        function compileCartData() {
            const cartKeys = Object.keys(cart);
            const selectedItems = [];
            cartKeys.forEach(itemId => {
                const itemObj = db.items.find(i => i.id === itemId);
                if (itemObj) {
                    const catObj = db.categories.find(c => c.id === itemObj.catId);
                    selectedItems.push({ catName: catObj?catObj.name:'未分類', itemName: itemObj.name, qty: cart[itemId].qty || '未填' });
                }
            });
            if (selectedItems.length === 0) return null;

            const grouped = {};
            selectedItems.forEach(item => {
                if (!grouped[item.catName]) grouped[item.catName] = [];
                grouped[item.catName].push(`${item.itemName} *${item.qty}`);
            });

            let textOutput = `材料訂單\n送貨地點：${currentState.siteName}\n`;
            for (const catName in grouped) { textOutput += `【${catName}】\n` + grouped[catName].join('\n') + `\n`; }
            textOutput += ``;

            return { text: textOutput.trim(), items: selectedItems };
        }

        // 上傳至 Google Sheet：先存紀錄欄，再上傳Google，最後詢問是否傳LINE，並清除訂單
        function uploadCartToGoogleSheetOnly() {
            if(!currentState.siteId) return alert('⚠️ 請先在上方選擇送貨案場！');
            const data = compileCartData();
            if (!data) return alert('訂單裡沒有材料！');

            // 1. 存檔
            const dateStr = document.getElementById('inputOrderDate')?.value || getTargetDateStr();
            const cartTextWithDate = `${dateStr} ${data.text}`;
            if(!db.dailyRecords[dateStr]) db.dailyRecords[dateStr] = {};
            if(!Array.isArray(db.dailyRecords[dateStr].order)) {
                db.dailyRecords[dateStr].order = db.dailyRecords[dateStr].order ? [db.dailyRecords[dateStr].order] : [];
            }
            const alreadySaved = db.dailyRecords[dateStr].order.some(r => r.text === cartTextWithDate && r.siteId === currentState.siteId);
            if (!alreadySaved) {
                db.dailyRecords[dateStr].order.push({ siteId: currentState.siteId, text: cartTextWithDate });
            }
            saveToLocalStorage();
            initHomeCalendar();

            // 2. 傳Google，完成後詢問LINE，最後清除
            const SCRIPT_URL = db.config?.scriptUrl?.trim() || '';
            if (!SCRIPT_URL || db.config?.disableUpload) {
                alert('訂單資料已儲存，未連結Google');
                _askLineAndClearCart(cartTextWithDate, dateStr);
                return;
            }
            const btn = document.getElementById('btnSubmitCart');
            if(btn) { btn.innerText = '⏳ 同步中...'; btn.disabled = true; }
            const payload = {
                AM: currentState.siteName,
                items: data.items.map(item => ({ cat: item.catName, PX: item.itemName, SL: item.qty }))
            };
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
            .then(() => { alert('訂單數據已成功發送至 Google 試算表！'); })
            .catch(() => { alert('傳送失敗，請確認網路連線與網址設定。'); })
            .finally(() => {
                if(btn) { btn.innerText = '儲存並上傳☁️'; btn.disabled = false; }
                _askLineAndClearCart(cartTextWithDate, dateStr);
            });
        }

        let _pendingLineText = '';

            // 清除訂單
            cart = {};

            renderCart();

        // ================= 首頁記錄內嵌編輯 =================
        let _editCtx = null; // { type, idx, dateStr }
        let _afterShowCheckId = null; // 編輯返回後自動勾選的 checkbox id

        function openInlineEdit(prefix, idx, dateStr) {
            const typeMap = { inlineChkLog: 'log', inlineChkNotes: 'notes', inlineChkOrder: 'order' };
            const type = typeMap[prefix];
            if (!type) return;
            const rec = db.dailyRecords[dateStr];
            if (!rec || !rec[type]) return;
            const arr = Array.isArray(rec[type]) ? rec[type] : [rec[type]];
            const item = arr[parseInt(idx)];
            if (!item) return;
            _editCtx = { type, idx: parseInt(idx), dateStr };

            if (type === 'log') {
                openEditLogModal(item, dateStr, 'log');
            } else if (type === 'notes') {
                openEditLogModal(item, dateStr, 'notes');
            } else if (type === 'order') {
                openEditOrderModal(item, dateStr, parseInt(idx));
            }
        }

        function openInlineEditPunch(dateStr) {
            let lines = [], note = '';
            if(db.punches) {
                for(let sId in db.punches) {
                    if(db.punches[sId] && db.punches[sId][dateStr]) {
                        const siteObj = db.sites.find(s => s.id === sId);
                        lines.push(siteObj ? siteObj.name : '未知案場');
                        if(!note && db.punches[sId][dateStr].note) note = db.punches[sId][dateStr].note;
                    }
                }
            }
            _editCtx = { type: 'punch', dateStr };
            document.getElementById('editModalTitle').innerText = '編輯出勤備註';
            document.getElementById('editModalTextarea').value = note;
            document.getElementById('editRecordModal').style.display = 'flex';
        }

        function saveInlineEdit() {
            if (!_editCtx) return;
            const newText = document.getElementById('editModalTextarea').value;
            const { type, idx, dateStr } = _editCtx;

            if (type === 'punch') {
                if(db.punches) {
                    for(let sId in db.punches) {
                        if(db.punches[sId] && db.punches[sId][dateStr]) {
                            db.punches[sId][dateStr].note = newText;
                        }
                    }
                }
            } else {
                const rec = db.dailyRecords[dateStr];
                if (!rec || !rec[type]) return;
                const arr = Array.isArray(rec[type]) ? rec[type] : [rec[type]];
                if (arr[idx]) arr[idx].text = newText;
                rec[type] = arr;
                db.dailyRecords[dateStr] = rec;
            }

            saveToLocalStorage();
            closeInlineEdit();
            initHomeCalendar();
            _afterShowCheckId = 'inlineChkPunch';
            showInlineDayView(dateStr);
        }

        function closeInlineEdit() {
            document.getElementById('editRecordModal').style.display = 'none';
            _editCtx = null;
        }

        // 點擊彈窗背景關閉
        document.getElementById('editRecordModal').addEventListener('click', function(e) {
            if(e.target === this) closeInlineEdit();
        });

        // ================= 施工日誌／工地記事 編輯彈窗 =================
        function openEditLogModal(item, dateStr, type) {
            _editCtx = { type, dateStr, idx: _editCtx ? _editCtx.idx : 0 };
            const isLog = type === 'log';
            document.getElementById('editLogModalTitle').innerText = isLog ? '編輯施工日誌' : '編輯工地記事';
            document.getElementById('editLogDate').value = dateStr;
            document.getElementById('editLogItemsWrap').style.display = isLog ? '' : 'none';
            document.getElementById('editNotesWrap').style.display = isLog ? 'none' : '';

            // 填入案場選擇
            const siteGroup = document.getElementById('editLogSiteGroup');
            siteGroup.innerHTML = '';
            db.sites.forEach(site => {
                const label = document.createElement('label');
                label.className = 'item-label';
                label.style.cssText = 'padding:4px 0; cursor:pointer;';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'editLogSiteRadio';
                radio.value = site.id;
                radio.className = 'item-checkbox';
                if (item.siteId === site.id) radio.checked = true;
                radio.addEventListener('change', () => { _editCtx.siteId = site.id; _editCtx.siteName = site.name; });
                const span = document.createElement('span');
                span.innerText = site.name;
                label.appendChild(radio); label.appendChild(span);
                siteGroup.appendChild(label);
            });
            // 預設 siteId/siteName
            const siteObj = db.sites.find(s => s.id === item.siteId);
            _editCtx.siteId = item.siteId;
            _editCtx.siteName = siteObj ? siteObj.name : '';

            if (isLog) {
                // 解析現有文字填入 log rows
                const container = document.getElementById('editLogItemsContainer');
                container.innerHTML = '';
                // 解析格式：項目 N：xxx\n↳ 區域：xxx\n↳ 人數：xxx
                const lines = item.text.split('\n');
                let rows = [];
                let cur = null;
                lines.forEach(line => {
                    const mItem = line.match(/^項目 \d+：(.*)$/);
                    const mFloor = line.match(/^↳ 區域：(.*)$/);
                    const mPeople = line.match(/^↳ 人數：(.+?) 人$|^↳ 人數：無$/);
                    if (mItem) { if (cur) rows.push(cur); cur = { item: mItem[1] === '無' ? '' : mItem[1], floor: '', people: '' }; }
                    else if (mFloor && cur) { cur.floor = mFloor[1] === '無' ? '' : mFloor[1]; }
                    else if (mPeople && cur) {
                        const m2 = line.match(/^↳ 人數：(.+?) 人$/);
                        cur.people = m2 ? m2[1] : '';
                    }
                });
                if (cur) rows.push(cur);
                if (rows.length === 0) rows.push({ item: '', floor: '', people: '' });
                rows.forEach(r => addEditLogItemRow(r.item, r.floor, r.people));
            } else {
                // 工地記事：提取內容部分
                const lines = item.text.split('\n');
                const startIdx = lines.findIndex(l => l.startsWith('------------------------'));
                const content = startIdx >= 0 ? lines.slice(startIdx + 1).join('\n').trim() : item.text;
                document.getElementById('editNotesTextarea').value = content;
            }
            document.getElementById('editLogModal').style.display = 'flex';
        }

        function addEditLogItemRow(itemValue = '', floorValue = '', peopleValue = '') {
            const container = document.getElementById('editLogItemsContainer');
            const div = document.createElement('div');
            div.className = 'log-entry-item';
            div.innerHTML = `
                <button type="button" class="btn-delete-log-item" onclick="removeEditLogItemRow(this)">移除</button>
                <div style="margin-top:8px;">
                    <label style="font-size:13px;font-weight:bold;display:block;margin-bottom:4px;color:#4b5563;">施工項目/記錄事項：</label>
                    <textarea class="log-item-input" rows="2" style="width:100%;resize:none;overflow:hidden;line-height:1.6;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;background:white;-webkit-user-select:text;user-select:text;" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${itemValue}</textarea>
                </div>
                <div class="log-entry-row">
                    <div>
                        <label style="font-size:13px;font-weight:bold;display:block;margin-bottom:4px;color:#4b5563;">樓層/區域：</label>
                        <input type="text" class="log-floor-input" value="${floorValue}" placeholder="如：1F柱牆">
                    </div>
                    <div>
                        <label style="font-size:13px;font-weight:bold;display:block;margin-bottom:4px;color:#4b5563;">人數：</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" class="log-people-input" value="${peopleValue}">
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        function removeEditLogItemRow(btn) {
            const container = document.getElementById('editLogItemsContainer');
            if (container.children.length <= 1) return alert('請至少保留一個施工項目！');
            btn.parentElement.remove();
        }

        function compileEditLogText() {
            const { type, siteId, siteName } = _editCtx;
            const dateStr = document.getElementById('editLogDate').value || _editCtx.dateStr;
            if (type === 'log') {
                const container = document.getElementById('editLogItemsContainer');
                const items = container.getElementsByClassName('log-entry-item');
                let projectLogText = '';
                let hasContent = false;
                let hasFloorOrPeople = false;
                for (let i = 0; i < items.length; i++) {
                    const itemVal = items[i].querySelector('.log-item-input').value.trim();
                    const floorVal = items[i].querySelector('.log-floor-input').value.trim();
                    const peopleVal = items[i].querySelector('.log-people-input').value.trim();
                    if (itemVal || floorVal || peopleVal) {
                        hasContent = true;
                        if (floorVal && peopleVal) hasFloorOrPeople = true;
                        let line = `項目 ${i + 1}：${itemVal || '無'}`;
                        if (floorVal) line += `\n↳ 區域：${floorVal}`;
                        if (peopleVal) line += `\n↳ 人數：${peopleVal} 人`;
                        projectLogText += line + '\n';
                    }
                }
                if (!hasContent) return null;
                const title = hasFloorOrPeople ? '施工日誌' : '記錄事項';
                return `${dateStr} ${title}\n案場名稱：${siteName}\n${projectLogText}`;
            } else {
                const val = document.getElementById('editNotesTextarea').value.trim();
                if (!val) return null;
                return `${dateStr} 工地記事\n案場名稱：${siteName}\n${val}\n`;
            }
        }

        function saveEditLogModal() {
            if (!_editCtx) return;
            const newText = compileEditLogText();
            if (!newText) return alert('請填寫內容！');
            const { type, idx, dateStr: oldDateStr, siteId } = _editCtx;
            const newDateStr = document.getElementById('editLogDate').value || oldDateStr;

            // 從舊日期移除
            const oldRec = db.dailyRecords[oldDateStr];
            if (oldRec && oldRec[type]) {
                const arr = Array.isArray(oldRec[type]) ? oldRec[type] : [oldRec[type]];
                arr.splice(idx, 1);
                if (arr.length === 0) delete oldRec[type]; else oldRec[type] = arr;
                if (Object.keys(oldRec).length === 0) delete db.dailyRecords[oldDateStr];
            }

            // 寫入新日期
            if (!db.dailyRecords[newDateStr]) db.dailyRecords[newDateStr] = {};
            const newRec = db.dailyRecords[newDateStr];
            if (!Array.isArray(newRec[type])) newRec[type] = newRec[type] ? [newRec[type]] : [];
            newRec[type].push({ siteId: siteId, text: newText });

            saveToLocalStorage();
            closeEditLogModal();
            initHomeCalendar();
            const prefixMap = { log: 'inlineChkLog', notes: 'inlineChkNotes' };
            _afterShowCheckId = `${prefixMap[type] || 'inlineChkLog'}_${newRec[type].length - 1}`;
            showInlineDayView(newDateStr);
            alert('紀錄已儲存！');
        }

        function deleteFromEditLogModal() {
            if (!_editCtx) return;
            const { type, idx, dateStr } = _editCtx;
            if (!confirm(`⚠️ 確定要刪除這筆紀錄嗎？(不可還原)`)) return;
            const rec = db.dailyRecords[dateStr];
            if (rec && rec[type]) {
                const arr = Array.isArray(rec[type]) ? rec[type] : [rec[type]];
                arr.splice(idx, 1);
                if (arr.length === 0) delete rec[type]; else rec[type] = arr;
                if (Object.keys(rec).length === 0) delete db.dailyRecords[dateStr];
            }
            saveToLocalStorage();
            closeEditLogModal();
            initHomeCalendar();
            showInlineDayView(dateStr);
            updateHomeImportBtn();
        }

        function deleteFromEditOrderModal() {
            if (!_editCtx) return;
            const { idx, dateStr } = _editCtx;
            if (!confirm(`⚠️ 確定要刪除這筆材料訂購嗎？(不可還原)`)) return;
            const rec = db.dailyRecords[dateStr];
            if (rec && rec.order) {
                const arr = Array.isArray(rec.order) ? rec.order : [rec.order];
                arr.splice(idx, 1);
                if (arr.length === 0) delete rec.order; else rec.order = arr;
                if (Object.keys(rec).length === 0) delete db.dailyRecords[dateStr];
            }
            saveToLocalStorage();
            closeEditOrderModal();
            initHomeCalendar();
            showInlineDayView(dateStr);
            updateHomeImportBtn();
        }

        function deleteFromEditPunchModal() {
            if (!_editCtx) return;
            const { dateStr } = _editCtx;
            if (!confirm(`⚠️ 確定要刪除 ${dateStr} 的出勤紀錄嗎？(不可還原)`)) return;
            if (db.punches) {
                for (let sId in db.punches) {
                    if (db.punches[sId] && db.punches[sId][dateStr]) {
                        delete db.punches[sId][dateStr];
                    }
                }
            }
            saveToLocalStorage();
            closeInlineEdit();
            initHomeCalendar();
            showInlineDayView(dateStr);
            updateHomeImportBtn();
        }

        function shareEditLogToLine() {
            const newText = compileEditLogText();
            if (!newText) return alert('請填寫內容！');
            window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(newText)}`;
        }

        function closeEditLogModal() {
            document.getElementById('editLogModal').style.display = 'none';
            _editCtx = null;
        }

        document.getElementById('editLogModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditLogModal();
        });

        // ================= 材料訂購 編輯彈窗 =================
        let _editOrderItems = []; // [{catName, itemName, qty}]

        function openEditOrderModal(item, dateStr, idx) {
            _editCtx = { type: 'order', idx, dateStr };
            const siteObj = db.sites.find(s => s.id === item.siteId);
            document.getElementById('editOrderSiteName').innerText = siteObj ? siteObj.name : '';
            document.getElementById('editOrderDate').value = dateStr;
            _editCtx.siteId = item.siteId;

            // 解析 text 為品項列表
            _editOrderItems = [];
            const lines = item.text.split('\n');
            let currentCat = '';
            lines.forEach(line => {
                const catMatch = line.match(/^【(.+)】$/);
                if (catMatch) { currentCat = catMatch[1]; return; }
                const itemMatch = line.match(/^(.+?) \*(.+)$/);
                if (itemMatch && currentCat) {
                    _editOrderItems.push({ catName: currentCat, itemName: itemMatch[1].trim(), qty: itemMatch[2].trim() });
                }
            });
            renderEditOrderList();
            document.getElementById('editOrderModal').style.display = 'flex';
        }

        function renderEditOrderList() {
            const list = document.getElementById('editOrderList');
            list.innerHTML = '';
            if (_editOrderItems.length === 0) {
                list.innerHTML = '<p class="text-muted text-center">訂單空空如也。</p>';
                return;
            }
            _editOrderItems.forEach((it, idx) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
                        <span style="font-size:11px;color:#4b5563;">[${it.catName}]</span>
                        <span style="font-size:14px;">${it.itemName}</span>
                    </div>
                    <input type="number" inputmode="decimal" pattern="[0-9]*" value="${it.qty}" oninput="_editOrderItems[${idx}].qty=this.value" class="cart-qty-input" placeholder="數量/單位">
                    <button onclick="removeEditOrderItem(${idx})" style="background:none;color:#D9006C;font-size:14px;">❌</button>
                `;
                list.appendChild(div);
            });
        }

        function removeEditOrderItem(idx) {
            _editOrderItems.splice(idx, 1);
            renderEditOrderList();
        }

        function compileEditOrderText() {
            if (_editOrderItems.length === 0) return null;
            const newDateStr = document.getElementById('editOrderDate').value || _editCtx.dateStr;
            const { siteId } = _editCtx;
            const siteObj = db.sites.find(s => s.id === siteId);
            const siteName = siteObj ? siteObj.name : '';
            const grouped = {};
            _editOrderItems.forEach(it => {
                if (!grouped[it.catName]) grouped[it.catName] = [];
                grouped[it.catName].push(`${it.itemName} *${it.qty || '未填'}`);
            });
            let text = `${newDateStr} 材料訂單\n送貨地點：${siteName}\n`;
            for (const cat in grouped) { text += `【${cat}】\n` + grouped[cat].join('\n') + '\n'; }
            return text.trim();
        }

        function saveEditOrder() {
            if (!_editCtx) return;
            const newText = compileEditOrderText();
            if (!newText) return alert('訂單沒有品項！');
            const { idx, dateStr: oldDateStr, siteId } = _editCtx;
            const newDateStr = document.getElementById('editOrderDate').value || oldDateStr;

            // 從舊日期移除
            const oldRec = db.dailyRecords[oldDateStr];
            if (oldRec && oldRec.order) {
                const arr = Array.isArray(oldRec.order) ? oldRec.order : [oldRec.order];
                arr.splice(idx, 1);
                if (arr.length === 0) delete oldRec.order; else oldRec.order = arr;
                if (Object.keys(oldRec).length === 0) delete db.dailyRecords[oldDateStr];
            }

            // 寫入新日期
            if (!db.dailyRecords[newDateStr]) db.dailyRecords[newDateStr] = {};
            const newRec = db.dailyRecords[newDateStr];
            if (!Array.isArray(newRec.order)) newRec.order = newRec.order ? [newRec.order] : [];
            newRec.order.push({ siteId, text: newText });

            saveToLocalStorage();

            // 上傳 Google（若設定了且未停用）
            const SCRIPT_URL = db.config?.scriptUrl?.trim() || '';
            if (SCRIPT_URL && !db.config?.disableUpload) {
                const payload = {
                    AM: document.getElementById('editOrderSiteName').innerText,
                    items: _editOrderItems.map(it => ({ cat: it.catName, PX: it.itemName, SL: it.qty }))
                };
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                .then(() => alert('訂單已儲存並上傳 Google！'))
                .catch(() => alert('儲存成功，但上傳失敗。'));
            } else {
                alert('訂單已儲存。');
            }
            closeEditOrderModal();
            initHomeCalendar();
            _afterShowCheckId = `inlineChkOrder_${newRec.order.length - 1}`;
            showInlineDayView(newDateStr);
        }

        function shareEditOrderToLine() {
            const text = compileEditOrderText();
            if (!text) return alert('訂單沒有品項！');
            window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
        }

        function closeEditOrderModal() {
            document.getElementById('editOrderModal').style.display = 'none';
            _editCtx = null;
            _editOrderItems = [];
        }

        document.getElementById('editOrderModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditOrderModal();
        });

        // ================= 首頁記錄單筆刪除 =================
        function deleteOneInlineRecord(prefix, idx, dateStr) {
            const typeMap = { inlineChkLog: 'log', inlineChkNotes: 'notes', inlineChkOrder: 'order', punch: 'punch' };
            const type = typeMap[prefix];
            const labelMap = { log: '施工日誌', notes: '工地記事', order: '材料訂購', punch: '出勤' };
            if (!confirm(`確定要刪除這筆${labelMap[type] || ''}紀錄嗎？(不可還原)`)) return;

            if (type === 'punch') {
                if (db.punches) {
                    for (let sId in db.punches) {
                        if (db.punches[sId] && db.punches[sId][dateStr]) delete db.punches[sId][dateStr];
                    }
                }
            } else {
                const rec = db.dailyRecords[dateStr];
                if (!rec || !rec[type]) return;
                const arr = Array.isArray(rec[type]) ? rec[type] : [rec[type]];
                arr.splice(parseInt(idx), 1);
                if (arr.length === 0) delete rec[type];
                else rec[type] = arr;
                if (Object.keys(rec).length === 0) delete db.dailyRecords[dateStr];
            }
            saveToLocalStorage();
            initHomeCalendar();
            showInlineDayView(dateStr);
        }

        // ================= 右滑返回手勢（含動畫） =================
        (function() {
            let touchStartX = 0;
            let touchStartY = 0;
            let isDragging = false;
            let mainEl = null;
            const EDGE_ZONE = 40; // 只有從距左邊緣 40px 內開始滑才觸發

            function getMain() { return mainEl || (mainEl = document.querySelector('main.max-w-md')); }

            document.addEventListener('touchstart', e => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                isDragging = false;
                const m = getMain();
                m.style.transition = 'none';
            }, { passive: true });

            document.addEventListener('touchmove', e => {
                const dx = e.touches[0].clientX - touchStartX;
                const dy = Math.abs(e.touches[0].clientY - touchStartY);
                const btn = document.getElementById('btnBack');
                // 只在起點於左側邊緣範圍內、且是明顯右滑時啟動
                if (!isDragging && touchStartX <= EDGE_ZONE && dx > 10 && dy < 40 && btn && !btn.classList.contains('hidden')) {
                    isDragging = true;
                }
                if (isDragging && dx > 0) {
                    const m = getMain();
                    m.style.transform = `translateX(${dx}px)`;
                    m.style.opacity = `${Math.max(0.4, 1 - dx / window.innerWidth)}`;
                }
            }, { passive: true });

            document.addEventListener('touchend', e => {
                const m = getMain();
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
                const btn = document.getElementById('btnBack');

                if (isDragging && dx > 60 && dy < 40 && btn && !btn.classList.contains('hidden')) {
                    // 觸發返回：滑出畫面
                    m.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
                    m.style.transform = `translateX(100%)`;
                    m.style.opacity = '0';
                    setTimeout(() => {
                        m.style.transition = 'none';
                        m.style.transform = '';
                        m.style.opacity = '';
                        btn.click();
                        // 新頁面從左側滑入
                        m.style.transform = 'translateX(-30px)';
                        m.style.opacity = '0';
                        requestAnimationFrame(() => {
                            m.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                            m.style.transform = '';
                            m.style.opacity = '';
                            setTimeout(() => { m.style.transition = ''; }, 220);
                        });
                    }, 220);
                } else if (isDragging) {
                    // 未達閾值：彈回
                    m.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                    m.style.transform = '';
                    m.style.opacity = '';
                    setTimeout(() => { m.style.transition = ''; }, 200);
                }
                isDragging = false;
            }, { passive: true });
        })();

        // ================= 材料訂購 Excel 匯出 =================
        function exportOrderExcel() {
            const monthVal = document.getElementById('inputExportOrderMonth').value;
            if (!monthVal) return alert('請先選擇要匯出的年月！');
            const [yyyy, mm] = monthVal.split('-');
            const prefix = `${yyyy}-${mm}`;

            // 收集該月份所有 order 紀錄
            const rows = [];
            Object.keys(db.dailyRecords).sort().forEach(dateStr => {
                if (!dateStr.startsWith(prefix)) return;
                const rec = db.dailyRecords[dateStr];
                if (!rec || !rec.order) return;
                const orderArr = Array.isArray(rec.order) ? rec.order : [rec.order];
                orderArr.forEach(orderEntry => {
                    if (!orderEntry || !orderEntry.text) return;
                    const siteObj = db.sites.find(s => s.id === orderEntry.siteId);
                    const siteName = siteObj ? siteObj.name : orderEntry.siteId || '';
                    // 解析 text 內容：找品項行
                    const lines = orderEntry.text.split('\n');
                    let currentCat = '';
                    lines.forEach(line => {
                        const catMatch = line.match(/^【(.+)】$/);
                        if (catMatch) { currentCat = catMatch[1]; return; }
                        // 品項行格式：品項名稱 *數量
                        const itemMatch = line.match(/^(.+?) \*(.+)$/);
                        if (itemMatch && currentCat) {
                            rows.push({ date: dateStr, site: siteName, cat: currentCat, item: itemMatch[1].trim(), qty: itemMatch[2].trim() });
                        }
                    });
                });
            });

            if (rows.length === 0) return alert(`${yyyy}年${mm}月 無任何材料訂購紀錄！`);

            // 產生 CSV (Excel 相容 UTF-8 BOM)
            const header = ['日期', '案場', '分類', '品項名稱', '數量'];
            const csvRows = [header, ...rows.map(r => [r.date, r.site, r.cat, r.item, r.qty])];
            const csvContent = '\uFEFF' + csvRows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `材料訂購${yyyy}-${mm}.csv`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadFromLocalStorage(); 
            navigateTo('sites');

            // 從LINE回來後顯示訂單已儲存提示
            try {
                const savedDate = sessionStorage.getItem('_orderSavedDate');
                if (savedDate) {
                    sessionStorage.removeItem('_orderSavedDate');
                    setTimeout(() => alert(savedDate + ' 訂單已儲存'), 300);
                }
            } catch(e) {}

            // 日期選擇器「重置/清除」時自動回到今天
            ['inputPunchDate', 'inputLogDate', 'inputNotesDate', 'inputOrderDate'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('change', function() {
                    if (!this.value) {
                        this.value = getTargetDateStr();
                        // punchDate 有額外的 sync 邏輯
                        if (id === 'inputPunchDate') syncPunchDateChange();
                    }
                });
            });

            // 預設開啟今天的行事曆記錄
            const todayStr = getTargetDateStr();
            selectedHomeDateStr = todayStr;
            const todayEl = document.querySelector('.calendar-day.today');
            if (todayEl) todayEl.classList.add('selected');
            showInlineDayView(todayStr);
            updateHomeImportBtn();

            _categorySortable = new Sortable(document.getElementById('manageListCategories'), {
                animation: 150, handle: '.drag-handle', ghostClass: 'sortable-ghost', threshold: 5,
                disabled: true,
                onEnd: function () {}
            });
        });
    </script>
