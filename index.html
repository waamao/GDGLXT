            const blocks = _getBlocks();
            const blk = blocks[_siEditingBlockIdx];
            const ct = _getContractTotal();

            document.getElementById('btnProgressModalEdit').style.display = 'none';
            document.getElementById('btnProgressModalSave').style.display = '';
            document.getElementById('progressModalAddBtn').style.display = '';

            const itemsContainer = document.getElementById('progressModalItems');
            itemsContainer.innerHTML = '';
            (blk.items || []).forEach((item, iIdx) => {
                itemsContainer.appendChild(_makeModalItemRow(iIdx, item.month, item.amount, ct, true));
            });
            _recalcModalSummary();
            _scrollModalToBottom();
        }

        function _makeModalItemRow(iIdx, month, amount, ct, editable) {
            const div = document.createElement('div');
            div.style.cssText = 'display:grid; grid-template-columns:1fr 1fr 56px 28px; gap:6px; align-items:center;';
            div.setAttribute('data-modal-row', iIdx);
            const amt = Number(amount)||0;
            const pct = ct > 0 ? (amt/ct*100).toFixed(1)+'%' : '—';
            const monthLabel = month ? month.replace(/^(\d{4})-(\d{2})$/, '$1年$2月') : '—';

            if (editable) {
                div.innerHTML = `
                    <select class="modal-month-sel" onchange="_recalcModalSummary()"
                        style="font-size:13px; padding:8px 4px; border:1px solid #d1d5db; border-radius:8px; background:white; -webkit-user-select:text; user-select:text; height:40px;">
                        ${_buildMonthOptions(month || _currentMonthValue())}
                    </select>
                    <input type="number" inputmode="decimal" value="${amount||''}" placeholder="金額"
                        class="modal-amount-inp" oninput="_recalcModalSummary()"
                        style="font-size:13px; padding:8px 10px; border:1px solid #d1d5db; border-radius:8px; background:white; text-align:right; -webkit-user-select:text; user-select:text; height:40px;">
                    <span class="modal-pct-cell" style="font-size:12px; color:#374151; text-align:right; padding-right:2px;">${pct}</span>
                    <button type="button" onclick="_removeModalItem(this)" style="background:none; color:#D9006C; font-size:18px; padding:0; line-height:1; font-weight:bold;">×</button>
                `;
            } else {
                div.innerHTML = `
                    <span style="font-size:13px; color:#374151; padding:8px 0;">${monthLabel}</span>
                    <span style="font-size:13px; color:#374151; text-align:right; padding:8px 10px 8px 0;">${_fmtAmount(amount)}</span>
                    <span class="modal-pct-cell" style="font-size:13px; color:#374151; text-align:right;">${pct}</span>
                    <span></span>
                `;
            }
            return div;
        }

        function _addProgressModalItem() {
            if (!_progressModalIsEditing) _enterProgressModalEdit();
            const ct = _getContractTotal();
            const container = document.getElementById('progressModalItems');
            let defaultMonth = _currentMonthValue();
            const lastSel = container.querySelector('div[data-modal-row]:last-child .modal-month-sel');
            if (lastSel && lastSel.value) {
                const [y, m] = lastSel.value.split('-').map(Number);
                const d = new Date(y, m);
                defaultMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            }
            const row = _makeModalItemRow(container.children.length, defaultMonth, '', ct, true);
            container.appendChild(row);
            _recalcModalSummary();
            setTimeout(() => {
                const inp = row.querySelector('.modal-amount-inp');
                if (inp) inp.focus();
                container.scrollTop = container.scrollHeight;
            }, 30);
        }

        function _removeModalItem(btn) {
            btn.closest('div[data-modal-row]').remove();
            _recalcModalSummary();
        }

        function _recalcModalSummary() {
            const ct = _getContractTotal();
            const rows = document.querySelectorAll('#progressModalItems div[data-modal-row]');
            let total = 0;
            rows.forEach(row => {
                const inp = row.querySelector('.modal-amount-inp');
                const pctEl = row.querySelector('.modal-pct-cell');
                if (inp) {
                    const amt = Number(inp.value)||0;
                    total += amt;
                    if (pctEl) pctEl.innerText = ct > 0 ? (amt/ct*100).toFixed(1)+'%' : '—';
                } else {
                    const spans = row.querySelectorAll('span');
                    if (spans.length >= 2) total += Number(spans[1].innerText.replace(/,/g,'')) || 0;
                }
            });
            document.getElementById('progressModalSumAmt').innerText = rows.length ? _fmtAmount(total) : '—';
            document.getElementById('progressModalSumPct').innerText = rows.length && ct>0 ? (total/ct*100).toFixed(1)+'%' : '—';
        }

        function _saveProgressModal() {
            const blocks = _getBlocks();
            const title = (blocks[_siEditingBlockIdx] && blocks[_siEditingBlockIdx].title) || '計價進度';
            const rows = document.querySelectorAll('#progressModalItems div[data-modal-row]');
            const items = [];
            rows.forEach(row => {
                const sel = row.querySelector('.modal-month-sel');
                const inp = row.querySelector('.modal-amount-inp');
                if (!sel || !inp) return;
                const amount = inp.value.trim();
                if (!amount || Number(amount) === 0) return;
                items.push({ month: sel.value, amount });
            });
            blocks[_siEditingBlockIdx].title = title;
            blocks[_siEditingBlockIdx].items = items;
            saveToLocalStorage();
            _progressModalIsEditing = false;
            _renderAllProgressBlocks();
            _openProgressModal(_siEditingBlockIdx);
        }

        function _deleteProgressBlock(bIdx) {
            const blocks = _getBlocks();
            const idx = (bIdx !== undefined) ? bIdx : _siEditingBlockIdx;
            if (idx === null || idx === undefined) return;
            const title = (blocks[idx] && blocks[idx].title) || '計價進度';
            if (!confirm(`確定要刪除「${title}」？`)) return;
            blocks.splice(idx, 1);
            saveToLocalStorage();
            document.getElementById('progressEditModal').style.display = 'none';
            _siEditingBlockIdx = null;
            _renderAllProgressBlocks();
        }

        function addProgressBlock() {
            const blocks = _getBlocks();
            blocks.push({ id: Date.now().toString(), title: '計價進度', items: [] });
            saveToLocalStorage();
            _renderAllProgressBlocks();
            setTimeout(() => {
                const wrap = document.getElementById('progressDetailWrap');
                if (wrap) wrap.scrollTop = wrap.scrollHeight;
            }, 50);
        }

        function deleteSiteFromInfo() {
            if (!_siSelectedSiteId) return;
            const site = db.sites.find(s => s.id === _siSelectedSiteId);
            if (!site) return;
            if (!confirm(`確定要刪除案場「${site.name}」嗎？`)) return;
            db.sites = db.sites.filter(s => s.id !== _siSelectedSiteId);
            if (db.siteInfo && db.siteInfo[_siSelectedSiteId]) delete db.siteInfo[_siSelectedSiteId];
            if (currentState.siteId === _siSelectedSiteId) { currentState.siteId = null; currentState.siteName = ''; }
            _siSelectedSiteId = null;
            saveToLocalStorage();
            document.getElementById('siteInfoDetailWrap').style.display = 'none';
            document.getElementById('progressDetailWrap').style.display = 'none';
            renderSiteInfoList();
        }

        function showAddSiteInline() {
            document.getElementById('addSiteInlineWrap').style.display = '';
            document.getElementById('inputNewSiteInfo').value = '';
            document.getElementById('inputNewSiteInfo').focus();
        }
        function cancelAddSiteInfo() {
            document.getElementById('addSiteInlineWrap').style.display = 'none';
        }
        function confirmAddSiteInfo() {
            const name = document.getElementById('inputNewSiteInfo').value.trim();
            if (!name) return alert('請輸入案場名稱！');
            if (db.sites.some(s => s.name === name)) return alert(`案場「${name}」已存在，請使用不同名稱。`);
            const newSite = { id: Date.now().toString(), name };
            db.sites.push(newSite);
            saveToLocalStorage();
            document.getElementById('addSiteInlineWrap').style.display = 'none';
            renderSiteInfoList();
            selectSiteInfoSite(newSite.id);
        }

        // ================= 施工日誌 / 備忘錄 =================
        function onLogTypeChange() {
            const isMemo = document.getElementById('logTypeMemo').checked;
            const memoText = document.getElementById('logTypeMemoText');
            if (memoText) memoText.style.color = isMemo ? '#D9006C' : '#4b5563';
            document.querySelectorAll('#logItemsContainer .log-entry-row').forEach(row => {
                row.style.display = isMemo ? 'none' : '';
            });
        }

        function getLogRawText() {
            const isMemo = document.getElementById('logTypeMemo') && document.getElementById('logTypeMemo').checked;
            const container = document.getElementById('logItemsContainer');
            const items = container.getElementsByClassName('log-page-entry-item');
            let projectLogText = '';
            let hasContent = false;
            for (let i = 0; i < items.length; i++) {
                const itemVal = items[i].querySelector('.log-item-input').value.trim();
                if (isMemo) {
                    if (itemVal) { hasContent = true; projectLogText += `項目 ${i + 1}：${itemVal}\n`; }
                } else {
                    const floorVal = items[i].querySelector('.log-floor-input').value.trim();
                    const peopleVal = items[i].querySelector('.log-people-input').value.trim();
                    if (itemVal || floorVal || peopleVal) {
                        hasContent = true;
                        let line = `項目 ${i + 1}：${itemVal || '無'}`;
                        if (floorVal) line += `\n↳ 區域：${floorVal}`;
                        if (peopleVal) line += `\n↳ 人數：${peopleVal} 人`;
                        projectLogText += line + '\n';
                    }
                }
            }
            if (!hasContent) return null;
            const title = isMemo ? '備忘錄' : '施工日誌';
            return `${title}\n案場名稱：${currentState.siteName}\n${projectLogText}`;
        }

        function saveLogOrNotes() {
            if (!currentState.siteId) return alert('⚠️ 請先在上方選擇案場！');
            const dateStr = document.getElementById('inputLogDate').value || getTargetDateStr();
            const logText = getLogRawText();
            if (!logText) return alert('請至少填寫一項項目內容！');
            const logTextWithDate = `${dateStr} ${logText}`;
            if (!db.dailyRecords[dateStr]) db.dailyRecords[dateStr] = {};
            if (!Array.isArray(db.dailyRecords[dateStr].log)) {
                db.dailyRecords[dateStr].log = db.dailyRecords[dateStr].log ? [db.dailyRecords[dateStr].log] : [];
            }
            db.dailyRecords[dateStr].log.push({ siteId: currentState.siteId, text: logTextWithDate });
            const newIdx = db.dailyRecords[dateStr].log.length - 1;
            saveToLocalStorage();
            alert('已儲存！');
            const [y, m] = dateStr.split('-').map(Number);
            homeCalYear = y;
            homeCalMonth = m - 1;
            selectedHomeDateStr = dateStr;
            _afterShowCheckId = `inlineChkLog_${newIdx}`;
            navigateTo('sites');
        }

        // ================= 頁面切換 =================
        function navigateTo(page) {
            const prevPage = currentState.page;
            currentState.page = page;

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('btnBack').classList.remove('hidden');
            document.getElementById('btnHomeTop').classList.add('hidden');

            if (page === 'sites') {
                document.getElementById('pageSites').classList.add('active');
                document.getElementById('appTitle').innerText = '';
                document.getElementById('btnBack').classList.add('hidden');
                document.getElementById('btnHomeTop').classList.add('hidden');
                document.getElementById('homeTitle').classList.remove('hidden');
                initHomeCalendar();
                document.getElementById('homeMainBtns').classList.remove('hidden');
                if (selectedHomeDateStr) {
                    document.querySelectorAll('.calendar-day.selected').forEach(el => el.classList.remove('selected'));
                    document.querySelectorAll('.calendar-day:not(.empty)').forEach(el => {
                        const numEl = el.querySelector('.day-num');
                        if (!numEl) return;
                        const ds = `${homeCalYear}-${String(homeCalMonth+1).padStart(2,'0')}-${String(parseInt(numEl.innerText)).padStart(2,'0')}`;
                        if (ds === selectedHomeDateStr) el.classList.add('selected');
                    });
                    showInlineDayView(selectedHomeDateStr);
                }
            } else if (page === 'log') {
                document.getElementById('pageLog').classList.add('active');
                document.getElementById('appTitle').innerText = '';
                document.getElementById('homeTitle').classList.add('hidden');
                document.getElementById('inputLogDate').value = selectedHomeDateStr || getTargetDateStr();
                renderPageSiteSelector('logSiteGroup');
                const logTypeLogEl = document.getElementById('logTypeLog');
                if (logTypeLogEl) { logTypeLogEl.checked = true; onLogTypeChange(); }
                clearLogInputs();
                document.querySelector('#pageLog .scroll-list-body')?.scrollTo(0, 0);
            } else if (page === 'categories') {
                document.getElementById('pageCategories').classList.add('active');
                document.getElementById('appTitle').innerText = '';
                document.getElementById('homeTitle').classList.add('hidden');
                document.getElementById('btnHomeTop').classList.remove('hidden');
                document.getElementById('inputOrderDate').value = getTargetDateStr();
                document.getElementById('globalSearchBar').value = '';
                currentState.siteId = null;
                currentState.siteName = '';
                renderCategories();
                const listCatEl = document.getElementById('listCategories');
                if (listCatEl) listCatEl.scrollTop = 0;
            } else if (page === 'items') {
                document.getElementById('pageItems').classList.add('active');
                document.getElementById('appTitle').innerText = '';
                document.getElementById('homeTitle').classList.add('hidden');
                document.getElementById('btnHomeTop').classList.remove('hidden');
                document.getElementById('inputQuickItem').value = '';
                const _qaw = document.getElementById('quickAddItemWrap');
                if (_qaw) _qaw.style.display = 'none';
                document.getElementById('currentCategoryName').innerText = currentState.catName;
                renderItems();
                const listEl = document.getElementById('listItems');
                if (listEl) listEl.scrollTop = 0;
            } else if (page === 'cart') {
                document.getElementById('pageCart').classList.add('active');
                document.getElementById('appTitle').innerText = '';
                document.getElementById('homeTitle').classList.add('hidden');
                document.getElementById('btnHomeTop').classList.remove('hidden');
                document.getElementById('btnBack').dataset.backTo = prevPage === 'cart' ? 'items' : prevPage;
                const _orderDateVal = document.getElementById('inputOrderDate')?.value || '';
                const _cartDateEl = document.getElementById('cartOrderDateDisplay');
                if (_cartDateEl) _cartDateEl.innerText = _orderDateVal ? `訂單日期：${_orderDateVal}` : '';
                renderCartSiteSelector();
                renderCart();
            } else if (page === 'manage') {
                document.getElementById('pageManage').classList.add('active');
                document.getElementById('appTitle').innerText = '';
                document.getElementById('homeTitle').classList.add('hidden');
                document.getElementById('btnHomeTop').classList.add('hidden');
                document.getElementById('inputScriptUrl').value = db.config?.scriptUrl || '';
                _populateExportMonthSelect();
                _refreshLastExportDisplay();
                _categorySortMode = false;
                const catSortBtn = document.getElementById('btnCategorySort');
                if (catSortBtn) { catSortBtn.innerText = '排序'; catSortBtn.style.background = '#111111'; }
                if (_categorySortable) _categorySortable.option('disabled', true);
                renderManageCategories(false);
                renderManageCategoryDropdown();
                document.getElementById('pageManage').scrollTop = 0;
                document.getElementById('manageListCategories').scrollTop = 0;
            } else if (page === 'siteInfo') {
                document.getElementById('pageSiteInfo').classList.add('active');
                document.getElementById('appTitle').innerText = '';
                document.getElementById('homeTitle').classList.add('hidden');
                document.getElementById('btnHomeTop').classList.add('hidden');
                _siSelectedSiteId = null;
                document.getElementById('siteInfoDetailWrap').style.display  = 'none';
                document.getElementById('progressDetailWrap').style.display  = 'none';
                document.getElementById('addSiteInlineWrap').style.display   = 'none';
                _siteInfoSortMode = false;
                const sortBtn = document.getElementById('btnSiteInfoSort');
                if (sortBtn) { sortBtn.innerText = '排序'; sortBtn.style.background = '#111111'; }
                if (_siteInfoSortable) _siteInfoSortable.option('disabled', true);
                renderSiteInfoList();
                if (db.sites.length > 0) selectSiteInfoSite(db.sites[0].id);
                const siScroll = document.querySelector('#pageSiteInfo > div:last-child');
                if (siScroll) siScroll.scrollTop = 0;
                document.getElementById('siteInfoList').scrollTop = 0;
            }
            updateCartBadge();
        }

        document.getElementById('btnBack').addEventListener('click', (e) => {
            const p = currentState.page;
            if (p === 'manage' || p === 'log' || p === 'punch' || p === 'categories' || p === 'siteInfo') navigateTo('sites');
            else if (p === 'items') navigateTo('categories');
            else if (p === 'cart') {
                const target = e.target.dataset.backTo || 'items';
                navigateTo(target === 'sites' ? 'categories' : target);
            }
        });

        // ================= 材料選單與訂購 =================
        function renderCategories() {
            const list = document.getElementById('listCategories');
            const keyword = document.getElementById('globalSearchBar').value.toLowerCase().trim();
            const header = document.getElementById('categoryListHeader');

            if (keyword === '') {
                header.innerText = '選擇材料分類：';
                list.innerHTML = db.categories.length === 0 ? '<p class="text-muted text-center">目前無分類，請先至後台新增。</p>' : '';
                db.categories.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = "list-item";
                    div.style.cursor = "pointer";
                    div.onclick = function() { currentState.catId = cat.id; currentState.catName = cat.name; navigateTo('items'); };
                    div.innerHTML = `<span style="font-weight:500; color:#1f2937;">${cat.name}</span> <span style="color:#4b5563; font-size:12px; font-weight:bold;">進入 →</span>`;
                    list.appendChild(div);
                });
            } else {
                header.innerText = '🔍 全品項搜尋結果：';
                const filteredItems = db.items.filter(item => item.name.toLowerCase().includes(keyword)).sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
                list.innerHTML = filteredItems.length === 0 ? '<p class="text-muted text-center">無符合的材料品項。</p>' : '';
                filteredItems.forEach(item => {
                    const catObj = db.categories.find(c => c.id === item.catId);
                    const catName = catObj ? catObj.name : '未分類';
                    const inCart = !!cart[item.id];
                    const div = document.createElement('div');
                    div.className = "list-item";
                    div.innerHTML = `
                        <label class="item-label">
                            <input type="checkbox" id="chk-${item.id}" ${inCart ? 'checked' : ''} onchange="handleItemCheck('${item.id}', this.checked)" class="item-checkbox">
                            <span><small style="color:#888;">[${catName}]</small> ${item.name}</span>
                        </label>
                        <input type="number" inputmode="decimal" pattern="[0-9]*" value="${inCart ? cart[item.id].qty : ''}" oninput="handleItemQty('${item.id}', this.value)" class="qty-input" placeholder="數量">
                    `;
                    list.appendChild(div);
                });
            }
        }

        function handleItemCheck(itemId, checked) {
            if (checked) { if (!cart[itemId]) cart[itemId] = { qty: '' }; }
            else { delete cart[itemId]; }
            updateCartBadge();
        }

        function handleItemQty(itemId, qty) {
            if (qty.trim() !== '') {
                if (!cart[itemId]) cart[itemId] = { qty: '' };
                cart[itemId].qty = qty;
                const chk = document.getElementById(`chk-${itemId}`);
                if (chk) chk.checked = true;
            } else {
                if (cart[itemId]) cart[itemId].qty = '';
            }
            updateCartBadge();
        }

        function quickAddItem() {
            const catId = currentState.catId;
            const name = document.getElementById('inputQuickItem').value.trim();
            if (!name) return alert('品項名稱不能為空');
            const dup = db.items.find(i => i.name === name);
            if (dup) {
                const dupCat = db.categories.find(c => c.id === dup.catId);
                const catName = dupCat ? dupCat.name : '未知分類';
                return alert(`品項「${name}」已存在於「${catName}」分類，請使用不同名稱。`);
            }
            db.items.push({ id: Date.now().toString(), catId, name });
            saveToLocalStorage();
            document.getElementById('inputQuickItem').value = '';
            renderItems();
        }

        function renderItems() {
            const list = document.getElementById('listItems');
            const filteredItems = db.items.filter(item => item.catId === currentState.catId).sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
            list.innerHTML = filteredItems.length === 0 ? '<p class="text-muted text-center">此分類下暫無材料品項。</p>' : '';
            filteredItems.forEach(item => {
                const inCart = !!cart[item.id];
                const div = document.createElement('div');
                div.className = "list-item";
                div.innerHTML = `
                    <label class="item-label">
                        <input type="checkbox" id="chk-${item.id}" ${inCart ? 'checked' : ''} onchange="handleItemCheck('${item.id}', this.checked)" class="item-checkbox">
                        <span>${item.name}</span>
                    </label>
                    <input type="number" inputmode="decimal" pattern="[0-9]*" value="${inCart ? cart[item.id].qty : ''}" oninput="handleItemQty('${item.id}', this.value)" class="qty-input" placeholder="數量">
                `;
                list.appendChild(div);
            });
        }

        function changeCartQty(itemId, qty) {
            if (qty.trim() === '') { delete cart[itemId]; renderCart(); }
            else { cart[itemId].qty = qty; }
            updateCartBadge();
        }

        function removeCartItem(itemId) {
            delete cart[itemId];
            renderCart();
            updateCartBadge();
        }

        function renderCart() {
            const list = document.getElementById('listCartItems');
            const cartKeys = Object.keys(cart);
            if (cartKeys.length === 0) { list.innerHTML = '<p class="text-muted text-center">訂單空空如也。</p>'; return; }
            list.innerHTML = '';
            cartKeys.forEach(itemId => {
                const itemObj = db.items.find(i => i.id === itemId);
                if (!itemObj) return;
                const catObj = db.categories.find(c => c.id === itemObj.catId);
                const div = document.createElement('div');
                div.className = "list-item";
                div.innerHTML = `
                    <div style="flex:1; min-width:0; display:flex; flex-direction:column;">
                        <span style="font-size:11px; color:#4b5563;">[${catObj?catObj.name:'未分類'}]</span>
                        <span style="font-size:14px;">${itemObj.name}</span>
                    </div>
                    <input type="number" inputmode="decimal" pattern="[0-9]*" value="${cart[itemId].qty}" oninput="changeCartQty('${itemId}', this.value)" class="cart-qty-input" placeholder="數量">
                    <button onclick="removeCartItem('${itemId}')" style="background:none; color:#D9006C; font-size:14px;">❌</button>
                `;
                list.appendChild(div);
            });
        }

        function compileCartData() {
            const cartKeys = Object.keys(cart);
            const selectedItems = [];
            cartKeys.forEach(itemId => {
                const itemObj = db.items.find(i => i.id === itemId);
                if (itemObj) {
                    const catObj = db.categories.find(c => c.id === itemObj.catId);
                    selectedItems.push({ catName: catObj?catObj.name:'未分類', itemName: itemObj.name, qty: cart[itemId].qty || '未填' });
                }
            });
            if (selectedItems.length === 0) return null;
            const grouped = {};
            selectedItems.forEach(item => {
                if (!grouped[item.catName]) grouped[item.catName] = [];
                grouped[item.catName].push(`${item.itemName} *${item.qty}`);
            });
            let textOutput = `材料訂單\n送貨地點：${currentState.siteName}\n`;
            for (const catName in grouped) { textOutput += `【${catName}】\n` + grouped[catName].join('\n') + '\n'; }
            return { text: textOutput.trim(), items: selectedItems };
        }

        function uploadCartToGoogleSheetOnly() {
            if (!currentState.siteId) return alert('⚠️ 請先選擇送貨地點！');
            const data = compileCartData();
            if (!data) return alert('訂單裡沒有材料！');

            const dateStr = document.getElementById('inputOrderDate')?.value || getTargetDateStr();
            const cartTextWithDate = `${dateStr} ${data.text}`;
            if (!db.dailyRecords[dateStr]) db.dailyRecords[dateStr] = {};
            if (!Array.isArray(db.dailyRecords[dateStr].order)) {
                db.dailyRecords[dateStr].order = db.dailyRecords[dateStr].order ? [db.dailyRecords[dateStr].order] : [];
            }
            const alreadySaved = db.dailyRecords[dateStr].order.some(r => r.text === cartTextWithDate && r.siteId === currentState.siteId);
            if (!alreadySaved) {
                db.dailyRecords[dateStr].order.push({ siteId: currentState.siteId, text: cartTextWithDate });
            }
            saveToLocalStorage();
            initHomeCalendar();

            const SCRIPT_URL = db.config?.scriptUrl?.trim() || '';
            const hasUrl = !!SCRIPT_URL;
            _showGoogleConfirm(hasUrl,
                () => {
                    if (!hasUrl) { _askLineAndClearCart(cartTextWithDate, dateStr); return; }
                    const btn = document.getElementById('btnSubmitCart');
                    if (btn) { btn.innerText = '⏳ 同步中...'; btn.disabled = true; }
                    const payload = {
                        AM: currentState.siteName,
                        items: data.items.map(item => ({ cat: item.catName, PX: item.itemName, SL: item.qty }))
                    };
                    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                    .then(() => { alert('訂單數據已成功發送至 Google 試算表！'); })
                    .catch(() => { alert('傳送失敗，請確認網路連線與網址設定。'); })
                    .finally(() => {
                        if (btn) { btn.innerText = '儲存並上傳☁️'; btn.disabled = false; }
                        _askLineAndClearCart(cartTextWithDate, dateStr);
                    });
                },
                () => { _askLineAndClearCart(cartTextWithDate, dateStr); }
            );
        }

        let _pendingLineText = '';
        let _pendingOrderDateStr = '';

        function _askLineAndClearCart(cartTextWithDate, dateStr) {
            _pendingLineText = cartTextWithDate;
            _pendingOrderDateStr = dateStr || (document.getElementById('inputOrderDate')?.value || getTargetDateStr());
            document.getElementById('lineConfirmMsg').innerText = '是否傳送到LINE？';
            document.getElementById('lineConfirmModal').style.display = 'flex';
        }

        // ================= Google 確認框 =================
        let _googleConfirmCallback = null;

        function _showGoogleConfirm(hasUrl, onYes, onNo) {
            const msg = hasUrl ? '是否上傳至 Google 連結？' : '目前沒有設定 Google 連結，是否直接儲存？';
            document.getElementById('googleConfirmMsg').innerText = msg;
            _googleConfirmCallback = { onYes, onNo: onNo || (() => {}) };
            document.getElementById('googleConfirmModal').style.display = 'flex';
        }
        function _googleConfirmYes() {
            document.getElementById('googleConfirmModal').style.display = 'none';
            if (_googleConfirmCallback) _googleConfirmCallback.onYes();
            _googleConfirmCallback = null;
        }
        function _googleConfirmNo() {
            document.getElementById('googleConfirmModal').style.display = 'none';
            if (_googleConfirmCallback) _googleConfirmCallback.onNo();
            _googleConfirmCallback = null;
        }

        function _lineConfirmYes() {
            document.getElementById('lineConfirmModal').style.display = 'none';
            try { sessionStorage.setItem('_orderSavedDate', _pendingOrderDateStr); } catch(e) {}
            cart = {};
            updateCartBadge();
            if (document.getElementById('globalSearchBar')) document.getElementById('globalSearchBar').value = '';
            renderCart();

        function _lineConfirmNo() {
            document.getElementById('lineConfirmModal').style.display = 'none';
            cart = {};
            updateCartBadge();
            if (document.getElementById('globalSearchBar')) document.getElementById('globalSearchBar').value = '';
            renderCart();
            alert(_pendingOrderDateStr + ' 訂單已儲存');
        }

        // ================= 設定頁維護 =================
        function addCategory() {
            const name = document.getElementById('inputNewCategory').value.trim();
            if (!name) return alert('請輸入分類名稱');
            if (db.categories.some(c => c.name === name)) return alert(`分類「${name}」已存在，請使用不同名稱。`);
            db.categories.push({ id: Date.now().toString(), name });
            saveToLocalStorage();
            document.getElementById('inputNewCategory').value = '';
            renderManageCategories();
        }
        function renameCategory(id, oldName) {
            const newName = prompt(`請輸入分類新名稱：`, oldName);
            if (!newName?.trim()) return;
            const cat = db.categories.find(c => c.id === id);
            if (cat) { cat.name = newName.trim(); saveToLocalStorage(); renderManageCategories(); }
        }
        function deleteCategory(id, name) {
            if (confirm(`確定要刪除分類「${name}」嗎？`)) {
                db.categories = db.categories.filter(cat => cat.id !== id);
                db.items = db.items.filter(item => item.catId !== id);
                saveToLocalStorage(); renderManageCategories();
            }
        }
        function renderManageCategories(sortMode) {
            if (sortMode === undefined) sortMode = _categorySortMode;
            const list = document.getElementById('manageListCategories');
            list.innerHTML = db.categories.length === 0 ? '<p style="color:#9ca3af; text-align:center;">暫無資料。</p>' : '';
            db.categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = "manage-item"; div.setAttribute('data-id', cat.id);
                if (sortMode) {
                    div.innerHTML = `<span class="manage-text">${cat.name}</span><span class="drag-handle" style="color:#374151; font-size:16px; padding:4px 0 4px 24px; flex-shrink:0;">☰</span>`;
                } else {
                    div.innerHTML = `<span class="manage-text">${cat.name}</span>
                        <div class="manage-btns" onmousedown="event.stopPropagation();" ontouchstart="event.stopPropagation();">
                            <button onclick="renameCategory('${cat.id}', '${cat.name}')" class="btn-rename">改名</button>
                            <button onclick="deleteCategory('${cat.id}', '${cat.name}')" class="btn-del">刪除</button>
                        </div>`;
                }
                list.appendChild(div);
            });
            renderManageCategoryDropdown();
        }

        let _categorySortMode = false;
        let _categorySortable = null;

        function toggleCategorySort() {
            const btn = document.getElementById('btnCategorySort');
            const list = document.getElementById('manageListCategories');
            if (!_categorySortMode) {
                _categorySortMode = true;
                btn.innerText = '儲存'; btn.style.background = '#000000';
                renderManageCategories(true);
                if (_categorySortable) _categorySortable.option('disabled', false);
            } else {
                _categorySortMode = false;
                btn.innerText = '排序'; btn.style.background = '#111111';
                const sorted = [];
                list.querySelectorAll('.manage-item').forEach(el => {
                    const cat = db.categories.find(c => c.id === el.getAttribute('data-id'));
                    if (cat) sorted.push(cat);
                });
                db.categories = sorted;
                saveToLocalStorage();
                if (_categorySortable) _categorySortable.option('disabled', true);
                renderManageCategories(false);
            }
        }

        function renderManageCategoryDropdown() {
            const select = document.getElementById('manageSelectCategory');
            if (!select) return;
            const val = select.value;
            select.innerHTML = '<option value="">請先選擇分類...</option>';
            db.categories.forEach(cat => {
                const opt = document.createElement('option'); opt.value = cat.id; opt.innerText = cat.name; select.appendChild(opt);
            });
            if (val && db.categories.find(c => c.id === val)) select.value = val;
            renderManageItems();
        }

        function renderManageItems() {
            const list = document.getElementById('manageListItems');
            const catId = document.getElementById('manageSelectCategory').value;
            if (!catId) { list.innerHTML = '<p style="color:#9ca3af; text-align:center;">請先選擇分類。</p>'; return; }
            const items = db.items.filter(item => item.catId === catId).sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
            list.innerHTML = items.length === 0 ? '<p style="color:#9ca3af; text-align:center;">此分類暫無品項。</p>' : '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "manage-item";
                div.innerHTML = `<span class="manage-text">${item.name}</span>
                    <div class="manage-btns">
                        <button class="btn-rename-item btn-rename">改名</button>
                        <button class="btn-delete-item btn-del">刪除</button>
                    </div>`;
                div.querySelector('.btn-rename-item').addEventListener('click', () => renameManageItem(item.id, item.name));
                div.querySelector('.btn-delete-item').addEventListener('click', () => deleteManageItem(item.id, item.name));
                list.appendChild(div);
            });
        }

        function addManageItem() {
            const catId = document.getElementById('manageSelectCategory').value;
            const name = document.getElementById('inputNewManageItem').value.trim();
            if (!catId || !name) return alert('分類與品項名稱不能為空');
            const dup = db.items.find(i => i.name === name);
            if (dup) {
                const dupCat = db.categories.find(c => c.id === dup.catId);
                const catName = dupCat ? dupCat.name : '未知分類';
                return alert(`品項「${name}」已存在於「${catName}」分類，請使用不同名稱。`);
            }
            db.items.push({ id: Date.now().toString(), catId, name });
            saveToLocalStorage(); document.getElementById('inputNewManageItem').value = ''; renderManageItems();
        }
        function renameManageItem(id, oldName) {
            const newName = prompt(`請輸入品項新名稱：`, oldName);
            if (!newName?.trim()) return;
            const item = db.items.find(i => String(i.id) === String(id));
            if (item) { item.name = newName.trim(); saveToLocalStorage(); renderManageItems(); }
        }
        function deleteManageItem(id, name) {
            if (confirm(`確定要刪除品項「${name}」嗎？`)) {
                db.items = db.items.filter(item => String(item.id) !== String(id));
                if (cart[id]) delete cart[id];
                saveToLocalStorage(); renderManageItems();
            }
        }

        // ================= 首頁記錄編輯 =================
        let _editCtx = null;
        let _afterShowCheckId = null;

        function openInlineEdit(prefix, idx, dateStr) {
            const typeMap = { inlineChkLog: 'log', inlineChkNotes: 'notes', inlineChkOrder: 'order' };
            const type = typeMap[prefix];
            if (!type) return;
            const rec = db.dailyRecords[dateStr];
            if (!rec || !rec[type]) return;
            const arr = Array.isArray(rec[type]) ? rec[type] : [rec[type]];
            const item = arr[parseInt(idx)];
            if (!item) return;
            _editCtx = { type, idx: parseInt(idx), dateStr };
            if (type === 'log') openEditLogModal(item, dateStr, 'log');
            else if (type === 'notes') openEditLogModal(item, dateStr, 'notes');
            else if (type === 'order') openEditOrderModal(item, dateStr, parseInt(idx));
        }

        function openInlineEditPunch(dateStr) {
            let note = '';
            if (db.punches) {
                for (let sId in db.punches) {
                    if (db.punches[sId] && db.punches[sId][dateStr] && db.punches[sId][dateStr].note) {
                        note = db.punches[sId][dateStr].note;
                        break;
                    }
                }
            }
            _editCtx = { type: 'punch', dateStr };
            document.getElementById('editModalTitle').innerText = '編輯出勤備註';
            document.getElementById('editModalTextarea').value = note;
            document.getElementById('editRecordModal').style.display = 'flex';
        }

        function saveInlineEdit() {
            if (!_editCtx) return;
            const newText = document.getElementById('editModalTextarea').value;
            const { type, idx, dateStr } = _editCtx;
            if (type === 'punch') {
                if (db.punches) {
                    for (let sId in db.punches) {
                        if (db.punches[sId] && db.punches[sId][dateStr]) {
                            db.punches[sId][dateStr].note = newText;
                        }
                    }
                }
            } else {
                const rec = db.dailyRecords[dateStr];
                if (!rec || !rec[type]) return;
                const arr = Array.isArray(rec[type]) ? rec[type] : [rec[type]];
                if (arr[idx]) arr[idx].text = newText;
                rec[type] = arr;
                db.dailyRecords[dateStr] = rec;
            }
            saveToLocalStorage();
            closeInlineEdit();
            initHomeCalendar();
            _afterShowCheckId = 'inlineChkPunch';
            showInlineDayView(dateStr);
        }

        function closeInlineEdit() {
            document.getElementById('editRecordModal').style.display = 'none';
            _editCtx = null;
        }

        document.getElementById('editRecordModal').addEventListener('click', function(e) {
            if (e.target === this) closeInlineEdit();
        });

        // ================= 施工日誌 / 備忘錄 編輯彈窗 =================
        function openEditLogModal(item, dateStr, type) {
            _editCtx = { type, dateStr, idx: _editCtx ? _editCtx.idx : 0 };
            const isLog = type === 'log';
            let modalTitle = isLog ? '編輯工程記錄' : '編輯工地記事';
            if (isLog) {
                if (/備忘錄/.test(item.text)) modalTitle = '編輯備忘錄';
                else if (/記錄事項/.test(item.text)) modalTitle = '編輯記錄事項';
                else if (/施工日誌/.test(item.text)) modalTitle = '編輯施工日誌';
            }
            document.getElementById('editLogModalTitle').innerText = modalTitle;
            document.getElementById('editLogDate').value = dateStr;
            document.getElementById('editLogItemsWrap').style.display = isLog ? '' : 'none';
            document.getElementById('editNotesWrap').style.display = isLog ? 'none' : '';

            const siteGroup = document.getElementById('editLogSiteGroup');
            siteGroup.innerHTML = '';
            const siteSel = document.createElement('select');
            siteSel.id = 'editLogSiteSelect';
            siteSel.style.cssText = 'width:100%; border:1px solid #d1d5db; border-radius:8px; padding:8px 10px; font-size:14px; background:white; color:#1f2937;';
            const ph = document.createElement('option');
            ph.value = ''; ph.textContent = '— 選擇案場 —';
            siteSel.appendChild(ph);
            db.sites.forEach(site => {
                const opt = document.createElement('option');
                opt.value = site.id; opt.textContent = site.name;
                if (item.siteId === site.id) opt.selected = true;
                siteSel.appendChild(opt);
            });
            siteSel.addEventListener('change', () => {
                const s = db.sites.find(x => x.id === siteSel.value);
                if (s) { _editCtx.siteId = s.id; _editCtx.siteName = s.name; }
            });
            siteGroup.style.display = 'block';
            siteGroup.appendChild(siteSel);
            const siteObj = db.sites.find(s => s.id === item.siteId);
            _editCtx.siteId = item.siteId;
            _editCtx.siteName = siteObj ? siteObj.name : '';
            _editCtx._isMemo = isLog && /備忘錄/.test(item.text);

            if (isLog) {
                const container = document.getElementById('editLogItemsContainer');
                container.innerHTML = '';
                const lines = item.text.split('\n');
                let rows = [], cur = null;
                lines.forEach(line => {
                    const mItem = line.match(/^項目 \d+：(.*)$/);
                    const mFloor = line.match(/^↳ 區域：(.*)$/);
                    if (mItem) { if (cur) rows.push(cur); cur = { item: mItem[1] === '無' ? '' : mItem[1], floor: '', people: '' }; }
                    else if (mFloor && cur) { cur.floor = mFloor[1] === '無' ? '' : mFloor[1]; }
                    else if (cur) {
                        const m2 = line.match(/^↳ 人數：(.+?) 人$/);
                        if (m2) cur.people = m2[1];
                    }
                });
                if (cur) rows.push(cur);
                if (rows.length === 0) rows.push({ item: '', floor: '', people: '' });
                rows.forEach(r => addEditLogItemRow(r.item, r.floor, r.people));
                if (_editCtx._isMemo) {
                    container.querySelectorAll('.log-entry-row').forEach(row => { row.style.display = 'none'; });
                }
            } else {
                const lines = item.text.split('\n');
                const startIdx = lines.findIndex(l => l.startsWith('------------------------'));
                const content = startIdx >= 0 ? lines.slice(startIdx + 1).join('\n').trim() : item.text;
                document.getElementById('editNotesTextarea').value = content;
            }
            document.getElementById('editLogModal').style.display = 'flex';
        }

        function _updateEditLogItemLabels() {
            const container = document.getElementById('editLogItemsContainer');
            Array.from(container.children).forEach((div, i) => {
                const lbl = div.querySelector('.log-item-label');
                if (lbl) lbl.innerText = `項目${i + 1}`;
            });
        }

        function addEditLogItemRow(itemValue = '', floorValue = '', peopleValue = '') {
            const container = document.getElementById('editLogItemsContainer');
            const itemNum = container.children.length + 1;
            const div = document.createElement('div');
            div.className = 'log-entry-item';
            div.innerHTML = `
                <button type="button" class="btn-delete-log-item" onclick="removeEditLogItemRow(this)">移除</button>
                <div style="margin-top:8px;">
                    <label style="font-size:13px;font-weight:bold;display:block;margin-bottom:4px;color:#4b5563;" class="log-item-label">項目${itemNum}</label>
                    <textarea class="log-item-input" rows="2" style="width:100%;resize:none;overflow:hidden;line-height:1.6;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;background:white;-webkit-user-select:text;user-select:text;" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${itemValue}</textarea>
                </div>
                <div class="log-entry-row">
                    <div>
                        <label style="font-size:13px;font-weight:bold;display:block;margin-bottom:4px;color:#4b5563;">樓層/區域：</label>
                        <input type="text" class="log-floor-input" value="${floorValue}" placeholder="如：1F柱牆">
                    </div>
                    <div>
                        <label style="font-size:13px;font-weight:bold;display:block;margin-bottom:4px;color:#4b5563;">人數：</label>
                        <input type="number" inputmode="numeric" pattern="[0-9]*" class="log-people-input" value="${peopleValue}">
                    </div>
                </div>
            `;
            container.appendChild(div);
            if (_editCtx && _editCtx._isMemo) div.querySelector('.log-entry-row').style.display = 'none';
        }

        function removeEditLogItemRow(btn) {
            const container = document.getElementById('editLogItemsContainer');
            if (container.children.length <= 1) return alert('請至少保留一個項目！');
            btn.closest('.log-entry-item').remove();
            _updateEditLogItemLabels();
        }

        function compileEditLogText() {
            const { type, siteId, siteName } = _editCtx;
            const dateStr = document.getElementById('editLogDate').value || _editCtx.dateStr;
            if (type === 'log') {
                const container = document.getElementById('editLogItemsContainer');
                const items = container.getElementsByClassName('log-entry-item');
                let projectLogText = '', hasContent = false;
                for (let i = 0; i < items.length; i++) {
                    const itemVal = items[i].querySelector('.log-item-input').value.trim();
                    const floorVal = items[i].querySelector('.log-floor-input').value.trim();
                    const peopleVal = items[i].querySelector('.log-people-input').value.trim();
                    if (itemVal || floorVal || peopleVal) {
                        hasContent = true;
                        let line = `項目 ${i + 1}：${itemVal || '無'}`;
                        if (floorVal) line += `\n↳ 區域：${floorVal}`;
                        if (peopleVal) line += `\n↳ 人數：${peopleVal} 人`;
                        projectLogText += line + '\n';
                    }
                }
                if (!hasContent) return null;
                const isMemoEdit = _editCtx && _editCtx._isMemo;
                const title = isMemoEdit ? '備忘錄' : '施工日誌';
                return `${dateStr} ${title}\n案場名稱：${siteName}\n${projectLogText}`;
            } else {
                const val = document.getElementById('editNotesTextarea').value.trim();
                if (!val) return null;
                return `${dateStr} 工地記事\n案場名稱：${siteName}\n${val}\n`;
            }
        }

        function saveEditLogModal() {
            if (!_editCtx) return;
            const newText = compileEditLogText();
            if (!newText) return alert('請填寫內容！');
            const { type, idx, dateStr: oldDateStr, siteId } = _editCtx;
            const newDateStr = document.getElementById('editLogDate').value || oldDateStr;

            const oldRec = db.dailyRecords[oldDateStr];
            if (oldRec && oldRec[type]) {
                const arr = Array.isArray(oldRec[type]) ? oldRec[type] : [oldRec[type]];
                arr.splice(idx, 1);
                if (arr.length === 0) delete oldRec[type]; else oldRec[type] = arr;
                if (Object.keys(oldRec).length === 0) delete db.dailyRecords[oldDateStr];
            }

            if (!db.dailyRecords[newDateStr]) db.dailyRecords[newDateStr] = {};
            const newRec = db.dailyRecords[newDateStr];
            if (!Array.isArray(newRec[type])) newRec[type] = newRec[type] ? [newRec[type]] : [];
            newRec[type].push({ siteId, text: newText });

            saveToLocalStorage();
            closeEditLogModal();
            initHomeCalendar();
            const prefixMap = { log: 'inlineChkLog', notes: 'inlineChkNotes' };
            _afterShowCheckId = `${prefixMap[type] || 'inlineChkLog'}_${newRec[type].length - 1}`;
            showInlineDayView(newDateStr);
            alert('已儲存！');
        }

        function deleteFromEditLogModal() {
            if (!_editCtx) return;
            const { type, idx, dateStr } = _editCtx;
            if (!confirm('⚠️ 確定要刪除這筆紀錄嗎？(不可還原)')) return;
            const rec = db.dailyRecords[dateStr];
            if (rec && rec[type]) {
                const arr = Array.isArray(rec[type]) ? rec[type] : [rec[type]];
                arr.splice(idx, 1);
                if (arr.length === 0) delete rec[type]; else rec[type] = arr;
                if (Object.keys(rec).length === 0) delete db.dailyRecords[dateStr];
            }
            saveToLocalStorage();
            closeEditLogModal();
            initHomeCalendar();
            showInlineDayView(dateStr);
            updateHomeImportBtn();
        }

        function closeEditLogModal() {
            document.getElementById('editLogModal').style.display = 'none';
            _editCtx = null;
        }

        document.getElementById('editLogModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditLogModal();
        });

        // ================= 材料訂購 編輯彈窗 =================
        let _editOrderItems = [];

        function openEditOrderModal(item, dateStr, idx) {
            _editCtx = { type: 'order', idx, dateStr };
            const siteObj = db.sites.find(s => s.id === item.siteId);
            _editCtx.siteId = item.siteId;
            _editCtx.siteName = siteObj ? siteObj.name : '';
            const oSel = document.getElementById('editOrderSiteSelect');
            oSel.innerHTML = '';
            const oph = document.createElement('option');
            oph.value = ''; oph.textContent = '— 選擇案場 —';
            oSel.appendChild(oph);
            db.sites.forEach(site => {
                const opt = document.createElement('option');
                opt.value = site.id; opt.textContent = site.name;
                if (site.id === item.siteId) opt.selected = true;
                oSel.appendChild(opt);
            });
            oSel.onchange = () => {
                const s = db.sites.find(x => x.id === oSel.value);
                if (s) { _editCtx.siteId = s.id; _editCtx.siteName = s.name; }
            };
            document.getElementById('editOrderDate').value = dateStr;
            _editOrderItems = [];
            const lines = item.text.split('\n');
            let currentCat = '';
            lines.forEach(line => {
                const catMatch = line.match(/^【(.+)】$/);
                if (catMatch) { currentCat = catMatch[1]; return; }
                const itemMatch = line.match(/^(.+?) \*(.+)$/);
                if (itemMatch && currentCat) {
                    _editOrderItems.push({ catName: currentCat, itemName: itemMatch[1].trim(), qty: itemMatch[2].trim() });
                }
            });
            renderEditOrderList();
            document.getElementById('editOrderModal').style.display = 'flex';
        }

        function renderEditOrderList() {
            const list = document.getElementById('editOrderList');
            list.innerHTML = '';
            if (_editOrderItems.length === 0) { list.innerHTML = '<p class="text-muted text-center">訂單空空如也。</p>'; return; }
            _editOrderItems.forEach((it, idx) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
                        <span style="font-size:11px;color:#4b5563;">[${it.catName}]</span>
                        <span style="font-size:14px;">${it.itemName}</span>
                    </div>
                    <input type="number" inputmode="decimal" pattern="[0-9]*" value="${it.qty}" oninput="_editOrderItems[${idx}].qty=this.value" class="cart-qty-input" placeholder="數量/單位">
                    <button onclick="removeEditOrderItem(${idx})" style="background:none;color:#D9006C;font-size:14px;">❌</button>
                `;
                list.appendChild(div);
            });
        }

        function removeEditOrderItem(idx) {
            _editOrderItems.splice(idx, 1);
            renderEditOrderList();
        }

        function compileEditOrderText() {
            if (_editOrderItems.length === 0) return null;
            const newDateStr = document.getElementById('editOrderDate').value || _editCtx.dateStr;
            const siteObj = db.sites.find(s => s.id === _editCtx.siteId);
            const siteName = siteObj ? siteObj.name : '';
            const grouped = {};
            _editOrderItems.forEach(it => {
                if (!grouped[it.catName]) grouped[it.catName] = [];
                grouped[it.catName].push(`${it.itemName} *${it.qty || '未填'}`);
            });
            let text = `${newDateStr} 材料訂單\n送貨地點：${siteName}\n`;
            for (const cat in grouped) { text += `【${cat}】\n` + grouped[cat].join('\n') + '\n'; }
            return text.trim();
        }

        function saveEditOrder() {
            if (!_editCtx) return;
            const newText = compileEditOrderText();
            if (!newText) return alert('訂單沒有品項！');
            const { idx, dateStr: oldDateStr, siteId } = _editCtx;
            const newDateStr = document.getElementById('editOrderDate').value || oldDateStr;

            const oldRec = db.dailyRecords[oldDateStr];
            if (oldRec && oldRec.order) {
                const arr = Array.isArray(oldRec.order) ? oldRec.order : [oldRec.order];
                arr.splice(idx, 1);
                if (arr.length === 0) delete oldRec.order; else oldRec.order = arr;
                if (Object.keys(oldRec).length === 0) delete db.dailyRecords[oldDateStr];
            }
            if (!db.dailyRecords[newDateStr]) db.dailyRecords[newDateStr] = {};
            const newRec = db.dailyRecords[newDateStr];
            if (!Array.isArray(newRec.order)) newRec.order = newRec.order ? [newRec.order] : [];
            newRec.order.push({ siteId, text: newText });
            saveToLocalStorage();
            const checkId = `inlineChkOrder_${newRec.order.length - 1}`;

            const SCRIPT_URL = db.config?.scriptUrl?.trim() || '';
            const hasUrl = !!SCRIPT_URL;
            closeEditOrderModal();
            _showGoogleConfirm(hasUrl,
                () => {
                    if (hasUrl) {
                        const payload = {
                            AM: _editCtx ? _editCtx.siteName || '' : '',
                            items: _editOrderItems.map(it => ({ cat: it.catName, PX: it.itemName, SL: it.qty }))
                        };
                        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                        .then(() => alert('訂單已儲存並上傳 Google！'))
                        .catch(() => alert('儲存成功，但上傳失敗。'));
                    }
                    initHomeCalendar();
                    _afterShowCheckId = checkId;
                    showInlineDayView(newDateStr);
                },
                () => {
                    initHomeCalendar();
                    _afterShowCheckId = checkId;
                    showInlineDayView(newDateStr);
                }
            );
        }

        function deleteFromEditOrderModal() {
            if (!_editCtx) return;
            const { idx, dateStr } = _editCtx;
            if (!confirm('⚠️ 確定要刪除這筆材料訂購嗎？(不可還原)')) return;
            const rec = db.dailyRecords[dateStr];
            if (rec && rec.order) {
                const arr = Array.isArray(rec.order) ? rec.order : [rec.order];
                arr.splice(idx, 1);

                if (Object.keys(rec).length === 0) delete db.dailyRecords[dateStr];
            }
            saveToLocalStorage();
            closeEditOrderModal();
            initHomeCalendar();
            showInlineDayView(dateStr);
            updateHomeImportBtn();
        }

        function deleteFromEditPunchModal() {
            if (!_editCtx) return;
            const { dateStr } = _editCtx;
            if (!confirm(`⚠️ 確定要刪除 ${dateStr} 的出勤紀錄嗎？(不可還原)`)) return;
            if (db.punches) {
                for (let sId in db.punches) {

        // ================= 右滑返回手勢 =================
        (function() {
            let touchStartX = 0, touchStartY = 0, isDragging = false, mainEl = null;
            const EDGE_ZONE = 40;
            function getMain() { return mainEl || (mainEl = document.querySelector('main.max-w-md')); }

            document.addEventListener('touchstart', e => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                isDragging = false;
                getMain().style.transition = 'none';
            }, { passive: true });

            document.addEventListener('touchmove', e => {
                const dx = e.touches[0].clientX - touchStartX;
                const dy = Math.abs(e.touches[0].clientY - touchStartY);
                const btn = document.getElementById('btnBack');
                if (!isDragging && touchStartX <= EDGE_ZONE && dx > 10 && dy < 40 && btn && !btn.classList.contains('hidden')) {
                    isDragging = true;
                }
                if (isDragging && dx > 0) {
                    const m = getMain();
                    m.style.transform = `translateX(${dx}px)`;
                    m.style.opacity = `${Math.max(0.4, 1 - dx / window.innerWidth)}`;
                }
            }, { passive: true });

            document.addEventListener('touchend', e => {
                const m = getMain();
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
                const btn = document.getElementById('btnBack');
                if (isDragging && dx > 60 && dy < 40 && btn && !btn.classList.contains('hidden')) {
                    m.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
                    m.style.transform = 'translateX(100%)';
                    m.style.opacity = '0';
                    setTimeout(() => {
                        m.style.transition = 'none';
                        m.style.transform = '';
                        m.style.opacity = '';
                        btn.click();
                        m.style.transform = 'translateX(-30px)';
                        m.style.opacity = '0';
                        requestAnimationFrame(() => {
                            m.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                            m.style.transform = '';
                            m.style.opacity = '';
                            setTimeout(() => { m.style.transition = ''; }, 220);
                        });
                    }, 220);
                } else if (isDragging) {
                    m.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                    m.style.transform = '';
                    m.style.opacity = '';
                    setTimeout(() => { m.style.transition = ''; }, 200);
                }
                isDragging = false;
            }, { passive: true });
        })();

        // ================= 材料訂購 Excel 匯出 =================
        function exportOrderExcel() {
            const monthVal = document.getElementById('inputExportOrderMonth').value;
            if (!monthVal) return alert('請先選擇要匯出的年月！');
            const [yyyy, mm] = monthVal.split('-');
            const prefix = `${yyyy}-${mm}`;
            const rows = [];
            Object.keys(db.dailyRecords).sort().forEach(dateStr => {
                if (!dateStr.startsWith(prefix)) return;
                const rec = db.dailyRecords[dateStr];
                if (!rec || !rec.order) return;
                const orderArr = Array.isArray(rec.order) ? rec.order : [rec.order];
                orderArr.forEach(orderEntry => {
                    if (!orderEntry || !orderEntry.text) return;
                    const siteObj = db.sites.find(s => s.id === orderEntry.siteId);
                    const siteName = siteObj ? siteObj.name : orderEntry.siteId || '';
                    const lines = orderEntry.text.split('\n');
                    let currentCat = '';
                    lines.forEach(line => {
                        const catMatch = line.match(/^【(.+)】$/);
                        if (catMatch) { currentCat = catMatch[1]; return; }
                        const itemMatch = line.match(/^(.+?) \*(.+)$/);
                        if (itemMatch && currentCat) {
                            rows.push({ date: dateStr, site: siteName, cat: currentCat, item: itemMatch[1].trim(), qty: itemMatch[2].trim() });
                        }
                    });
                });
            });
            if (rows.length === 0) return alert(`${yyyy}年${mm}月 無任何材料訂購紀錄！`);
            const header = ['日期', '案場', '分類', '品項名稱', '數量'];
            const csvRows = [header, ...rows.map(r => [r.date, r.site, r.cat, r.item, r.qty])];
            const csvContent = '\uFEFF' + csvRows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `材料訂購${yyyy}-${mm}.csv`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadFromLocalStorage();
            navigateTo('sites');
            _refreshLastExportDisplay();

            try {
                const savedDate = sessionStorage.getItem('_orderSavedDate');
                if (savedDate) {
                    sessionStorage.removeItem('_orderSavedDate');
                    setTimeout(() => alert(savedDate + ' 訂單已儲存'), 300);
                }
            } catch(e) {}

            ['inputPunchDate', 'inputLogDate', 'inputOrderDate'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('change', function() {
                    if (!this.value) {

                    }
                });
            });

            const todayStr = getTargetDateStr();
            selectedHomeDateStr = todayStr;
            const todayEl = document.querySelector('.calendar-day.today');
            if (todayEl) todayEl.classList.add('selected');
            showInlineDayView(todayStr);
            updateHomeImportBtn();

            _categorySortable = new Sortable(document.getElementById('manageListCategories'), {
                animation: 150, handle: '.drag-handle', ghostClass: 'sortable-ghost', threshold: 5,
                disabled: true,
                onEnd: function() {}
            });
        });

    <script>
    const _STD_DATA = [{"label": "前言", "level": 0, "children": [{"title": "【法規資訊】", "body": "法規名稱：各類場所消防安全設備設置標準修正日期：民國 113 年 04 月 24 日"}]}, {"label": "第 一 編 總則", "level": 1, "children": [{"title": "第 1 條本標準依消防法（以下簡稱本法）第六條第一項規定訂定之。", "body": ""}, {"title": "第 2 條", "body": "（刪除）"}, {"title": "第 3 條", "body": "1 未定國家標準或國內無法檢驗之消防安全設備，應檢附國外標準、國外（內）檢驗報告及試驗合格證明或規格證明，經中央主管機關認可後，始准使用。\n2 前項應經認可之消防安全設備項目及應檢附之文件，由中央消防機關另定之。"}]}, {"label": "第 二 編 消防設計", "level": 1, "children": [{"title": "第 4 條", "body": "1 本標準用語定義如下：\n一、複合用途建築物：一棟建築物中有供第十二條第一款至第四款各目所列用途二種以上，且該不同用途，在管理及使用形態上，未構成從屬於其中一主用途者；其判斷基準，由中央消防機關另定之。\n二、無開口樓層：建築物之各樓層供避難及消防搶救用之有效開口面積未達下列規定者：\n（一）十一層以上之樓層，具可內切直徑五十公分以上圓孔之開口，合計面積為該樓地板面積三十分之一以上者。\n（二）十層以下之樓層，具可內切直徑五十公分以上圓孔之開口，合計面積為該樓地板面積三十分之一以上者。但其中至少應具有二個內切直徑一公尺以上圓孔或寬七十五公分以上、高一百二十公分以上之開口。\n三、高度危險工作場所：儲存一般可燃性固體物質倉庫之高度超過五點五公尺者，或易燃性液體物質之閃火點未超過攝氏六十度與攝氏溫度為三十七點八度時，其蒸氣壓未超過每平方公分二點八公斤或 0.28 百萬帕斯卡（以下簡稱 MPa）者，或可燃性高壓氣體製造、儲存、處理場所或石化作業場所，木材加工業作業場所及油漆作業場所等。\n四、中度危險工作場所：儲存一般可燃性固體物質倉庫之高度未超過五點五公尺者，或易燃性液體物質之閃火點超過攝氏六十度之作業場所或輕工業場所。\n五、低度危險工作場所：有可燃性物質存在。但其存量少，延燒範圍小，延燒速度慢，僅形成小型火災者。\n\n六、避難指標：標示避難出口或方向之指標。\n2 前項第二款所稱有效開口，指符合下列規定者：\n一、開口下端距樓地板面一百二十公分以內。\n二、開口面臨道路或寬度一公尺以上之通路。\n三、開口無柵欄且內部未設妨礙避難之構造或阻礙物。\n四、開口為可自外面開啟或輕易破壞得以進入室內之構造。採一般玻璃門窗時，厚度應在六毫米以下。\n3 本標準所列有關建築技術、公共危險物品及可燃性高壓氣體用語，適用建築技術規則、公共危險物品及可燃性高壓氣體製造儲存處理場所設置標準暨安全管理辦法用語定義之規定。"}, {"title": "第 5 條", "body": "1 各類場所符合建築技術規則以無開口且具一小時以上防火時效之牆壁、樓地板區劃分隔者，適用本標準各編規定，視為另一場所。\n2 建築物間設有過廊，並符合下列規定者，視為另一場所：\n一、過廊僅供通行或搬運用途使用，且無通行之障礙。\n二、過廊有效寬度在六公尺以下。\n三、連接建築物之間距，一樓超過六公尺，二樓以上超過十公尺。\n3 建築物符合下列規定者，不受前項第三款之限制：\n一、連接建築物之外牆及屋頂，與過廊連接相距三公尺以內者，為防火構造或不燃材料。\n二、前款之外牆及屋頂未設有開口。但開口面積在四平方公尺以下，且設具半小時以上防火時效之防火門窗者，不在此限。\n三、過廊為開放式或符合下列規定者：\n（一）為防火構造或以不燃材料建造。\n（二）過廊與二側建築物相連接處之開口面積在四平方公尺以下，且設具半小時以上防火時效之防火門。\n（三）設置直接開向室外之開口或機械排煙設備。但設有自動撒水設備者，得免設。\n4 前項第三款第三目之直接開向室外之開口或機械排煙設備，應符合下列規定：\n一、直接開向室外之開口面積合計在一平方公尺以上，且符合下列規定：\n（一）開口設在屋頂或天花板時，設有寬度在過廊寬度三分之一以上，長度在一公尺以上之開口。\n（二）開口設在外牆時，在過廊二側設有寬度在過廊長度三分之一以上，高度一公尺以上之開口。\n二、機械排煙設備能將過廊內部煙量安全有效地排至室外，排煙機連接緊急電源。"}, {"title": "第 6 條供第十二條第五款使用之複合用途建築物，有分屬同條其他各款目用途時，適用本標準除第十七條第一項第四款、第五款、第十九條第一項第四款、第五款、第二十一條第二款、第二十三條第一款、第二款及第一百五十七條以外之規定，以各目為單元，按各目所列不同用途，合計其樓地", "body": "板面積，視為單一場所。"}, {"title": "第 7 條各類場所消防安全設備如下：", "body": "一、滅火設備：指以水或其他滅火藥劑滅火之器具或設備。\n二、警報設備：指報知火災發生之器具或設備。\n三、避難逃生設備：指火災發生時為避難而使用之器具或設備。\n四、消防搶救上之必要設備：指火警發生時，消防人員從事搶救活動上必需之器具或設備。\n五、其他經中央主管機關認定之消防安全設備。"}, {"title": "第 8 條滅火設備種類如下：", "body": "一、滅火器、消防砂。\n二、室內消防栓設備。\n三、室外消防栓設備。\n四、自動撒水設備。\n五、水霧滅火設備。\n六、泡沫滅火設備。\n七、二氧化碳滅火設備。\n八、惰性氣體滅火設備。\n九、鹵化烴滅火設備。\n十、乾粉滅火設備。\n十一、簡易自動滅火設備。"}, {"title": "第 9 條警報設備種類如下：", "body": "一、火警自動警報設備。\n二、手動報警設備。\n三、緊急廣播設備。\n四、瓦斯漏氣火警自動警報設備。\n五、一一九火災通報裝置。"}, {"title": "第 10 條避難逃生設備種類如下：", "body": "一、標示設備：出口標示燈、避難方向指示燈、觀眾席引導燈、避難指標。\n二、避難器具：指滑臺、避難梯、避難橋、救助袋、緩降機、避難繩索、滑杆及其他避難器具。\n三、緊急照明設備。"}, {"title": "第 11 條消防搶救上之必要設備種類如下：", "body": "一、連結送水管。\n二、消防專用蓄水池。\n三、排煙設備（緊急昇降機間、特別安全梯間排煙設備、室內排煙設備）。\n四、緊急電源插座。\n五、無線電通信輔助設備。\n六、防災監控系統綜合操作裝置。"}, {"title": "第 12 條各類場所按用途分類如下：", "body": "一、甲類場所：\n（一）電影片映演場所（戲院、電影院）\n、歌廳、舞廳、夜總會、俱樂部、理容院（觀光理髮、視聽理容等）、指壓按摩場所、錄影節目帶播映場所（MTV 等）、視聽歌唱場所（KTV 等）、酒家、酒吧、酒店（廊）。\n（二）保齡球館、撞球場、集會堂、健身休閒中心（含提供指壓、三溫暖等設施之美容瘦身場所）、室內螢幕式高爾夫練習場、遊藝場所、電子遊戲場、資訊休閒場所。\n（三）觀光旅館、飯店、旅館、招待所（限有寢室客房者）。\n（四）商場、市場、百貨商場、超級市場、零售市場、展覽場。\n（五）餐廳、飲食店、咖啡廳、茶藝館。\n（六）醫院、療養院、榮譽國民之家、長期照顧服務機構（限機構住宿式、社區式之建築物使用類組非屬 H-2 之日間照顧、團體家屋及小規模多機能）\n、老人福利機構（限長期照護型、養護型、失智照顧型之長期照顧機構、安養機構）\n、兒童及少年福利機構（限托嬰中心、早期療育機構、有收容未滿二歲兒童之安置及教養機構）\n、護理機構（限一般護理之家、精神護理之家、產後護理機構）\n、身心障礙福利機構（限供住宿養護、日間服務、臨時及短期照顧者）、身心障礙者職業訓練機構（限提供住宿或使用特殊機具者）、啟明、啟智、啟聰等特殊學校。\n（七）三溫暖、公共浴室。\n二、乙類場所：\n（一）車站、飛機場大廈、候船室。\n（二）期貨經紀業、證券交易所、金融機構。\n（三）學校教室、兒童課後照顧服務中心、補習班、訓練班、K 書中心、前款第六目以外之兒童及少年福利機構（限安置及教養機構）及身心障礙者職業訓練機構。\n（四）圖書館、博物館、美術館、陳列館、史蹟資料館、紀念館及其他類似場所。\n（五）寺廟、宗祠、教堂、供存放骨灰（骸）之納骨堂（塔）及其他類似場所。\n（六）辦公室、靶場、診所、長期照顧服務機構（限社區式之建築物使用類組屬 H-2 之日間照顧、\n\n團體家屋及小規模多機能）、日間型精神復健機構、兒童及少年心理輔導或家庭諮詢機構、身心障礙者就業服務機構、老人文康機構、前款第六目以外之老人福利機構及身心障礙福利機構。\n（七）集合住宅、寄宿舍、住宿型精神復健機構。\n（八）體育館、活動中心。\n（九）室內溜冰場、室內游泳池。\n（十）電影攝影場、電視播送場。\n（十一）倉庫、傢俱展示販售場。\n（十二）幼兒園。\n三、丙類場所：\n（一）電信機器室。\n（二）汽車修護廠、飛機修理廠、飛機庫。\n（三）室內停車場、建築物依法附設之室內停車空間。\n四、丁類場所：\n（一）高度危險工作場所。\n（二）中度危險工作場所。\n（三）低度危險工作場所。\n五、戊類場所：\n（一）複合用途建築物中，有供第一款用途者。\n（二）前目以外供第二款至前款用途之複合用途建築物。\n（三）地下建築物。\n六、其他經中央主管機關公告之場所。"}, {"title": "第 13 條各類場所於增建、改建或變更用途時，其消防安全設備之設置，適用增建、改建或用途變更前之標準。但有下列情形之一者，適用增建、改建或變更用途後之標準：", "body": "一、其消防安全設備為滅火器、火警自動警報設備、手動報警設備、緊急廣播設備、標示設備、避難器具及緊急照明設備者。\n二、增建或改建部分，以本標準中華民國八十五年七月一日修正條文施行日起，樓地板面積合計逾一千平方公尺或占原建築物總樓地板面積二分之一以上時，該建築物之消防安全設備。\n三、用途變更為甲類場所使用時，該變更後用途之消防安全設備。\n四、用途變更前，未符合變更前規定之消防安全設備。"}, {"title": "第 14 條下列場所應設置滅火器：", "body": "一、甲類場所、地下建築物、幼兒園。\n\n二、總樓地板面積在一百五十平方公尺以上之乙、丙、丁類場所。\n三、設於地下層或無開口樓層，且樓地板面積在五十平方公尺以上之各類場所。\n四、設有放映室或變壓器、配電盤及其他類似電氣設備之各類場所。\n五、設有鍋爐房、廚房等大量使用火源之各類場所。"}, {"title": "第 15 條", "body": "1 下列場所應設置室內消防栓設備：\n一、五層以下建築物，供第十二條第一款第一目所列場所使用，任何一層樓地板面積在三百平方公尺以上者；供同款其他各目及第二款至第四款所列場所使用，任何一層樓地板面積在五百平方公尺以上者；或為學校教室任何一層樓地板面積在一千四百平方公尺以上者。\n二、六層以上建築物，供第十二條第一款至第四款所列場所使用，任何一層之樓地板面積在一百五十平方公尺以上者。\n三、總樓地板面積在一百五十平方公尺以上之地下建築物。\n四、地下層或無開口之樓層，供第十二條第一款第一目所列場所使用，樓地板面積在一百平方公尺以上者；供第一款其他各目及第二款至第四款所列場所使用，樓地板面積在一百五十平方公尺以上者。\n2 前項應設室內消防栓設備之場所，依本標準設有室外消防栓、自動撒水（含補助撒水栓）、水霧、泡沫、二氧化碳、惰性氣體、鹵化烴或乾粉等滅火設備者，在該有效範圍內，得免設室內消防栓設備。但設有室外消防栓設備時，在第一層水平距離四十公尺以下、第二層步行距離四十公尺以下有效滅火範圍內，室內消防栓設備限於第一層、第二層免設。"}, {"title": "第 16 條", "body": "1 下列場所應設置室外消防栓設備：\n一、高度危險工作場所，其建築物及儲存場所之第一層及第二層樓地板面積合計在三千平方公尺以上者。\n二、中度危險工作場所，其建築物及儲存場所之第一層及第二層樓地板面積合計在五千平方公尺以上者。\n三、低度危險工作場所，其建築物及儲存場所之第一層及第二層樓地板面積合計在一萬平方公尺以上者。\n四、如有不同危險程度工作場所未達前三款規定標準，而以各款場所之實際面積為分子，各款規定之面積為分母，分別計算，其比例之總和大於一者。\n五、同一建築基地內有二棟以上木造或其他易燃構造建築物時，建築物間外牆與中心線水平距離第一層在三公尺以下，第二層在五公尺以下，且合計各棟第一層及第二層樓地板面積在三千平方公尺以上者。\n2 前項應設室外消防栓設備之場所，依本標準設有自動撒水、水霧、泡沫、二氧化碳、惰性氣體、鹵化烴或乾粉等滅火設備者，在該有效範圍內，得免設室外消防栓設備。"}, {"title": "第 17 條", "body": "1 下列場所或樓層應設置自動撒水設備：\n一、十層以下建築物之樓層，供第十二條第一款第一目所列場所使用，樓地板面積合計在三百平方公尺以上者；供同款其他各目及第二款第一目所列場所使用，樓地板面積在一千五百平方公尺以上者。\n二、建築物在十一層以上之樓層，樓地板面積在一百平方公尺以上者。\n三、地下層或無開口樓層，供第十二條第一款所列場所使用，樓地板面積在一千平方公尺以上者。\n四、十一層以上建築物供第十二條第一款所列場所或第五款第一目使用者。\n五、供第十二條第五款第一目使用之建築物中，甲類場所樓地板面積合計達三千平方公尺以上時，供甲類場所使用之樓層。\n六、供第十二條第二款第十一目使用之場所，樓層高度超過十公尺且樓地板面積在七百平方公尺以上之高架儲存倉庫。\n七、總樓地板面積在一千平方公尺以上之地下建築物。\n八、高層建築物。\n九、供第十二條第一款第六目所定榮譽國民之家、長期照顧服務機構（限機構住宿式、社區式之建築物使用類組非屬 H-2 之日間照顧、團體家屋及小規模多機能）\n、老人福利機構（限長期照護型、養護型、失智照顧型之長期照顧機構、安養機構）\n、護理機構（限一般護理之家、精神護理之家）\n、身心障礙福利機構（限照顧植物人、失智症、重癱、長期臥床或身心功能退化者）使用之場所。\n2 前項應設自動撒水設備之場所，依本標準設有水霧、泡沫、二氧化碳、惰性氣體、鹵化烴或乾粉等滅火設備者，在該有效範圍內，得免設自動撒水設備。\n3 第一項第九款所定場所，其樓地板面積合計未達一千平方公尺者，得設置水道連結型自動撒水設備或與現行法令同等以上效能之滅火設備或採用中央主管機關公告之措施；水道連結型自動撒水設備設置基準，由中央主管機關定之。"}, {"title": "第 18 條", "body": "（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n1 下表所列之場所，應就水霧、泡沫、二氧化碳、惰性氣體、鹵化烴或乾粉滅火設備等選擇設置之。\n但外牆開口面積（常時開放部分）達該層樓地板面積百分之十五以上者，上列除惰性氣體及鹵化烴外之滅火設備得採移動式設置。\n2 樓地板面積在三百平方公尺以上之餐廳或供第十二條第一款第六目所定榮譽國民之家、長期照顧服務機構（限機構住宿式、社區式之建築物使用類組非屬 H-2 之日間照顧、團體家屋及小規模多機能）、老人福利機構（限長期照護型、養護型、失智照顧型之長期照顧機構、安養機構）、護理機構（限一般護理之家、精神護理之家）、身心障礙福利機構（限照顧植物人、失智症、重癱、長期臥床或身心功能退化者）使用之場所且樓地板面積合計在五百平方公尺以上者，其廚房排油煙管及煙罩應設簡易自動滅火設備。但已依前項規定設有滅火設備者，得免設簡易自動滅火設備。"}, {"title": "第 19 條", "body": "1 下列場所應設置火警自動警報設備：\n一、五層以下之建築物，供第十二條第一款及第二款第十二目所列場所使用，任何一層之樓地板面積在三百平方公尺以上者；或供同條第二款（第十二目除外）至第四款所列場所使用，任何一層樓地板面積在五百平方公尺以上者。\n二、六層以上十層以下之建築物任何一層樓地板面積在三百平方公尺以上者。\n三、十一層以上建築物。\n四、地下層或無開口樓層，供第十二條第一款第一目、第五目及第五款（限其中供第一款第一目或第五目使用者）使用之場所，樓地板面積在一百平方公尺以上者；供同條第一款其他各目及其他各款所列場所使用，樓地板面積在三百平方公尺以上者。\n五、供第十二條第五款第一目使用之建築物，總樓地板面積在五百平方公尺以上，且其中甲類場所樓地板面積合計在三百平方公尺以上者。\n六、供第十二條第一款及第五款第三目所列場所使用，總樓地板面積在三百平方公尺以上者。\n七、供第十二條第一款第六目所定榮譽國民之家、長期照顧服務機構（限機構住宿式、社區式之建築物使用類組非屬 H-2 之日間照顧、團體家屋及小規模多機能）\n、老人福利機構（限長期照護型、養護型、失智照顧型之長期照顧機構、安養機構）\n、護理機構（限一般護理之家、精神護理之家）\n、身心障礙福利機構（限照顧植物人、失智症、重癱、長期臥床或身心功能退化者）\n使用之場所。\n2 前項應設火警自動警報設備之場所，除供甲類場所、地下建築物、高層建築物或應設置偵煙式探測器之場所外，如已依本標準設置自動撒水、水霧或泡沫滅火設備（限使用標示攝氏溫度七十五度以下，動作時間六十秒以內之密閉型撒水頭）者，在該有效範圍內，得免設火警自動警報設備。"}, {"title": "第 20 條下列場所應設置手動報警設備：", "body": "一、三層以上建築物，任何一層樓地板面積在二百平方公尺以上者。\n二、第十二條第一款第三目之場所。"}, {"title": "第 21 條下列使用瓦斯之場所應設置瓦斯漏氣火警自動警報設備：", "body": "一、地下層供第十二條第一款所列場所使用，樓地板面積合計一千平方公尺以上者。\n二、供第十二條第五款第一目使用之地下層，樓地板面積合計一千平方公尺以上，且其中甲類場所樓地板面積合計五百平方公尺以上者。\n三、總樓地板面積在一千平方公尺以上之地下建築物。"}, {"title": "第 22 條依第十九條或前條規定設有火警自動警報或瓦斯漏氣火警自動警報設備之建築物，應設置緊急廣播設備。", "body": ""}, {"title": "第 22-1 條下列場所應設置一一九火災通報裝置：", "body": "一、供第十二條第一款第六目所定醫院、療養院、榮譽國民之家、長期照顧服務機構（限機構住宿式、社區式之建築物使用類組非屬 H-2 之日間照顧、團體家屋及小規模多機能）\n、老人福利機構（限長期照護型、養護型、失智照顧型之長期照顧機構、安養機構）\n、護理機構（限一般護理之家、精神護理之家）\n、身心障礙福利機構（限照顧植物人、失智症、重癱、長期臥床或身心功能退化者）使用之場所。\n二、其他經中央主管機關公告之供公眾使用之場所。"}, {"title": "第 23 條下列場所應設置標示設備：", "body": "一、供第十二條第一款、第二款第十二目、第五款第一目、第三目使用之場所，或地下層、無開口樓層、十一層以上之樓層供同條其他各款目所列場所使用，應設置出口標示燈。\n二、供第十二條第一款、第二款第十二目、第五款第一目、第三目使用之場所，或地下層、無開口樓層、十一層以上之樓層供同條其他各款目所列場所使用，應設置避難方向指示燈。\n三、戲院、電影院、歌廳、集會堂及類似場所，應設置觀眾席引導燈。\n四、各類場所均應設置避難指標。但設有避難方向指示燈或出口標示燈時，在其有效範圍內，得免設置避難指標。"}, {"title": "第 24 條", "body": "1 下列場所應設置緊急照明設備：\n一、供第十二條第一款、第三款及第五款所列場所使用之居室。\n二、供第十二條第二款第一目、第二目、第三目（學校教室除外）\n、第四目至第六目、第七目所定住宿型精神復健機構、第八目、第九目及第十二目所列場所使用之居室。\n三、總樓地板面積在一千平方公尺以上建築物之居室（學校教室除外）。\n四、有效採光面積未達該居室樓地板面積百分之五者。\n五、供前四款使用之場所，自居室通達避難層所須經過之走廊、樓梯間、通道及其他平時依賴人工照明部分。\n2 經中央主管機關認可為容易避難逃生或具有效採光之場所，得免設緊急照明設備。"}, {"title": "第 25 條建築物除十一層以上樓層及避難層外，各樓層應選設滑臺、避難梯、避難橋、救助袋、緩降機、避難繩索、滑杆或經中央主管機關認可具同等性能之避難器具。但建築物在構造及設施上，並無避難逃生障礙，經中央主管機關認可者，不在此限。", "body": ""}, {"title": "第 26 條下列場所應設置連結送水管：", "body": "一、五層或六層建築物總樓地板面積在六千平方公尺以上者及七層以上建築物。\n二、總樓地板面積在一千平方公尺以上之地下建築物。"}, {"title": "第 27 條下列場所應設置消防專用蓄水池：", "body": "一、各類場所其建築基地面積在二萬平方公尺以上，且任何一層樓地板面積在一千五百平方公尺以上者。\n二、各類場所其高度超過三十一公尺，且總樓地板面積在二萬五千平方公尺以上者。\n三、同一建築基地內有二棟以上建築物時，建築物間外牆與中心線水平距離第一層在三公尺以下，第二層在五公尺以下，且合計各棟該第一層及第二層樓地板面積在一萬平方公尺以上者。"}, {"title": "第 28 條", "body": "1 下列場所應設置排煙設備：\n一、供第十二條第一款及第五款第三目所列場所使用，樓地板面積合計在五百平方公尺以上。\n二、樓地板面積在一百平方公尺以上之居室，其天花板下方八十公分範圍內之有效通風面積未達該居室樓地板面積百分之二者。\n三、樓地板面積在一千平方公尺以上之無開口樓層。\n四、供第十二條第一款第一目所列場所及第二目之集會堂使用，舞臺部分之樓地板面積在五百平方公尺以上者。\n五、依建築技術規則應設置之特別安全梯或緊急昇降機間。\n2 前項場所之樓地板面積，在建築物以具有一小時以上防火時效之牆壁、平時保持關閉之防火門窗等防火設備及各該樓層防火構造之樓地板區劃，且防火設備具一小時以上之阻熱性者，增建、改建或變更用途部分得分別計算。"}, {"title": "第 29 條下列場所應設置緊急電源插座：", "body": "一、十一層以上建築物之各樓層。\n二、總樓地板面積在一千平方公尺以上之地下建築物。\n三、依建築技術規則應設置之緊急昇降機間。"}, {"title": "第 30 條下列場所應設置無線電通信輔助設備：", "body": "一、樓高在一百公尺以上建築物之地下層。\n二、總樓地板面積在一千平方公尺以上之地下建築物。\n三、地下層在四層以上，且地下層樓地板面積合計在三千平方公尺以上建築物之地下層。"}, {"title": "第 30-1 條下列場所應設置防災監控系統綜合操作裝置：", "body": "一、高層建築物。\n二、總樓地板面積在五萬平方公尺以上之建築物。\n三、總樓地板面積在一千平方公尺以上之地下建築物。\n四、其他經中央主管機關公告之供公眾使用之場所。"}]}, {"label": "第 三 編 消防安全設計", "level": 1, "children": []}, {"label": "第 一 章 滅火設備", "level": 2, "children": []}, {"label": "第 一 節 滅火器及室內消防栓設備", "level": 3, "children": [{"title": "第 31 條滅火器應依下列規定設置：", "body": "一、視各類場所潛在火災性質設置，並依下列規定核算其最低滅火效能值：\n（一）供第十二條第一款及第五款使用之場所，各層樓地板面積每一百平方公尺（含未滿）有一滅火效能值。\n（二）供第十二條第二款至第四款使用之場所，各層樓地板面積每二百平方公尺（含未滿）有一滅火效能值。\n（三）鍋爐房、廚房等大量使用火源之處所，以樓地板面積每二十五平方公尺（含未滿）有一滅火效能值。\n二、電影片映演場所放映室及電氣設備使用之處所，每一百平方公尺（含未滿）另設一滅火器。\n三、設有滅火器之樓層，自樓面居室任一點至滅火器之步行距離在二十公尺以下。\n四、固定放置於取用方便之明顯處所，並設有以紅底白字標明滅火器字樣之標識，其每字應在二十平方公分以上。但與室內消防栓箱等設備併設於箱體內並於箱面標明滅火器字樣者，其標識顏色不在此限。\n五、懸掛於牆上或放置滅火器箱中之滅火器，其上端與樓地板面之距離，十八公斤以上者在一公尺以下，未滿十八公斤者在一點五公尺以下。"}, {"title": "第 32 條室內消防栓設備之配管、配件及屋頂水箱，依下列規定設置：", "body": "一、配管部分：\n（一）應為專用。但與室外消防栓、自動撒水設備及連結送水管等滅火系統共用，無礙其功能者，不在此限。\n（二）符合下列規定之一：\n1.國家標準（以下簡稱 CNS）六四四五配管用碳鋼鋼管、四六二六壓力配管用碳鋼鋼管、六三三一配管用不銹鋼鋼管或具同等以上強度、耐腐蝕性及耐熱性者。\n2.經中央主管機關認可具氣密性、強度、耐腐蝕性、耐候性及耐熱性等性能之合成樹脂管。\n（三）管徑，依水力計算配置。但立管與連結送水管共用時，其管徑在一百毫米以上。\n\n（四）立管管徑，第一種消防栓在六十三毫米以上；第二種消防栓在五十毫米以上。\n（五）立管裝置於不受外來損傷及火災不易殃及之位置。\n（六）立管連接屋頂水箱、重力水箱或壓力水箱，使配管平時充滿水。\n（七）採取有效之防震措施。\n二、止水閥以明顯之方式標示開關之狀態，逆止閥標示水流之方向，並符合 CNS 規定。\n三、屋頂水箱部分：\n（一）水箱之水量，第一種消防栓有零點五立方公尺以上；第二種消防栓有零點三立方公尺以上。\n但與其他滅火設備並用時，水量應取其最大值。\n（二）採取有效之防震措施。\n（三）斜屋頂建築物得免設。"}, {"title": "第 33 條室內消防栓設備之消防立管管系竣工時，應做加壓試驗，試驗壓力不得小於加壓送水裝置全閉揚程一點五倍以上之水壓。試驗壓力以繼續維持二小時無漏水現象為合格。", "body": ""}, {"title": "第 34 條", "body": "1 除第十二條第二款第十一目或第四款之場所，應設置第一種消防栓外，其他場所應就下列二種消防栓選擇設置之：\n一、第一種消防栓，依下列規定設置：\n（一）各層任一點至消防栓接頭之水平距離在二十五公尺以下。\n（二）任一樓層內，全部消防栓同時使用時，各消防栓瞄子放水壓力在每平方公分一點七公斤以上或 0.17MPa 以上，放水量在每分鐘一百三十公升以上。但全部消防栓數量超過二支時，以同時使用二支計算之。\n（三）消防栓箱內，配置口徑三十八毫米或五十毫米之消防栓一個，口徑三十八毫米或五十毫米、長十五公尺並附快式接頭之水帶二條，水帶架一組及口徑十三毫米以上之直線水霧兩用瞄子一具。但消防栓接頭至建築物任一點之水平距離在十五公尺以下時，水帶部分得設十公尺水帶二條。\n二、第二種消防栓，依下列規定設置：\n（一）各層任一點至消防栓接頭之水平距離在二十五公尺以下。\n（二）任一樓層內，全部消防栓同時使用時，各消防栓瞄子放水壓力在每平方公分一點七公斤以上或 0.17MPa 以上，放水量在每分鐘八十公升以上。但全部消防栓數量超過二支時，以同時使用二支計算之。\n（三）消防栓箱內，配置口徑二十五毫米消防栓連同管盤長三十公尺之皮管或消防用保形水帶及直線水霧兩用瞄子一具，且瞄子設有容易開關之裝置。\n2 前項消防栓，應符合下列規定：\n一、消防栓開關距離樓地板之高度，在零點三公尺以上一點五公尺以下。\n\n二、設在走廊或防火構造樓梯間附近便於取用處。\n三、供集會或娛樂處所，設於舞臺二側、觀眾席後二側、包廂後側之位置。\n四、在屋頂上適當位置至少設置一個測試用出水口，並標明測試出水口字樣。但斜屋頂設置測試用出水口有困難時，得免設。"}, {"title": "第 35 條室內消防栓箱，應符合下列規定：", "body": "一、箱身為厚度在一點六毫米以上之鋼板或具同等性能以上之不燃材料者。\n二、具有足夠裝設消防栓、水帶及瞄子等裝
