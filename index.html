        // ---- 廠商膠囊（多選，編輯模式）----
        let _activeVendorName = null;  // 目前 view 模式選中的廠商

        function _getSelectedVendors() {
            const info = (db.siteInfo && db.siteInfo[_siSelectedSiteId]) || {};
            const v = info.vendors;
            if (Array.isArray(v)) return v;
            if (info.vendor) return [info.vendor];
            return [];
        }

        function _renderVendorEditPills() {
            const container = document.getElementById('siteInfoVendorPills');
            if (!container) return;
            const selected = _getSelectedVendors();
            container.innerHTML = '';
            (db.vendors || []).forEach(function(v) {
                const on = selected.includes(v);
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = v;
                btn.style.cssText = 'padding:6px 14px; border-radius:33px; font-size:13px; font-weight:bold; border:1px solid ' + (on ? '#ffffff' : '#555555') + '; background:' + (on ? '#3d3d3d' : '#1e1e1e') + '; color:#ffffff; cursor:pointer; transition:all 0.15s;';
                btn.addEventListener('click', function() {
                    const cur = _getSelectedVendors();
                    let next;
                    if (cur.includes(v)) {
                        // 取消廠商：若有計價表內容則提示
                        const blocks = _getVendorBlocksFor(v);
                        const hasContent = blocks.some(function(blk) {
                            return (blk.items && blk.items.length > 0) || blk.blockTotal;
                        });
                        if (hasContent && !confirm('「' + v + '」已有計價表內容，確定要移除此施工廠商？')) return;
                        next = cur.filter(function(x) { return x !== v; });
                    } else {
                        next = cur.concat([v]);
                    }
                    if (!db.siteInfo) db.siteInfo = {};
                    if (!db.siteInfo[_siSelectedSiteId]) db.siteInfo[_siSelectedSiteId] = {};
                    db.siteInfo[_siSelectedSiteId].vendors = next;
                    _renderVendorEditPills();
                    enterVendorCardEdit();
                });
                container.appendChild(btn);
            });
        }


        // ---- 廠商卡片 per-vendor blocks ----
        function _getVendorBlocksFor(vendorName) {
            if (!db.siteInfo) db.siteInfo = {};
            if (!db.siteInfo[_siSelectedSiteId]) db.siteInfo[_siSelectedSiteId] = {};
            const info = db.siteInfo[_siSelectedSiteId];
            if (!info.vendorProgressBlocksMap) info.vendorProgressBlocksMap = {};
            if (!info.vendorProgressBlocksMap[vendorName]) info.vendorProgressBlocksMap[vendorName] = [];
            return info.vendorProgressBlocksMap[vendorName];
        }

        function _getVendorBlocks() {
            return _activeVendorName ? _getVendorBlocksFor(_activeVendorName) : [];
        }

        function _computeVendorContractTotalFor(vendorName) {
            return _getVendorBlocksFor(vendorName).reduce(function(sum, blk) {
                if (blk.includeInTotal === false) return sum;
                return sum + (Number(blk.blockTotal) || 0);
            }, 0);
        }

        function _computeVendorContractTotal() {
            return _activeVendorName ? _computeVendorContractTotalFor(_activeVendorName) : 0;
        }

        function _updateVendorTotalDisplay() {
            const total = _computeVendorContractTotal();
            const el = document.getElementById('vendorCardTotalDisplay');
            if (el) el.innerText = total > 0 ? total.toLocaleString('zh-TW') : '—';
        }

        // ---- 廠商切換膠囊（view + edit 模式共用）----
        function _renderVendorSwitchPills(isEditing) {
            const container = document.getElementById('vendorCardViewPills');
            if (!container) return;
            const selected = _getSelectedVendors();
            if (selected.length === 0) {
                container.innerHTML = '<span style="font-size:13px; color:#888888;">—</span>';
                document.getElementById('vendorCardViewArea').style.display = 'none';
                document.getElementById('vendorCardEditArea').style.display = 'none';
                document.getElementById('vendorProgressDetailWrap').style.display = 'none';
                return;
            }
            // 若目前 active 廠商不在選單裡，預設選第一個
            if (!_activeVendorName || !selected.includes(_activeVendorName)) {
                _activeVendorName = selected[0];
            }
            container.innerHTML = '';
            selected.forEach(function(v) {
                const active = (v === _activeVendorName);
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = v;
                btn.style.cssText = 'padding:6px 14px; border-radius:33px; font-size:13px; font-weight:bold; border:1px solid ' + (active ? '#ffffff' : '#555555') + '; background:' + (active ? '#3d3d3d' : '#1e1e1e') + '; color:#ffffff; cursor:pointer; transition:all 0.15s;';
                btn.addEventListener('click', function() {
                    _activeVendorName = v;
                    if (isEditing) { _renderVendorCardEdit(); }
                    else { _renderVendorCardView(); }
                });
                container.appendChild(btn);
            });
        }

        function _renderVendorCardView() {
            _renderVendorSwitchPills(false);
            if (!_activeVendorName) return;
            const blocks = _getVendorBlocks();
            const total = _computeVendorContractTotal();
            const totalAmt = blocks.reduce(function(sum, blk) {
                if (blk.includeInTotal === false) return sum;
                return sum + (blk.items || []).reduce(function(s, r) { return s + (Number(r.amount) || 0); }, 0);
            }, 0);
            document.getElementById('vendorCardViewTotal').innerText = total > 0 ? _fmtAmount(total) : '—';
            document.getElementById('vendorCardViewTotalPct').innerText = total > 0 ? (totalAmt / total * 100).toFixed(1) + '%' : '—';
            document.getElementById('vendorCardViewArea').style.display = 'flex';
            document.getElementById('vendorCardEditArea').style.display = 'none';
            _renderVendorProgressBlocksFor(false);
            const wrap = document.getElementById('vendorProgressDetailWrap');
            if (wrap) wrap.style.display = blocks.length > 0 ? 'flex' : 'none';
        }

        function _renderVendorCardEdit() {
            _renderVendorSwitchPills(true);
            if (!_activeVendorName) return;
            _updateVendorTotalDisplay();
            document.getElementById('vendorCardViewArea').style.display = 'none';
            document.getElementById('vendorCardEditArea').style.display = 'flex';
            _renderVendorProgressBlocksFor(true);
            const blocks = _getVendorBlocks();
            const wrap = document.getElementById('vendorProgressDetailWrap');
            if (wrap) wrap.style.display = blocks.length > 0 ? 'flex' : 'none';
        }

        function _renderVendorCard() { _renderVendorCardView(); }
        function enterVendorCardEdit() { _renderVendorCardEdit(); }
        function saveVendorCard() {
            if (!_siSelectedSiteId) return;
            if (!db.siteInfo) db.siteInfo = {};
            if (!db.siteInfo[_siSelectedSiteId]) db.siteInfo[_siSelectedSiteId] = {};
            saveToLocalStorage();
        }

        let _vendorProgressBlockSortable = null;

        function _initVendorProgressBlockSortable() {
            if (_vendorProgressBlockSortable) { _vendorProgressBlockSortable.destroy(); _vendorProgressBlockSortable = null; }
            const container = document.getElementById('vendorProgressBlocksContainer');
            if (!container) return;
            _vendorProgressBlockSortable = new Sortable(container, {
                animation: 150,
                handle: '.vendor-drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: function() {
                    const blocks = _getVendorBlocks();
                    const newOrder = [];
                    container.querySelectorAll('[data-vbidx]').forEach(function(el) {
                        const idx = parseInt(el.getAttribute('data-vbidx'));
                        if (!isNaN(idx) && blocks[idx]) newOrder.push(blocks[idx]);
                    });
                    const info = db.siteInfo[_siSelectedSiteId];
                    if (info && info.vendorProgressBlocksMap) {
                        info.vendorProgressBlocksMap[_activeVendorName] = newOrder;
                    }
                    saveToLocalStorage();
                    _renderVendorProgressBlocksFor(true);
                    _initVendorProgressBlockSortable();
                }
            });
        }

        function _renderVendorProgressBlocksFor(isEditing) {
            const container = document.getElementById('vendorProgressBlocksContainer');
            if (!container) return;
            container.innerHTML = '';
            if (!_activeVendorName) return;
            const blocks = _getVendorBlocks();
            const ct = _computeVendorContractTotal();
            blocks.forEach(function(blk, bIdx) {
                const items = blk.items || [];
                const totalAmt = items.reduce(function(s, r) { return s + (Number(r.amount) || 0); }, 0);
                const blkTotal = Number(blk.blockTotal) || 0;
                const useCt = blkTotal > 0 ? blkTotal : ct;
                const totalPct = useCt > 0 ? (totalAmt / useCt * 100).toFixed(1) + '%' : '';
                const card = document.createElement('div');
                card.setAttribute('data-vbidx', bIdx);
                card.style.cssText = 'padding:10px 14px;' + (bIdx > 0 ? ' border-top:1px solid #444444;' : '') + ' display:flex; flex-direction:column; gap:6px; flex-shrink:0;';
                const titleBar = document.createElement('div');
                titleBar.style.cssText = 'display:flex; align-items:center; justify-content:space-between; gap:8px;';
                const displayTitle = blk.title || ('計價表 ' + (bIdx + 1));
                if (isEditing) {
                    titleBar.innerHTML =
                        '<span class="vendor-drag-handle" style="cursor:move; color:#888888; font-size:16px; padding:4px 6px 4px 0; flex-shrink:0; touch-action:none;">☰</span>' +
                        '<span style="flex:1; min-width:0; font-size:13px; font-weight:bold; color:#ffffff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + displayTitle + '</span>' +
                        '<div style="display:flex; align-items:center; gap:6px; flex-shrink:0;">' +
                            '<button onclick="_renameVendorBlock(' + bIdx + ')" style="background:#111111; color:white; font-size:12px; font-weight:bold; padding:6px 10px; border-radius:8px;">更名</button>' +
                            '<button onclick="_deleteVendorBlock(' + bIdx + ')" style="background:#D9006C; color:white; font-size:12px; font-weight:bold; padding:6px 10px; border-radius:8px;">刪除</button>' +
                        '</div>';
                } else {
                    const blkTotalLabel = blkTotal > 0 ? '<span style="font-size:11px; color:#888888; font-weight:500;">' + _fmtAmount(blkTotal) + '</span>' : '';
                    const totalAmtLabel = totalAmt > 0 ? '<span style="font-size:11px; color:#aaaaaa; font-weight:500; margin-top:1px;">' + _fmtAmount(totalAmt) + '</span>' : '';
                    titleBar.innerHTML =
                        '<div style="flex:1; min-width:0; display:flex; flex-direction:column; gap:1px;">' +
                            '<span style="font-size:13px; font-weight:bold; color:#ffffff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + displayTitle + '</span>' +
                            blkTotalLabel +
                        '</div>' +
                        '<div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">' +
                            '<div style="display:flex; flex-direction:column; align-items:flex-end; gap:1px;">' +
                                '<span style="font-size:13px; font-weight:600; color:#ffffff;">' + totalPct + '</span>' +
                                totalAmtLabel +
                            '</div>' +
                            '<button onclick="_openProgressModal(' + bIdx + ', true)" style="background:#111111; color:white; font-size:12px; font-weight:bold; padding:6px 12px; border-radius:8px;">查看</button>' +
                        '</div>';
                }
                card.appendChild(titleBar);
                container.appendChild(card);
            });
            if (isEditing) _initVendorProgressBlockSortable();
        }

        function addVendorProgressBlock() {
            if (!_activeVendorName) return;
            const name = '';
            const blocks = _getVendorBlocks();
            blocks.push({ id: Date.now().toString(), title: name, items: [], includeInTotal: false });
            saveToLocalStorage();
            _renderVendorCardEdit();
            const wrap = document.getElementById('vendorProgressDetailWrap');
            if (wrap) { wrap.style.display = 'flex'; setTimeout(function() { wrap.scrollTop = wrap.scrollHeight; }, 30); }
            showToast('儲存成功');
        }

        function _renameVendorBlock(bIdx) {
            const blocks = _getVendorBlocks();
            if (!blocks[bIdx]) return;
            const newTitle = prompt('請輸入新名稱（可留空白）：', blocks[bIdx].title || '');
            if (newTitle === null) return;
            blocks[bIdx].title = newTitle.trim();
            saveToLocalStorage();
            _renderVendorProgressBlocksFor(true);
            showToast('儲存成功');
        }

        function _deleteVendorBlock(bIdx) {
            const blocks = _getVendorBlocks();
            if (!confirm('確定要刪除此計價表？')) return;
            blocks.splice(bIdx, 1);
            saveToLocalStorage();
            _renderVendorCardEdit();
        }


        function _renderMainInfoView() {
            if (!db.siteInfo) db.siteInfo = {};
            const info = db.siteInfo[_siSelectedSiteId] || {};
            document.getElementById('siteInfoViewAddress').innerText = info.caseAddress || '—';
            document.getElementById('siteInfoViewTotal').innerText = info.contractTotal ? _fmtAmount(info.contractTotal) : '—';
            const notesWrap = document.getElementById('siteInfoViewNotesWrap');
            const notesEl = document.getElementById('siteInfoViewNotes');
            if (info.notes && info.notes.trim()) {
                notesEl.innerText = info.notes.trim();
                notesWrap.style.display = '';
            } else {
                notesWrap.style.display = 'none';
            }
            _updateTotalProgressPct();
            document.getElementById('mainInfoViewArea').style.display  = 'flex';
            document.getElementById('mainInfoEditArea').style.display  = 'none';
            document.getElementById('btnMainInfoEdit').style.display   = '';
            document.getElementById('btnMainInfoSave').style.display   = 'none';
        }

        function _updateTotalProgressPct() {
            const ct = _getContractTotal();
            const blocks = _getBlocks();
            const totalAmt = blocks.reduce((sum, blk) => {
                if (blk.includeInTotal === false) return sum;
                return sum + (blk.items || []).reduce((s, r) => s + (Number(r.amount)||0), 0);
            }, 0);
            const el = document.getElementById('siteInfoViewTotalPct');
            if (!el) return;
            el.innerText = ct > 0 ? (totalAmt / ct * 100).toFixed(1) + '%' : '—';
        }

        function enterMainInfoEdit() {
            if (!db.siteInfo) db.siteInfo = {};
            const info = db.siteInfo[_siSelectedSiteId] || {};
            document.getElementById('inputSiteInfoAddress').value = info.caseAddress || '';
            document.getElementById('inputSiteInfoNotes').value   = info.notes       || '';
            document.getElementById('mainInfoViewArea').style.display  = 'none';
            document.getElementById('mainInfoEditArea').style.display  = 'flex';
            document.getElementById('btnMainInfoEdit').style.display   = 'none';
            document.getElementById('btnMainInfoSave').style.display   = '';
            _updateEditTotalDisplay();
            _renderAllProgressBlocks();
            enterVendorCardEdit();
            _renderVendorEditPills();
            setTimeout(() => { _siteInfoModalSnapshot = _snapshotSiteInfoModal(); }, 30);
        }

        function _cancelMainInfoEdit() {
            _siteInfoModalSnapshot = null;
            document.getElementById('mainInfoViewArea').style.display  = 'flex';
            document.getElementById('mainInfoEditArea').style.display  = 'none';
            document.getElementById('btnMainInfoEdit').style.display   = '';
            document.getElementById('btnMainInfoSave').style.display   = 'none';
            _renderAllProgressBlocks();
            _renderVendorCard();
        }

        function saveMainInfo() {
            const caseAddress = document.getElementById('inputSiteInfoAddress').value.trim();
            const notes       = document.getElementById('inputSiteInfoNotes').value.trim();
            const contractTotal = _computeContractTotalFromBlocks();
            if (!db.siteInfo) db.siteInfo = {};
            if (!db.siteInfo[_siSelectedSiteId]) db.siteInfo[_siSelectedSiteId] = {};
            db.siteInfo[_siSelectedSiteId].caseAddress   = caseAddress;
            db.siteInfo[_siSelectedSiteId].notes         = notes;
            db.siteInfo[_siSelectedSiteId].contractTotal = contractTotal ? String(contractTotal) : '';
            saveVendorCard();
            saveToLocalStorage();
            _siteInfoModalSnapshot = null;
            document.getElementById('mainInfoViewArea').style.display = 'flex';
            document.getElementById('mainInfoEditArea').style.display = 'none';
            document.getElementById('btnMainInfoEdit').style.display  = '';
            document.getElementById('btnMainInfoSave').style.display  = 'none';
            _renderMainInfoView();
            _renderAllProgressBlocks();
            _renderVendorCard();
            showToast('儲存成功');
        }

        function _computeContractTotalFromBlocks() {
            const blocks = _getBlocks();
            return blocks.reduce((sum, blk) => {
                if (blk.includeInTotal === false) return sum;
                return sum + (Number(blk.blockTotal) || 0);
            }, 0);
        }

        function _updateEditTotalDisplay() {
            const total = _computeContractTotalFromBlocks();
            const el = document.getElementById('inputSiteInfoTotalDisplay');
            if (el) el.innerText = total > 0 ? total.toLocaleString('zh-TW') : '—';
            const hidden = document.getElementById('inputSiteInfoTotal');
            if (hidden) hidden.value = total > 0 ? String(total) : '';
        }

        function _getBlocks() {
            if (!db.siteInfo) db.siteInfo = {};
            if (!db.siteInfo[_siSelectedSiteId]) db.siteInfo[_siSelectedSiteId] = {};
            if (!db.siteInfo[_siSelectedSiteId].progressBlocks) db.siteInfo[_siSelectedSiteId].progressBlocks = [];
            return db.siteInfo[_siSelectedSiteId].progressBlocks;
        }

        function _renderAllProgressBlocks() {
            const container = document.getElementById('progressBlocksContainer');
            container.innerHTML = '';
            const blocks = _getBlocks();
            const ct = _getContractTotal();
            blocks.forEach((blk, bIdx) => {
                container.appendChild(_buildProgressBlockCard(blk, bIdx, ct));
            });
            _updateTotalProgressPct();
            _initProgressBlockSortable();
        }

        function _buildProgressBlockCard(blk, bIdx, ct) {
            const items = blk.items || [];
            const totalAmt = items.reduce((s, r) => s + (Number(r.amount)||0), 0);
            const blkTotal = Number(blk.blockTotal) || 0;
            const useCt = blkTotal > 0 ? blkTotal : ct;
            const totalPct = useCt > 0 ? (totalAmt / useCt * 100).toFixed(1) + '%' : '';
            const isMainEditing = document.getElementById('mainInfoEditArea').style.display !== 'none';

            const card = document.createElement('div');
            card.className = 'progress-block-card';
            card.setAttribute('data-bidx', bIdx);
            card.style.cssText = `padding:10px 14px;${bIdx > 0 ? ' border-top:1px solid #444444;' : ''} display:flex; flex-direction:column; gap:6px; flex-shrink:0;`;

            const titleBar = document.createElement('div');
            titleBar.style.cssText = 'display:flex; align-items:center; justify-content:space-between; gap:8px;';

            if (isMainEditing) {
                titleBar.innerHTML = `
                    <span class="progress-drag-handle" style="cursor:move; color:#888888; font-size:16px; padding:4px 6px 4px 0; flex-shrink:0; touch-action:none;">☰</span>
                    <span style="flex:1; min-width:0; font-size:13px; font-weight:bold; color:#ffffff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${_getBlockDisplayTitle(blk)}</span>
                    <div style="display:flex; align-items:center; gap:6px; flex-shrink:0;">
                        <button class="progress-rename-btn" data-bidx="${bIdx}" style="background:#111111; color:white; font-size:12px; font-weight:bold; padding:6px 10px; border-radius:8px;">更名</button>
                        <button onclick="_deleteProgressBlockMain(${bIdx})" style="background:#D9006C; color:white; font-size:12px; font-weight:bold; padding:6px 10px; border-radius:8px;">刪除</button>
                    </div>
                `;
                const renameBtn = titleBar.querySelector('.progress-rename-btn');
                renameBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    _renameProgressBlock(parseInt(renameBtn.getAttribute('data-bidx')));
                });
            } else {
                // View mode: show block total amount below title name, pct uses blockTotal
                const blkTotalLabel = blkTotal > 0 ? `<span style="font-size:11px; color:#888888; font-weight:500;">${_fmtAmount(blkTotal)}</span>` : '';
                const totalAmtLabel = totalAmt > 0 ? `<span style="font-size:11px; color:#aaaaaa; font-weight:500; margin-top:1px;">${_fmtAmount(totalAmt)}</span>` : '';
                titleBar.innerHTML = `
                    <div style="flex:1; min-width:0; display:flex; flex-direction:column; gap:1px;">
                        <span style="font-size:13px; font-weight:bold; color:#ffffff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${_getBlockDisplayTitle(blk)}</span>
                        ${blkTotalLabel}
                    </div>
                    <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:1px;">
                            <span style="font-size:13px; font-weight:600; color:#ffffff;">${totalPct}</span>
                            ${totalAmtLabel}
                        </div>
                        <button onclick="_openProgressModal(${bIdx})" style="background:#111111; color:white; font-size:12px; font-weight:bold; padding:6px 12px; border-radius:8px;">查看</button>
                    </div>
                `;
            }
            card.appendChild(titleBar);
            return card;
        }

        let _progressBlockSortable = null;

        function _renameProgressBlock(bIdx) {
            const blocks = _getBlocks();
            if (!blocks[bIdx]) return;
            const newTitle = prompt('請輸入新名稱（可留空白）：', blocks[bIdx].title || '');
            if (newTitle === null) return;
            blocks[bIdx].title = newTitle.trim();
            saveToLocalStorage();
            _renderAllProgressBlocks();
            showToast('儲存成功');
        }

        function _initProgressBlockSortable() {
            if (_progressBlockSortable) { _progressBlockSortable.destroy(); _progressBlockSortable = null; }
            const container = document.getElementById('progressBlocksContainer');
            const isEditing = document.getElementById('mainInfoEditArea').style.display !== 'none';
            if (!isEditing) return;
            _progressBlockSortable = new Sortable(container, {
                animation: 150,
                handle: '.progress-drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: function() {
                    const blocks = _getBlocks();
                    const newOrder = [];
                    container.querySelectorAll('.progress-block-card').forEach(el => {
                        const idx = parseInt(el.getAttribute('data-bidx'));
                        if (!isNaN(idx) && blocks[idx]) newOrder.push(blocks[idx]);
                    });
                    if (!db.siteInfo[_siSelectedSiteId]) db.siteInfo[_siSelectedSiteId] = {};
                    db.siteInfo[_siSelectedSiteId].progressBlocks = newOrder;
                    saveToLocalStorage();
                    _renderAllProgressBlocks();
                    _initProgressBlockSortable();
                }
            });
        }

        // ================= 計價進度彈窗 =================
        let _progressModalIsEditing = false;
        let _progressModalIsVendor = false;

        function _modalBlocks() {
            return _progressModalIsVendor ? _getVendorBlocks() : _getBlocks();
        }
        function _modalContractTotal() {
            return _progressModalIsVendor ? _computeVendorContractTotal() : _getContractTotal();
        }

        function _scrollModalToBottom() {
            const el = document.getElementById('progressModalItems');
            if (el) setTimeout(() => { el.scrollTop = el.scrollHeight; }, 30);
        }

        function _getBlockDisplayTitle(blk) {
            const type = blk.blockType || '';
            const title = blk.title !== undefined && blk.title !== null ? String(blk.title) : '';
            if (!type && !title) return '（未命名）';
            return type ? `[${type}] ${title}` : title;
        }

        function _openProgressModal(bIdx, isVendor) {
            _siEditingBlockIdx = bIdx;
            _progressModalIsEditing = false;
            _progressModalIsVendor = !!isVendor;
            const blocks = _modalBlocks();
            const blk = blocks[bIdx];
            const ct = _modalContractTotal();
            const blkTotal = Number(blk.blockTotal) || 0;
            const useCt = blkTotal > 0 ? blkTotal : ct;

            document.getElementById('progressModalTitleView').innerText = _getBlockDisplayTitle(blk);
            document.getElementById('btnProgressModalEdit').style.display = '';
            document.getElementById('btnProgressModalSave').style.display = 'none';
            document.getElementById('progressModalAddBtn').style.display = 'none';

            // Meta row — view mode
            document.getElementById('progressModalBlockTypeView').style.display = '';
            document.getElementById('progressModalBlockTypeView').innerText = blk.blockType || '無';
            document.getElementById('progressModalBlockTypeSelect').style.display = 'none';
            document.getElementById('progressModalBlockTotalView').style.display = '';
            document.getElementById('progressModalBlockTotalView').innerText = blk.blockTotal ? _fmtAmount(blk.blockTotal) : '—';
            document.getElementById('progressModalBlockTotalInput').style.display = 'none';
            document.getElementById('progressModalIncludeView').style.display = '';
            document.getElementById('progressModalIncludeView').innerText = (blk.includeInTotal === false) ? '否' : '是';
            document.getElementById('progressModalIncludeInput').style.display = 'none';

            const itemsContainer = document.getElementById('progressModalItems');
            itemsContainer.innerHTML = '';
            (blk.items || []).forEach((item, iIdx) => {
                itemsContainer.appendChild(_makeModalItemRow(iIdx, item.month, item.amount, useCt, false));
            });
            _recalcModalSummary();
            document.getElementById('progressEditModal').style.display = 'flex';
            _scrollModalToBottom();
        }

        function _enterProgressModalEdit() {
            _progressModalIsEditing = true;
            const blocks = _modalBlocks();
            const blk = blocks[_siEditingBlockIdx];
            const blkTotal = Number(blk.blockTotal) || 0;
            const ct = _modalContractTotal();
            const useCt = blkTotal > 0 ? blkTotal : ct;

            document.getElementById('btnProgressModalEdit').style.display = 'none';
            document.getElementById('btnProgressModalSave').style.display = '';
            document.getElementById('progressModalAddBtn').style.display = '';

            // Meta row — edit mode
            document.getElementById('progressModalBlockTypeView').style.display = 'none';
            const typeSelect = document.getElementById('progressModalBlockTypeSelect');
            typeSelect.style.display = '';
            typeSelect.value = blk.blockType || '';
            document.getElementById('progressModalBlockTotalView').style.display = 'none';
            const btInp = document.getElementById('progressModalBlockTotalInput');
            btInp.style.display = '';
            btInp.value = blk.blockTotal || '';
            btInp.oninput = () => _recalcModalSummary();
            document.getElementById('progressModalIncludeView').style.display = 'none';
            const inclChk = document.getElementById('progressModalIncludeInput');
            inclChk.style.display = '';
            inclChk.checked = (blk.includeInTotal !== false);

            const itemsContainer = document.getElementById('progressModalItems');
            itemsContainer.innerHTML = '';
            (blk.items || []).forEach((item, iIdx) => {
                itemsContainer.appendChild(_makeModalItemRow(iIdx, item.month, item.amount, useCt, true));
            });
            _recalcModalSummary();
            _scrollModalToBottom();
            setTimeout(() => { _progressModalSnapshot = _snapshotProgressModal(); }, 50);
        }

        function _makeModalItemRow(iIdx, month, amount, ct, editable) {
            const div = document.createElement('div');
            div.style.cssText = 'display:grid; grid-template-columns:1fr 1fr 56px 28px; gap:6px; align-items:center;';
            div.setAttribute('data-modal-row', iIdx);
            const amt = Number(amount)||0;
            const pct = ct > 0 ? (amt/ct*100).toFixed(1)+'%' : '—';
            const monthLabel = month ? month.replace(/^(\d{4})-(\d{2})$/, '$1年$2月') : '—';

            if (editable) {
                div.innerHTML = `
                    <select class="modal-month-sel" onchange="_recalcModalSummary()"
                        style="font-size:13px; padding:8px 4px; border:1px solid #555555; border-radius:8px; background:#1e1e1e; -webkit-user-select:text; user-select:text; height:40px;">
                        ${_buildMonthOptions(month || _currentMonthValue())}
                    </select>
                    <input type="number" inputmode="decimal" value="${amount||''}" placeholder="金額"
                        class="modal-amount-inp" oninput="_recalcModalSummary()"
                        style="font-size:13px; padding:8px 10px; border:1px solid #555555; border-radius:8px; background:#1e1e1e; text-align:right; -webkit-user-select:text; user-select:text; height:40px;">
                    <span class="modal-pct-cell" style="font-size:12px; color:#ffffff; text-align:right; padding-right:2px;">${pct}</span>
                    <button type="button" onclick="_removeModalItem(this)" style="background:none; color:#D9006C; font-size:18px; padding:0; line-height:1; font-weight:bold;">×</button>
                `;
            } else {
                div.innerHTML = `
                    <span style="font-size:13px; color:#ffffff; padding:8px 0;">${monthLabel}</span>
                    <span style="font-size:13px; color:#ffffff; text-align:right; padding:8px 10px 8px 0;">${_fmtAmount(amount)}</span>
                    <span class="modal-pct-cell" style="font-size:13px; color:#ffffff; text-align:right;">${pct}</span>
                    <span></span>
                `;
            }
            return div;
        }

        function _addProgressModalItem() {
            if (!_progressModalIsEditing) _enterProgressModalEdit();
            const ct = _modalContractTotal();
            const btInp = document.getElementById('progressModalBlockTotalInput');
            const blkTotal = btInp && btInp.style.display !== 'none' ? (Number(btInp.value) || 0) : 0;
            const useCt = blkTotal > 0 ? blkTotal : ct;
            const container = document.getElementById('progressModalItems');
            let defaultMonth = _currentMonthValue();
            const lastSel = container.querySelector('div[data-modal-row]:last-child .modal-month-sel');
            if (lastSel && lastSel.value) {
                const [y, m] = lastSel.value.split('-').map(Number);
                const d = new Date(y, m);
                defaultMonth = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            }
            const row = _makeModalItemRow(container.children.length, defaultMonth, '', useCt, true);
            container.appendChild(row);
            _recalcModalSummary();
            setTimeout(() => {
                const inp = row.querySelector('.modal-amount-inp');
                if (inp) inp.focus();
                container.scrollTop = container.scrollHeight;
            }, 30);
        }

        function _removeModalItem(btn) {
            btn.closest('div[data-modal-row]').remove();
            _recalcModalSummary();
        }

        function _recalcModalSummary() {
            const ct = _modalContractTotal();
            // Use blockTotal input (edit mode) or saved blockTotal (view mode) if available
            const btInp = document.getElementById('progressModalBlockTotalInput');
            const blocks = _modalBlocks();
            const blk = blocks[_siEditingBlockIdx] || {};
            let blkTotal = 0;
            if (btInp && btInp.style.display !== 'none') {
                blkTotal = Number(btInp.value) || 0;
            } else {
                blkTotal = Number(blk.blockTotal) || 0;
            }
            const useCt = blkTotal > 0 ? blkTotal : ct;

            const rows = document.querySelectorAll('#progressModalItems div[data-modal-row]');
            let total = 0;
            rows.forEach(row => {
                const inp = row.querySelector('.modal-amount-inp');
                const pctEl = row.querySelector('.modal-pct-cell');
                if (inp) {
                    const amt = Number(inp.value)||0;
                    total += amt;
                    if (pctEl) pctEl.innerText = useCt > 0 ? (amt/useCt*100).toFixed(1)+'%' : '—';
                } else {
                    const spans = row.querySelectorAll('span');
                    if (spans.length >= 2) total += Number(spans[1].innerText.replace(/,/g,'')) || 0;
                }
            });
            document.getElementById('progressModalSumAmt').innerText = rows.length ? _fmtAmount(total) : '—';

        function _saveProgressModal() {
            const blocks = _modalBlocks();
            const title = (blocks[_siEditingBlockIdx] && blocks[_siEditingBlockIdx].title !== undefined) ? blocks[_siEditingBlockIdx].title : '';
            const rows = document.querySelectorAll('#progressModalItems div[data-modal-row]');
            const items = [];
            rows.forEach(row => {
                const sel = row.querySelector('.modal-month-sel');
                const inp = row.querySelector('.modal-amount-inp');
                if (!sel || !inp) return;
                const amount = inp.value.trim();
                if (!amount || Number(amount) === 0) return;
                items.push({ month: sel.value, amount });
            });
            // 自動依月份排序
            items.sort((a, b) => (a.month || '').localeCompare(b.month || ''));
            const btInp = document.getElementById('progressModalBlockTotalInput');
            const inclChk = document.getElementById('progressModalIncludeInput');
            const typeSelect = document.getElementById('progressModalBlockTypeSelect');
            blocks[_siEditingBlockIdx].title = title;
            blocks[_siEditingBlockIdx].items = items;
            blocks[_siEditingBlockIdx].blockTotal = btInp ? btInp.value.trim() : '';
            blocks[_siEditingBlockIdx].includeInTotal = inclChk ? inclChk.checked : false;
            blocks[_siEditingBlockIdx].blockType = typeSelect ? typeSelect.value : '';
            saveToLocalStorage();
            _progressModalIsEditing = false;
            _progressModalSnapshot = null;

        // ================= 右滑返回（非首頁）=================
        (function() {
            let _backSwipeStartX = 0, _backSwipeStartY = 0, _backSwipeActive = false;
            const EDGE_ZONE = 40, THRESHOLD = 120, MAX_Y = 80;

            document.addEventListener('touchstart', function(e) {
                _backSwipeActive = false;
                if (currentState.page === 'sites') return;
                // 只偵測從左側邊緣開始的滑動
                if (e.touches[0].clientX > EDGE_ZONE) return;
                _backSwipeStartX = e.touches[0].clientX;
                _backSwipeStartY = e.touches[0].clientY;
                _backSwipeActive = true;
            }, { passive: true });

            document.addEventListener('touchend', function(e) {
                if (!_backSwipeActive) return;
                _backSwipeActive = false;
                if (currentState.page === 'sites') return;
                if (_isModalOpen()) return;
                if (_justBlurredKeyboard) return;
                const dx = e.changedTouches[0].clientX - _backSwipeStartX;
                const dy = Math.abs(e.changedTouches[0].clientY - _backSwipeStartY);
                if (dx < THRESHOLD || dy > MAX_Y) return;
                // 觸發返回
                const p = currentState.page;
                if (p === 'manage' || p === 'lawref') navigateTo('sites');
                else if (p === 'categories') {
                    if (_catPageMode === 'catPick') cancelCatPick();
                    else if (_catPageMode === 'items') backToCategories();

        function renderCategories() {
            const list = document.getElementById('listCategories');
            const keyword = document.getElementById('globalSearchBar').value.toLowerCase().trim();
            const header = document.getElementById('categoryListHeader');

            if (_catPageMode === 'catPick') {
                // 分類選擇模式：一律顯示分類列表供點選，忽略搜尋關鍵字
                document.getElementById('btnHomeTop').classList.add('hidden');
                document.getElementById('btnQuickAddInSearch').style.display = 'none';
                document.getElementById('catEditBtnGroup').style.display = 'none';
                document.getElementById('itemEditBtnGroup').style.display = 'none';
                header.innerText = '請點選要加入的分類：';
                list.innerHTML = db.categories.length === 0 ? '<p class="text-muted text-center">目前無分類，請先至設定新增。</p>' : '';
                db.categories.forEach(cat => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.style.cursor = 'pointer';
                    div.style.background = '#1a3a1a';
                    div.style.borderColor = '#86efac';
                    div.onclick = function() {
                        const name = _catPickPendingName;
                        cancelCatPick();
                        _confirmAddName = name;
                        _confirmAddCatId = cat.id;
                        _confirmAddCatName = cat.name;
                        document.getElementById('confirmAddMsg').innerText = `是否新增「${name}」至「${cat.name}」分類？`;
                        document.getElementById('confirmAddModal').style.display = 'flex';
                    };
                    div.innerHTML = `<span style="font-weight:600; color:#166534;">${cat.name}</span><span style="color:#16a34a; font-size:13px; font-weight:bold; flex-shrink:0;">選擇 ✓</span>`;
                    list.appendChild(div);
                });
                return;
            }

            if (keyword !== '') {
                // 搜尋模式：分詞子字串交集搜尋
                _catPageMode = 'search';
                header.innerText = '🔍 全品項搜尋結果：';
                document.getElementById('catEditBtnGroup').style.display = 'none';
                document.getElementById('itemEditBtnGroup').style.display = 'none';
                document.getElementById('btnQuickAddInSearch').style.display = '';
                list.innerHTML = '';
                list.scrollTop = 0;
                // 分詞：以空白切分，每個 token 都必須出現在品項名稱中
                // 正規化：移除斜線，使 38 可匹配 3/8
                const normalize = s => s.replace(/[\/\-"xX×]/g, '');
                const tokens = keyword.split(/\s+/).filter(t => t.length > 0);
                const filteredItems = db.items
                    .filter(item => {

                return alert('品項「' + newName.trim() + '」在此分類中已存在，請使用不同名稱。');

        function compileCartData() {
            const cartKeys = Object.keys(cart);
            const selectedItems = [];
            cartKeys.forEach(itemId => {
                const itemObj = db.items.find(i => i.id === itemId);
                if (itemObj) {
                    const catObj = db.categories.find(c => c.id === itemObj.catId);
                    selectedItems.push({ catName: catObj?catObj.name:'未分類', itemName: itemObj.name, qty: cart[itemId].qty || '未填' });
                }
            });
            if (selectedItems.length === 0) return null;
            const grouped = {};
            selectedItems.forEach(item => {
                if (!grouped[item.catName]) grouped[item.catName] = [];
                grouped[item.catName].push(`${item.itemName} *${item.qty}`);
            });
            let textOutput = `\n送貨地點：${currentState.siteName}\n`;
            for (const catName in grouped) { textOutput += `【${catName}】\n` + grouped[catName].join('\n') + '\n'; }
            return { text: textOutput.trim(), items: selectedItems };
        }

        function uploadCartToGoogleSheetOnly() {
            if (!currentState.siteId) return alert('⚠️ 請先選擇送貨地點！');
            const data = compileCartData();
            if (!data) return alert('訂單裡沒有材料！');

            const dateStr = document.getElementById('inputOrderDate')?.value || getTargetDateStr();
            const cartTextWithDate = `${dateStr} \n${data.text}`;
            if (!db.dailyRecords[dateStr]) db.dailyRecords[dateStr] = {};
            if (!Array.isArray(db.dailyRecords[dateStr].order)) {
                db.dailyRecords[dateStr].order = db.dailyRecords[dateStr].order ? [db.dailyRecords[dateStr].order] : [];
            }
            const alreadySaved = db.dailyRecords[dateStr].order.some(r => r.text === cartTextWithDate && r.siteId === currentState.siteId);
            if (!alreadySaved) {
                db.dailyRecords[dateStr].order.push({ siteId: currentState.siteId, text: cartTextWithDate });
            }
            saveToLocalStorage();
            initHomeCalendar();

            const SCRIPT_URL = db.config?.scriptUrl?.trim() || '';
            const hasUrl = !!SCRIPT_URL;
            _showGoogleConfirm(hasUrl,
                () => {
                    if (!hasUrl) { _askLineAndClearCart(cartTextWithDate, dateStr); return; }
                    const btn = document.getElementById('btnSubmitCart');
                    if (btn) { btn.textContent = '⏳ 同步中...'; btn.disabled = true; }
                    const payload = {
                        AM: currentState.siteName,
                        items: data.items.map(item => ({ cat: item.catName, PX: item.itemName, SL: item.qty }))
                    };
                    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                    .then(() => { alert('訂單數據已成功發送至 Google 試算表！'); })
                    .catch(() => { alert('傳送失敗，請確認網路連線與網址設定。'); })
                    .finally(() => {
                        if (btn) { btn.textContent = '儲存並上傳☁️'; btn.disabled = false; }
                        _askLineAndClearCart(cartTextWithDate, dateStr);
                    });
                },
                () => { _askLineAndClearCart(cartTextWithDate, dateStr); }
            );
        }

        function openInlineEdit(prefix, idx, dateStr) {
            const typeMap = { inlineChkLog: 'log', inlineChkOrder: 'order' };
            const type = typeMap[prefix];
            if (!type) return;
            const rec = db.dailyRecords[dateStr];
            if (!rec || !rec[type]) return;
            const arr = Array.isArray(rec[type]) ? rec[type] : [rec[type]];
            const item = arr[parseInt(idx)];
            if (!item) return;
            _editCtx = { type, idx: parseInt(idx), dateStr };
            if (type === 'log') openEditLogModal(item, dateStr, 'log');
            else if (type === 'order') openEditOrderModal(item, dateStr, parseInt(idx));
        }

        function openInlineEditPunch(dateStr) {
            _editCtx = { type: 'punch', dateStr };

            document.getElementById('inputPunchDate').value = dateStr;
            renderPunchSites();
            // Correctly read overtime from existing punch record
            const otInput = document.getElementById('inputOvertimeHours');
            otInput.value = '';
            if (db.punches) {
                for (let sId in db.punches) {
                    if (db.punches[sId] && db.punches[sId][dateStr]) {
                        const rec = db.punches[sId][dateStr];
                        if (rec.overtime !== undefined && rec.overtime !== '') {
                            otInput.value = rec.overtime;
                        } else if (rec.note) {
                            const m = rec.note.match(/加班(\d+(?:\.\d+)?)小時/);
                            if (m) otInput.value = m[1];
                        }
                        break;
                    }
                }
            }
            const delBtn = document.getElementById('btnPunchDeleteInEdit');
            if (delBtn) delBtn.classList.remove('hidden');

        function _buildWpOptions(siteId, selectedValue) {
            const wpItems = (siteId && db.workProgress[siteId]) ? db.workProgress[siteId] : [];
            let opts = '<option value="">\u2014 \u9078\u64c7\u65bd\u5de5\u9805\u76ee \u2014</option>';
            wpItems.forEach(function(wp) {
                const label = ((wp.floor || '') + (wp.task || '')).trim() || wp.task || '';
                if (!label) return;
                opts += '<option value="' + label + '"' + (label === selectedValue ? ' selected' : '') + '>' + label + '</option>';
            });
            return opts;
        }

        function _getWpProgress(siteId, label) {
            if (!siteId || !label) return null;
            const items = db.workProgress[siteId] || [];
            const found = items.find(function(wp) {
                return ((wp.floor || '') + (wp.task || '')).trim() === label || wp.task === label;
            });
            return found ? (found.progress || 0) : null;
        }

            lines.forEach(line => {
                const catMatch = line.match(/^【(.+)】$/);
                if (catMatch) { currentCat = catMatch[1]; return; }
                const itemMatch = line.match(/^(.+?) \*(.+)$/);
                if (itemMatch && currentCat) {
                    _editOrderItems.push({ catName: currentCat, itemName: itemMatch[1].trim(), qty: itemMatch[2].trim() });
                }
            });
            renderEditOrderList();
            document.getElementById('editOrderModal').style.display = 'flex';
            document.getElementById('editOrderList')?.scrollTo(0, 0);
        }

        function renderEditOrderList() {
            const list = document.getElementById('editOrderList');
            list.innerHTML = '';
            if (_editOrderItems.length === 0) { list.innerHTML = '<p class="text-muted text-center">訂單空空如也。</p>'; return; }
            _editOrderItems.forEach((it, idx) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
                        <span style="font-size:11px;color:#dddddd;">[${it.catName}]</span>
                        <span style="font-size:14px;">${it.itemName}</span>
                    </div>
                    <input type="number" inputmode="decimal" pattern="[0-9]*" value="${it.qty}" oninput="_editOrderItems[${idx}].qty=this.value" class="cart-qty-input" placeholder="數量/單位">
                    <button onclick="removeEditOrderItem(${idx})" style="background:none;color:#D9006C;font-size:14px;">❌</button>
                `;
                list.appendChild(div);
            });

        function removeEditOrderItem(idx) {
            _editOrderItems.splice(idx, 1);

        function compileEditOrderText() {
            if (_editOrderItems.length === 0) return null;
            const newDateStr = document.getElementById('editOrderDate').value || _editCtx.dateStr;
            const siteObj = db.sites.find(s => s.id === _editCtx.siteId);
            const siteName = siteObj ? siteObj.name : '';
            const grouped = {};
            _editOrderItems.forEach(it => {
                if (!grouped[it.catName]) grouped[it.catName] = [];
                grouped[it.catName].push(`${it.itemName} *${it.qty || '未填'}`);
            });
            let text = `${newDateStr} \n送貨地點：${siteName}\n`;
            for (const cat in grouped) { text += `【${cat}】\n` + grouped[cat].join('\n') + '\n'; }
            return text.trim();
        }

        function saveEditOrder() {
            if (!_editCtx) return;
            const newText = compileEditOrderText();
            if (!newText) return alert('訂單沒有品項！');
            const { idx, dateStr: oldDateStr, siteId } = _editCtx;
            const newDateStr = document.getElementById('editOrderDate').value || oldDateStr;

            const oldRec = db.dailyRecords[oldDateStr];
            if (oldRec && oldRec.order) {
                const arr = Array.isArray(oldRec.order) ? oldRec.order : [oldRec.order];
                arr.splice(idx, 1);
                if (arr.length === 0) delete oldRec.order; else oldRec.order = arr;
                if (Object.keys(oldRec).length === 0) delete db.dailyRecords[oldDateStr];
            }
            if (!db.dailyRecords[newDateStr]) db.dailyRecords[newDateStr] = {};
            const newRec = db.dailyRecords[newDateStr];
            if (!Array.isArray(newRec.order)) newRec.order = newRec.order ? [newRec.order] : [];
            newRec.order.push({ siteId, text: newText });
            saveToLocalStorage();
            const checkId = `inlineChkOrder_${newRec.order.length - 1}`;

            const SCRIPT_URL = db.config?.scriptUrl?.trim() || '';
            const hasUrl = !!SCRIPT_URL;
            closeEditOrderModal();
            _showGoogleConfirm(hasUrl,

                    if (hasUrl) {
                        const payload = {

                            items: _editOrderItems.map(it => ({ cat: it.catName, PX: it.itemName, SL: it.qty }))
                        };
                        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                        .then(() => alert('訂單已儲存並上傳 Google！'))
                        .catch(() => alert('儲存成功，但上傳失敗。'));
                    }
                    initHomeCalendar();

                    showInlineDayView(newDateStr);
                },

                    initHomeCalendar();

                    showInlineDayView(newDateStr);
                }
            );
        }

        // ================= 右滑返回手勢 =================
        (function() {
            let touchStartX = 0, touchStartY = 0, touchStartTime = 0, isDragging = false, mainEl = null;
            const EDGE_ZONE = 80, LONG_PRESS_MS = 300;
            function getMain() { return mainEl || (mainEl = document.querySelector('main.max-w-md')); }

            document.addEventListener('touchstart', e => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchStartTime = Date.now();
                isDragging = false;
                getMain().style.transition = 'none';
            }, { passive: true });

            document.addEventListener('touchmove', e => {
                const dx = e.touches[0].clientX - touchStartX;
                const dy = Math.abs(e.touches[0].clientY - touchStartY);
                const btn = document.getElementById('btnBack');
                const elapsed = Date.now() - touchStartTime;
                if (!isDragging && touchStartX <= EDGE_ZONE && dx > 8 && dy < 50 && btn && !btn.classList.contains('hidden') && elapsed < LONG_PRESS_MS) {
                    isDragging = true;
                }
                if (isDragging && dx > 0) {
                    const m = getMain();
                    m.style.transform = `translateX(${dx}px)`;
                    m.style.opacity = `${Math.max(0.4, 1 - dx / window.innerWidth)}`;
                }
            }, { passive: true });

            document.addEventListener('touchend', e => {
                const m = getMain();
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
                const btn = document.getElementById('btnBack');
                if (isDragging && _isModalOpen()) {
                    m.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                    m.style.transform = '';
                    m.style.opacity = '';
                    setTimeout(() => { m.style.transition = ''; }, 200);
                    isDragging = false;
                    return;
                }
                if (isDragging && dx > 40 && dy < 50 && btn && !btn.classList.contains('hidden')) {
                    m.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
                    m.style.transform = 'translateX(100%)';
                    m.style.opacity = '0';
                    setTimeout(() => {
                        m.style.transition = 'none';
                        m.style.transform = '';
                        m.style.opacity = '';
                        btn.click();
                        m.style.transform = 'translateX(-30px)';
                        m.style.opacity = '0';
                        requestAnimationFrame(() => {
                            m.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                            m.style.transform = '';
                            m.style.opacity = '';
                            setTimeout(() => { m.style.transition = ''; }, 220);
                        });
                    }, 220);
                } else if (isDragging) {
                    m.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                    m.style.transform = '';
                    m.style.opacity = '';
                    setTimeout(() => { m.style.transition = ''; }, 200);
                }
                isDragging = false;
            }, { passive: true });
        })();

        // ================= Excel 匯出（工程記錄 / 材料訂購 / 出勤，三張工作表）=================
        function _siteNameById(siteId) {
            const siteObj = db.sites.find(s => s.id === siteId);
            return siteObj ? siteObj.name : (siteId || '');
        }

        function exportOrderExcel() {
            const monthVal = document.getElementById('inputExportOrderMonth').value;
            const siteId = (document.getElementById('inputExportSite') || {}).value || '';

            // 決定過濾條件
            const filterBySite = !!siteId;
            const filterByMonth = !!monthVal;
            const [yyyy, mm] = monthVal ? monthVal.split('-') : [null, null];
            const prefix = monthVal || '';
            const siteObj = filterBySite ? db.sites.find(function(s) { return s.id === siteId; }) : null;
            const siteName = siteObj ? siteObj.name : '';

            function _dateOk(dateStr) {
                if (!filterByMonth) return true;
                return dateStr.startsWith(prefix);
            }
            function _siteOk(entSiteId) {
                if (!filterBySite) return true;
                return entSiteId === siteId;
            }

            // ---- 第一張：工程記錄 ----
            const logRows = [];
            Object.keys(db.dailyRecords).sort().forEach(dateStr => {
                if (!_dateOk(dateStr)) return;
                const rec = db.dailyRecords[dateStr];
                if (!rec || !rec.log) return;
                const logArr = Array.isArray(rec.log) ? rec.log : [rec.log];
                logArr.forEach(entry => {
                    if (!entry || !entry.text) return;
                    if (!_siteOk(entry.siteId)) return;
                    logRows.push({
                        date: dateStr,
                        site: _siteNameById(entry.siteId),
                        content: String(entry.text).trim()
                    });
                });
            });

            // ---- 第二張：材料訂購（格式不變：日期/案場/分類/品項名稱/數量）----
            const orderRows = [];
            Object.keys(db.dailyRecords).sort().forEach(dateStr => {
                if (!_dateOk(dateStr)) return;
                const rec = db.dailyRecords[dateStr];
                if (!rec || !rec.order) return;
                const orderArr = Array.isArray(rec.order) ? rec.order : [rec.order];
                orderArr.forEach(orderEntry => {
                    if (!orderEntry || !orderEntry.text) return;
                    if (!_siteOk(orderEntry.siteId)) return;
                    const siteName = _siteNameById(orderEntry.siteId);
                    const lines = orderEntry.text.split('\n');
                    let currentCat = '';
                    lines.forEach(line => {
                        const catMatch = line.match(/^【(.+)】$/);
                        if (catMatch) { currentCat = catMatch[1]; return; }
                        const itemMatch = line.match(/^(.+?) \*(.+)$/);
                        if (itemMatch && currentCat) {
                            orderRows.push({ date: dateStr, site: siteName, cat: currentCat, item: itemMatch[1].trim(), qty: itemMatch[2].trim() });
                        }
                    });
                });
            });

            // ---- 第三張：出勤 ----
            const punchRows = [];
            if (db.punches) {
                const punchByDate = {};
                for (const sId in db.punches) {
                    const dateMap = db.punches[sId];
                    if (!dateMap) continue;
                    for (const dateStr in dateMap) {
                        if (!_dateOk(dateStr)) continue;
                        if (!_siteOk(sId)) continue;
                        const p = dateMap[dateStr];
                        if (!p) continue;
                        if (!punchByDate[dateStr]) punchByDate[dateStr] = [];
                        punchByDate[dateStr].push({ siteId: sId, p });
                    }
                }
                Object.keys(punchByDate).sort().forEach(dateStr => {
                    punchByDate[dateStr]
                        .sort((a, b) => _siteNameById(a.siteId).localeCompare(_siteNameById(b.siteId), 'zh-Hant'))
                        .forEach(({ siteId, p }) => {
                            const overtime = (p.overtime !== undefined && p.overtime !== null && String(p.overtime).trim() !== '')
                                ? String(p.overtime).trim() : '';
                            punchRows.push({
                                date: dateStr,
                                site: _siteNameById(siteId),
                                status: p.status || '上班',
                                overtime: overtime ? `${overtime} 小時` : '',
                                note: p.note || ''
                            });
                        });
                });
            }

            if (logRows.length === 0 && orderRows.length === 0 && punchRows.length === 0) {
                const label = (filterByMonth ? `${yyyy}年${mm}月` : '所選') + (filterBySite ? ` ${siteName}` : '');
                return alert(label + ' 無任何紀錄可匯出！');
            }

            if (typeof XLSX === 'undefined') {
                return alert('Excel 匯出元件尚未載入完成，請確認網路後再試一次。');
            }

            const wb = XLSX.utils.book_new();

            // 工作表 1：工程記錄
            const logAoa = [['日期', '案場', '工程記錄內容'],
                ...logRows.map(r => [r.date, r.site, r.content])];
            const wsLog = XLSX.utils.aoa_to_sheet(logAoa);
            wsLog['!cols'] = [{ wch: 12 }, { wch: 16 }, { wch: 50 }];
            XLSX.utils.book_append_sheet(wb, wsLog, '工程記錄');

            // 工作表 2：材料訂購（格式不變）
            const orderAoa = [['日期', '案場', '分類', '品項名稱', '數量'],
                ...orderRows.map(r => [r.date, r.site, r.cat, r.item, r.qty])];
            const wsOrder = XLSX.utils.aoa_to_sheet(orderAoa);
            wsOrder['!cols'] = [{ wch: 12 }, { wch: 16 }, { wch: 14 }, { wch: 22 }, { wch: 10 }];
            XLSX.utils.book_append_sheet(wb, wsOrder, '材料訂購');

            // 工作表 3：出勤
            const punchAoa = [['日期', '案場', '狀態', '加班', '備註'],
                ...punchRows.map(r => [r.date, r.site, r.status, r.overtime, r.note])];
            const wsPunch = XLSX.utils.aoa_to_sheet(punchAoa);
            wsPunch['!cols'] = [{ wch: 12 }, { wch: 16 }, { wch: 8 }, { wch: 10 }, { wch: 24 }];
            XLSX.utils.book_append_sheet(wb, wsPunch, '出勤');

            const fnMonth = filterByMonth ? `${yyyy}-${mm}` : '全期';
            const fnSite = filterBySite ? `_${siteName}` : '';
            XLSX.writeFile(wb, `工程管理${fnMonth}${fnSite}.xlsx`);
        }

        const _LAW_DATA = [[0,"第 一 編 總則"],[1,"1","本標準依消防法（以下簡稱本法）第六條第一項規定訂定之。"],[1,"2","（刪除）"],[1,"3","未定國家標準或國內無法檢驗之消防安全設備，應檢附國外標準、國外（內）檢驗報告及試驗合\n格證明或規格證明，經中央主管機關認可後，始准使用。\n\n前項應經認可之消防安全設備項目及應檢附之文件，由中央消防機關另定之。"],[0,"第 二 編 消防設計"],[1,"4","本標準用語定義如下：\n一、複合用途建築物：一棟建築物中有供第十二條第一款至第四款各目所列用途二種以上，且該\n不同用途，在管理及使用形態上，未構成從屬於其中一主用途者；其判斷基準，由中央消防\n機關另定之。\n二、無開口樓層：建築物之各樓層供避難及消防搶救用之有效開口面積未達下列規定者：\n（一）十一層以上之樓層，具可內切直徑五十公分以上圓孔之開口，合計面積為該樓地板面積三\n十分之一以上者。\n（二）十層以下之樓層，具可內切直徑五十公分以上圓孔之開口，合計面積為該樓地板面積三十\n分之一以上者。但其中至少應具有二個內切直徑一公尺以上圓孔或寬七十五公分以上、高\n一百二十公分以上之開口。\n三、高度危險工作場所：儲存一般可燃性固體物質倉庫之高度超過五點五公尺者，或易燃性液體\n物質之閃火點未超過攝氏六十度與攝氏溫度為三十七點八度時，其蒸氣壓未超過每平方公分\n二點八公斤或 0.28 百萬帕斯卡（以下簡稱 MPa）者，或可燃性高壓氣體製造、儲存、處理\n場所或石化作業場所，木材加工業作業場所及油漆作業場所等。\n四、中度危險工作場所：儲存一般可燃性固體物質倉庫之高度未超過五點五公尺者，或易燃性液\n體物質之閃火點超過攝氏六十度之作業場所或輕工業場所。\n五、低度危險工作場所：有可燃性物質存在。但其存量少，延燒範圍小，延燒速度慢，僅形成小\n型火災者。\n\n六、避難指標：標示避難出口或方向之指標。\n\n前項第二款所稱有效開口，指符合下列規定者：\n一、開口下端距樓地板面一百二十公分以內。\n二、開口面臨道路或寬度一公尺以上之通路。\n三、開口無柵欄且內部未設妨礙避難之構造或阻礙物。\n四、開口為可自外面開啟或輕易破壞得以進入室內之構造。採一般玻璃門窗時，厚度應在六毫米\n以下。\n\n本標準所列有關建築技術、公共危險物品及可燃性高壓氣體用語，適用建築技術規則、公共危險\n物品及可燃性高壓氣體製造儲存處理場所設置標準暨安全管理辦法用語定義之規定。"],[1,"5","各類場所符合建築技術規則以無開口且具一小時以上防火時效之牆壁、樓地板區劃分隔者，適用\n本標準各編規定，視為另一場所。\n\n建築物間設有過廊，並符合下列規定者，視為另一場所：\n一、過廊僅供通行或搬運用途使用，且無通行之障礙。\n二、過廊有效寬度在六公尺以下。\n三、連接建築物之間距，一樓超過六公尺，二樓以上超過十公尺。\n\n建築物符合下列規定者，不受前項第三款之限制：\n一、連接建築物之外牆及屋頂，與過廊連接相距三公尺以內者，為防火構造或不燃材料。\n二、前款之外牆及屋頂未設有開口。但開口面積在四平方公尺以下，且設具半小時以上防火時效\n之防火門窗者，不在此限。\n三、過廊為開放式或符合下列規定者：\n（一）為防火構造或以不燃材料建造。\n（二）過廊與二側建築物相連接處之開口面積在四平方公尺以下，且設具半小時以上防火時效之\n防火門。\n（三）設置直接開向室外之開口或機械排煙設備。但設有自動撒水設備者，得免設。\n\n前項第三款第三目之直接開向室外之開口或機械排煙設備，應符合下列規定：\n一、直接開向室外之開口面積合計在一平方公尺以上，且符合下列規定：\n（一）開口設在屋頂或天花板時，設有寬度在過廊寬度三分之一以上，長度在一公尺以上之開口。\n（二）開口設在外牆時，在過廊二側設有寬度在過廊長度三分之一以上，高度一公尺以上之開口。\n二、機械排煙設備能將過廊內部煙量安全有效地排至室外，排煙機連接緊急電源。"],[1,"6","供第十二條第五款使用之複合用途建築物，有分屬同條其他各款目用途時，適用本標準除第十七\n條第一項第四款、第五款、第十九條第一項第四款、第五款、第二十一條第二款、第二十三條第\n一款、第二款及第一百五十七條以外之規定，以各目為單元，按各目所列不同用途，合計其樓地\n\n板面積，視為單一場所。"],[1,"7","各類場所消防安全設備如下：\n一、滅火設備：指以水或其他滅火藥劑滅火之器具或設備。\n二、警報設備：指報知火災發生之器具或設備。\n三、避難逃生設備：指火災發生時為避難而使用之器具或設備。\n四、消防搶救上之必要設備：指火警發生時，消防人員從事搶救活動上必需之器具或設備。\n五、其他經中央主管機關認定之消防安全設備。"],[1,"8","滅火設備種類如下：\n一、滅火器、消防砂。\n二、室內消防栓設備。\n三、室外消防栓設備。\n四、自動撒水設備。\n五、水霧滅火設備。\n六、泡沫滅火設備。\n七、二氧化碳滅火設備。\n八、惰性氣體滅火設備。\n九、鹵化烴滅火設備。\n十、乾粉滅火設備。\n十一、簡易自動滅火設備。"],[1,"9","警報設備種類如下：\n一、火警自動警報設備。\n二、手動報警設備。\n三、緊急廣播設備。\n四、瓦斯漏氣火警自動警報設備。\n五、一一九火災通報裝置。"],[1,"10","避難逃生設備種類如下：\n一、標示設備：出口標示燈、避難方向指示燈、觀眾席引導燈、避難指標。\n二、避難器具：指滑臺、避難梯、避難橋、救助袋、緩降機、避難繩索、滑杆及其他避難器具。\n三、緊急照明設備。"],[1,"11","消防搶救上之必要設備種類如下：\n一、連結送水管。\n二、消防專用蓄水池。\n三、排煙設備（緊急昇降機間、特別安全梯間排煙設備、室內排煙設備）。\n四、緊急電源插座。\n五、無線電通信輔助設備。\n六、防災監控系統綜合操作裝置。"],[1,"12","各類場所按用途分類如下：\n一、甲類場所：\n（一）電影片映演場所（戲院、電影院）\n、歌廳、舞廳、夜總會、俱樂部、理容院（觀光理髮、視\n聽理容等）、指壓按摩場所、錄影節目帶播映場所（MTV 等）、視聽歌唱場所（KTV 等）、酒\n家、酒吧、酒店（廊）。\n（二）保齡球館、撞球場、集會堂、健身休閒中心（含提供指壓、三溫暖等設施之美容瘦身場\n所）、室內螢幕式高爾夫練習場、遊藝場所、電子遊戲場、資訊休閒場所。\n（三）觀光旅館、飯店、旅館、招待所（限有寢室客房者）。\n（四）商場、市場、百貨商場、超級市場、零售市場、展覽場。\n（五）餐廳、飲食店、咖啡廳、茶藝館。\n（六）醫院、療養院、榮譽國民之家、長期照顧服務機構（限機構住宿式、社區式之建築物使用\n類組非屬 H-2 之日間照顧、團體家屋及小規模多機能）\n、老人福利機構（限長期照護型、養\n護型、失智照顧型之長期照顧機構、安養機構）\n、兒童及少年福利機構（限托嬰中心、早期\n療育機構、有收容未滿二歲兒童之安置及教養機構）\n、護理機構（限一般護理之家、精神護\n理之家、產後護理機構）\n、身心障礙福利機構（限供住宿養護、日間服務、臨時及短期照顧\n者）、身心障礙者職業訓練機構（限提供住宿或使用特殊機具者）、啟明、啟智、啟聰等特\n殊學校。\n（七）三溫暖、公共浴室。\n二、乙類場所：\n（一）車站、飛機場大廈、候船室。\n（二）期貨經紀業、證券交易所、金融機構。\n（三）學校教室、兒童課後照顧服務中心、補習班、訓練班、K 書中心、前款第六目以外之兒童\n及少年福利機構（限安置及教養機構）及身心障礙者職業訓練機構。\n（四）圖書館、博物館、美術館、陳列館、史蹟資料館、紀念館及其他類似場所。\n（五）寺廟、宗祠、教堂、供存放骨灰（骸）之納骨堂（塔）及其他類似場所。\n（六）辦公室、靶場、診所、長期照顧服務機構（限社區式之建築物使用類組屬 H-2 之日間照顧、\n\n團體家屋及小規模多機能）、日間型精神復健機構、兒童及少年心理輔導或家庭諮詢機構、\n身心障礙者就業服務機構、老人文康機構、前款第六目以外之老人福利機構及身心障礙福\n利機構。\n（七）集合住宅、寄宿舍、住宿型精神復健機構。\n（八）體育館、活動中心。\n（九）室內溜冰場、室內游泳池。\n（十）電影攝影場、電視播送場。\n（十一）倉庫、傢俱展示販售場。\n（十二）幼兒園。\n三、丙類場所：\n（一）電信機器室。\n（二）汽車修護廠、飛機修理廠、飛機庫。\n（三）室內停車場、建築物依法附設之室內停車空間。\n四、丁類場所：\n（一）高度危險工作場所。\n（二）中度危險工作場所。\n（三）低度危險工作場所。\n五、戊類場所：\n（一）複合用途建築物中，有供第一款用途者。\n（二）前目以外供第二款至前款用途之複合用途建築物。\n（三）地下建築物。\n六、其他經中央主管機關公告之場所。"],[1,"13","各類場所於增建、改建或變更用途時，其消防安全設備之設置，適用增建、改建或用途變更前之\n標準。但有下列情形之一者，適用增建、改建或變更用途後之標準：\n一、其消防安全設備為滅火器、火警自動警報設備、手動報警設備、緊急廣播設備、標示設備、\n避難器具及緊急照明設備者。\n二、增建或改建部分，以本標準中華民國八十五年七月一日修正條文施行日起，樓地板面積合計\n逾一千平方公尺或占原建築物總樓地板面積二分之一以上時，該建築物之消防安全設備。\n三、用途變更為甲類場所使用時，該變更後用途之消防安全設備。\n四、用途變更前，未符合變更前規定之消防安全設備。"],[1,"14","下列場所應設置滅火器：\n一、甲類場所、地下建築物、幼兒園。\n\n二、總樓地板面積在一百五十平方公尺以上之乙、丙、丁類場所。\n三、設於地下層或無開口樓層，且樓地板面積在五十平方公尺以上之各類場所。\n四、設有放映室或變壓器、配電盤及其他類似電氣設備之各類場所。\n五、設有鍋爐房、廚房等大量使用火源之各類場所。"],[1,"15","下列場所應設置室內消防栓設備：\n一、五層以下建築物，供第十二條第一款第一目所列場所使用，任何一層樓地板面積在三百平方\n公尺以上者；供同款其他各目及第二款至第四款所列場所使用，任何一層樓地板面積在五百\n平方公尺以上者；或為學校教室任何一層樓地板面積在一千四百平方公尺以上者。\n二、六層以上建築物，供第十二條第一款至第四款所列場所使用，任何一層之樓地板面積在一百\n五十平方公尺以上者。\n三、總樓地板面積在一百五十平方公尺以上之地下建築物。\n四、地下層或無開口之樓層，供第十二條第一款第一目所列場所使用，樓地板面積在一百平方公\n尺以上者；供第一款其他各目及第二款至第四款所列場所使用，樓地板面積在一百五十平方\n公尺以上者。\n\n前項應設室內消防栓設備之場所，依本標準設有室外消防栓、自動撒水（含補助撒水栓）、水霧、\n泡沫、二氧化碳、惰性氣體、鹵化烴或乾粉等滅火設備者，在該有效範圍內，得免設室內消防栓\n設備。但設有室外消防栓設備時，在第一層水平距離四十公尺以下、第二層步行距離四十公尺以\n下有效滅火範圍內，室內消防栓設備限於第一層、第二層免設。"],[1,"16","下列場所應設置室外消防栓設備：\n一、高度危險工作場所，其建築物及儲存場所之第一層及第二層樓地板面積合計在三千平方公尺\n以上者。\n二、中度危險工作場所，其建築物及儲存場所之第一層及第二層樓地板面積合計在五千平方公尺\n以上者。\n三、低度危險工作場所，其建築物及儲存場所之第一層及第二層樓地板面積合計在一萬平方公尺\n以上者。\n四、如有不同危險程度工作場所未達前三款規定標準，而以各款場所之實際面積為分子，各款規\n定之面積為分母，分別計算，其比例之總和大於一者。\n五、同一建築基地內有二棟以上木造或其他易燃構造建築物時，建築物間外牆與中心線水平距離\n第一層在三公尺以下，第二層在五公尺以下，且合計各棟第一層及第二層樓地板面積在三千\n平方公尺以上者。\n\n前項應設室外消防栓設備之場所，依本標準設有自動撒水、水霧、泡沫、二氧化碳、惰性氣體、\n鹵化烴或乾粉等滅火設備者，在該有效範圍內，得免設室外消防栓設備。"],[1,"17","下列場所或樓層應設置自動撒水設備：\n一、十層以下建築物之樓層，供第十二條第一款第一目所列場所使用，樓地板面積合計在三百平\n方公尺以上者；供同款其他各目及第二款第一目所列場所使用，樓地板面積在一千五百平方\n公尺以上者。\n二、建築物在十一層以上之樓層，樓地板面積在一百平方公尺以上者。\n三、地下層或無開口樓層，供第十二條第一款所列場所使用，樓地板面積在一千平方公尺以上者。\n四、十一層以上建築物供第十二條第一款所列場所或第五款第一目使用者。\n五、供第十二條第五款第一目使用之建築物中，甲類場所樓地板面積合計達三千平方公尺以上時，\n供甲類場所使用之樓層。\n六、供第十二條第二款第十一目使用之場所，樓層高度超過十公尺且樓地板面積在七百平方公尺\n以上之高架儲存倉庫。\n七、總樓地板面積在一千平方公尺以上之地下建築物。\n八、高層建築物。\n九、供第十二條第一款第六目所定榮譽國民之家、長期照顧服務機構（限機構住宿式、社區式之\n建築物使用類組非屬 H-2\n\n之日間照顧、團體家屋及小規模多機能）\n、老人福利機構（限長期\n\n照護型、養護型、失智照顧型之長期照顧機構、安養機構）\n、護理機構（限一般護理之家、精\n神護理之家）\n、身心障礙福利機構（限照顧植物人、失智症、重癱、長期臥床或身心功能退化\n者）使用之場所。\n\n前項應設自動撒水設備之場所，依本標準設有水霧、泡沫、二氧化碳、惰性氣體、鹵化烴或乾粉\n等滅火設備者，在該有效範圍內，得免設自動撒水設備。\n\n第一項第九款所定場所，其樓地板面積合計未達一千平方公尺者，得設置水道連結型自動撒水設\n備或與現行法令同等以上效能之滅火設備或採用中央主管機關公告之措施；水道連結型自動撒水\n設備設置基準，由中央主管機關定之。"],[1,"18","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n\n下表所列之場所，應就水霧、泡沫、二氧化碳、惰性氣體、鹵化烴或乾粉滅火設備等選擇設置之。\n但外牆開口面積（常時開放部分）達該層樓地板面積百分之十五以上者，上列除惰性氣體及鹵化\n烴外之滅火設備得採移動式設置。\n\n樓地板面積在三百平方公尺以上之餐廳或供第十二條第一款第六目所定榮譽國民之家、長期照顧\n服務機構（限機構住宿式、社區式之建築物使用類組非屬 H-2\n\n之日間照顧、團體家屋及小規模\n\n多機能）、老人福利機構（限長期照護型、養護型、失智照顧型之長期照顧機構、安養機構）、護\n理機構（限一般護理之家、精神護理之家）、身心障礙福利機構（限照顧植物人、失智症、重癱、\n長期臥床或身心功能退化者）使用之場所且樓地板面積合計在五百平方公尺以上者，其廚房排油\n煙管及煙罩應設簡易自動滅火設備。但已依前項規定設有滅火設備者，得免設簡易自動滅火設備。"],[1,"19","下列場所應設置火警自動警報設備：\n一、五層以下之建築物，供第十二條第一款及第二款第十二目所列場所使用，任何一層之樓地板\n面積在三百平方公尺以上者；或供同條第二款（第十二目除外）至第四款所列場所使用，任\n何一層樓地板面積在五百平方公尺以上者。\n二、六層以上十層以下之建築物任何一層樓地板面積在三百平方公尺以上者。\n三、十一層以上建築物。\n四、地下層或無開口樓層，供第十二條第一款第一目、第五目及第五款（限其中供第一款第一目\n或第五目使用者）使用之場所，樓地板面積在一百平方公尺以上者；供同條第一款其他各目\n及其他各款所列場所使用，樓地板面積在三百平方公尺以上者。\n五、供第十二條第五款第一目使用之建築物，總樓地板面積在五百平方公尺以上，且其中甲類場\n所樓地板面積合計在三百平方公尺以上者。\n六、供第十二條第一款及第五款第三目所列場所使用，總樓地板面積在三百平方公尺以上者。\n七、供第十二條第一款第六目所定榮譽國民之家、長期照顧服務機構（限機構住宿式、社區式之\n建築物使用類組非屬 H-2 之日間照顧、團體家屋及小規模多機能）\n、老人福利機構（限長期照\n護型、養護型、失智照顧型之長期照顧機構、安養機構）\n、護理機構（限一般護理之家、精神\n護理之家）\n、身心障礙福利機構（限照顧植物人、失智症、重癱、長期臥床或身心功能退化者）\n使用之場所。\n\n前項應設火警自動警報設備之場所，除供甲類場所、地下建築物、高層建築物或應設置偵煙式探\n測器之場所外，如已依本標準設置自動撒水、水霧或泡沫滅火設備（限使用標示攝氏溫度七十五\n度以下，動作時間六十秒以內之密閉型撒水頭）者，在該有效範圍內，得免設火警自動警報設備。"],[1,"20","下列場所應設置手動報警設備：\n一、三層以上建築物，任何一層樓地板面積在二百平方公尺以上者。\n二、第十二條第一款第三目之場所。"],[1,"21","下列使用瓦斯之場所應設置瓦斯漏氣火警自動警報設備：\n一、地下層供第十二條第一款所列場所使用，樓地板面積合計一千平方公尺以上者。\n二、供第十二條第五款第一目使用之地下層，樓地板面積合計一千平方公尺以上，且其中甲類場\n所樓地板面積合計五百平方公尺以上者。\n三、總樓地板面積在一千平方公尺以上之地下建築物。"],[1,"22","依第十九條或前條規定設有火警自動警報或瓦斯漏氣火警自動警報設備之建築物，應設置緊急廣\n播設備。"],[1,"22-1","下列場所應設置一一九火災通報裝置：\n一、供第十二條第一款第六目所定醫院、療養院、榮譽國民之家、長期照顧服務機構（限機構住\n宿式、社區式之建築物使用類組非屬 H-2 之日間照顧、團體家屋及小規模多機能）\n、老人福利\n機構（限長期照護型、養護型、失智照顧型之長期照顧機構、安養機構）\n、護理機構（限一般\n護理之家、精神護理之家）\n、身心障礙福利機構（限照顧植物人、失智症、重癱、長期臥床或\n身心功能退化者）使用之場所。\n二、其他經中央主管機關公告之供公眾使用之場所。"],[1,"23","下列場所應設置標示設備：\n一、供第十二條第一款、第二款第十二目、第五款第一目、第三目使用之場所，或地下層、無開\n口樓層、十一層以上之樓層供同條其他各款目所列場所使用，應設置出口標示燈。\n二、供第十二條第一款、第二款第十二目、第五款第一目、第三目使用之場所，或地下層、無開\n口樓層、十一層以上之樓層供同條其他各款目所列場所使用，應設置避難方向指示燈。\n三、戲院、電影院、歌廳、集會堂及類似場所，應設置觀眾席引導燈。\n四、各類場所均應設置避難指標。但設有避難方向指示燈或出口標示燈時，在其有效範圍內，得\n免設置避難指標。"],[1,"24","下列場所應設置緊急照明設備：\n一、供第十二條第一款、第三款及第五款所列場所使用之居室。\n二、供第十二條第二款第一目、第二目、第三目（學校教室除外）\n、第四目至第六目、第七目所定\n住宿型精神復健機構、第八目、第九目及第十二目所列場所使用之居室。\n三、總樓地板面積在一千平方公尺以上建築物之居室（學校教室除外）。\n四、有效採光面積未達該居室樓地板面積百分之五者。\n五、供前四款使用之場所，自居室通達避難層所須經過之走廊、樓梯間、通道及其他平時依賴人\n工照明部分。\n\n經中央主管機關認可為容易避難逃生或具有效採光之場所，得免設緊急照明設備。"],[1,"25","建築物除十一層以上樓層及避難層外，各樓層應選設滑臺、避難梯、避難橋、救助袋、緩降機、\n避難繩索、滑杆或經中央主管機關認可具同等性能之避難器具。但建築物在構造及設施上，並無\n避難逃生障礙，經中央主管機關認可者，不在此限。"],[1,"26","下列場所應設置連結送水管：\n\n一、五層或六層建築物總樓地板面積在六千平方公尺以上者及七層以上建築物。\n二、總樓地板面積在一千平方公尺以上之地下建築物。"],[1,"27","下列場所應設置消防專用蓄水池：\n一、各類場所其建築基地面積在二萬平方公尺以上，且任何一層樓地板面積在一千五百平方公尺\n以上者。\n二、各類場所其高度超過三十一公尺，且總樓地板面積在二萬五千平方公尺以上者。\n三、同一建築基地內有二棟以上建築物時，建築物間外牆與中心線水平距離第一層在三公尺以下，\n第二層在五公尺以下，且合計各棟該第一層及第二層樓地板面積在一萬平方公尺以上者。"],[1,"28","下列場所應設置排煙設備：\n一、供第十二條第一款及第五款第三目所列場所使用，樓地板面積合計在五百平方公尺以上。\n二、樓地板面積在一百平方公尺以上之居室，其天花板下方八十公分範圍內之有效通風面積未達\n該居室樓地板面積百分之二者。\n三、樓地板面積在一千平方公尺以上之無開口樓層。\n四、供第十二條第一款第一目所列場所及第二目之集會堂使用，舞臺部分之樓地板面積在五百平\n方公尺以上者。\n五、依建築技術規則應設置之特別安全梯或緊急昇降機間。\n\n前項場所之樓地板面積，在建築物以具有一小時以上防火時效之牆壁、平時保持關閉之防火門窗\n等防火設備及各該樓層防火構造之樓地板區劃，且防火設備具一小時以上之阻熱性者，增建、改\n建或變更用途部分得分別計算。"],[1,"29","下列場所應設置緊急電源插座：\n一、十一層以上建築物之各樓層。\n二、總樓地板面積在一千平方公尺以上之地下建築物。\n三、依建築技術規則應設置之緊急昇降機間。"],[1,"30","下列場所應設置無線電通信輔助設備：\n一、樓高在一百公尺以上建築物之地下層。\n二、總樓地板面積在一千平方公尺以上之地下建築物。\n三、地下層在四層以上，且地下層樓地板面積合計在三千平方公尺以上建築物之地下層。"],[1,"30-1","下列場所應設置防災監控系統綜合操作裝置：\n\n一、高層建築物。\n二、總樓地板面積在五萬平方公尺以上之建築物。\n三、總樓地板面積在一千平方公尺以上之地下建築物。\n四、其他經中央主管機關公告之供公眾使用之場所。"],[0,"第 三 編 消防安全設計"],[0,"第 一 章 滅火設備"],[0,"第 一 節 滅火器及室內消防栓設備"],[1,"31","滅火器應依下列規定設置：\n一、視各類場所潛在火災性質設置，並依下列規定核算其最低滅火效能值：\n（一）供第十二條第一款及第五款使用之場所，各層樓地板面積每一百平方公尺（含未滿）有一\n滅火效能值。\n（二）供第十二條第二款至第四款使用之場所，各層樓地板面積每二百平方公尺（含未滿）有一\n滅火效能值。\n（三）鍋爐房、廚房等大量使用火源之處所，以樓地板面積每二十五平方公尺（含未滿）有一滅\n火效能值。\n二、電影片映演場所放映室及電氣設備使用之處所，每一百平方公尺（含未滿）另設一滅火器。\n三、設有滅火器之樓層，自樓面居室任一點至滅火器之步行距離在二十公尺以下。\n四、固定放置於取用方便之明顯處所，並設有以紅底白字標明滅火器字樣之標識，其每字應在二\n十平方公分以上。但與室內消防栓箱等設備併設於箱體內並於箱面標明滅火器字樣者，其標\n識顏色不在此限。\n五、懸掛於牆上或放置滅火器箱中之滅火器，其上端與樓地板面之距離，十八公斤以上者在一公\n尺以下，未滿十八公斤者在一點五公尺以下。"],[1,"32","室內消防栓設備之配管、配件及屋頂水箱，依下列規定設置：\n一、配管部分：\n（一）應為專用。但與室外消防栓、自動撒水設備及連結送水管等滅火系統共用，無礙其功能者，\n不在此限。\n（二）符合下列規定之一：\n1.國家標準（以下簡稱 CNS）六四四五配管用碳鋼鋼管、四六二六壓力配管用碳鋼鋼管、六三\n三一配管用不銹鋼鋼管或具同等以上強度、耐腐蝕性及耐熱性者。\n2.經中央主管機關認可具氣密性、強度、耐腐蝕性、耐候性及耐熱性等性能之合成樹脂管。\n（三）管徑，依水力計算配置。但立管與連結送水管共用時，其管徑在一百毫米以上。\n\n（四）立管管徑，第一種消防栓在六十三毫米以上；第二種消防栓在五十毫米以上。\n（五）立管裝置於不受外來損傷及火災不易殃及之位置。\n（六）立管連接屋頂水箱、重力水箱或壓力水箱，使配管平時充滿水。\n（七）採取有效之防震措施。\n二、止水閥以明顯之方式標示開關之狀態，逆止閥標示水流之方向，並符合 CNS\n\n規定。\n\n三、屋頂水箱部分：\n（一）水箱之水量，第一種消防栓有零點五立方公尺以上；第二種消防栓有零點三立方公尺以上。\n但與其他滅火設備並用時，水量應取其最大值。\n（二）採取有效之防震措施。\n（三）斜屋頂建築物得免設。"],[1,"33","室內消防栓設備之消防立管管系竣工時，應做加壓試驗，試驗壓力不得小於加壓送水裝置全閉揚\n程一點五倍以上之水壓。試驗壓力以繼續維持二小時無漏水現象為合格。"],[1,"34","除第十二條第二款第十一目或第四款之場所，應設置第一種消防栓外，其他場所應就下列二種消\n防栓選擇設置之：\n一、第一種消防栓，依下列規定設置：\n（一）各層任一點至消防栓接頭之水平距離在二十五公尺以下。\n（二）任一樓層內，全部消防栓同時使用時，各消防栓瞄子放水壓力在每平方公分一點七公斤以\n上或 0.17MPa 以上，放水量在每分鐘一百三十公升以上。但全部消防栓數量超過二支時，\n以同時使用二支計算之。\n（三）消防栓箱內，配置口徑三十八毫米或五十毫米之消防栓一個，口徑三十八毫米或五十毫米、\n長十五公尺並附快式接頭之水帶二條，水帶架一組及口徑十三毫米以上之直線水霧兩用瞄\n子一具。但消防栓接頭至建築物任一點之水平距離在十五公尺以下時，水帶部分得設十公\n尺水帶二條。\n二、第二種消防栓，依下列規定設置：\n（一）各層任一點至消防栓接頭之水平距離在二十五公尺以下。\n（二）任一樓層內，全部消防栓同時使用時，各消防栓瞄子放水壓力在每平方公分一點七公斤以\n上或 0.17MPa 以上，放水量在每分鐘八十公升以上。但全部消防栓數量超過二支時，以同\n時使用二支計算之。\n（三）消防栓箱內，配置口徑二十五毫米消防栓連同管盤長三十公尺之皮管或消防用保形水帶及\n直線水霧兩用瞄子一具，且瞄子設有容易開關之裝置。\n\n前項消防栓，應符合下列規定：\n一、消防栓開關距離樓地板之高度，在零點三公尺以上一點五公尺以下。\n\n二、設在走廊或防火構造樓梯間附近便於取用處。\n三、供集會或娛樂處所，設於舞臺二側、觀眾席後二側、包廂後側之位置。\n四、在屋頂上適當位置至少設置一個測試用出水口，並標明測試出水口字樣。但斜屋頂設置測試\n用出水口有困難時，得免設。"],[1,"35","室內消防栓箱，應符合下列規定：\n一、箱身為厚度在一點六毫米以上之鋼板或具同等性能以上之不燃材料者。\n二、具有足夠裝設消防栓、水帶及瞄子等裝備之深度，其箱面表面積在零點七平方公尺以上。\n三、箱面有明顯而不易脫落之消防栓字樣，每字在二十平方公分以上。"],[1,"36","室內消防栓設備之水源容量，應在裝置室內消防栓最多樓層之全部消防栓繼續放水二十分鐘之水\n量以上。但該樓層內，全部消防栓數量超過二支時，以二支計算之。\n\n消防用水與普通用水合併使用者，應採取必要措施，確保前項水源容量在有效水量範圍內。\n\n第一項水源得與本章所列其他滅火設備水源併設。但其總容量應在各滅火設備應設水量之合計以\n上。"],[1,"37","依前條設置之水源，應連結加壓送水裝置，並依下列各款擇一設置：\n一、重力水箱，應符合下列規定：\n（一）有水位計、排水管、溢水用排水管、補給水管及人孔之裝置。\n（二）消防栓水箱必要落差在下列計算值以上：必要落差＝消防水帶摩擦損失水頭＋配管摩擦損\n失水頭＋17（計算單位：公尺）H=h1+h2+17m\n二、壓力水箱，應符合下列規定：\n（一）有壓力表、水位計、排水管、補給水管、給氣管、空氣壓縮機及人孔之裝置。\n（二）水箱內空氣占水箱容積之三分之一以上，壓力在使用建築物最遠處之消防栓維持規定放水\n水壓所需壓力以上。當水箱內壓力及液面減低時，能自動補充加壓。空氣壓縮機及加壓幫\n浦與緊急電源相連接。\n（三）消防栓水箱必要壓力在下列計算值以上：必要壓力＝消防水帶摩擦損失水頭+配管摩擦損失\n水頭＋落差＋1.7（計算單位：公斤／平方公分）P=P1+P2+P3+1.7 kgf/cm2\n三、消防幫浦，應符合下列規定：\n（一）幫浦出水量，第一種消防栓每支每分鐘之水量在一百五十公升以上；第二種消防栓每支每\n分鐘之水量在九十公升以上。但全部消防栓數量超過二支時，以二支計算之。\n（二）消防栓幫浦全揚程在下列計算值以上：幫浦全揚程＝消防水帶摩擦損失水頭＋配管摩擦損\n失水頭＋落差＋17（計算單位：公尺）H=h1+h2+h3+17m\n（三）應為專用。但與其他滅火設備並用，無妨礙各設備之性能時，不在此限。\n\n（四）連接緊急電源。\n\n前項加壓送水裝置除重力水箱外，依下列規定設置：\n一、設在便於檢修，且無受火災等災害損害之處所。\n二、使用消防幫浦之加壓送水裝置，以具一小時以上防火時效之牆壁、樓地板及防火門窗等防火\n設備區劃分隔。但設於屋頂或屋外時，設有不受積水及雨水侵襲之防水措施者，不在此限。\n三、設自動或手動啟動裝置，其停止僅限於手動操作。手動啟動裝置應設於每一室內消防栓箱內，\n室內消防栓箱上方有紅色啟動表示燈。\n四、室內消防栓瞄子放水壓力超過每平方公分七公斤時，應採取有效之減壓措施。\n五、採取有效之防震措施。"],[1,"38","室內消防栓設備之緊急電源，應使用發電機設備或蓄電池設備，其供電容量應供其有效動作三十\n分鐘以上。\n\n前項緊急電源在供第十二條第四款使用之場所，得使用具有相同效果之引擎動力系統。"],[0,"第 二 節 室外消防栓設備"],[1,"39","室外消防栓設備之配管、試壓及緊急電源，準用第三十二條第一款第一目至第五目、第七目、第\n二款、第三十三條及第三十八條規定設置。\n\n配管除符合前項規定外，水平主幹管外露部分，應於每二十公尺內，以明顯方式標示水流方向及\n配管名稱。"],[1,"40","室外消防栓，依下列規定設置：\n一、口徑在六十三毫米以上，與建築物一樓外牆各部分之水平距離在四十公尺以下。\n二、瞄子出水壓力在每平方公分二點五公斤以上或 0.25 MPa 以上，出水量在每分鐘三百五十公\n升以上。\n三、室外消防栓開關位置，不得高於地面一點五公尺，並不得低於地面零點六公尺。設於地面下\n者，其水帶接頭位置不得低於地面零點三公尺。\n四、於其五公尺範圍內附設水帶箱，並符合下列規定：\n（一）水帶箱具有足夠裝置水帶及瞄子之深度，箱底二側設排水孔，其箱面表面積在零點八平方\n公尺以上。\n（二）箱面有明顯而不易脫落之水帶箱字樣，每字在二十平方公分以上。\n（三）箱內配置口徑六十三毫米及長二十公尺水帶二條、口徑十九毫米以上直線噴霧兩用型瞄子\n一具及消防栓閥型開關一把。\n五、室外消防栓三公尺以內，保持空曠，不得堆放物品或種植花木，並在其附近明顯易見處，標\n\n明消防栓字樣。"],[1,"41","室外消防栓設備之水源容量，應在二具室外消防栓同時放水三十分鐘之水量以上。\n\n消防用水與普通用水合併使用者，應採取必要措施，確保前項水源容量，在有效水量範圍內。\n\n第一項水源得與其他滅火設備併設。但其總容量應在各滅火設備應設水量之合計以上。"],[1,"42","依前條設置之水源，應連結加壓送水裝置，並依下列各款擇一設置：\n一、重力水箱，應符合下列規定：\n（一）有水位計、排水管、溢水用排水管、補給水管及人孔之裝置。\n（二）水箱必要落差在下列計算值以上：必要落差＝消防水帶摩擦損失水頭＋配管摩擦損失水頭\n＋25（計算單位：公尺）H=h1+h2+25m\n二、壓力水箱，應符合下列規定：\n（一）有壓力表、水位計、排水管、補給水管、給氣管、空氣壓縮機及人孔之裝置。\n（二）水箱內空氣占水箱容積之三分之一以上，壓力在使用建築物最高處之消防栓維持規定放水\n水壓所需壓力以上。當水箱內壓力及液面減低時，能自動補充加壓。空氣壓縮機及加壓幫\n浦與緊急電源相連接。\n（三）水箱必要壓力在下列計算值以上：必要壓力＝消防水帶摩擦損失水頭＋配管摩擦損失水頭\n＋落差＋2.5（計算單位：公斤／平方公分）P=P1＋P2＋P3＋2.5 kgf/cm2\n三、消防幫浦，應符合下列規定：\n（一）幫浦出水量，一支消防栓在每分鐘四百公升以上。但全部消防栓數量超過二支時，以二支\n計算之。\n（二）幫浦全揚程在下列計算值以上：幫浦全揚程＝消防水帶摩擦損失水頭＋配管摩擦損失水頭\n＋落差＋25（計算單位：公尺）H=h1＋h2＋h3＋25m\n（三）應為專用。但與其他滅火設備並用，無妨礙各設備之性能時，不在此限。\n（四）連接緊急電源。\n\n前項加壓送水裝置除採重力水箱外，準用第三十七條第二項第一款至第三款、第五款規定，室外\n消防栓瞄子放水壓力超過每平方公分六公斤或 0.6Mpa 時，應採取有效之減壓措施。"],[0,"第 三 節 自動撒水設備"],[1,"43","自動撒水設備，得依實際情況需要就下列各款擇一設置。但供第十二條第一款第一目所列場所及\n第二目之集會堂使用之舞臺，應設開放式：\n一、密閉濕式：平時管內貯滿高壓水，撒水頭動作時即撒水。\n二、密閉乾式：平時管內貯滿高壓空氣，撒水頭動作時先排空氣，繼而撒水。\n\n三、開放式：平時管內無水，啟動一齊開放閥，使水流入管系撒水。\n四、預動式：平時管內貯滿低壓空氣，以感知裝置啟動流水檢知裝置，且撒水頭動作時即撒水。\n五、其他經中央主管機關認可者。"],[1,"44","自動撒水設備之配管、配件及屋頂水箱，除準用第三十二條第一款、第二款規定外，依下列規定\n設置：\n一、密閉乾式或預動式之流水檢知裝置二次側配管，施予鍍鋅等防腐蝕處理。一齊開放閥二次側\n配管，亦同。\n二、密閉乾式或預動式之流水檢知裝置二次側配管，為有效排水，依下列規定裝置：\n（一）支管每十公尺傾斜四公分，主管每十公尺傾斜二公分。\n（二）於明顯易見處設排水閥，並標明排水閥字樣。\n三、立管連接屋頂水箱時，屋頂水箱之容量在一立方公尺以上。"],[1,"45","自動撒水設備竣工時，應做加壓試驗，其測試方法準用第三十三條規定。但密閉乾式管系應併行\n空氣壓試驗，試驗時，應使空氣壓力達到每平方公分二點八公斤或 0.28MPa 之標準，其壓力持續\n二十四小時，漏氣減壓量應在每平方公分零點一公斤以下或 0.01MPa\n\n以下為合格。"],[1,"46","撒水頭，依下列規定配置：\n一、戲院、舞廳、夜總會、歌廳、集會堂等表演場所之舞臺及道具室、電影院之放映室或儲存易\n燃物品之倉庫，任一點至撒水頭之水平距離，在一點七公尺以下。\n二、汽車修理廠、室內停車空間及昇降機械式停車場，任一點至撒水頭之水平距離，在二點一公\n尺以下。\n三、前二款以外之場所依下列規定配置：\n（一）一般反應型撒水頭（第二種感度）\n，各層任一點至撒水頭之水平距離在二點一公尺以下。但\n防火構造建築物，其水平距離，得增加為二點三公尺以下。\n（二）快速反應型撒水頭（第一種感度）\n，各層任一點至撒水頭之水平距離在二點三公尺以下。但\n設於防火構造建築物，其水平距離，得增加為二點六公尺以下；撒水頭有效撒水半徑經中\n央主管機關認可者，其水平距離，得超過二點六公尺。\n四、第十二條第一款第三目、第六目、第二款第七目、第五款第一目等場所之住宿居室、病房及\n其他類似處所，得採用小區劃型撒水頭（以第一種感度為限）\n，任一點至撒水頭之水平距離在\n二點六公尺以下，撒水頭間距在三公尺以上，且任一撒水頭之防護面積在十三平方公尺以下。\n五、前款所列場所之住宿居室等及其走廊、通道與其類似場所，得採用側壁型撒水頭（以第一種\n感度為限）\n，牆面二側至撒水頭之水平距離在一點八公尺以下，牆壁前方至撒水頭之水平距離\n在三點六公尺以下。\n\n六、中央主管機關認定儲存大量可燃物之場所天花板高度超過六公尺，或其他場所天花板高度超\n過十公尺者，應採用放水型撒水頭。\n七、地下建築物天花板與樓板間之高度，在五十公分以上時，天花板與樓板均應配置撒水頭，且\n任一點至撒水頭之水平距離在二點一公尺以下。但天花板以不燃性材料裝修者，其樓板得免\n設撒水頭。\n\n第十七條第一項第六款之高架儲存倉庫，其撒水頭依下列規定配置：\n一、設在貨架之撒水頭，應符合下列規定：\n（一）任一點至撒水頭之水平距離，在二點五公尺以下，並以交錯方式設置。\n（二）儲存棉花類、塑膠類、木製品、紙製品或紡織製品等易燃物品時，每四公尺高度至少設置\n一個；儲存其他物品時，每六公尺高度至少設置一個。\n（三）儲存之物品會產生撒水障礙時，該物品下方亦應設置。\n（四）設置符合第四十七條第二項規定之防護板。但使用經中央主管機關認可之貨架撒水頭者，\n不在此限。\n二、前款以外，設在天花板或樓板之撒水頭，任一點至撒水頭之水平距離在二點一公尺以下。"],[1,"47","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n\n撒水頭之位置，依下列規定裝置：\n一、撒水頭軸心與裝置面成垂直裝置。\n二、撒水頭迴水板下方四十五公分內及水平方向三十公分內，應保持淨空間，不得有障礙物。\n三、密閉式撒水頭之迴水板裝設於裝置面（指樓板或天花板）下方，其間距在三十公分以下。\n四、密閉式撒水頭裝置於樑下時，迴水板與樑底之間距在十公分以下，且與樓板或天花板之間距\n在五十公分以下。\n五、密閉式撒水頭裝置面，四周以淨高四十公分以上之樑或類似構造體區劃包圍時，按各區劃裝\n置。但該樑或類似構造體之間距在一百八十公分以下者，不在此限。\n六、使用密閉式撒水頭，且風管等障礙物之寬度超過一百二十公分時，該風管等障礙物下方，亦\n應設置。\n七、側壁型撒水頭應符合下列規定：\n（一）撒水頭與裝置面（牆壁）之間距，在十五公分以下。\n（二）撒水頭迴水板與天花板或樓板之間距，在十五公分以下。\n（三）撒水頭迴水板下方及水平方向四十五公分內，保持淨空間，不得有障礙物。\n八、密閉式撒水頭側面有樑時，依下表裝置：\n九、汽車修理廠、室內停車空間及昇降機械式停車場有複層式停車設施者，其撒水頭設置準用第\
