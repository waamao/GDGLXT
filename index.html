dy": "一、防護對象在其有效防護範圍內。\n\n二、防護對象之表面積（為建築物時，為樓地板面積），每九平方公尺設置一個泡沫噴頭。\n三、每一放射區域在一百平方公尺以上。其防護對象之表面積未滿一百平方公尺時，依其實際表面積計算。"}, {"title": "第 218 條", "body": "1 泡沫滅火設備之泡沫放出口、放射量、配管、試壓、流水檢知裝置、啟動裝置、一齊開放閥、泡沫原液儲存量、濃度及泡沫原液槽設置規定，準用第六十九條、第七十條、第七十二條至第七十四條、第七十八條、第七十九條及第八十一條之規定。\n2 儲槽用之泡沫放出口，依第二百十三條之規定設置。"}, {"title": "第 219 條移動式泡沫滅火設備，依下列規定設置：", "body": "一、泡沫瞄子放射壓力在每平方公分三點五公斤以上或 0.35 MPa 以上。\n二、泡沬消防栓設於室內者，準用第三十四條第一項第一款第一目及第三十五條規定；設於室外者，準用第四十條第一款及第四款規定。"}, {"title": "第 220 條泡沫滅火設備之水源容量需達下列規定水溶液所需之水量以上，並加計配管內所需之水溶液量：", "body": "一、使用泡沫頭放射時，以最大泡沫放射區域，繼續射水十分鐘以上之水量。\n二、使用移動式泡沫滅火設備時，應在四具瞄子同時放水三十分鐘之水量以上。但瞄子個數未滿四個時，以實際設置個數計算。設於室內者，放水量在每分鐘二百公升以上；設於室外者，在每分鐘四百公升以上。\n三、使用泡沫射水槍時，在二具射水槍連續放射三十分鐘之水量以上。\n四、設置於儲槽之固定式泡沫滅火設備之水量，為下列之合計：\n（一）固定式泡沫放出口依第二百十三條第二款、第三款表列之泡沫水溶液量，乘以其液體表面積所能放射之量。\n（二）補助泡沫消防栓依第二百十四條規定之放射量，放射二十分鐘之水量。"}, {"title": "第 221 條", "body": "1 依前條設置之水源，應連結加壓送水裝置，並依下列各款擇一設置：\n一、重力水箱，應符合下列規定：\n（一）有水位計、排水管、溢水用排水管、補給水管及人孔之裝置。\n（二）水箱必要落差在下列計算值以上：\n必要落差＝移動式泡沫滅火設備消防水帶摩擦損失水頭＋配管摩擦損失水頭＋泡沫放出口、泡沫瞄子或泡沫射水槍之放射壓力，並換算成水頭（計算單位：公尺）\nH=h1+h2+h3m\n二、壓力水箱，應符合下列規定：\n\n（一）有壓力表、水位計、排水管、補給水管、給氣管、空氣壓縮機及人孔之裝置。\n（二）水箱內空氣占水箱容積三分之一以上，壓力在使用建築物最高處之消防栓維持規定放水水壓所需壓力以上。當水箱內壓力及液面減低時，能自動補充加壓。空氣壓縮機及加壓幫浦，與緊急電源相連接。\n（三）必要壓力在下列計算值以上：\n必要壓力＝消防水帶摩擦損失壓力＋配管摩擦損失壓力＋落差＋泡沫放出口、泡沫瞄子或泡沫射水槍之放射壓力（計算單位：公斤／平方公分，MPa）\nP=P1+P2+P3+P4\n三、消防幫浦，應符合下列規定：\n（一）幫浦全揚程在下列計算值以上：\n幫浦全揚程＝消防水帶摩擦損失水頭＋配管摩擦損失水頭＋落差＋泡沫放出口、泡沫瞄子或射水槍之放射壓力，並換算成水頭（計算單位：公尺）\nH=h1+h2+h3+h4\n（二）連結之泡沫滅火設備採泡沫噴頭方式者，其出水量及出水壓力，準用第七十七條之規定。\n（三）應為專用。但與其他滅火設備並用，無妨礙各設備之性能時，不在此限。\n（四）連接緊急電源。\n2 前項緊急電源除準用第三十八條規定外，其供電容量應在所需放射時間之一點五倍以上。"}, {"title": "第 222 條", "body": "（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n1 二氧化碳滅火設備準用第八十二條第一項、第八十三條、第八十四條至第八十八條、第八十九條第一項及第二項、第九十條至第九十二條、第九十三條第一項、第九十四條至第九十六條及第九十七條規定。但全區放射方式之二氧化碳滅火設備，依下列規定計算其所需滅火藥劑量：\n一、以下表所列防護區域體積及其所列每立方公尺防護區域體積所需之滅火藥劑量，核算其所需之量。但實際量未達所列之量時，以該滅火藥劑之總量所列最低限度之基本量計算。\n二、防護區域之開口部未設置自動關閉裝置時，除依前款計算劑量外，另加算該開口部面積每平方公尺五公斤之量。\n2 惰性氣體滅火設備準用第八十二條第二項之 IG-100、IG-55、IG-541 藥劑及第三項、第八十三條之一、第八十三條之二、第八十四條第一項、第八十五條、第八十七條第一項、第八十八條、第八十九條第一項及第三項、第九十條至第九十二條、第九十三條第二項、第九十四條、第九十五條、第九十六條之一及第九十七條規定。\n3 於防護區域內或防護對象係為儲存、處理之公共危險物品，依下表之係數，二氧化碳滅火設備全區放射方式乘以第一項、局部放射方式乘以第八十三條第二款或惰性氣體滅火設備乘以第八十三條之二所算出之量。未表列之公共危險物品或滅火藥劑係數，依中央主管機關認可之設計係數值核算之。"}, {"title": "第 222-1 條鹵化烴滅火設備準用第九十七條之一第一項之 HFC-23 、HFC-227ea 藥劑、第二項及第三項、第九十七條之二至第九十七條之十規定。但於防護區域內係為儲存、處理之公共危險物品，依前條第三項表列滅火藥劑之係數乘以第九十七條之三所算出之量。前條第三項未表列之公共危險物品或係數，依中央主管機關認可之設計係數值核算之。", "body": ""}, {"title": "第 223 條乾粉滅火設備準用第九十八條至第一百十一條規定。但於防護區域內或防護對象係為儲存、處理之公共危險物品，依第二百二十二條第三項表列滅火藥劑之係數乘以第九十九條所算出之量。第二百二十二條第三項未表列之公共危險物品或係數，依中央主管機關認可之設計係數值核算之。", "body": ""}, {"title": "第 224 條第四種滅火設備距防護對象任一點之步行距離，應在三十公尺以下。但與第一種、第二種或第三種滅火設備併設者，不在此限。", "body": ""}, {"title": "第 225 條", "body": "1 第五種滅火設備應設於能有效滅火之處所，且至防護對象任一點之步行距離應在二十公尺以下。\n但與第一種、第二種、第三種或第四種滅火設備併設者，不在此限。\n2 前項選設水槽應備有三個一公升之消防專用水桶，乾燥砂、膨脹蛭石及膨脹珍珠岩應備有鏟子。"}, {"title": "第 226 條警報設備之設置，依第一百十二條至第一百三十二條之規定。", "body": ""}, {"title": "第 227 條標示設備之設置，依第一百四十六條至第一百五十六條之規定。", "body": ""}, {"title": "第 228 條可燃性高壓氣體場所、加氣站、天然氣儲槽及可燃性高壓氣體儲槽之滅火器，依下列規定設置：", "body": "一、製造、儲存或處理場所設置二具。但樓地板面積二百平方公尺以上者，每五十平方公尺（含未滿）應增設一具。\n二、儲槽設置三具以上。\n三、加氣站，依下列規定設置：\n（一）儲氣槽區四具以上。\n（二）加氣機每臺一具以上。\n（三）用火設備處所一具以上。\n（四）建築物每層樓地板面積在一百平方公尺以下設置二具，超過一百平方公尺時，每增加（含未滿）一百平方公尺增設一具。\n四、儲存場所任一點至滅火器之步行距離在十五公尺以下，並不得妨礙出入作業。\n\n五、設於屋外者，滅火器置於箱內或有不受雨水侵襲之措施。\n六、每具滅火器對普通火災具有四個以上之滅火效能值，對油類火災具有十個以上之滅火效能值。\n七、滅火器之放置及標示依第三十一條第四款之規定。"}, {"title": "第 229 條可燃性高壓氣體場所、加氣站、天然氣儲槽及可燃性高壓氣體儲槽之冷卻撒水設備，依下列規定設置：", "body": "一、撒水管使用撒水噴頭或配管穿孔方式，對防護對象均勻撒水。\n二、使用配管穿孔方式者，符合 CNS 一二八五四之規定，孔徑在四毫米以上。\n三、撒水量為防護面積每平方公尺每分鐘五公升以上。但以厚度二十五毫米以上之岩棉或同等以上防火性能之隔熱材被覆，外側以厚度零點三五毫米以上符合 CNS 一二四四規定之鋅鐵板或具有同等以上強度及防火性能之材料被覆者，得將其撒水量減半。\n四、水源容量在加壓送水裝置連續撒水三十分鐘之水量以上。\n五、構造及手動啟動裝置準用第二百十六條之規定。"}, {"title": "第 230 條前條防護面積計算方式，依下列規定：", "body": "一、儲槽為儲槽本體之外表面積（圓筒形者含端板部分）及附屬於儲槽之液面計及閥類之露出表面積。\n二、前款以外設備為露出之表面積。但製造設備離地面高度超過五公尺者，以五公尺之間隔作水平面切割所得之露出表面積作為應予防護之範圍。\n三、加氣站防護面積，依下列規定：\n（一）加氣機每臺三點五平方公尺。\n（二）加氣車位每處二平方公尺。\n（三）儲氣槽人孔每座三處共三平方公尺。\n（四）壓縮機每臺三平方公尺。\n（五）幫浦每臺二平方公尺。\n（六）氣槽車卸收區每處三十平方公尺。"}, {"title": "第 231 條可燃性高壓氣體場所、加氣站、天然氣儲槽及可燃性高壓氣體儲槽之射水設備，依下列規定：", "body": "一、室外消防栓應設置於屋外，且具備消防水帶箱。\n二、室外消防栓箱內配置瞄子、開關把手及口徑六十三毫米、長度二十公尺消防水帶二條。\n三、全部射水設備同時使用時，各射水設備放水壓力在每平方公分三點五公斤以上或 0.35MPa 以上，放水量在每分鐘四百五十公升以上。但全部射水設備數量超過二支時，以同時使用二支計算之。\n四、射水設備之水源容量，在二具射水設備同時放水三十分鐘之水量以上。"}, {"title": "第 232 條射水設備設置之位置及數量應依下列規定：", "body": "一、設置個數在二支以上，且設於距防護對象外圍四十公尺以內，能自任何方向對儲槽放射之位置。\n二、依儲槽之表面積，每五十平方公尺（含未滿）設置一具射水設備。但依第二百二十九條第三款但書規定設置隔熱措施者，每一百平方公尺（含未滿）設置一具。"}, {"title": "第 233 條射水設備之配管、試壓、加壓送水裝置及緊急電源準用第三十九條及第四十二條之規定。", "body": ""}]}, {"label": "第 五 編 附則", "level": 1, "children": [{"title": "第 234 條依本標準設置之室內消防栓、室外消防栓、自動撒水、水霧滅火、泡沫滅火、冷卻撒水、射水設備及連結送水管等設備，其消防幫浦、電動機、附屬裝置及配管摩擦損失計算，由中央消防機關另定之。", "body": ""}, {"title": "第 235 條緊急供電系統之配線除依用戶用電設備裝置規則外，並依下列規定：", "body": "一、電氣配線應設專用回路，不得與一般電路相接，且開關有消防安全設備別之明顯標示。\n二、緊急用電源回路及操作回路，使用六百伏特耐熱絕緣電線，或同等耐熱效果以上之電線。\n三、電源回路之配線，依下列規定，施予耐燃保護：\n（一）電線裝於金屬導線管槽內，並埋設於防火構造物之混凝土內，混凝土保護厚度為二十毫米以上。但在使用不燃材料建造，且符合建築技術規則防火區劃規定之管道間，得免埋設。\n（二）使用 MI 電纜或耐燃電纜時，得按電纜裝設法，直接敷設。\n（三）其他經中央主管機關指定之耐燃保護裝置。\n四、標示燈回路及控制回路之配線，依下列規定，施予耐熱保護：\n（一）電線於金屬導線管槽內裝置。\n（二）使用 MI 電纜、耐燃電纜或耐熱電線電纜時，得按電纜裝設法，直接敷設。\n（三）其他經中央主管機關指定之耐熱保護裝置。"}, {"title": "第 236 條", "body": "（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n消防安全設備緊急供電系統之配線，依下表之區分，施予耐燃保護或耐熱保護。"}, {"title": "第 237 條緊急供電系統之電源，依下列規定：", "body": "一、緊急電源使用符合 CNS、一○二○四規定之發電機設備、一○二○五規定之蓄電池設備或具\n\n有相同效果之設備，其容量之計算，由中央消防機關另定之。\n二、緊急電源裝置切換開關，於常用電源切斷時自動切換供應電源至緊急用電器具，並於常用電源恢復時，自動恢復由常用電源供應。\n三、發電機裝設適當開關或連鎖機件，以防止向正常供電線路逆向電力。\n四、裝設發電機及蓄電池之處所為防火構造。但設於屋外時，設有不受積水及雨水侵襲之防水措施者，不在此限。\n五、蓄電池設備充電電源之配線設專用回路，其開關上應有明顯之標示。"}, {"title": "第 238 條防災中心樓地板面積應在四十平方公尺以上，並依下列規定設置：", "body": "一、防災中心之位置，依下列規定：\n（一）設於消防人員自外面容易進出之位置。\n（二）設於便於通達緊急昇降機間及特別安全梯處。\n（三）出入口至屋外任一出入口之步行距離在三十公尺以下。\n二、防災中心之構造，依下列規定：\n（一）冷暖、換氣等空調系統為專用。\n（二）防災監控系統相關設備以地腳螺栓或其他堅固方法予以固定。\n（三）防災中心內設有供操作人員睡眠、休息區域時，該部分以防火區劃間隔。"}, {"title": "第 239 條本標準施行日期，由內政部以命令定之。", "body": ""}]}];

    function openStandardModal() {
        document.getElementById('standardSearchInput').value = '';
        renderStandardSearch();
        if (!document.getElementById('standardOutline').hasChildNodes()) {
            _buildOutline();
        }
        document.getElementById('standardModal').style.display = 'flex';
    }
    function closeStandardModal() {
        document.getElementById('standardModal').style.display = 'none';
    }
    function resetStandardModal() {
        document.getElementById('standardSearchInput').value = '';
        renderStandardSearch();
        var outline = document.getElementById('standardOutline');
        outline.querySelectorAll('.std-arr').forEach(function(arr) {
            arr.style.transform = '';
        });
        outline.querySelectorAll('div').forEach(function(el) {
            if (el.style.display === 'block') el.style.display = 'none';
        });
    }
    document.getElementById('standardModal').addEventListener('click', function(e) {
        if (e.target === this) closeStandardModal();
    });

    // ── 建立大綱（只建一次）──
    function _buildOutline() {
        const box = document.getElementById('standardOutline');
        box.innerHTML = '';

        // 把扁平陣列組成巢狀結構再渲染
        // 走訪一次，依 level 決定要掛在哪裡
        let stackEdit = null;  // 目前的「編」body
        let stackChap = null;  // 目前的「章」body

        _STD_DATA.forEach(function(g) {
            if (g.level === 0) {
                // 前言：直接掛在 box
                if (g.children.length) {
                    box.appendChild(_makeArticlesBlock(g.children));
                }

            } else if (g.level === 1) {
                // 編：掛在 box，重設章指標
                var acc = _makeAccordion(g.label, 1, g.children.length);
                box.appendChild(acc.wrap);
                stackEdit = acc.body;
                stackChap = null;
                // 編直屬條文（少見）
                if (g.children.length) {
                    stackEdit.appendChild(_makeArticlesBlock(g.children));
                }

            } else if (g.level === 2) {
                // 章：掛在最近的「編」
                var acc = _makeAccordion(g.label, 2, g.children.length);
                var target = stackEdit || box;
                target.appendChild(acc.wrap);
                stackChap = acc.body;
                if (g.children.length) {
                    stackChap.appendChild(_makeArticlesBlock(g.children));
                }

            } else if (g.level === 3) {
                // 節：掛在最近的「章」，若無章則掛在「編」
                if (g.children.length) {
                    var acc = _makeAccordion(g.label, 3, g.children.length);
                    var target = stackChap || stackEdit || box;
                    target.appendChild(acc.wrap);
                    acc.body.appendChild(_makeArticlesBlock(g.children));
                }
            }
        });
    }

    // 建立一個 accordion，回傳 {wrap, body}
    function _makeAccordion(label, level, count) {
        var wrap = document.createElement('div');
        wrap.style.cssText = 'border-bottom:1px solid rgba(0,0,0,0.1);';

        var header = document.createElement('div');
        var bgColor = level === 1 ? '#111111' : level === 2 ? '#1e3a5f' : '#ffffff';
        var fgColor = level <= 2 ? '#ffffff' : '#1f2937';
        var pl = (level - 1) * 14 + 16;
        var fs = level === 1 ? '14' : level === 2 ? '13' : '13';
        header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;'
            + 'padding:11px 14px 11px ' + pl + 'px;'
            + 'background:' + bgColor + ';color:' + fgColor + ';'
            + 'cursor:pointer;user-select:none;gap:6px;'
            + '-webkit-tap-highlight-color:transparent;';

        var badge = count > 0
            ? '<span style="font-size:10px;opacity:0.6;flex-shrink:0;white-space:nowrap;">' + count + ' 條</span>'
            : '';
        header.innerHTML = '<span style="font-size:' + fs + 'px;font-weight:bold;flex:1;line-height:1.5;">'
            + label + '</span>' + badge
            + '<span class="std-arr" style="font-size:11px;flex-shrink:0;transition:transform 0.18s;display:inline-block;">▶</span>';

        var body = document.createElement('div');
        body.style.cssText = 'display:none;';

        header.addEventListener('click', function() {
            var open = body.style.display !== 'none';
            body.style.display = open ? 'none' : 'block';
            header.querySelector('.std-arr').style.transform = open ? '' : 'rotate(90deg)';
        });

        wrap.appendChild(header);
        wrap.appendChild(body);
        return { wrap: wrap, body: body };
    }

    // 將條文陣列渲染成 DOM
    function _makeArticlesBlock(children) {
        var wrap = document.createElement('div');
        wrap.style.cssText = 'background:#fff;';
        children.forEach(function(art) {
            var item = document.createElement('div');
            item.style.cssText = 'border-bottom:1px solid #f0f0f0;padding:10px 16px;';

            var titleEl = document.createElement('div');
            titleEl.style.cssText = 'font-size:13px;font-weight:bold;color:#1f2937;'
                + (art.body ? 'margin-bottom:6px;' : '');
            titleEl.textContent = art.title;
            item.appendChild(titleEl);

            if (art.body) {
                var bodyEl = document.createElement('div');
                bodyEl.style.cssText = 'font-size:12px;color:#374151;line-height:1.85;white-space:pre-wrap;word-break:break-all;';
                bodyEl.textContent = art.body;
                item.appendChild(bodyEl);
            }
            wrap.appendChild(item);
        });
        return wrap;
    }

    // ── 搜尋 ──
    function renderStandardSearch() {
        var kw = document.getElementById('standardSearchInput').value.trim();
        var resultsDiv = document.getElementById('standardSearchResults');
        var outlineDiv = document.getElementById('standardOutline');

        if (!kw) {
            resultsDiv.style.display = 'none';
            outlineDiv.style.display = '';
            return;
        }
        outlineDiv.style.display = 'none';
        resultsDiv.style.display = '';
        resultsDiv.innerHTML = '';

        var hits = [];
        _STD_DATA.forEach(function(g) {
            g.children.forEach(function(art) {
                if ((art.title + ' ' + (art.body || '')).includes(kw)) {
                    hits.push({ groupLabel: g.label, art: art });
                }
            });
        });

        if (!hits.length) {
            resultsDiv.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:24px;font-size:13px;">無符合結果</p>';
            return;
        }

        var countEl = document.createElement('p');
        countEl.style.cssText = 'font-size:11px;color:#6b7280;margin:0 0 8px;padding-bottom:8px;border-bottom:1px solid #e5e7eb;';
        countEl.textContent = '找到 ' + hits.length + ' 筆符合條文';
        resultsDiv.appendChild(countEl);

        var escRe = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        var re = new RegExp(escRe, 'g');

        function hl(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                      .replace(re, function(m){ return '<mark style="background:#fef08a;padding:0 1px;border-radius:2px;">' + m + '</mark>'; });
        }

        hits.forEach(function(h) {
            var item = document.createElement('div');
            item.style.cssText = 'border-bottom:1px solid #f0f0f0;padding:10px 0;';

            var meta = document.createElement('div');
            meta.style.cssText = 'font-size:10px;color:#9ca3af;margin-bottom:3px;';
            meta.textContent = h.groupLabel;
            item.appendChild(meta);

            var titleEl = document.createElement('div');
            titleEl.style.cssText = 'font-size:13px;font-weight:bold;color:#1f2937;margin-bottom:4px;';
            titleEl.innerHTML = hl(h.art.title);
            item.appendChild(titleEl);

            if (h.art.body) {
                var bodyEl = document.createElement('div');
                bodyEl.style.cssText = 'font-size:12px;color:#374151;line-height:1.85;white-space:pre-wrap;word-break:break-all;';
                bodyEl.innerHTML = hl(h.art.body);
                item.appendChild(bodyEl);
            }
            resultsDiv.appendChild(item);
        });
    }
    </script>
