壁十五公尺以上，便於消防救災處，且至任一泡沫消防栓之\n步行距離在七十五公尺以下，泡沫瞄子放射量在每分鐘四百公升以上，放射壓力在每平方\n公分三點五公斤以上或 0.35Mpa 以上。但全部泡沫消防栓數量超過三支時，以同時使用三\n支計算之。\n（二）補助泡沫消防栓之附設水帶箱之設置，準用第四十條第四款之規定。\n二、連結送液口所需數量，依下列公式計算：\nN=Aq/C\nN ：連結送液口應設數量\nA ：儲槽最大水平斷面積。但浮頂儲槽得以環狀面積核算（㎡）。\nq ：固定式泡沫放出口每平方公尺放射量（ι/min ㎡）\nC ：每一個連結送液口之標準送液量（800ι/min）"],[1,"215","以室外儲槽儲存閃火點在攝氏四十度以下之第四類公共危險物品之顯著滅火困難場所者，且設於\n岸壁、碼頭或其他類似之地區，並連接輸送設備者，除設置固定式泡沫滅火設備外，並依下列規\n定設置泡沫射水槍滅火設備：\n一、室外儲槽之幫浦設備等設於岸壁、碼頭或其他類似之地區時，泡沫射水槍應能防護該場所位\n於海面上前端之水平距離十五公尺以內之海面，而距離注入口及其附屬之公共危險物品處理\n設備各部分之水平距離在三十公尺以內，其設置個數在二具以上。\n二、泡沫射水槍為固定式，並設於無礙滅火活動及可啟動、操作之位置。\n三、泡沫射水槍同時放射時，射水槍泡沫放射量為每分鐘一千九百公升以上，且其有效水平放射\n距離在三十公尺以上。"],[1,"216","以室內、室外儲槽儲存閃火點在攝氏七十度以下之第四類公共危險物品之顯著滅火困難場所，除\n設置固定式泡沫滅火設備外，並依下列規定設置冷卻撒水設備：\n一、撒水噴孔符合 CNS、一二八五四之規定，孔徑在四毫米以上。\n二、撒水管設於槽壁頂部，撒水噴頭之配置數量，依其裝設之放水角度及撒水量核算；儲槽設有\n風樑或補強環等阻礙水路徑者，於風樑或補強環等下方增設撒水管及撒水噴孔。\n三、撒水量按槽壁總防護面積每平方公尺每分鐘二公升以上計算之，其管徑依水力計算配置。\n四、加壓送水裝置為專用，其幫浦出水量在前款撒水量乘以所防護之面積以上。\n五、水源容量在最大一座儲槽連續放水四小時之水量以上。\n六、選擇閥（未設選擇閥者為開關閥）設於防液堤外，火災不易殃及且容易接近之處所，其操作\n位置距離地面之高度在零點八公尺以上一點五公尺以下。\n七、加壓送水裝置設置符合下列規定之手動啟動裝置及遠隔啟動裝置。但送水區域距加壓送水裝\n置在三百公尺以內者，得免設遠隔啟動裝置：\n（一）手動啟動裝置之操作部設於加壓送水裝置設置之場所。\n（二）遠隔啟動裝置由下列方式之一啟動加壓送水裝置：\n1.開啟選擇閥，使啟動用水壓開關裝置或流水檢知裝置連動啟動。\n2.設於監控室等平常有人駐守處所，直接啟動。\n八、加壓送水裝置啟動後五分鐘以內，能有效撒水，且加壓送水裝置距撒水區域在五百公尺以下。\n但設有保壓措施者，不在此限。\n九、加壓送水裝置連接緊急電源。\n\n前項緊急電源除準用第三十八條規定外，其供電容量應在其連續放水時間以上。"],[1,"217","採泡沫噴頭方式者，應符合下列規定：\n一、防護對象在其有效防護範圍內。\n\n二、防護對象之表面積（為建築物時，為樓地板面積），每九平方公尺設置一個泡沫噴頭。\n三、每一放射區域在一百平方公尺以上。其防護對象之表面積未滿一百平方公尺時，依其實際表\n面積計算。"],[1,"218","泡沫滅火設備之泡沫放出口、放射量、配管、試壓、流水檢知裝置、啟動裝置、一齊開放閥、泡\n沫原液儲存量、濃度及泡沫原液槽設置規定，準用第六十九條、第七十條、第七十二條至第七十\n四條、第七十八條、第七十九條及第八十一條之規定。\n\n儲槽用之泡沫放出口，依第二百十三條之規定設置。"],[1,"219","移動式泡沫滅火設備，依下列規定設置：\n一、泡沫瞄子放射壓力在每平方公分三點五公斤以上或 0.35 MPa 以上。\n二、泡沬消防栓設於室內者，準用第三十四條第一項第一款第一目及第三十五條規定；設於室外\n者，準用第四十條第一款及第四款規定。"],[1,"220","泡沫滅火設備之水源容量需達下列規定水溶液所需之水量以上，並加計配管內所需之水溶液量：\n一、使用泡沫頭放射時，以最大泡沫放射區域，繼續射水十分鐘以上之水量。\n二、使用移動式泡沫滅火設備時，應在四具瞄子同時放水三十分鐘之水量以上。但瞄子個數未滿\n四個時，以實際設置個數計算。設於室內者，放水量在每分鐘二百公升以上；設於室外者，\n在每分鐘四百公升以上。\n三、使用泡沫射水槍時，在二具射水槍連續放射三十分鐘之水量以上。\n四、設置於儲槽之固定式泡沫滅火設備之水量，為下列之合計：\n（一）固定式泡沫放出口依第二百十三條第二款、第三款表列之泡沫水溶液量，乘以其液體表面\n積所能放射之量。\n（二）補助泡沫消防栓依第二百十四條規定之放射量，放射二十分鐘之水量。"],[1,"221","依前條設置之水源，應連結加壓送水裝置，並依下列各款擇一設置：\n一、重力水箱，應符合下列規定：\n（一）有水位計、排水管、溢水用排水管、補給水管及人孔之裝置。\n（二）水箱必要落差在下列計算值以上：\n必要落差＝移動式泡沫滅火設備消防水帶摩擦損失水頭＋配管摩擦損失水頭＋泡沫放出口、泡\n沫瞄子或泡沫射水槍之放射壓力，並換算成水頭（計算單位：公尺）\nH=h1+h2+h3m\n二、壓力水箱，應符合下列規定：\n\n（一）有壓力表、水位計、排水管、補給水管、給氣管、空氣壓縮機及人孔之裝置。\n（二）水箱內空氣占水箱容積三分之一以上，壓力在使用建築物最高處之消防栓維持規定放水水\n壓所需壓力以上。當水箱內壓力及液面減低時，能自動補充加壓。空氣壓縮機及加壓幫浦，\n與緊急電源相連接。\n（三）必要壓力在下列計算值以上：\n必要壓力＝消防水帶摩擦損失壓力＋配管摩擦損失壓力＋落差＋泡沫放出口、泡沫瞄子或泡沫\n射水槍之放射壓力（計算單位：公斤／平方公分，MPa）\nP=P1+P2+P3+P4\n三、消防幫浦，應符合下列規定：\n（一）幫浦全揚程在下列計算值以上：\n幫浦全揚程＝消防水帶摩擦損失水頭＋配管摩擦損失水頭＋落差＋泡沫放出口、泡沫瞄子或射\n水槍之放射壓力，並換算成水頭（計算單位：公尺）\nH=h1+h2+h3+h4\n（二）連結之泡沫滅火設備採泡沫噴頭方式者，其出水量及出水壓力，準用第七十七條之規定。\n（三）應為專用。但與其他滅火設備並用，無妨礙各設備之性能時，不在此限。\n（四）連接緊急電源。\n\n前項緊急電源除準用第三十八條規定外，其供電容量應在所需放射時間之一點五倍以上。"],[1,"222","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n\n二氧化碳滅火設備準用第八十二條第一項、第八十三條、第八十四條至第八十八條、第八十九條\n第一項及第二項、第九十條至第九十二條、第九十三條第一項、第九十四條至第九十六條及第九\n十七條規定。但全區放射方式之二氧化碳滅火設備，依下列規定計算其所需滅火藥劑量：\n一、以下表所列防護區域體積及其所列每立方公尺防護區域體積所需之滅火藥劑量，核算其所需\n之量。但實際量未達所列之量時，以該滅火藥劑之總量所列最低限度之基本量計算。\n二、防護區域之開口部未設置自動關閉裝置時，除依前款計算劑量外，另加算該開口部面積每平\n方公尺五公斤之量。\n\n惰性氣體滅火設備準用第八十二條第二項之 IG-100、IG-55、IG-541\n\n藥劑及第三項、第八十三\n\n條之一、第八十三條之二、第八十四條第一項、第八十五條、第八十七條第一項、第八十八條、\n第八十九條第一項及第三項、第九十條至第九十二條、第九十三條第二項、第九十四條、第九十\n五條、第九十六條之一及第九十七條規定。\n\n於防護區域內或防護對象係為儲存、處理之公共危險物品，依下表之係數，二氧化碳滅火設備全\n區放射方式乘以第一項、局部放射方式乘以第八十三條第二款或惰性氣體滅火設備乘以第八十三\n條之二所算出之量。未表列之公共危險物品或滅火藥劑係數，依中央主管機關認可之設計係數值\n核算之。"],[1,"222-1","鹵化烴滅火設備準用第九十七條之一第一項之 HFC-23 、HFC-227ea 藥劑、第二項及第三項、第\n九十七條之二至第九十七條之十規定。但於防護區域內係為儲存、處理之公共危險物品，依前條\n第三項表列滅火藥劑之係數乘以第九十七條之三所算出之量。前條第三項未表列之公共危險物品\n或係數，依中央主管機關認可之設計係數值核算之。"],[1,"223","乾粉滅火設備準用第九十八條至第一百十一條規定。但於防護區域內或防護對象係為儲存、處理\n之公共危險物品，依第二百二十二條第三項表列滅火藥劑之係數乘以第九十九條所算出之量。第\n二百二十二條第三項未表列之公共危險物品或係數，依中央主管機關認可之設計係數值核算之。"],[1,"224","第四種滅火設備距防護對象任一點之步行距離，應在三十公尺以下。但與第一種、第二種或第三\n種滅火設備併設者，不在此限。"],[1,"225","第五種滅火設備應設於能有效滅火之處所，且至防護對象任一點之步行距離應在二十公尺以下。\n但與第一種、第二種、第三種或第四種滅火設備併設者，不在此限。\n\n前項選設水槽應備有三個一公升之消防專用水桶，乾燥砂、膨脹蛭石及膨脹珍珠岩應備有鏟子。"],[1,"226","警報設備之設置，依第一百十二條至第一百三十二條之規定。"],[1,"227","標示設備之設置，依第一百四十六條至第一百五十六條之規定。"],[1,"228","可燃性高壓氣體場所、加氣站、天然氣儲槽及可燃性高壓氣體儲槽之滅火器，依下列規定設置：\n一、製造、儲存或處理場所設置二具。但樓地板面積二百平方公尺以上者，每五十平方公尺（含\n未滿）應增設一具。\n二、儲槽設置三具以上。\n三、加氣站，依下列規定設置：\n（一）儲氣槽區四具以上。\n（二）加氣機每臺一具以上。\n（三）用火設備處所一具以上。\n（四）建築物每層樓地板面積在一百平方公尺以下設置二具，超過一百平方公尺時，每增加（含\n未滿）一百平方公尺增設一具。\n四、儲存場所任一點至滅火器之步行距離在十五公尺以下，並不得妨礙出入作業。\n\n五、設於屋外者，滅火器置於箱內或有不受雨水侵襲之措施。\n六、每具滅火器對普通火災具有四個以上之滅火效能值，對油類火災具有十個以上之滅火效能值。\n七、滅火器之放置及標示依第三十一條第四款之規定。"],[1,"229","可燃性高壓氣體場所、加氣站、天然氣儲槽及可燃性高壓氣體儲槽之冷卻撒水設備，依下列規定\n設置：\n一、撒水管使用撒水噴頭或配管穿孔方式，對防護對象均勻撒水。\n二、使用配管穿孔方式者，符合 CNS\n\n一二八五四之規定，孔徑在四毫米以上。\n\n三、撒水量為防護面積每平方公尺每分鐘五公升以上。但以厚度二十五毫米以上之岩棉或同等以\n上防火性能之隔熱材被覆，外側以厚度零點三五毫米以上符合 CNS 一二四四規定之鋅鐵板或\n具有同等以上強度及防火性能之材料被覆者，得將其撒水量減半。\n四、水源容量在加壓送水裝置連續撒水三十分鐘之水量以上。\n五、構造及手動啟動裝置準用第二百十六條之規定。"],[1,"230","前條防護面積計算方式，依下列規定：\n一、儲槽為儲槽本體之外表面積（圓筒形者含端板部分）及附屬於儲槽之液面計及閥類之露出表\n面積。\n二、前款以外設備為露出之表面積。但製造設備離地面高度超過五公尺者，以五公尺之間隔作水\n平面切割所得之露出表面積作為應予防護之範圍。\n三、加氣站防護面積，依下列規定：\n（一）加氣機每臺三點五平方公尺。\n（二）加氣車位每處二平方公尺。\n（三）儲氣槽人孔每座三處共三平方公尺。\n（四）壓縮機每臺三平方公尺。\n（五）幫浦每臺二平方公尺。\n（六）氣槽車卸收區每處三十平方公尺。"],[1,"231","可燃性高壓氣體場所、加氣站、天然氣儲槽及可燃性高壓氣體儲槽之射水設備，依下列規定：\n一、室外消防栓應設置於屋外，且具備消防水帶箱。\n二、室外消防栓箱內配置瞄子、開關把手及口徑六十三毫米、長度二十公尺消防水帶二條。\n三、全部射水設備同時使用時，各射水設備放水壓力在每平方公分三點五公斤以上或 0.35MPa 以\n上，放水量在每分鐘四百五十公升以上。但全部射水設備數量超過二支時，以同時使用二支\n計算之。\n四、射水設備之水源容量，在二具射水設備同時放水三十分鐘之水量以上。"],[1,"232","射水設備設置之位置及數量應依下列規定：\n一、設置個數在二支以上，且設於距防護對象外圍四十公尺以內，能自任何方向對儲槽放射之位\n置。\n二、依儲槽之表面積，每五十平方公尺（含未滿）設置一具射水設備。但依第二百二十九條第三\n款但書規定設置隔熱措施者，每一百平方公尺（含未滿）設置一具。"],[1,"233","射水設備之配管、試壓、加壓送水裝置及緊急電源準用第三十九條及第四十二條之規定。"],[0,"第 五 編 附則"],[1,"234","依本標準設置之室內消防栓、室外消防栓、自動撒水、水霧滅火、泡沫滅火、冷卻撒水、射水設\n備及連結送水管等設備，其消防幫浦、電動機、附屬裝置及配管摩擦損失計算，由中央消防機關\n另定之。"],[1,"235","緊急供電系統之配線除依用戶用電設備裝置規則外，並依下列規定：\n一、電氣配線應設專用回路，不得與一般電路相接，且開關有消防安全設備別之明顯標示。\n二、緊急用電源回路及操作回路，使用六百伏特耐熱絕緣電線，或同等耐熱效果以上之電線。\n三、電源回路之配線，依下列規定，施予耐燃保護：\n（一）電線裝於金屬導線管槽內，並埋設於防火構造物之混凝土內，混凝土保護厚度為二十毫米\n以上。但在使用不燃材料建造，且符合建築技術規則防火區劃規定之管道間，得免埋設。\n（二）使用 MI 電纜或耐燃電纜時，得按電纜裝設法，直接敷設。\n（三）其他經中央主管機關指定之耐燃保護裝置。\n四、標示燈回路及控制回路之配線，依下列規定，施予耐熱保護：\n（一）電線於金屬導線管槽內裝置。\n（二）使用 MI 電纜、耐燃電纜或耐熱電線電纜時，得按電纜裝設法，直接敷設。\n（三）其他經中央主管機關指定之耐熱保護裝置。"],[1,"236","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n消防安全設備緊急供電系統之配線，依下表之區分，施予耐燃保護或耐熱保護。"],[1,"237","緊急供電系統之電源，依下列規定：\n一、緊急電源使用符合 CNS、一○二○四規定之發電機設備、一○二○五規定之蓄電池設備或具\n\n有相同效果之設備，其容量之計算，由中央消防機關另定之。\n二、緊急電源裝置切換開關，於常用電源切斷時自動切換供應電源至緊急用電器具，並於常用電\n源恢復時，自動恢復由常用電源供應。\n三、發電機裝設適當開關或連鎖機件，以防止向正常供電線路逆向電力。\n四、裝設發電機及蓄電池之處所為防火構造。但設於屋外時，設有不受積水及雨水侵襲之防水措\n施者，不在此限。\n五、蓄電池設備充電電源之配線設專用回路，其開關上應有明顯之標示。"],[1,"238","防災中心樓地板面積應在四十平方公尺以上，並依下列規定設置：\n一、防災中心之位置，依下列規定：\n（一）設於消防人員自外面容易進出之位置。\n（二）設於便於通達緊急昇降機間及特別安全梯處。\n（三）出入口至屋外任一出入口之步行距離在三十公尺以下。\n二、防災中心之構造，依下列規定：\n（一）冷暖、換氣等空調系統為專用。\n（二）防災監控系統相關設備以地腳螺栓或其他堅固方法予以固定。\n（三）防災中心內設有供操作人員睡眠、休息區域時，該部分以防火區劃間隔。"],[1,"239","本標準施行日期，由內政部以命令定之。"]];

        let _lawExpandedArticle = null;
        let _lawDefaultCollapsed = false;

        function _cnToNum(s) {
            const m = {'零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
            if (s.includes('點')) {
                const di = s.indexOf('點');
                const intP = di > 0 ? _cnToNum(s.substring(0, di)) : 0;
                let dec = '';
                for (let i = di + 1; i < s.length; i++) { if (m[s[i]] !== undefined) dec += m[s[i]]; }
                return dec ? parseFloat(intP + '.' + dec) : intP;
            }
            let r = 0;
            if (s.includes('萬')) { const i = s.indexOf('萬'); r += (i > 0 ? _cnToNum(s.substring(0, i)) : 1) * 10000; s = s.substring(i + 1); }
            if (s.includes('千')) { const i = s.indexOf('千'); r += (i > 0 ? _cnToNum(s.substring(0, i)) : 1) * 1000; s = s.substring(i + 1); }
            if (s.includes('百')) { const i = s.indexOf('百'); const b = s.substring(0, i); r += (b && m[b] !== undefined ? m[b] : 1) * 100; s = s.substring(i + 1); }
            if (s.includes('十')) { const i = s.indexOf('十'); const b = s.substring(0, i); r += (b && m[b] !== undefined ? m[b] : 1) * 10; s = s.substring(i + 1); }
            for (let i = 0; i < s.length; i++) { if (m[s[i]] !== undefined) r += m[s[i]]; }
            return r;
        }

        function _convertUnits(text) {
            const unitMap = [
                ['平方公尺', 'm²'], ['立方公尺', 'm³'], ['平方公分', 'cm²'],
                ['公尺', 'm'], ['公分', 'cm'], ['毫米', 'mm'],
                ['公斤', 'kg'], ['公升', 'L'], ['公里', 'km']
            ];
            const cnNum = '[零一二三四五六七八九十百千萬點]+';
            for (const [cn, abbr] of unitMap) {
                const re = new RegExp('(' + cnNum + ')' + cn, 'g');
                text = text.replace(re, function(_, numStr) {
                    try {
                        const n = _cnToNum(numStr);
                        const formatted = Number.isInteger(n) ? String(n) : String(parseFloat(n.toFixed(4)));
                        return formatted + abbr;
                    } catch(e) { return _; }
                });
            }
            return text;
        }

        function _formatLawContent(raw) {
            const listRe = /^[一二三四五六七八九十]+、/;
            const subRe = /^（[一二三四五六七八九十]+）/;
            const tableRe = /^[│┌├└┬┼┴─┐┤┘]/;
            const paraStartRe = /^(前項|前二|前三|但書|本標準|第[一二三四五六七八九十\d])/;
            // Step 1: 修正假段落分隔（PDF 在句中產生的 \n\n）
            const parts = raw.split('\n\n');
            const merged = [parts[0]];
            for (let i = 1; i < parts.length; i++) {
                const before = merged[merged.length - 1].trimEnd();
                const after = parts[i].trimStart();
                if (!before || !after) { merged.push(parts[i]); continue; }
                const lastCh = before[before.length - 1];
                let isReal = false;
                if ('。：'.includes(lastCh)) isReal = true;
                else if (tableRe.test(after) || '│┤┘─'.includes(lastCh)) isReal = true;
                else if (listRe.test(after) || subRe.test(after)) isReal = true;
                else if (paraStartRe.test(after)) isReal = true;
                if (isReal) merged.push(parts[i]);
                else merged[merged.length - 1] += '\n' + parts[i];
            }
            // Step 2: 段落內合併 PDF 斷行，保留列舉項目換行
            const formatted = merged.map(para => {
                const lines = para.split('\n');
                if (lines.length <= 1) return para.trim();
                let result = lines[0].trim();
                for (let j = 1; j < lines.length; j++) {
                    const t = lines[j].trim();
                    if (!t) continue;
                    if (listRe.test(t) || subRe.test(t) || tableRe.test(t)) result += '\n' + t;
                    else result += t;
                }
                return result;
            }).join('\n\n');
            return _convertUnits(formatted);
        }

        function _resetLawView() {
            document.getElementById('lawSearchBar').value = '';
            _lawDefaultCollapsed = true;
            _renderLawList();
            _lawDefaultCollapsed = false;
            document.getElementById('lawTocArea').scrollTop = 0;
        }

        function _getLawSectionStyle(title) {
            if (title.includes('編')) return { bg:'#1a1a2e', color:'#bb99ff', fontSize:'14px', paddingLeft:'14px' };
            if (title.includes('章')) return { bg:'#1a2a1a', color:'#88cc88', fontSize:'13px', paddingLeft:'28px' };
            return { bg:'#1a2a2a', color:'#77bbcc', fontSize:'12px', paddingLeft:'42px' };
        }

        function _renderLawList() {
            const area = document.getElementById('lawTocArea');
            const keyword = (document.getElementById('lawSearchBar').value || '').trim().toLowerCase();
            area.innerHTML = '';

            if (keyword) {
                const tokens = keyword.split(/\s+/).filter(t => t.length > 0);
                let count = 0;
                _LAW_DATA.forEach(entry => {
                    if (entry[0] !== 1) return;
                    const artId = entry[1];
                    const content = entry[2];
                    const artLabel = '第 ' + artId + ' 條';
                    const searchText = (artLabel + ' ' + content).toLowerCase();
                    if (!tokens.every(t => searchText.includes(t))) return;
                    count++;
                    _buildArticleRow(area, artId, content);
                });
                if (count === 0) {
                    area.innerHTML = '<p style="text-align:center; color:#888; padding:24px; font-size:13px;">無符合的條文。</p>';
                }
                area.scrollTop = 0;
            } else {
                let currentArticles = null;
                const collapsed = _lawDefaultCollapsed;

                _LAW_DATA.forEach(entry => {
                    if (entry[0] === 0) {
                        const sty = _getLawSectionStyle(entry[1]);

                        const sec = document.createElement('div');
                        sec.style.cssText = 'padding:10px 14px; padding-left:' + sty.paddingLeft + '; background:' + sty.bg + '; border-bottom:1px solid #333; cursor:pointer; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:2;';

                        const secLabel = document.createElement('span');
                        secLabel.style.cssText = 'font-size:' + sty.fontSize + '; font-weight:bold; color:' + sty.color + ';';
                        secLabel.textContent = entry[1];

                        const secArrow = document.createElement('span');
                        secArrow.style.cssText = 'font-size:11px; color:#666; flex-shrink:0;';
                        secArrow.textContent = collapsed ? '▸ 展開' : '▾ 收合';

                        sec.appendChild(secLabel);
                        sec.appendChild(secArrow);

                        const artContainer = document.createElement('div');
                        artContainer.style.cssText = collapsed ? 'display:none;' : 'display:block;';
                        currentArticles = artContainer;

                        sec.onclick = function() {
                            const isOpen = artContainer.style.display !== 'none';
                            artContainer.style.display = isOpen ? 'none' : 'block';
                            secArrow.textContent = isOpen ? '▸ 展開' : '▾ 收合';
                        };

                        area.appendChild(sec);
                        area.appendChild(artContainer);
                    } else if (entry[0] === 1 && currentArticles) {
                        _buildArticleRow(currentArticles, entry[1], entry[2]);
                    }
                });
            }
        }

        function _buildArticleRow(container, artId, content) {
            const row = document.createElement('div');
            row.style.cssText = 'border-bottom:1px solid #2a2a2a; padding:10px 14px;';

            const label = document.createElement('div');
            label.style.cssText = 'font-size:14px; font-weight:700; color:#ffffff; margin-bottom:6px;';
            label.textContent = '第 ' + artId + ' 條';

            const body = document.createElement('div');
            body.style.cssText = 'font-size:13px; color:#cccccc; line-height:1.9; white-space:pre-wrap; word-break:break-all; -webkit-user-select:text; user-select:text;';

            row.appendChild(label);
            row.appendChild(body);
            container.appendChild(row);
        }


        // ================= 工程進度 =================
        let _wpEditingId = null;
        let _wpCurrentSiteId = null;

        function openWorkProgressModal() {
            _openModalAlignedToCalendar('workProgressModal', 'workProgressModalInner');
            const firstId = db.sites.length > 0 ? db.sites[0].id : '';
            _renderSitePills('wpSiteSelect', firstId, function(siteId) {
                renderWorkProgressList();
            });
            renderWorkProgressList();
        }

        function closeWorkProgressModal() {
            document.querySelectorAll('.home-seg').forEach(s => s.classList.remove('active-seg'));
            document.getElementById('workProgressModal').style.display = 'none';
        }

        function renderWorkProgressList() {
            const siteId = (document.getElementById('wpSiteSelect') || {}).dataset?.siteId || '';
            _wpCurrentSiteId = siteId;
            const container = document.getElementById('wpList');
            container.innerHTML = '';
            const overallWrap = document.getElementById('wpOverallWrap');

            if (!siteId) { overallWrap.style.display = 'none'; return; }

            const rawItems = (db.workProgress[siteId] || []);

            if (rawItems.length === 0) {
                overallWrap.style.display = 'none';
                container.innerHTML = '<div style="text-align:center; color:#888; font-size:13px; padding:16px 0;">尚無工項，請點上方「＋ 新增」</div>';
                return;
            }

            // 計算某工項的總施工人數
            function calcTotalPeople(wpLabel) {
                let total = 0;
                for (const dateStr in db.dailyRecords) {
                    const rec = db.dailyRecords[dateStr];
                    if (!rec || !rec.log) continue;
                    const arr = Array.isArray(rec.log) ? rec.log : [rec.log];
                    arr.forEach(function(logEntry) {
                        if (!logEntry || logEntry.siteId !== siteId || !logEntry.text) return;
                        const lines = logEntry.text.split('\n');
                        let inBlock = false;
                        lines.forEach(function(line) {
                            const mItem = line.match(/^● (.+)$/);
                            if (mItem) { inBlock = (mItem[1].trim() === wpLabel); return; }
                            if (inBlock) {
                                const mPeople = line.match(/^↳ 人數：(\d+)\s*人/);
                                if (mPeople) total += parseInt(mPeople[1], 10);
                            }
                        });
                    });
                }
                return total;
            }

            // 總進度 & 總人數
            const totalPct = Math.round(rawItems.reduce((sum, it) => sum + (it.progress || 0), 0) / rawItems.length);
            let grandTotalPeople = 0;
            rawItems.forEach(function(item) {
                grandTotalPeople += calcTotalPeople(((item.floor || '') + (item.task || '')).trim());
            });

            overallWrap.style.display = 'flex';
            document.getElementById('wpOverallLabel').textContent = totalPct + '%';
            document.getElementById('wpOverallFill').style.width = totalPct + '%';
            const overallPeopleEl = document.getElementById('wpOverallPeople');
            if (grandTotalPeople > 0) {
                overallPeopleEl.textContent = grandTotalPeople + ' 人';
                overallPeopleEl.style.display = 'inline';
            } else {
                overallPeopleEl.style.display = 'none';
            }

            // 排序：按樓層分組，組內 100% 沉底，其餘保持原序
            const indexed = rawItems.map((item, idx) => ({ item, idx }));
            indexed.sort((a, b) => {
                const aFloor = a.item.floor || '';
                const bFloor = b.item.floor || '';
                if (aFloor !== bFloor) return aFloor < bFloor ? -1 : 1;
                const aDone = (a.item.progress || 0) >= 100 ? 1 : 0;
                const bDone = (b.item.progress || 0) >= 100 ? 1 : 0;
                return aDone - bDone || a.idx - b.idx;
            });

            // 外層貼合容器（仿計價進度表樣式）
            const listCard = document.createElement('div');
            listCard.style.cssText = 'background:#1e1e1e; border:1px solid #444; border-radius:12px; overflow:hidden; display:flex; flex-direction:column;';

            // 維護各 floor 的收起狀態（跨 render 保留）
            if (!window._wpFloorCollapsed) window._wpFloorCollapsed = {};

            // ── 第一遍：把排序後的項目分成群組 ──
            const groups = [];
            indexed.forEach(function(entry) {
                const fk = entry.item.floor || '';
                if (!groups.length || groups[groups.length - 1].floorKey !== fk) {
                    groups.push({ floorKey: fk, items: [] });
                }
                groups[groups.length - 1].items.push(entry);
            });

            // ── 第二遍：建 DOM ──
            let domRowCount = 0;

            groups.forEach(function(group) {
                const floorKey = group.floorKey;
                const collapseKey = siteId + '|' + floorKey;
                const collapsed = !!window._wpFloorCollapsed[collapseKey];

                // 樓層平均進度
                const floorAvgPct = Math.round(
                    group.items.reduce(function(s, e) { return s + (e.item.progress || 0); }, 0) / group.items.length
                );

                // ── floor header（只有有 floor 的群組才顯示）──
                if (floorKey) {
                    const header = document.createElement('div');
                    let hCss = 'padding:6px 14px 6px; display:flex; align-items:center; gap:6px; background:#252525; cursor:pointer;';
                    if (domRowCount > 0) hCss += ' border-top:1px solid #444;';
                    header.style.cssText = hCss;

                    const hSpan = document.createElement('span');
                    hSpan.style.cssText = 'font-size:12px; font-weight:700; color:#06C755; letter-spacing:0.04em; flex:1; min-width:0;';
                    hSpan.textContent = floorKey;
                    header.appendChild(hSpan);

                    // 樓層平均進度%
                    const pctSpan = document.createElement('span');
                    pctSpan.style.cssText = 'font-size:12px; font-weight:700; color:#06C755; white-space:nowrap;';
                    pctSpan.textContent = floorAvgPct + '%';
                    header.appendChild(pctSpan);

                    // 收起/展開按鈕（IIFE capture collapseKey）
                    const btn = document.createElement('button');
                    btn.style.cssText = 'background:none; border:none; color:#888; font-size:12px; padding:2px 6px; cursor:pointer; flex-shrink:0; line-height:1;';
                    btn.textContent = collapsed ? '\u25b6' : '\u25bc';
                    (function(key) {
                        var toggle = function(e) {
                            e.stopPropagation();
                            window._wpFloorCollapsed[key] = !window._wpFloorCollapsed[key];
                            renderWorkProgressList();
                        };
                        btn.addEventListener('click', toggle);
                        header.addEventListener('click', function(e) {
                            if (e.target === btn) return;
                            window._wpFloorCollapsed[key] = !window._wpFloorCollapsed[key];
                            renderWorkProgressList();
                        });
                    }(collapseKey));

                    header.appendChild(btn);
                    listCard.appendChild(header);
                    domRowCount++;
                }

                // ── 各工項卡片 ──
                group.items.forEach(function(entry) {
                    var item = entry.item;
                    var idx = entry.idx;
                    var pct = item.progress || 0;
                    var isDone = pct >= 100;
                    var wpLabel = ((item.floor || '') + (item.task || '')).trim();
                    var totalPeople = calcTotalPeople(wpLabel);

                    var card = document.createElement('div');
                    var cardCss = 'padding:11px 14px; display:flex; flex-direction:column; gap:7px; cursor:pointer;';
                    if (domRowCount > 0) cardCss += ' border-top:1px solid #333;';
                    if (isDone) cardCss += ' opacity:0.55; background:#1a1a1a;';
                    if (floorKey && collapsed) card.style.display = 'none';
                    card.style.cssText = cardCss;
                    if (floorKey && collapsed) card.style.display = 'none';
                    (function(i) { card.addEventListener('click', function() { openEditWorkProgressForm(siteId, i); }); }(idx));

                    var topRow = document.createElement('div');
                    topRow.style.cssText = 'display:flex; justify-content:space-between; align-items:center; gap:8px;';

                    var titleWrap = document.createElement('div');
                    titleWrap.style.cssText = 'display:flex; align-items:baseline; gap:5px; flex:1; min-width:0; overflow:hidden;';

                    var taskSpan = document.createElement('span');
                    taskSpan.style.cssText = 'font-size:15px; font-weight:700; color:#ffffff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;';
                    taskSpan.textContent = item.task || '\u2014';
                    titleWrap.appendChild(taskSpan);

                    var metaWrap = document.createElement('div');
                    metaWrap.style.cssText = 'display:flex; align-items:center; gap:6px; flex-shrink:0;';

                    var metaParts = [];
                    if (item.vendor) {
                        var sv = document.createElement('span');
                        sv.style.cssText = 'font-size:12px; color:#888888; white-space:nowrap;';
                        sv.textContent = item.vendor;
                        metaParts.push(sv);
                    }
                    if (totalPeople > 0) {
                        var sp = document.createElement('span');
                        sp.style.cssText = 'font-size:12px; color:#aaaaaa; white-space:nowrap;';
                        sp.textContent = totalPeople + ' \u4eba';
                        metaParts.push(sp);
                    }
                    metaParts.forEach(function(part, pi) {
                        if (pi > 0) {
                            var dot = document.createElement('span');
                            dot.style.cssText = 'font-size:11px; color:#555;';
                            dot.textContent = '\u00b7';
                            metaWrap.appendChild(dot);
                        }
                        metaWrap.appendChild(part);
                    });
                    if (metaParts.length > 0) {
                        var dot2 = document.createElement('span');
                        dot2.style.cssText = 'font-size:11px; color:#555;';
                        dot2.textContent = '\u00b7';
                        metaWrap.appendChild(dot2);
                    }
                    var pctLabel = document.createElement('span');
                    pctLabel.style.cssText = 'font-size:14px; font-weight:700; color:' + (isDone ? '#888' : '#7ec8e3') + '; white-space:nowrap;';
                    pctLabel.textContent = pct + '%';
                    metaWrap.appendChild(pctLabel);

                    topRow.appendChild(titleWrap);
                    topRow.appendChild(metaWrap);

                    var barWrap = document.createElement('div');
                    barWrap.style.cssText = 'position:relative; height:8px; background:#2a2a2a; border-radius:4px; overflow:hidden;';
                    var fill = document.createElement('div');
                    fill.style.cssText = 'height:100%; width:' + pct + '%; background:' + (isDone ? '#444' : 'linear-gradient(90deg,#4ab3d0,#7ec8e3)') + '; border-radius:4px; transition:width 0.3s;';
                    barWrap.appendChild(fill);
                    for (var t = 1; t < 10; t++) {
                        var tick = document.createElement('div');
                        tick.style.cssText = 'position:absolute; top:0; bottom:0; left:' + (t * 10) + '%; width:1px; background:rgba(0,0,0,0.18);';
                        barWrap.appendChild(tick);
                    }

                    card.appendChild(topRow);
                    card.appendChild(barWrap);
                    listCard.appendChild(card);
                    domRowCount++;
                });
            });

            container.appendChild(listCard);
        }

        function _buildWpStepBtns(currentPct) {
            _setWpProgressFill(currentPct);
            document.getElementById('wpProgressLabel').textContent = currentPct + '%';
        }

        function _setWpProgress(val) {
            document.getElementById('wpProgressLabel').textContent = val + '%';
            _setWpProgressFill(val);
        }

        function _setWpProgressFill(pct) {
            document.getElementById('wpProgressFill').style.width = pct + '%';
        }

        function _getWpProgressValue() {
            const label = document.getElementById('wpProgressLabel').textContent;
            return parseInt(label) || 0;
        }

        let _wpIsEditMode = false;
        let _wpEditSnapshot = null;

        function _wpSnapshot() {
            return [
                document.getElementById('wpInputTask') ? document.getElementById('wpInputTask').value : '',
                document.getElementById('wpInputFloor') ? document.getElementById('wpInputFloor').value : '',
                document.getElementById('wpVendorSelect') ? document.getElementById('wpVendorSelect').value : '',
                document.getElementById('wpProgressLabel') ? document.getElementById('wpProgressLabel').textContent : ''
            ].join('|');
        }

        function _refreshWpHistoryDatalist() {
            const siteId = _wpCurrentSiteId || '';
            const tasks = new Set();
            const floors = new Set();
            ((db.workProgress || {})[siteId] || []).forEach(function(wp) {
                if (wp.task && wp.task.trim()) tasks.add(wp.task.trim());
                if (wp.floor && wp.floor.trim()) floors.add(wp.floor.trim());
            });
            const dlTask = document.getElementById('wpTaskHistory');
            if (dlTask) dlTask.innerHTML = Array.from(tasks).map(function(t) { return '<option value="' + t.replace(/"/g, '&quot;') + '">'; }).join('');
            const dlFloor = document.getElementById('wpFloorHistory');
            if (dlFloor) dlFloor.innerHTML = Array.from(floors).map(function(f) { return '<option value="' + f.replace(/"/g, '&quot;') + '">'; }).join('');
        }
        function _wpPopulateVendorSelect(selectedValue) {
            const sel = document.getElementById('wpVendorSelect');
            if (!sel) return;
            // 只顯示案場資訊指定的施工廠商；若該案場無指定則顯示全部
            const siteId = _wpCurrentSiteId || '';
            const siteVendors = (db.siteInfo && db.siteInfo[siteId] && Array.isArray(db.siteInfo[siteId].vendors) && db.siteInfo[siteId].vendors.length > 0)
                ? db.siteInfo[siteId].vendors
                : (db.vendors || []);
            sel.innerHTML = '<option value="">\u2014 \u9078\u64c7\u65bd\u5de5\u5ee0\u5546 \u2014</option>';
            siteVendors.forEach(function(v) {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                if (v === selectedValue) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        function _wpSetInputsDisabled(disabled) {
            ['wpInputTask','wpInputFloor'].forEach(function(id) {
                const el = document.getElementById(id);
                if (!el) return;
                el.disabled = disabled;
                el.style.color = disabled ? '#888888' : '#ffffff';
                el.style.background = disabled ? '#1e1e1e' : '#2a2a2a';
                el.style.borderColor = disabled ? '#333333' : '#555555';
                el.style.webkitUserSelect = disabled ? 'none' : 'text';
                el.style.userSelect = disabled ? 'none' : 'text';
            });
            const vsel = document.getElementById('wpVendorSelect');
            if (vsel) {
                vsel.disabled = disabled;
                vsel.style.background = disabled ? '#1e1e1e' : '#2a2a2a';
                vsel.style.color = disabled ? '#888888' : '#ffffff';
                vsel.style.borderColor = disabled ? '#333333' : '#555555';
            }
        }

        function _wpEnterEditMode() {
            _wpIsEditMode = true;
            _wpSetInputsDisabled(false);
            document.getElementById('btnWpFormEdit').style.display = 'none';
            document.getElementById('btnWpFormSave').style.display = '';
            document.getElementById('btnWpFormDelete').style.display = _wpEditingId !== null ? '' : 'none';
            _wpEditSnapshot = _wpSnapshot();
        }


        function _wpFormModalBgClick(e) {
            if (e.target !== e.currentTarget) return;
            if (_wpIsEditMode) {
                const current = _wpSnapshot();
                if (_wpEditSnapshot !== null && current !== _wpEditSnapshot) {
                    if (!confirm('尚未儲存，是否要離開？')) return;
                }
                closeWpFormModal();
            } else if (_wpEditingId !== null) {
                _wpSaveProgressOnly();
            } else {
                closeWpFormModal();
            }
        }

        // 唯讀模式下只儲存進度條，不驗證文字欄
        function _wpSaveProgressOnly() {
            const siteId = _wpCurrentSiteId;
            if (!siteId || _wpEditingId === null) { closeWpFormModal(); return; }
            const progress = _getWpProgressValue();
            if (!db.workProgress[siteId] || !db.workProgress[siteId][_wpEditingId]) { closeWpFormModal(); return; }
            const changed = db.workProgress[siteId][_wpEditingId].progress !== progress;
            db.workProgress[siteId][_wpEditingId].progress = progress;
            if (changed) {
                saveToLocalStorage();
                closeWpFormModal();
                renderWorkProgressList();
                showToast('儲存成功');
            } else {
                closeWpFormModal();
            }
        }

        function openAddWorkProgressForm() {
            _wpEditingId = null;
            _wpIsEditMode = true;
            document.getElementById('wpFormTitle').textContent = '新增工項進度';
            document.getElementById('wpInputTask').value = '';
            document.getElementById('wpInputFloor').value = '';
            _wpPopulateVendorSelect('');
            _refreshWpHistoryDatalist();
            _wpSetInputsDisabled(false);
            document.getElementById('btnWpFormEdit').style.display = 'none';
            document.getElementById('btnWpFormSave').style.display = '';
            document.getElementById('btnWpFormDelete').style.display = 'none';
            _buildWpStepBtns(0);
            document.getElementById('wpFormModal').style.display = 'flex';
            _wpEditSnapshot = _wpSnapshot();
        }

        function openEditWorkProgressForm(siteId, idx) {
            const item = (db.workProgress[siteId] || [])[idx];
            if (!item) return;
            _wpEditingId = idx;
            _wpIsEditMode = false;
            document.getElementById('wpFormTitle').textContent = (item.floor ? item.floor + ' ' : '') + (item.task || '工項進度');
            document.getElementById('wpInputTask').value = item.task || '';
            document.getElementById('wpInputFloor').value = item.floor || '';
            _wpPopulateVendorSelect(item.vendor || '');
            _wpSetInputsDisabled(true);
            document.getElementById('btnWpFormEdit').style.display = '';
            document.getElementById('btnWpFormSave').style.display = 'none';
            document.getElementById('btnWpFormDelete').style.display = 'none';
            _buildWpStepBtns(item.progress || 0);
            document.getElementById('wpFormModal').style.display = 'flex';
        }

        function closeWpFormModal() {
            document.getElementById('wpFormModal').style.display = 'none';
            _wpEditSnapshot = null;
        }

        function saveWorkProgressItem() {
            const siteId = _wpCurrentSiteId;
            if (!siteId) { alert('請先選擇案場'); return; }
            const task = document.getElementById('wpInputTask').value.trim();
            if (!task) { alert('請輸入工項名稱'); return; }
            const floor = document.getElementById('wpInputFloor').value.trim();
            const vsel = document.getElementById('wpVendorSelect');
            const vendor = vsel ? vsel.value : '';
            const progress = _getWpProgressValue();
            if (!db.workProgress[siteId]) db.workProgress[siteId] = [];
            const entry = { task, floor, vendor, progress };
            if (_wpEditingId === null) {
                db.workProgress[siteId].push(entry);
            } else {
                db.workProgress[siteId][_wpEditingId] = entry;
            }
            saveToLocalStorage();
            closeWpFormModal();
            renderWorkProgressList();
            showToast('儲存成功');
        }

        function deleteWorkProgressItem() {
            const siteId = _wpCurrentSiteId;
            if (!siteId || _wpEditingId === null) return;
            if (!confirm('確定要刪除此工項進度？')) return;
            db.workProgress[siteId].splice(_wpEditingId, 1);
            saveToLocalStorage();
            closeWpFormModal();
            renderWorkProgressList();
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.home-seg').forEach(seg => {
                seg.addEventListener('touchstart', () => {
                    document.querySelectorAll('.home-seg').forEach(s => s.classList.remove('active-seg'));
                    seg.classList.add('active-seg');
                }, { passive: true });
                seg.addEventListener('mousedown', () => {
                    document.querySelectorAll('.home-seg').forEach(s => s.classList.remove('active-seg'));
                    seg.classList.add('active-seg');
                });
            });
            loadFromLocalStorage();
            navigateTo('sites');
            _refreshLastExportDisplay();

            try {
                const savedDate = sessionStorage.getItem('_orderSavedDate');
                if (savedDate) {
                    sessionStorage.removeItem('_orderSavedDate');
                    setTimeout(() => alert(savedDate + ' 訂單已儲存'), 300);
                }
            } catch(e) {}

            ['inputPunchDate', 'inputOrderDate', 'addLogDate', 'editLogDate'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('change', function() {
                    if (!this.value) {
                        this.value = getTargetDateStr();
                        if (id === 'inputPunchDate') syncPunchDateChange();
                    }
                });
            });

            const todayStr = getTargetDateStr();
            selectedHomeDateStr = todayStr;
            const todayEl = document.querySelector('.calendar-day.today');
            if (todayEl) todayEl.classList.add('selected');
            showInlineDayView(todayStr);
            updateHomeImportBtn();

            // 工程進度滑桿：拖動並吸附至10格
            (function() {
                const track = document.getElementById('wpProgressTrack');
                if (!track) return;
                let dragging = false;
                function _pctFromEvent(e) {
                    const rect = track.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    let ratio = (clientX - rect.left) / rect.width;
                    ratio = Math.max(0, Math.min(1, ratio));
                    return Math.round(ratio * 10) * 10;
                }
                track.addEventListener('pointerdown', function(e) {
                    dragging = true;
                    if (track.setPointerCapture) track.setPointerCapture(e.pointerId);
                    _setWpProgress(_pctFromEvent(e));
                    e.preventDefault();
                }, { passive: false });
                track.addEventListener('pointermove', function(e) {
                    if (!dragging) return;
                    _setWpProgress(_pctFromEvent(e));
                    e.preventDefault();
                }, { passive: false });
                track.addEventListener('pointerup', function() { dragging = false; });
                track.addEventListener('pointercancel', function() { dragging = false; });
                track.addEventListener('touchstart', function(e) {
                    _setWpProgress(_pctFromEvent(e));
                    e.preventDefault();
                }, { passive: false });
                track.addEventListener('touchmove', function(e) {
                    _setWpProgress(_pctFromEvent(e));
                    e.preventDefault();
                }, { passive: false });
            })();
        });
    </script>
