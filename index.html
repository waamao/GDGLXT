n七十一條第五款及第六款規定。\n\n前項第八款之撒水頭，其迴水板與天花板或樓板之距離超過三十公分時，依下列規定設置防護板：\n一、防護板應使用金屬材料，且直徑在三十公分以上。\n\n二、防護板與迴水板之距離，在三十公分以下。"],[1,"48","密閉式撒水頭，應就裝置場所平時最高周圍溫度，依下表選擇一定標示溫度之撒水頭。\n┌─────────────┬────────────────┐\n│最高周圍溫度\n\n│標示溫度\n\n│\n\n├─────────────┼────────────────┤\n│三十九度未滿\n\n│七十五度未滿\n\n│\n\n├─────────────┼────────────────┤\n│三十九度以上六十四度未滿\n\n│七十五度以上一百二十一度未滿\n\n│\n\n├─────────────┼────────────────┤\n│六十四度以上一百零六度未滿│一百二十一度以上一百六十二度未滿│\n├─────────────┼────────────────┤\n│一百零六度以上\n\n│一百六十二度以上\n\n│\n\n└─────────────┴────────────────┘"],[1,"49","下列處所得免裝撒水頭：\n一、洗手間、浴室或廁所。\n二、室內安全梯間、特別安全梯間或緊急昇降機間之排煙室。\n三、防火構造之昇降機昇降路或管道間。\n四、昇降機機械室或通風換氣設備機械室。\n五、電信機械室或電腦室。\n六、發電機、變壓器等電氣設備室。\n七、外氣流通無法有效探測火災之走廊。\n八、手術室、產房、Ｘ光（放射線）室、加護病房或麻醉室等其他類似處所。\n九、第十二條第一款第一目所列場所及第二目之集會堂使用之觀眾席，設有固定座椅部分，且撒\n水頭裝置面高度在八公尺以上者。\n十、室內游泳池之水面或溜冰場之冰面上方。\n十一、主要構造為防火構造，且開口設有具一小時以上防火時效之防火門之金庫。\n十二、儲存鋁粉、碳化鈣、磷化鈣、鈉、生石灰、鎂粉、鉀、過氧化鈉等禁水性物質或其他遇水\n時將發生危險之化學品倉庫或房間。\n十三、第十七條第一項第五款之建築物（地下層、無開口樓層及第十一層以上之樓層除外）中，\n供第十二條第二款至第四款所列場所使用，與其他部分間以具一小時以上防火時效之牆壁、\n樓地板區劃分隔，並符合下列規定者：\n\n（一）區劃分隔之牆壁及樓地板開口面積合計在八平方公尺以下，且任一開口面積在四平方公尺以\n下。\n（二）前目開口部設具一小時以上防火時效之防火門窗等防火設備，且開口部與走廊、樓梯間不得\n使用防火鐵捲門。但開口面積在四平方公尺以下，且該區劃分隔部分能二方向避難者，得使\n用具半小時以上防火時效之防火門窗等防火設備。\n十四、第十七條第一項第四款之建築物（地下層、無開口樓層及第十一層以上之樓層除外）中，\n供第十二條第二款至第四款所列場所使用，與其他部分間以具一小時以上防火時效之牆壁、\n樓地板區劃分隔，並符合下列規定者：\n（一）區劃分隔部分，樓地板面積在二百平方公尺以下。\n（二）內部裝修符合建築技術規則建築設計施工編第八十八條規定。\n（三）開口部設具一小時以上防火時效之防火門窗等防火設備，且開口部與走廊、樓梯間不得使用\n防火鐵捲門。但開口面積在四平方公尺以下，且該區劃分隔部分能二方向避難者，得使用具\n半小時以上防火時效之防火門窗等防火設備。\n十五、其他經中央主管機關指定之場所。"],[1,"50","撒水頭之放水量，每分鐘應在八十公升（設於高架倉庫者，應為一百十四公升）以上，且放水壓\n力應在每平方公分一公斤以上或 0.1Mpa 以上。但小區劃型撒水頭之放水量，每分鐘應在五十公升\n以上。\n\n放水型撒水頭之放水量，應達防護區域每平方公尺每分鐘五公升以上。但儲存可燃物場所，應達\n每平方公尺每分鐘十公升以上。"],[1,"51","自動撒水設備應裝置適當之流水檢知裝置，並符合下列規定：\n一、各樓層之樓地板面積在三千平方公尺以下者，裝設一套，超過三千平方公尺者，裝設二套。\n但上下二層，各層撒水頭數量在十個以下，且設有火警自動警報設備者，得二層共用。\n二、無隔間之樓層內，前款三千平方公尺得增為一萬平方公尺。\n三、撒水頭或一齊開放閥開啟放水時，即發出警報。\n四、附設制水閥，其高度距離樓地板面在一點五公尺以下零點八公尺以上，並於制水閥附近明顯\n易見處，設置標明制水閥字樣之標識。"],[1,"52","開放式自動撒水設備之自動及手動啟動裝置，依下列規定設置。但受信總機設在平時有人處，且\n火災時，能立即操作啟動裝置者，得免設自動啟動裝置：\n一、自動啟動裝置，應符合下列規定：\n（一）感知撒水頭或探測器動作後，能啟動一齊開放閥及加壓送水裝置。\n（二）感知撒水頭使用標示溫度在七十九度以下者，且每二十平方公尺設置一個；探測器使用定\n\n溫式一種或二種，並依第一百二十條規定設置，每一放水區域至少一個。\n（三）感知撒水頭設在裝置面距樓地板面高度五公尺以下，且能有效探測火災處。\n二、手動啟動裝置，應符合下列規定：\n（一）每一放水區域設置一個手動啟動開關，其高度距樓地板面在零點八公尺以上一點五公尺以\n下，並標明手動啟動開關字樣。\n（二）手動啟動開關動作後，能啟動一齊開放閥及加壓送水裝置。"],[1,"53","開放式自動撒水設備之一齊開放閥應依下列規定設置：\n一、每一放水區域設置一個。\n二、一齊開放閥二次側配管裝設試驗用裝置，在該放水區域不放水情形下，能測試一齊開放閥之\n動作。\n三、一齊開放閥所承受之壓力，在其最高使用壓力以下。"],[1,"54","開放式自動撒水設備之放水區域，依下列規定：\n一、每一舞臺之放水區域在四個以下。\n二、放水區域在二個以上時，每一放水區域樓地板面積在一百平方公尺以上，且鄰接之放水區域\n相互重疊，使有效滅火。"],[1,"55","密閉乾式或預動式自動撒水設備，依下列規定設置：\n一、密閉乾式或預動式流水檢知裝置二次側之加壓空氣，其空氣壓縮機為專用，並能在三十分鐘\n內，加壓達流水檢知裝置二次側配管之設定壓力值。\n二、流水檢知裝置二次側之減壓警報設於平時有人處。\n三、撒水頭動作後，流水檢知裝置應在一分鐘內，使撒水頭放水。\n四、撒水頭使用向上型。但配管能採取有效措施者，不在此限。"],[1,"56","使用密閉式撒水頭之自動撒水設備末端之查驗閥，依下列規定配置：\n一、管徑在二十五毫米以上。\n二、查驗閥依各流水檢知裝置配管系統配置，並接裝在建築物各層放水壓力最低之最遠支管末端。\n三、查驗閥之一次側設壓力表，二次側設有與撒水頭同等放水性能之限流孔。\n四、距離地板面之高度在二點一公尺以下，並附有排水管裝置，並標明末端查驗閥字樣。"],[1,"57","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n\n自動撒水設備之水源容量，依下列規定設置：\n\n一、使用密閉式一般反應型、快速反應型撒水頭時，應符合下表規定數量繼續放水二十分鐘之水\n量。但各類場所實設撒水頭數量，較應設水源容量之撒水頭數量少時，其水源容量得依實際\n撒水頭數量計算之。\n二、使用開放式撒水頭時，應符合下列規定：\n（一）供第十二條第一款第一目使用場所及第二目集會堂之舞臺，在十層以下建築物之樓層時，\n應在最大放水區域全部撒水頭，繼續放水二十分鐘之水量以上。\n（二）供第十二條第一款第一目使用場所及第二目集會堂之舞臺，在十一層以上建築物之樓層，\n應在最大樓層全部撒水頭，繼續放水二十分鐘之水量以上。\n三、使用側壁型或小區劃型撒水頭時，十層以下樓層在八個撒水頭、十一層以上樓層在十二個撒\n水頭繼續放水二十分鐘之水量以上。\n四、使用放水型撒水頭時，採固定式者應在最大放水區域全部撒水頭、採可動式者應在最大放水\n量撒水頭，繼續放射二十分鐘之水量以上。\n\n前項撒水頭數量之規定，在使用乾式或預動式流水檢知裝置時，應追加百分之五十。\n\n免設撒水頭處所，除第四十九條第七款及第十二款外，得設置補助撒水栓，並應符合下列規定：\n一、各層任一點至水帶接頭之水平距離在十五公尺以下。但設有自動撒水設備撒水頭之部分，不\n在此限。\n二、設有補助撒水栓之任一層，以同時使用該層所有補助撒水栓時，各瞄子放水壓力在每平方公\n分二點五公斤以上或 0.25MPa\n\n以上，放水量在每分鐘六十公升以上。但全部補助撒水栓數\n\n量超過二支時（鄰接補助撒水栓水帶接頭之水平距離超過三十公尺時，為一個）\n，以同時使用\n二支計算之。\n三、補助撒水栓箱表面標示補助撒水栓字樣，箱體上方設置紅色啟動表示燈。\n四、瞄子具有容易開關之裝置。\n五、開關閥設在距地板面一點五公尺以下。\n六、水帶能便於操作延伸。\n七、配管從各層流水檢知裝置二次側配置。"],[1,"58","依前條設置之水源應連結加壓送水裝置，並依下列各款擇一設置：\n一、重力水箱，應符合下列規定：\n（一）有水位計、排水管、溢水用排水管、補給水管及人孔之裝置。\n（二）水箱必要落差在下列計算值以上：必要落差＝配管摩擦損失水頭＋10（計算單位：公尺）H\n＝h1＋10m\n二、壓力水箱，應符合下列規定：\n（一）有壓力表、水位計、排水管、補給水管、給氣管、空氣壓縮機及人孔之裝置。\n（二）水箱內空氣占水箱容積之三分之一以上，壓力在使用建築物最高處之撒水頭維持規定放水\n水壓所需壓力以上。當水箱內壓力及液面減低時，能自動補充加壓。空氣壓縮機及加壓幫\n\n浦與緊急電源相連接。\n（三）水箱必要壓力在下列計算值以上：必要壓力＝配管摩擦損失水頭＋落差＋1（計算單位：公\n斤／平方公分）P＝P1＋P2＋1 kgf／c㎡\n三、消防幫浦，應符合下列規定：\n（一）幫浦出水量，依前條規定核算之撒水頭數量，乘以每分鐘九十公升（設於高架儲存倉庫者，\n為一百三十公升）\n。但使用小區劃型撒水頭者，應乘以每分鐘六十公升。另放水型撒水頭依\n中央消防機關認可者計算之。\n（二）幫浦全揚程在下列計算值以上：幫浦全揚程＝配管摩擦損失水頭＋落差＋10（計算單位：\n公尺）H＝h1＋h2＋10m\n（三）應為專用。但與其他滅火設備並用，無妨礙各設備之性能時，不在此限。\n（四）連接緊急電源。\n\n前項加壓送水裝置除應準用第三十七條第二項第一款、第二款及第五款規定外，撒水頭放水壓力\n應在每平方公分十公斤以下或 1MPa 以下。"],[1,"59","裝置自動撒水之建築物，應於地面層室外臨建築線，消防車容易接近處，設置口徑六十三毫米之\n送水口，並符合下列規定：\n一、應為專用。\n二、裝置自動撒水設備之樓層，樓地板面積在三千平方公尺以下，至少設置雙口形送水口一個，\n並裝接陰式快速接頭，每超過三千平方公尺，增設一個。但應設數量超過三個時，以三個計。\n三、設在無送水障礙處，且其高度距基地地面在一公尺以下零點五公尺以上。\n四、與立管管系連通，其管徑在立管管徑以上，並在其附近便於檢修確認處，裝置逆止閥及止水\n閥。\n五、送水口附近明顯易見處，標明自動撒水送水口字樣及送水壓力範圍。"],[1,"60","自動撒水設備之緊急電源，依第三十八條規定設置。"],[0,"第 四 節 水霧滅火設備"],[1,"61","水霧噴頭，依下列規定配置：\n一、防護對象之總面積在各水霧噴頭放水之有效防護範圍內。\n二、每一水霧噴頭之有效半徑在二點一公尺以下。\n三、水霧噴頭之配置數量，依其裝設之放水角度、放水量及防護區域面積核算，其每平方公尺放\n水量，供第十八條附表第三項、第四項所列場所使用，在每分鐘二十公升以上；供同條附表\n其他場所使用，在每分鐘十公升以上。"],[1,"62","水霧滅火設備之緊急電源、配管、配件、屋頂水箱、竣工時之加壓送水試驗、流水檢知裝置、啟\n動裝置及一齊開放閥準用第三十八條、第四十四條、第四十五條、第五十一條至第五十三條規定\n設置。"],[1,"63","放射區域，指一只一齊開放閥啟動放射之區域，每一區域以五十平方公尺為原則。\n\n前項放射區域有二區域以上者，其主管管徑應在一百毫米以上。"],[1,"64","水霧滅火設備之水源容量，應保持二十立方公尺以上。但放射區域在二區域以上者，應保持四十\n立方公尺以上。"],[1,"65","依前條設置之水源，應連結加壓送水裝置。\n\n加壓送水裝置使用消防幫浦時，其出水量及出水壓力，依下列規定，並連接緊急電源：\n一、出水量：每分鐘一千二百公升以上，其放射區域二個以上時為每分鐘二千公升以上。\n二、出水壓力：核算管系最末端一個放射區域全部水霧噴頭放水壓力均能達每平方公分二點七公\n斤以上或 0.27MPa 以上。但用於防護電氣設備者，應達每平方公分三點五公斤以上或 0.35MPa\n以上。"],[1,"66","水霧噴頭及配管與高壓電器設備應保持之距離，依下表規定：\n┌───────┬──────────────┐\n│離開距離（㎜）│\n\n│\n\n├───┬───┤電壓（KV）\n\n│\n\n│最\n\n│\n\n低│標\n\n準│\n\n├───┼───┼──────────────┤\n│150\n\n│250\n\n│7\n\n以下\n\n│\n\n├───┼───┼──────────────┤\n│200\n\n│300\n\n│10\n\n以下\n\n│\n\n├───┼───┼──────────────┤\n│300\n\n│400\n\n│20\n\n以下\n\n│\n\n├───┼───┼──────────────┤\n│400\n\n│500\n\n│30\n\n以下\n\n│\n\n├───┼───┼──────────────┤\n│700\n\n│1000\n\n│60\n\n以下\n\n│\n\n├───┼───┼──────────────┤\n│800\n\n│1100\n\n│70\n\n以下\n\n│\n\n├───┼───┼──────────────┤\n│1100\n\n│1500\n\n│100 以下\n\n│\n\n├───┼───┼──────────────┤\n│1500\n\n│1900\n\n│140 以下\n\n│\n\n├───┼───┼──────────────┤\n│2100\n\n│2600\n\n│200 以下\n\n│\n\n├───┼───┼──────────────┤\n│2600\n\n│3300\n\n│345 以下\n\n│\n\n└───┴───┴──────────────┘"],[1,"67","水霧送水口，依第五十九條第一款至第四款規定設置，並標明水霧送水口字樣及送水壓力範圍。"],[1,"68","裝置水霧滅火設備之室內停車空間，其排水設備應符合下列規定：\n一、車輛停駐場所地面作百分之二以上之坡度。\n二、車輛停駐場所，除面臨車道部分外，應設高十公分以上之地區境界堤，或深十公分寬十公分\n以上之地區境界溝，並與排水溝連通。\n三、滅火坑具備油水分離裝置，並設於火災不易殃及之處所。\n四、車道之中央或二側設置排水溝，排水溝設置集水管，並與滅火坑相連接。\n五、排水溝及集水管之大小及坡度，應具備能將加壓送水裝置之最大能力水量有效排出。"],[0,"第 五 節 泡沫滅火設備"],[1,"69","泡沫滅火設備之放射方式，依實際狀況需要，就下列各款擇一設置：\n一、固定式：視防護對象之形狀、構造、數量及性質配置泡沫放出口，其設置數量、位置及放射\n量，應能有效滅火。\n二、移動式：水帶接頭至防護對象任一點之水平距離在十五公尺以下。"],[1,"70","固定式泡沫滅火設備之泡沫放出口，依泡沫膨脹比，就下表選擇設置之：\n┌────────────────┬─────────┐\n│膨脹比種類\n\n│泡沫放出口種類\n\n│\n\n├────────────────┼─────────┤\n\n│膨脹比二十以下（低發泡）\n\n│泡沫噴頭或泡水噴頭│\n\n├────────────────┼─────────┤\n│膨脹比八十以上一千以下（高發泡）│高發泡放出口\n\n│\n\n└────────────────┴─────────┘\n\n前項膨脹比，指泡沫發泡體積與發泡所需泡沫水溶液體積之比值。"],[1,"71","泡沫頭，依下列規定配置：\n一、飛機庫等場所，使用泡水噴頭，並樓地板面積每八平方公尺設置一個，使防護對象在其有效\n防護範圍內。\n二、室內停車空間或汽車修理廠等場所，使用泡沫噴頭，並樓地板面積每九平方公尺設置一個，\n使防護對象在其有效防護範圍內。\n三、放射區域內任一點至泡沫噴頭之水平距離在二點一公尺以下。\n四、泡沫噴頭側面有樑時，其裝置依第四十七條第一項第八款規定。\n五、室內停車空間有複層式停車設施者，其最上層上方之裝置面設泡沫噴頭，並延伸配管至車輛\n間，使能對下層停車平臺放射泡沫。但感知撒水頭之設置，得免延伸配管。\n六、前款複層式停車設施之泡沫噴頭，礙於構造，無法在最上層以外之停車平臺配置時，其配管\n之延伸應就停車構造成一單元部分，在其四周設置泡沫噴頭，使能對四周全體放射泡沫。"],[1,"72","泡沫頭之放射量，依下列規定：\n一、泡水噴頭放射量在每分鐘七十五公升以上。\n二、泡沫噴頭放射量，依下表規定：\n┌──────┬─────────────────────┐\n│泡沫原液種類│樓地板面積每平方公尺之放射量（公升＼分鐘）│\n├──────┼─────────────────────┤\n│蛋白質泡沫液│六點五以上\n\n│\n\n├──────┼─────────────────────┤\n│合成界面活性│八以上\n\n│\n\n│泡沫液\n\n│\n\n│\n\n├──────┼─────────────────────┤\n│水成膜泡沫液│三點七以上\n\n│\n\n└──────┴─────────────────────┘"],[1,"73","高發泡放出口，依下列規定配置：\n一、全區放射時，應符合下列規定，且其防護區域開口部能在泡沫水溶液放射前自動關閉。但能\n有效補充開口部洩漏者，得免設自動關閉裝置。\n（一）高發泡放出口之泡沫水溶液放射量依下表核算：\n┌──┬──────────────────┬─────┐\n│防護│\n\n│每分鐘每立│\n\n│\n\n│\n\n│方公尺冠泡│\n\n│\n\n│膨\n\n│\n\n│\n\n│水溶液放射│\n\n│對象│\n\n│量（公升）│\n\n脹\n\n比\n\n種\n\n類\n\n│體積之泡沫│\n\n├──┼──────────────────┼─────┤\n│飛機│八十以上二百五十未滿（以下簡稱第一種│二\n\n│\n\n│庫\n\n│）\n\n│\n\n│\n\n├──────────────────┼─────┤\n\n│\n\n│二百五十以上五百未滿（以下簡稱第二種│零點五\n\n│\n\n│\n\n│）\n\n│\n\n│\n\n├──────────────────┼─────┤\n\n│\n\n│五百以上一千未滿（以下簡稱第三種）\n\n│\n\n│\n\n│零點二九\n\n│\n\n├──┼──────────────────┼─────┤\n│室內│第一種\n\n│一點一一\n\n│\n\n│停車├──────────────────┼─────┤\n│空間│第二種\n\n│零點二八\n\n│\n\n│或汽├──────────────────┼─────┤\n│車修│第三種\n\n│零點一六\n\n│\n\n│護廠│\n\n│\n\n│\n\n├──┼──────────────────┼─────┤\n│第十│第一種\n\n│一點二五\n\n│\n\n│八條├──────────────────┼─────┤\n│表第│第二種\n\n│零點三一\n\n│\n\n│八項├──────────────────┼─────┤\n│之場│第三種\n\n│零點一八\n\n│\n\n│所\n\n│\n\n│\n\n│\n\n└──┴──────────────────┴─────┘\n\n（二）前目之冠泡體積，指防護區域自樓地板面至高出防護對象最高點零點五公尺所圍體積。\n\n（三）高發泡放出口在防護區域內，樓地板面積每五百平方公尺至少設置一個，且能有效放射至\n該區域，並附設泡沫放出停止裝置。\n（四）高發泡放出口位置高於防護對象物最高點。\n（五）防護對象位置距離樓地板面高度，超過五公尺，且使用高發泡放出口時，應為全區放射方\n式。\n二、局部放射時，應符合下列規定：\n（一）防護對象物相互鄰接，且鄰接處有延燒之虞時，防護對象與該有延燒之虞範圍內之對象，\n視為單一防護對象，設置高發泡放出口。但該鄰接處以具有一小時以上防火時效之牆壁區\n劃或相距三公尺以上者，得免視為單一防護對象。\n（二）高發泡放出口之泡沫水溶液放射量，防護面積每一平方公尺在每分鐘二公升以上。\n（三）前目之防護面積，指防護對象外周線以高出防護對象物高度三倍數值所包圍之面積。但高\n出防護對象物高度三倍數值，小於一公尺時，以一公尺計。"],[1,"74","泡沫滅火設備之緊急電源、配管、配件、屋頂水箱、竣工時之加壓試驗、流水檢知裝置、啟動裝\n置及一齊開放閥準用第三十八條、第四十四條、第四十五條、第五十一條至第五十三條規定設置。"],[1,"75","泡沫滅火設備之放射區域，依下列規定：\n一、使用泡沫噴頭時，每一放射區域在樓地板面積五十平方公尺以上一百平方公尺以下。\n二、使用泡水噴頭時，放射區域占其樓地板面積三分之一以上，且至少二百平方公尺。但樓地板\n面積未達二百平方公尺者，放射區域依其實際樓地板面積計。"],[1,"76","泡沫滅火設備之水源，依下列規定：\n一、使用泡沫頭時，依第七十二條核算之最低放射量在最大一個泡沫放射區域，能繼續放射二十\n分鐘以上。\n二、使用高發泡放出口時，應符合下列規定：\n（一）全區放射時，以最大樓地板面積之防護區域，除依下表核算外，防護區域開口部未設閉鎖\n裝置者，加算開口洩漏泡沫水溶液量。\n┌─────┬─────────────────────┐\n│膨脹比種類│冠泡體積每一立方公尺之泡沫水溶液量（立方公│\n│\n\n│尺）\n\n│\n\n├─────┼─────────────────────┤\n│第一種\n\n│零點零四\n\n│\n\n├─────┼─────────────────────┤\n│第二種\n\n│零點零一三\n\n│\n\n├─────┼─────────────────────┤\n│第三種\n\n│零點零零八\n\n│\n\n└─────┴─────────────────────┘\n\n（二）局部放射時，依第七十三條核算之泡沫水溶液放射量，在樓地板面積最大區域，能繼續放\n射二十分鐘以上。\n三、移動式泡沫滅火設備之水源容量，在二具泡沫瞄子同時放水十五分鐘之水量以上。\n\n前項各款計算之水溶液量，應加算充滿配管所需之泡沫水溶液量，且應加算總泡沫水溶液量之百\n分之二十。"],[1,"77","依前條設置之水源，應連結加壓送水裝置。\n\n前條第一項第一款及第二款之加壓送水裝置使用消防幫浦時，其出水量及出水壓力，依下列規定：\n一、出水量：泡沫放射區域有二區域以上時，以最大一個泡沫放射區域之最低出水量加倍計算。\n二、出水壓力：核算最末端一個泡沫放射區域全部泡沫噴頭放射壓力均能達每平方公分一公斤以\n上或 0.1MPa 以上。\n三、連接緊急電源。\n\n前條第一項第三款之加壓送水裝置使用消防幫浦時，其出水量及出水壓力，依下列規定：\n一、出水量：同一樓層設一個泡沫消防栓箱時，應在每分鐘一百三十公升以上；同一樓層設二個\n以上泡沫消防栓箱時，應在每分鐘二百六十公升以上。\n二、出水壓力：核算最末端一個泡沫消防栓放射壓力能達每平方公分三點五公斤以上或 035MPa\n以上。\n三、連接緊急電源。\n\n同一棟建築物內，採用低發泡原液，分層配置固定式及移動式放射方式泡沫滅火設備時，得共用\n配管及消防幫浦，而幫浦之出水量、揚程與泡沫原液儲存量應採其放射方式中較大者。"],[1,"78","泡沫原液儲存量，依第七十六條規定核算之水量與使用之泡沫原液濃度比核算之。"],[1,"79","泡沫原液與水混合使用之濃度，依下列規定：\n一、蛋白質泡沫液百分之三或百分之六。\n二、合成界面活性泡沫液百分之一或百分之三。\n三、水成膜泡沫液百分之三或百分之六。"],[1,"80","移動式泡沫滅火設備，依下列規定設置：\n\n一、同一樓層各泡沫瞄子放射量，應在每分鐘一百公升以上。但全部泡沫消防栓箱數量超過二個\n時，以同時使用二支泡沫瞄子計算之。\n二、泡沫瞄子放射壓力應在每平方公分三點五公斤以上或 0.35MPa、以上。\n三、移動式泡沫滅火設備之泡沫原液，應使用低發泡。\n四、在水帶接頭三公尺範圍內，設置泡沫消防栓箱，箱內配置長二十公尺以上水帶及泡沫瞄子乙\n具，其箱面表面積應在零點八平方公尺以上，且標明移動式泡沫滅火設備字樣，並在泡沫消\n防栓箱上方設置紅色幫浦啟動表示燈。"],[1,"81","泡沫原液儲槽，依下列規定設置：\n一、設有便於確認藥劑量之液面計或計量棒。\n二、平時在加壓狀態者，應附設壓力表。\n三、設置於溫度攝氏四十度以下，且無日光曝曬之處。\n四、採取有效防震措施。"],[0,"第 六 節 二氧化碳及惰性氣體滅火設備"],[1,"82","二氧化碳滅火設備之放射方式依實際狀況需要就下列各款擇一裝置：\n一、全區放射方式：用不燃材料建造之牆、柱、樓地板或天花板等區劃間隔，且開口部設有自動\n關閉裝置之區域，其噴頭設置數量、位置與放射量應視該部分容積及防護對象之性質作有效\n之滅火。但能有效補充開口部洩漏量者，得免設自動關閉裝置。\n二、局部放射方式：視防護對象之形狀、構造、數量及性質，配置噴頭，其設置數量、位置及放\n射量，應能有效滅火。\n三、移動放射方式：皮管接頭至防護對象任一部分之水平距離在十五公尺以下。\n\n惰性氣體滅火設備依其藥劑種類，分為氮氣（以下簡稱 IG-100） 、氬氣（以下簡稱 IG-01）\n、氮\n氣與氬氣容量比為五十比五十之混合物（以下簡稱 IG-55）\n、氮氣與氬氣及二氧化碳容量比為五十\n二比四十比八之混合物（以下簡稱 IG-541） 滅火設備。\n\n惰性氣體滅火設備之放射方式以全區放射方式為限，其裝置準用第一項第一款本文之規定。防護\n區域之開口部應設置自動關閉裝置，並於滅火藥劑放射前自動關閉開口。"],[1,"83","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n二氧化碳滅火設備之滅火藥劑量，依下列規定設置：\n一、全區放射方式所需滅火藥劑量依下表計算：\n二、局部放射方式所需滅火藥劑量應符合下列規定：\n（一）可燃性固體或易燃性液體存放於上方開放式容器，火災發生時，燃燒限於一面且可燃物無\n\n向外飛散之虞者，所需之滅火藥劑量，依該防護對象表面積每一平方公尺以十三公斤比例\n核算，其表面積之核算，在防護對象邊長小於零點六公尺時，以零點六公尺計。但追加倍\n數，高壓式為一點四，低壓式為一點一。\n（二）前目以外防護對象依下列公式計算假想防護空間（指距防護對象任一點零點六公尺範圍空\n間）單位體積滅火藥劑量，再乘以假想防護空間體積來計算所需滅火藥劑量：\nQ=8-6×a/A\n\nQ ：假想防護空間單位體積滅火藥劑量（公斤／立方公尺），所需追加倍數比照前目規定。\na ：防護對象周圍實存牆壁面積之合計（平方公尺）。\nA ：假想防護空間牆壁面積之合計（平方公尺）。\n三、移動放射方式每一具噴射瞄子所需滅火藥劑量在九十公斤以上。\n四、全區及局部放射方式在同一建築物內有二個以上防護區域或防護對象時，所需滅火藥劑量應\n取其最大量者。"],[1,"83-1","惰性氣體滅火設備之藥劑理論滅火濃度應經測試決定，在固定之防護空間達到設計濃度，並維持\n一定時間。\n\n惰性氣體滅火設備之藥劑設計濃度，應符合下列規定：\n一、設計濃度：\n（一）理論滅火濃度乘以一點二倍安全係數以上。\n（二）常時有人之場所，藥劑最高設計濃度以百分之五十二為限。\n二、防護對象為含易燃液體之場所時，設計濃度應以理論滅火濃度乘以一點三倍安全係數以上。\n三、防護對象為含通電中之電氣設備之場所時，設計濃度應以理論滅火濃度乘以一點三五倍安全\n係數以上。但持續通電大於四百八十伏特之電氣設備之場所，其設計濃度依中央主管機關認\n可之值核算。"],[1,"83-2","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n惰性氣體滅火設備之滅火藥劑量，依下列規定設置：\n一、所需滅火藥劑量依下列公式及經中央主管機關認可之值計算：\nV\n\nW=－ln﹝－－－﹞\nS\n\n100-C\n\nW ：防護空間所需藥劑量（kg）\nV ：防護空間淨體積（m³，得扣除不滲透且不可移動固體體積）\n\nS ：防護空間之最低溫度（t℃）、一大氣壓下之比容積（m³/kg）\nC ：設計濃度百分比（％，體積百分比）\n二、在同一建築物內有二個以上防護區域時，所需滅火藥劑量取其最大量者。"],[1,"84","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n\n二氧化碳滅火設備全區放射方式及惰性氣體滅火設備之噴頭，依下列規定設置：\n一、噴頭能使放射藥劑迅速且均勻擴散至整個防護區域。\n二、噴頭之放射壓力，應符合下列規定：\n（一）二氧化碳滅火設備噴頭之放射壓力，其滅火藥劑以常溫儲存者之高壓式為每平方公分十四\n公斤以上或 1.4MPa 以上；其滅火藥劑儲存於溫度攝氏零下十八度以下者之低壓式為每平\n方公分九公斤以上或 0.9MPa\n\n以上。\n\n（二）惰性氣體滅火設備噴頭放射壓力，為每平方公分十九公斤以上或 1.9 MPa\n\n以上。但經中\n\n央主管機關認可者，不在此限。\n（三）噴頭數量及型式，依流量計算配置。\n三、滅火藥劑之放射時間，依下列規定設置：\n（一）二氧化碳滅火設備依第八十三條第一款所核算之滅火藥劑量，依下表所列場所，於規定時\n間內全部放射完畢，乾式電器設備室並應於二分鐘內放射百分之三十以上。\n（二）惰性氣體滅火設備依前條第一款所核算之滅火藥劑量，除含易燃液體之場所，應於一分鐘\n內放射百分之九十以上外，應於二分鐘內放射百分之九十以上。\n\n二氧化碳滅火設備局部放射方式之噴頭，依下列規定設置：\n一、噴頭之放射壓力，應符合前項第二款第一目規定。\n二、噴頭之有效射程內，應涵蓋防護對象所有表面，且所設位置不得因藥劑之放射使可燃物有飛\n散之虞。\n三、依第八十三條第二款所核算之滅火藥劑量應於三十秒內全部放射完畢。"],[1,"85","全區或局部放射方式防護區域內之通風換氣裝置，應在滅火藥劑放射前停止運轉。"],[1,"86","二氧化碳滅火設備全區放射方式防護區域之開口部，依下列規定設置：\n一、不得設於面對安全梯間、特別安全梯間、緊急昇降機間或其他類似場所。\n二、開口部位於距樓地板面高度三分之二以下部分，應在滅火藥劑放射前自動關閉。\n三、不設自動關閉裝置之開口部總面積，供電信機械室使用時，應在圍壁面積百分之一以下，其\n他處所則應在防護區域體積值或圍壁面積值二者中之較小數值百分之十以下。\n\n前項第三款所稱圍壁面積，指防護區域內牆壁、樓地板及天花板等面積之合計。"],[1,"87","二氧化碳及惰性氣體滅火設備之滅火藥劑儲存容器，依下列規定設置：\n一、儲存容器之充填依下列規定：\n（一）二氧化碳滅火設備之充填比在高壓式為一點五以上一點九以下；低壓式為一點一以上一點\n四以下。\n（二）惰性氣體滅火設備之充填壓力，在溫度攝氏十五度時應在每平方公分三百公斤以下或 30MPa\n以下。\n二、儲存容器設置之場所應符合下列規定：\n（一）置於防護區域外。\n（二）置於溫度攝氏四十度以下，溫度變化較少處。\n（三）不得置於有日光曝曬或雨水淋濕之處。\n三、儲存容器之安全裝置符合 CNS\n\n一一一七六之規定，或經中央主管機關認可具同等性能以上\n\n者。\n四、高壓式二氧化碳滅火設備及惰性氣體滅火設備儲存容器之容器閥符合 CNS 一○八四八及一○\n八四九之規定，或經中央主管機關認可具同等性能以上者。\n五、低壓式二氧化碳滅火設備儲存容器，應設有液面計、壓力表及壓力警報裝置，壓力在每平方\n公分二十三公斤以上或 2.3MPa 以上或每平方公分十九公斤以下或 1.9MPa 以下時發出警報。\n六、低壓式二氧化碳滅火設備儲存容器應設置使容器內部溫度維持於攝氏零下二十度以上，攝氏\n零下十八度以下之自動冷凍機。\n七、儲存容器之容器閥開放裝置，依下列規定：\n（一）容器閥之開放裝置，具有以手動方式可開啟之構造。\n（二）容器閥使用電磁閥直接開啟時，同時開啟之儲存容器數在七支以上者，該儲存容器應設二\n個以上之電磁閥。\n八、採取有效防震措施。\n九、儲存容器應在明顯位置標示充填滅火藥劑之種類、滅火藥劑量、製造年份及製造商名稱。\n\n前項第一款第一目所稱充填比，指容器內容積（公升）與液化氣體重量（公斤）之比值。"],[1,"88","二氧化碳及惰性氣體滅火設備使用氣體啟動者，依下列規定設置：\n一、啟動用氣體容器能耐每平方公分二百五十公斤或 25MPa\n\n之壓力。\n\n二、啟動用氣體容器之內容積應有一公升以上，其所儲存之二氧化碳重量在零點六公斤以上，且\n其充填比在一點五以上。\n三、啟動用氣體容器之安全裝置及容器閥符合 CNS\n\n一一一七六規定，或經中央主管機關認可具\n\n同等性能以上者。\n四、啟動用氣體容器不得兼供防護區域之自動關閉裝置使用。"],[1,"89","二氧化碳及惰性氣體之滅火設備配管，依下列規定設置：\n一、應為專用，其管徑依流量計算書配置。\n二、最低配管與最高配管間之落差依流量計算配置，並在五十公尺以下。\n\n二氧化碳滅火設備之配管除依前項規定設置外，並應符合下列規定：\n一、使用符合 CNS\n\n四六二六規定之無縫鋼管，其中高壓式為管號 Sch 80 以上，低壓式為管號 Sch\n\n40 以上厚度或具有同等以上強度，且施予鍍鋅等防蝕處理。\n二、採用銅管配管時，應使用符合 CNS\n\n五一二七規定之銅及銅合金無縫管或具有同等以上強度\n\n者，其中高壓式能耐壓每平方公分一百六十五公斤以上或 16.5 MPa 以上，低壓式能耐壓每\n平方公分三十七點五公斤以上或 3.75MPa\n\n以上。\n\n三、配管接頭及閥類之耐壓，高壓式為每平方公分一百六十五公斤以上或 16.5MPa 以上，低壓式\n為每平方公分三十七點五公斤以上或 3.75MPa 以上，並予適當之防蝕處理。\n\n惰性氣體滅火設備之配管除依第一項規定設置外，並應符合下列規定：\n一、使用符合 CNS\n\n四六二六規定之無縫鋼管管號 Sch 80 以上厚度或具有同等以上強度。但設\n\n有壓力調整裝置之二次側配管，得使用溫度攝氏四十度時，具耐最高調整壓力以上之鋼管，\n且施予鍍鋅等防蝕處理。\n二、採用銅管配管時，應使用符合 CNS\n\n五一二七規定之銅及銅合金無縫管或具有同等以上強度\n\n者，能耐壓每平方公分一百六十五公斤以上或 16.5 MPa\n\n以上。但設有壓力調整裝置之二次\n\n側配管，得使用溫度攝氏四十度時，具耐最高調整壓力以上之銅管。\n三、配管接頭及閥類，應具耐內部壓力強度，並予適當之防蝕處理。"],[1,"90","二氧化碳及惰性氣體滅火設備之選擇閥，依下列規定設置：\n一、同一建築物內有二個以上防護區域或防護對象，共用儲存容器時，每一防護區域或防護對象\n均應設置。\n二、設於防護區域外。\n三、標明選擇閥字樣及所屬防護區域或防護對象。\n四、儲存容器與噴頭設有選擇閥時，儲存容器與選擇閥間之配管依 CNS 一一一七六之規定設置安\n全裝置或破壞板，或經中央主管機關認可具同等性能以上者。"],[1,"91","二氧化碳及惰性氣體滅火設備之啟動裝置，依下列規定，設置手動及自動啟動裝置：\n一、手動啟動裝置應符合下列規定：\n（一）設於能看清區域內部且操作後能容易退避之防護區域外。\n（二）每一防護區域或防護對象裝設一套。\n（三）其操作部設在距樓地板面高度零點八公尺以上一點五公尺以下。\n\n（四）其外殼漆紅色或足以辨識之顏色。\n（五）以電力啟動者，裝置電源表示燈。\n（六）操作開關或拉桿，操作時同時發出警報音響，且設有透明材質製之有效保護裝置。\n（七）在其近旁標示所防護區域名稱、操作方法及安全上應注意事項。\n二、自動啟動裝置與二回路以上之火警探測器感應連動啟動。\n\n前項啟動裝置，依下列規定設置自動及手動切換裝置：\n一、設於易於操作之處所。\n二、設自動及手動之表示燈。\n三、自動、手動切換必須以鑰匙或拉桿操作，始能切換。\n四、切換裝置近旁標明操作方法。"],[1,"92","音響警報裝置，依下列規定設置：\n一、手動或自動裝置動作後，應自動發出警報，且藥劑未全部放射前不得中斷。\n二、音響警報應有效報知防護區域或防護對象內所有人員。\n三、設於全區放射方式之音響警報裝置採用人語發音。但平時無人駐守者，不在此限。"],[1,"93","二氧化碳滅火設備全區放射方式之安全裝置，依下列規定設置：\n一、啟動裝置開關或拉桿開始動作至儲存容器之容器閥開啟，設有二十秒以上之遲延裝置。\n二、採手動啟動時，應採取在前款延遲時間內，滅火藥劑不得放射之措施。\n三、於防護區域出入口等易於辨認處所設置放射表示燈。\n\n惰性氣體滅火設備之安全裝置，依下列規定設置：\n一、防護區域應依流量計算結果採取防止該區域內壓力上升之措施。\n二、於防護區域出入口等易於辨認處所設置放射表示燈。"],[1,"94","全區放射或局部放射方式防護區域，對放射之滅火藥劑，依下列規定將其排放至安全地方：\n一、排放方式應就下列方式擇一設置，並於一小時內將藥劑排出：\n（一）採機械排放時，排風機為專用，且具有每小時五次之換氣量。但與其他設備之排氣裝置共\n用，無排放障礙者，得共用之。\n（二）採自然排放時，設有能開啟之開口部，其面向外氣部分（限防護區域自樓地板面起高度三\n分之二以下部分）之大小，占防護區域樓地板面積百分之十以上，且容易擴散滅火藥劑。\n二、排放裝置之操作開關須設於防護區域外便於操作處，且在其附近設有標示。\n三、排放至室外之滅火藥劑不得有局部滯留之現象。"],[1,"95","全區及局部放射方式之緊急電源，應採用自用發電設備或蓄電池設備，其容量應能使該設備有效\n動作一小時以上。"],[1,"96","二氧化碳滅火設備移動式放射方式，除依第八十七條第一項第一款第一目、第二款第二目、第三\n目、第三款、第四款及第九款規定辦理外，並依下列規定設置：\n一、儲存容器之容器閥能在皮管出口處以手動開關者。\n二、儲存容器分設於各皮管設置處。\n三、儲存容器近旁設紅色標示燈及標明移動式二氧化碳滅火設備字樣。\n四、設於火災時濃煙不易籠罩之處所。\n五、每一具瞄子之藥劑放射量在溫度攝氏二十度時，應在每分鐘六十公斤以上。\n六、皮管、噴嘴及管盤符合 CNS\n\n一一一七七之規定。"],[1,"96-1","惰性氣體滅火設備之防護區域竣工時，應做防護區域完整性測試，十分鐘內之氣體洩漏量使滅火\n藥劑維持在設計濃度百分之八十五以上者為合格。"],[1,"97","二氧化碳及惰性氣體滅火設備使用之各種標示規格，由中央主管機關另定之。"],[0,"第 六 節之一 鹵化烴滅火設備"],[1,"97-1","鹵化烴滅火設備依其藥劑種類，分為三氟甲烷（以下簡稱 HFC-23 ）、七氟丙烷（以下簡稱\nHFC-227ea）、全氟（2-甲基-3-戊酮） （以下簡稱 FK-5-1-12）滅火設備。\n\n鹵化烴滅火設備之放射方式以全區放射方式為限，其防護區域、開口自動關閉及通風換氣，準用\n第八十二條第一項第一款本文、第三項及第八十五條規定設置。\n\n防護區域除符合前項規定外，應依流量計算結果採取防止該區域內壓力上升之措施。但無影響防\n護區域完整性之虞者，不在此限。"],[1,"97-2","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n\n鹵化烴滅火設備之藥劑理論滅火濃度及設計濃度，準用第八十三條之一除第二項第一款第二目外\n之規定。\n\n常時有人之場所，藥劑最高設計濃度依下表規定："],[1,"97-3","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n鹵化烴滅火設備之滅火藥劑量，依下列規定設置：\n\n一、所需滅火藥劑量依下列公式及中央主管機關認可之值計算：\nV\n\nC\n\nW=－（－－－）\nS\n\n100-C\n\nW ：防護空間所需藥劑量（kg）\nV ：防護空間淨體積（m³，得扣除不滲透且不可移動固體體積）\nS ：防護空間之最低溫度（t℃）、一大氣壓下之比容積（m³/kg）\nC ：設計濃度百分比（％，體積百分比）\n\n二、在同一建築物內有二個以上防護區域時，所需滅火藥劑量取其最大量者。"],[1,"97-4","鹵化烴滅火設備之噴頭，依下列規定設置：\n一、噴頭能使放射藥劑迅速且均勻擴散至整個防護區域。\n二、噴頭之放射壓力，HFC-23\nFK-5-1-12\n\n為每平方公分九公斤以上或 0.9Mpa 以上，HFC-227ea 或\n\n為每平方公分三公斤以上或 0.3 MPa\n\n以上。但經中央主管機關認可者，不在此\n\n限。\n三、噴頭數量及型式，依流量計算配置。\n\n依前條所核算之滅火藥劑量，應於十秒內放射百分之九十五以上。"],[1,"97-5","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n\n鹵化烴滅火設備之滅火藥劑儲存容器，依下列規定設置：\n一、儲存容器之充填比，依下表規定：\n二、蓄壓式儲存容器，儲存 HFC-227ea、FK-5-1-12 之儲存壓力，應以氮氣加壓至每平方公分二\n十五公斤以上或 2.5MPa 以上。\n三、加壓式儲存容器，應設置可調整壓力至 2.0 MPa\n\n之壓力調整裝置。\n\n四、儲存容器之設置場所、安全裝置、容器閥與開放裝置、防震措施及標示，準用第八十七條第\n一項第二款至第四款、第七款至第九款規定。\n五、加壓用氣體容器，應充填氮氣，其安全裝置及容器閥，準用第八十七條第一項第三款、第四\n款規定。\n\n前項第一款所稱充填比，指容器內容積（公升）與液化氣體重量（公斤）之比值。"],[1,"97-6","鹵化烴滅火設備之配管，依下列規定設置：\n一、應為專用，其管徑依流量計算書配置。\n\n二、最低配管與最高配管間之落差依流量計算配置，並在五十公尺以下。\n三、採用鋼管配管時，HFC-23\n\n滅火設備使用符合 CNS\n\n以上厚度；HFC-227ea 及 FK-5-1-12\n\n四六二六規定之無縫鋼管管號 Sch 80\n\n滅火設備使用符合 CNS\n\n四六二六規定之無縫鋼管管\n\n號 Sch 40 以上厚度或具有同等以上強度，且施予鍍鋅等防蝕處理。\n四、採用銅管配管時，應使用符合 CNS\n\n五一二七規定之銅及銅合金無縫管或具有同等以上強度\n\n及耐腐蝕性。\n五、配管接頭及閥類，應具耐內部壓力強度，並予適當之防蝕處理。"],[1,"97-7","鹵化烴滅火設備使用氣體啟動者，準用第八十八條規定。\n\n鹵化烴滅火設備之選擇閥、啟動裝置、音響警報裝置、安全裝置及排放裝置，準用第九十條至第\n九十二條、第九十三條第二項及第九十四條規定。"],[1,"97-8","鹵化烴滅火設備之緊急電源，準用第九十五條之規定設置。"],[1,"97-9","鹵化烴滅火設備之防護區域竣工時，應做防護區域完整性測試，十分鐘內之氣體洩漏量使滅火藥\n劑維持在設計濃度百分之八十五以上者為合格。"],[1,"97-10","鹵化烴滅火設備使用之各種標示規格，由中央主管機關另定之。"],[0,"第 七 節 乾粉滅火設備及簡易自動滅火設備"],[1,"98","乾粉滅火設備之放射方式、通風換氣裝置、防護區域之開口部、選擇閥、啟動裝置、音響警報裝\n置、安全裝置、緊急電源及各種標示規格，準用第八十二條、第八十五條、第八十六條、第九十\n條至第九十三條、第九十五條及第九十七條規定設置。"],[1,"99","乾粉滅火藥劑量，依下列規定設置：\n一、全區放射方式所需滅火藥劑量，依下表計算：\n┌───────┬────┬────┬────┬─────┐\n│乾粉藥劑種類\n\n│第一種乾│第二種乾│第三種乾│第四種乾粉│\n\n│\n\n│粉（主成│粉（主成│粉（主成│（主成份碳│\n\n│\n\n│份碳酸氫│份碳酸氫│份磷酸二│酸氫鉀及尿│\n\n│\n\n│鈉\n\n│鉀\n\n│氫銨）\n\n│素化合物）│\n\n├───────┼────┼────┼────┼─────┤\n\n│每立方公尺防護│0.6\n\n│0.36\n\n│0.36\n\n│0.24\n\n│\n\n│區域所需滅火藥│\n\n│\n\n│\n\n│\n\n│\n\n│劑量（㎏／m³）│\n\n│\n\n│\n\n│\n\n│\n\n├───────┼────┼────┼────┼─────┤\n│每平方公尺開口│4.5\n\n│2.7\n\n│2.7\n\n│1.8\n\n│\n\n│部所需追加滅火│\n\n│\n\n│\n\n│\n\n│\n\n│藥劑量（㎏／㎡│\n\n│\n\n│\n\n│\n\n│\n\n│）\n\n│\n\n│\n\n│\n\n│\n\n│\n\n└───────┴────┴────┴────┴─────┘\n\n二、局部放射方式所需滅火藥劑量應符合下列規定：\n（一）可燃性固體或易燃性液體存放於上方開放式容器，火災發生時，燃燒限於一面且可燃物無\n向外飛散之虞者，所需之滅火藥劑量，依下表計算：\n┌───────────┬────┬─────┬────┐\n│\n│滅\n\n│第一種乾│第二種乾粉│第四種乾│\n火\n\n│\n\n藥\n\n劑\n\n種\n\n類│粉\n│\n\n│或第三種乾│粉\n\n│\n\n│粉\n\n│\n\n│\n\n├───────────┼────┼─────┼────┤\n│防護對象每平方公尺表面│8.8\n\n│5.2\n\n│3.6\n\n│\n\n│積所需滅火藥劑量（㎏／│\n\n│\n\n│\n\n│\n\n│㎡）\n\n│\n\n│\n\n│\n\n│\n\n├───────────┼────┼─────┼────┤\n│追加倍數\n\n│1.1\n\n│1.1\n\n│1.1\n\n│\n\n├─┬─────────┴────┴─────┴────┤\n│備│防護對象物之邊長在零點六公尺以下時，以零點六公尺計│\n│考│。\n\n│\n\n└─┴─────────────────────────┘\n\n（二）前目以外設置場所，依下列公式計算假想防護空間單位體積滅火藥劑量，再乘假想防護空\n間體積來計算所需滅火藥劑量。但供電信機器室使用者，所核算出之滅火藥劑量，須乘以\n零點七。Q=X-Y×a/AＱ：假想防護空間單位體積滅火藥劑量（公斤／立方公尺）所需追加倍\n數比照前目規定。ａ：防護對象周圍實存牆壁面積之合計（平方公尺）\n。Ａ：假想防護空間\n牆壁面積之合計（平方公尺）。Ｘ及Ｙ值，依下表規定為準：\n┌─────┬─────┬─────────┬─────┐\n│滅火藥劑種│第一種乾粉│第二種乾粉或第三種│第四種乾粉│\n\n│類\n\n│\n\n│乾粉\n\n│\n\n│\n\n├─────┼─────┼─────────┼─────┤\n│Ｘ\n\n值\n\n│5.2\n\n│3.2\n\n│2.0\n\n│\n\n├─────┼─────┼─────────┼─────┤\n│Ｙ\n\n值\n\n│3.9\n\n│2.4\n\n│1.5\n\n│\n\n└─────┴─────┴─────────┴─────┘\n\n三、移動放射方式每一具噴射瞄子所需滅火藥劑量在下表之規定以上：\n┌──────┬─────┬─────────┬─────┐\n│滅火藥劑種類│第一種乾粉│第二種乾粉或第三種│第四種乾粉│\n│\n\n│\n\n│乾粉\n\n│\n\n│\n\n├──────┼─────┼─────────┼─────┤\n│滅火藥劑量（│50\n\n│30\n\n│20\n\n│\n\n│㎏）\n\n│\n\n│\n\n│\n\n│\n\n└──────┴─────┴─────────┴─────┘\n\n四、全區及局部放射方式在同一建築物內有二個以上防護區域或防護對象時，所需滅火藥劑量取\n其最大量者。"],[1,"100","全區及局部放射方式之噴頭，依下列規定設置：\n一、全區放射方式所設之噴頭能使放射藥劑迅速均勻地擴散至整個防護區域。\n二、乾粉噴頭之放射壓力在每平方公分一公斤以上或 0.1MPa 以上。\n三、依前條第一款或第二款所核算之滅火藥劑量須於三十秒內全部放射完畢。\n四、局部放射方式所設噴頭之有效射程內，應涵蓋防護對象所有表面，且所設位置不得因藥劑之\n放射使可燃物有飛散之虞。"],[1,"101","供室內停車空間使用之滅火藥劑，以第三種乾粉為限。"],[1,"102","滅火藥劑儲存容器，依下列規定設置：\n一、充填比應符合下列規定：\n┌───┬───────┬─────────┬──────┐\n│滅火藥│第一種乾粉\n\n│第二種乾粉或第三種│第四種乾粉\n\n│\n\n│劑種類│\n\n│乾粉\n\n│\n\n│\n\n├───┼───────┼─────────┼──────┤\n\n│充填比│零點八五以上、│一點零五以上、一點│一點五以上、│\n│\n\n│一點四五以下\n\n│七五以下\n\n│二點五以下\n\n│\n\n└───┴───────┴─────────┴──────┘\n\n二、儲存場所應符合下列規定：\n（一）置於防護區域外。\n（二）置於溫度攝氏四十度以下，溫度變化較少處。\n（三）不得置於有日光曝曬或雨水淋濕之處。\n三、儲存容器於明顯處所標示：充填藥劑量、滅火藥劑種類、最高使用壓力（限於加壓式）\n、製造\n年限及製造廠商等。\n四、儲存容器設置符合 CNS、一一一七六規定之安全裝置。\n五、蓄壓式儲存容器，內壓在每平方公分十公斤以上或 1MPa 以上者，設符合 CNS\n\n一○八四八\n\n及一○八四九規定之容器閥。\n六、為排除儲存容器之殘留氣體應設置排出裝置，為處理配管之殘留藥劑則應設置清洗裝置。\n七、採取有效之防震措施。"],[1,"103","加壓用氣體容器應設於儲存容器近旁，且須確實接連，並應設置符合 CNS 一一一七六規定之容器\n閥及安全裝置。"],[1,"104","加壓或蓄壓用氣體容器，依下列規定設置：\n一、加壓或蓄壓用氣體應使用氮氣或二氧化碳。\n二、加壓用氣體使用氮氣時，在溫度攝氏三十五度，大氣壓力（表壓力）每平方公分零公斤或 0MPa\n狀態下，每一公斤乾粉藥劑需氮氣四十公升以上；使用二氧化碳時，每一公斤乾粉藥劑需二\n氧化碳二十公克並加算清洗配管所需要量以上。\n三、蓄壓用氣體使用氮氣時，在溫度攝氏三十五度，大氣壓力（表壓力）每平方公分零公斤或 0MPa\n狀態下，每一公斤乾粉藥劑需氮氣十公升並加算清洗配管所需要量以上；使用二氧化碳時，\n每一公斤乾粉藥劑需二氧化碳二十公克並加算清洗配管所需要量以上。\n四、清洗配管用氣體，另以容器儲存。\n五、採取有效之防震措施。"],[1,"105","乾粉滅火設備配管及閥類，依下列規定設置：\n一、配管部分：\n（一）應為專用，其管徑依噴頭流量計算配置。\n（二）使用符合 CNS\n\n六四四五規定，並施予鍍鋅等防蝕處理或具同等以上強度及耐蝕性之鋼管。\n\n但蓄壓式中，壓力在每平方公分二十五公斤以上或 2.5MPa 以上，每平方公分四十二公斤以\n下或 4.2MPa 以下時，應使用符合 CNS 四六二六之無縫鋼管管號 Sch40 以上厚度並施予防蝕\n處理，或具有同等以上強度及耐蝕性之鋼管。\n（三）採用銅管配管時，應使用符合 CNS\n\n五一二七規定或具有同等以上強度及耐蝕性者，並能\n\n承受調整壓力或最高使用壓力的一點五倍以上之壓力。\n（四）最低配管與最高配管間，落差在五十公尺以下。\n（五）配管採均分為原則，使噴頭同時放射時，放射壓力為均等。\n（六）採取有效之防震措施。\n二、閥類部分：\n（一）使用符合 CNS\n\n之規定且施予防蝕處理或具有同等以上強度、耐蝕性及耐熱性者。\n\n（二）標示開閉位置及方向。\n（三）放出閥及加壓用氣體容器閥之手動操作部分設於火災時易於接近且安全之處。"],[1,"106","乾粉滅火設備自儲存容器起，其配管任一部分與彎曲部分之距離應為管徑二十倍以上。但能採取\n乾粉藥劑與加壓或蓄壓用氣體不會分離措施者，不在此限。"],[1,"107","加壓式乾粉滅火設備應設壓力調整裝置，可調整壓力至每平方公分二十五公斤以下或 2.5Mpa 以下。"],[1,"108","加壓式乾粉滅火設備，依下列規定設置定壓動作裝置：\n一、啟動裝置動作後，儲存容器壓力達設定壓力時，應使放出閥開啟。\n二、定壓動作裝置設於各儲存容器。"],[1,"109","蓄壓式乾粉滅火設備應設置以綠色表示使用壓力範圍之指示壓力表。"],[1,"110","若使用氣體啟動者，依下列規定設置：\n一、啟動用氣體容器能耐每平方公分二百五十公斤或 25MPa、之壓力。\n二、啟動用氣體容器之內容積有零點二七公升以上，其所儲存之氣體量在一百四十五公克以上，\n且其充填比在一點五以上。\n三、啟動用氣體容器之安全裝置及容器閥符合 CNS、一一一七六之規定。\n四、啟動用氣體容器不得兼供防護區域之自動關閉裝置使用。"],[1,"111","移動式放射方式，除依第一百零二條第一款、第二款第二目、第三目、第三款、第四款規定辦理\n\n外，並依下列規定設置：\n一、儲存容器之容器閥能在皮管出口處以手動開關者。\n二、儲存容器分設於各皮管設置處。\n三、儲存容器近旁設紅色標示燈及標明移動式乾粉滅火設備字樣。\n四、設於火災時濃煙不易籠罩之場所。\n五、每一具噴射瞄子之每分鐘藥劑放射量符合下表規定。\n┌──────┬─────┬─────────┬─────┐\n│滅火藥劑種類│第一種乾粉│第二種乾粉或第三種│第四種乾粉│\n│\n\n│\n\n│乾粉\n\n│\n\n│\n\n├──────┼─────┼─────────┼─────┤\n│每分鐘放射量│45\n\n│27\n\n│18\n\n│\n\n│（㎏／min） │\n\n│\n\n│\n\n│\n\n└──────┴─────┴─────────┴─────┘\n\n六、移動式乾粉滅火設備之皮管、噴嘴及管盤符合 CNS、一一一七七之規定。"],[1,"111-1","簡易自動滅火設備，應依下列規定設置：\n一、視排油煙管之斷面積、警戒長度及風速，配置感知元件及噴頭，其設置數量、位置及放射量，\n應能有效滅火。\n二、排油煙管內風速超過每秒五公尺，應在警戒長度外側設置放出藥劑之啟動裝置及連動閉鎖閘\n門。但不設置閘門能有效滅火時，不在此限。\n三、噴頭之有效射程內，應涵蓋煙罩及排油煙管，且所設位置不得因藥劑之放射使可燃物有飛散\n之虞。\n四、防護範圍內之噴頭，應一齊放射。\n五、儲存鋼瓶及加壓氣體鋼瓶設置於攝氏四十度以下之位置。\n\n前項第二款之警戒長度，指煙罩與排油煙管接合處往內五公尺。"],[0,"第 二 章 警報設備"],[0,"第 一 節 火警自動警報設備"],[1,"112","裝設火警自動警報設備之建築物，依下列規定劃定火警分區：\n一、每一火警分區不得超過一樓層，並在樓地板面積六百平方公尺以下。但上下二層樓地板面積\n之和在五百平方公尺以下者，得二層共用一分區。\n二、每一分區之任一邊長在五十公尺以下。但裝設光電式分離型探測器時，其邊長得在一百公尺\n\n以下。\n三、如由主要出入口或直通樓梯出入口能直接觀察該樓層任一角落時，第一款規定之六百平方公\n尺得增為一千平方公尺。\n四、樓梯、斜坡通道、昇降機之昇降路及管道間等場所，在水平距離五十公尺範圍內，且其頂層\n相差在二層以下時，得為一火警分區。但應與建築物各層之走廊、通道及居室等場所分別設\n置火警分區。\n五、樓梯或斜坡通道，垂直距離每四十五公尺以下為一火警分區。但其地下層部分應為另一火警\n分區。"],[1,"113","火警自動警報設備之鳴動方式，建築物在五樓以上，且總樓地板面積在三千平方公尺以上者，依\n下列規定：\n一、起火層為地上二層以上時，限該樓層與其直上二層及其直下層鳴動。\n二、起火層為地面層時，限該樓層與其直上層及地下層各層鳴動。\n三、起火層為地下層時，限地面層及地下層各層鳴動。\n四、前三款之鳴動於十分鐘內或受信總機再接受火災信號時，應立即全區鳴動。"],[1,"114","探測器應依裝置場所高度，就下表選擇探測器種類裝設。但同一室內之天花板或屋頂板高度不同\n時，以平均高度計。\n┌──┬───────┬──────┬──────┬─────┐\n│裝置│未滿四公尺\n\n│四公尺以上\n\n│八公尺以上未│十五公尺以│\n\n│場所│\n\n│未滿八公尺\n\n│滿十五公尺\n\n│上未滿二十│\n\n│高度│\n\n│\n\n│\n\n│公尺\n\n│\n\n├──┼───────┼──────┼──────┼─────┤\n│探測│差動式局限型、│差動式局限型│差動式分佈型│離子式局限│\n│器種│差動式分布型、│、差動式分布│、離子式局限│型一種、光│\n│類\n\n│補償式局限型、│型、補償式局│型一種或二種│電式局限型│\n\n│\n\n│定溫式、離子式│限型、定溫式│、光電式局限│一種、光電│\n\n│\n\n│局限型、光電式│特種或一種、│型一種或二種│式分離型一│\n\n│\n\n│局限型、光電式│離子式局限型│、光電式分離│種、火焰式│\n\n│\n\n│分離型、火焰式│一種或二種、│型、火焰式。│。\n\n│\n\n│\n\n│。\n\n│光電式局限型│\n\n│\n\n│\n\n│\n\n│\n\n│一種或二種、│\n\n│\n\n│\n\n│\n\n│\n\n│光電式分離型│\n\n│\n\n│\n\n│\n\n│\n\n│、火焰式。\n\n│\n\n│\n\n│\n\n└──┴───────┴──────┴──────┴─────┘"],[1,"115","探測器之裝置位置，依下列規定：\n一、天花板上設有出風口時，除火焰式、差動式分布型及光電式分離型探測器外，應距離該出風\n口一點五公尺以上。\n二、牆上設有出風口時，應距離該出風口一點五公尺以上。但該出風口距天花板在一公尺以上時，\n不在此限。\n三、天花板設排氣口或回風口時，偵煙式探測器應裝置於排氣口或回風口周圍一公尺範圍內。\n四、局限型探測器以裝置在探測區域中心附近為原則。\n五、局限型探測器之裝置，不得傾斜四十五度以上。但火焰式探測器，不在此限。"],[1,"116","下列處所得免設探測器：\n一、探測器除火焰式外，裝置面高度超過二十公尺者。\n二、外氣流通無法有效探測火災之場所。\n三、洗手間、廁所或浴室。\n四、冷藏庫等設有能早期發現火災之溫度自動調整裝置者。\n五、主要構造為防火構造，且開口設有具一小時以上防火時效防火門之金庫。\n六、室內游泳池之水面或溜冰場之冰面上方。\n七、不燃性石材或金屬等加工場，未儲存或未處理可燃性物品處。\n八、其他經中央主管機關指定之場所。"],[1,"117","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n\n偵煙式或熱煙複合式局限型探測器不得設於下列處所：\n一、塵埃、粉末或水蒸氣會大量滯留之場所。\n二、會散發腐蝕性氣體之場所。\n三、廚房及其他平時煙會滯留之場所。\n四、顯著高溫之場所。\n五、排放廢氣會大量滯留之場所。\n六、煙會大量流入之場所。\n七、會結露之場所。\n八、設有用火設備其火焰外露之場所。\n九、其他對探測器機能會造成障礙之場所。\n\n火焰式探測器不得設於下列處所：\n\n一、前項第二款至第四款或第六款至第八款所列之處所。\n二、水蒸氣會大量滯留之處所。\n三、其他對探測器機能會造成障礙之處所。\n\n前二項所列場所，依下表狀況，選擇適當探測器設置："],[1,"118","下表所列場所應就偵煙式、熱煙複合式或火焰式探測器選擇設置：\n┌─┬─┬─────┬───┬────┬───┬───────┐\n│設│樓│走廊或通道│昇降機│天花板等│天花板│地下層、無開口│\n│置│梯│（限供第十│之昇降│高度在十│等高度│樓層及十一層以│\n│場│或│二條第一款│坑道或│五公尺以│超過二│上之各樓層（前│\n│所│斜│、第二款第│配管配│上，未滿│十公尺│揭所列樓層限供│\n│\n\n│坡│二目、第六│線管道│二十公尺│之場所│第十二條第一款│\n\n│\n\n│通│目至第十目│間\n\n│之場所\n\n│\n\n│、第二款第二目│\n\n│\n\n│道│、第四款及│\n\n│\n\n│\n\n│、第六目、第八│\n\n│\n\n│\n\n│第五款使用│\n\n│\n\n│\n\n│目至第十目及第│\n\n│\n\n│\n\n│者）\n\n│\n\n│\n\n│五款使用者）\n\n│\n\n│\n\n├─┼─┼─────┼───┼────┼───┼───────┤\n│偵│○│○\n\n│○\n\n│○\n\n│\n\n│○\n\n│\n\n│煙│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│式│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n├─┼─┼─────┼───┼────┼───┼───────┤\n│熱│\n\n│○\n\n│\n\n│\n\n│\n\n│○\n\n│\n\n│煙│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│複│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│合│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│式│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n├─┼─┼─────┼───┼────┼───┼───────┤\n│火│\n\n│\n\n│\n\n│○\n\n│○\n\n│○\n\n│\n\n│焰│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│式│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n├─┴─┴─────┴───┴────┴───┴───────┤\n│註：○表可選擇設置。\n\n│\n\n└──────────────────────────────┘"],[1,"119","探測器之探測區域，指探測器裝置面之四周以淨高四十公分以上之樑或類似構造體區劃包圍者。\n但差動式分布型及偵煙式探測器，其裝置面之四周淨高應為六十公分以上。"],[1,"120","差動式局限型、補償式局限型及定溫式局限型探測器，依下列規定設置：\n一、探測器下端，裝設在裝置面下方三十公分範圍內。\n二、各探測區域應設探測器數，依下表之探測器種類及裝置面高度，在每一有效探測範圍，至少\n設置一個。\n┌──────────┬────────┬────────┐\n│裝置面高度\n\n│未滿四公尺\n\n│四公尺以上未滿八│\n\n│\n\n│\n\n│公尺\n\n│\n\n├──────────┼────┬───┼────┬───┤\n│建築物構造\n\n│防火構造│其他建│防火構造│其他建│\n\n│\n\n│建築物\n\n│築物\n\n│建築物\n\n│築物\n\n│\n\n├───┬───┬──┼────┼───┼────┼───┤\n│探測器│差動式│一種│\n│種類及│\n\n│50\n\n│45\n\n│30\n\n│\n\n├──┼────┼───┼────┼───┤\n\n│有效探│局限型│二種│\n\n│40\n\n│35\n\n│25\n\n│\n\n│測範圍├───┼──┼────┼───┼────┼───┤\n│（平方│補償式│一種│\n│公尺）│\n\n│50\n\n│45\n\n│30\n\n│\n\n├──┼────┼───┼────┼───┤\n\n│\n\n│局限型│二種│\n\n│\n\n├───┼──┼────┼───┼────┼───┤\n\n│\n\n│定溫式│特種│\n\n│\n\n│\n\n├──┼────┼───┼────┼───┤\n\n│\n\n│\n\n│一種│\n\n│\n\n│\n\n├──┼────┼───┼────┼───┤\n\n│\n\n│局限型│二種│\n\n│40\n\n│40\n\n│30\n\n│15\n\n│35\n\n│35\n\n│30\n\n│–\n\n│25\n\n│25\n\n│15\n\n│–\n\n│\n\n│\n\n│\n\n│\n\n└───┴───┴──┴────┴───┴────┴───┘\n\n三、具有定溫式性能之探測器，應裝設在平時之最高周圍溫度，比補償式局限型探測器之標稱定\n溫點或其他具有定溫式性能探測器之標稱動作溫度低攝氏二十度以上處。但具二種以上標稱\n動作溫度者，應設在平時之最高周圍溫度比最低標稱動作溫度低攝氏二十度以上處。"],[1,"121","差動式分布型探測器，依下列規定設置：\n一、差動式分布型探測器為空氣管式時，應符合下列規定：\n（一）每一探測區域內之空氣管長度，露出部分在二十公尺以上。\n（二）裝接於一個檢出器之空氣管長度，在一百公尺以下。\n（三）空氣管裝置在裝置面下方三十公分範圍內。\n（四）空氣管裝置在自裝置面任一邊起一點五公尺以內之位置，其間距，在防火構造建築物，在\n九公尺以下，其他建築物在六公尺以下。但依探測區域規模及形狀能有效探測火災發生者，\n不在此限。\n二、差動式分布型探測器為熱電偶式時，應符合下列規定：\n（一）熱電偶應裝置在裝置面下方三十公分範圍內。\n（二）各探測區域應設探測器數，依下表之規定：\n┌───┬─────────┬─────────────┐\n│建築物│探測區域樓地板面積│應設探測器數\n\n│\n\n│構造\n\n│\n\n│\n\n│\n\n├───┼─────────┼─────────────┤\n│防火構│八十八平方公尺以下│至少四個\n\n│\n\n│造建築├─────────┼─────────────┤\n│物\n\n│超過八十八平方公尺│應設四個，每增加二十二平方│\n\n│\n\n│\n\n│公尺（包括未滿），增設一個│\n\n│\n\n│\n\n│。\n\n│\n\n├───┼─────────┼─────────────┤\n│其他建│七十二平方公尺以下│至少四個\n\n│\n\n│築物\n\n├─────────┼─────────────┤\n\n│\n\n│超過七十二平方公尺│應設四個，每增加十八平方公│\n\n│\n\n│\n\n│尺（包括未滿），增設一個。│\n\n└───┴─────────┴─────────────┘\n\n（三）裝接於一個檢出器之熱電偶數，在二十個以下。\n三、差動式分布型探測器為熱半導體式時，應符合下列規定：\n（一）探測器下端，裝設在裝置面下方三十公分範圍內。\n（二）各探測區域應設探測器數，依下表之探測器種類及裝置面高度，在每一有效探測範圍，至\n少設置二個。但裝置面高度未滿八公尺時，在每一有效探測範圍，至少設置一個。\n┌───┬─────────┬─────────────┐\n│裝置面│建築物之構造\n\n│探測器種類及有效探測範圍（│\n\n│高度\n\n│平方公尺）\n\n│\n\n│\n\n│\n\n│\n\n├──────┬──────┤\n\n│\n\n│\n\n│一種\n\n│二種\n\n│\n\n├───┼─────────┼──────┼──────┤\n│未滿八│防火構造建築物\n\n│65\n\n│36\n\n│\n\n│公尺\n\n├─────────┼──────┼──────┤\n\n│\n\n│他建築物\n\n│40\n\n│23\n\n│\n\n├───┼─────────┼──────┼──────┤\n│八公尺│防火構造建築物\n\n│50\n\n│–\n\n│\n\n│以上未│\n\n│\n\n│\n\n│\n\n│滿十五├─────────┼──────┼──────┤\n│公尺\n\n│其他建築物\n\n│30\n\n│–\n\n│\n\n└───┴─────────┴──────┴──────┘\n\n（三）裝接於一個檢出器之感熱器數量，在二個以上十五個以下。\n\n前項之檢出器應設於便於檢修處，且與裝置面不得傾斜五度以上。\n\n定溫式線型探測器，依下列規定設置：\n一、探測器設在裝置面下方三十公分範圍內。\n二、探測器在各探測區域，使用第一種探測器時，裝置在自裝置面任一點起水平距離三公尺（防\n火構造建築物為四點五公尺）以內；使用第二種探測器時，裝在自裝置面任一點起水平距離\n一公尺（防火構造建築物為三公尺）以內。"],[1,"122","偵煙式探測器除光電式分離型外，依下列規定裝置：\n一、居室天花板距樓地板面高度在二點三公尺以下或樓地板面積在四十平方公尺以下時，應設在\n其出入口附近。\n二、探測器下端，裝設在裝置面下方六十公分範圍內。\n三、探測器裝設於距離牆壁或樑六十公分以上之位置。\n四、探測器除走廊、通道、樓梯及傾斜路面外，各探測區域應設探測器數，依下表之探測器種類\n及裝置面高度，在每一有效探測範圍，至少設置一個。\n┌─────────┬──────────────────┐\n│\n\n│探測器種類及有效探測範圍（平方公尺）│\n\n│裝置面高度\n\n├───────────┬──────┤\n\n│\n\n│\n\n一\n\n種\n\n或\n\n二\n\n種\n\n│三\n\n種\n\n│\n\n├─────────┼───────────┼──────┤\n│未滿四公尺\n\n│150\n\n│50\n\n│\n\n├─────────┼───────────┼──────┤\n\n│四公尺以上未滿二十│75\n\n│–\n\n│\n\n│公尺\n\n│\n\n│\n\n│\n\n└─────────┴───────────┴──────┘\n\n五、探測器在走廊及通道，步行距離每三十公尺至少設置一個；使用第三種探測器時，每二十公\n尺至少設置一個；且距盡頭之牆壁在十五公尺以下，使用第三種探測器應在十公尺以下。但\n走廊或通道至樓梯之步行距離在十公尺以下，且樓梯設有平時開放式防火門或居室有面向該\n處之出入口時，得免設。\n六、在樓梯、斜坡通道及電扶梯，垂直距離每十五公尺至少設置一個；使用第三種探測器時，其\n垂直距離每十公尺至少設置一個。\n七、在昇降機坑道及管道間（管道截面積在一平方公尺以上者）\n，應設在最頂部。但昇降路頂部有\n昇降機機械室，且昇降路與機械室間有開口時，應設於機械室，昇降路頂部得免設。"],[1,"123","光電式分離型探測器，依下列規定設置：\n一、探測器之受光面設在無日光照射之處。\n二、設在與探測器光軸平行牆壁距離六十公分以上之位置。\n三、探測器之受光器及送光器，設在距其背部牆壁一公尺範圍內。\n四、設在天花板等高度二十公尺以下之場所。\n五、探測器之光軸高度，在天花板等高度百分之八十以上之位置。\n六、探測器之光軸長度，在該探測器之標稱監視距離以下。\n七、探測器之光軸與警戒區任一點之水平距離，在七公尺以下。\n\n前項探測器之光軸，指探測器受光面中心點與送光面中心點之連結線。"],[1,"124","火焰式探測器，依下列規定設置：\n一、裝設於天花板、樓板或牆壁。\n二、距樓地板面一點二公尺範圍內之空間，應在探測器標稱監視距離範圍內。\n三、探測器不得設在有障礙物妨礙探測火災發生處。\n四、探測器設在無日光照射之處。但設有遮光功能可避免探測障礙者，不在此限。"],[1,"125","火警受信總機應依下列規定裝置：\n一、具有火警區域表示裝置，指示火警發生之分區。\n二、火警發生時，能發出促使警戒人員注意之音響。\n三、附設與火警發信機通話之裝置。\n四、一棟建築物內設有二臺以上火警受信總機時，設受信總機處，設有能相互同時通話連絡之設\n\n備。\n五、受信總機附近備有識別火警分區之圖面資料。\n六、裝置蓄積式探測器或中繼器之火警分區，該分區在受信總機，不得有雙信號功能。\n七、受信總機、中繼器及偵煙式探測器，有設定蓄積時間時，其蓄積時間之合計，每一火警分區\n在六十秒以下，使用其他探測器時，在二十秒以下。\n八、歌廳、舞廳、夜總會、俱樂部、錄影節目帶播映場所（MTV 等）、視聽歌唱場所（KTV 等）、\n酒家、酒吧、酒店（廊）或其他類似場所，因營業時音量或封閉式隔間等特性，致難以聽到\n火警警鈴聲響或辨識緊急廣播語音，於火災發生時，應連動停止相關娛樂用影音設備。\n九、受信總機應具有於接受火災信號後一定時間內或再接受火災信號時，強制地區警報音響裝置\n鳴動之功能。\n\n總樓地板面積未達三百五十平方公尺之建築物，得設置單回路火警受信總機，其裝置不受前項第\n一款及第三款至第五款之限制；符合第十九條第一項第四款所定之樓層及場所用途分類，且該層\n樓地板面積未達三百五十平方公尺者，亦同。"],[1,"126","火警受信總機之位置，依下列規定裝置：\n一、裝置於值日室等經常有人之處所。但設有防災中心時，設於該中心。\n二、裝置於日光不直接照射之位置。\n三、避免傾斜裝置，其外殼應接地。\n四、壁掛型總機操作開關距離樓地板面之高度，在零點八公尺（座式操作者，為零點六公尺）以\n上一點五公尺以下。"],[1,"127","火警自動警報設備之配線，除依用戶用電設備裝置規則外，依下列規定設置：\n一、常開式之探測器信號回路，其配線採用串接式，並加設終端電阻，以便藉由火警受信總機作\n回路斷線自動檢出用。\n二、Ｐ型受信總機採用數個分區共用一公用線方式配線時，該公用線供應之分區數，不得超過七\n個。\n三、Ｐ型受信總機之探測器回路電阻，在五十 Ω 以下。\n四、電源回路導線間及導線與大地間之絕緣電阻值，以直流二百五十伏特額定之絕緣電阻計測定，\n對地電壓在一百五十伏特以下者，在零點一ＭΩ 以上，對地電壓超過一百五十伏特者，在零\n點二ＭΩ 以上。探測器回路導線間及導線與大地間之絕緣電阻值，以直流二百五十伏特額定\n之絕緣電阻計測定，每一火警分區在零點一ＭΩ 以上。\n五、埋設於屋外或有浸水之虞之配線，採用電纜並穿於金屬管或塑膠導線管，與電力線保持三十\n公分以上之間距。"],[1,"128","火警自動警報設備之緊急電源，應使用蓄電池設備，其容量能使其有效動作十分鐘以上。"],[0,"第 二 節 手動報警設備"],[1,"129","每一火警分區，依下列規定設置火警發信機：\n一、按鈕按下時，能即刻發出火警音響。\n二、按鈕前有防止隨意撥弄之保護板。\n三、附設緊急電話插座。\n四、裝置於屋外之火警發信機，具防水之性能。\n\n二樓層共用一火警分區者，火警發信機應分別設置。但樓梯或管道間之火警分區，得免設。"],[1,"130","設有火警發信機之處所，其標示燈應平時保持明亮，標示燈與裝置面成十五度角，在十公尺距離\n內須無遮視物且明顯易見。"],[1,"131","設有火警發信機之處所，其火警警鈴，依下列規定設置：\n一、電壓到達規定電壓之百分之八十時，能即刻發出音響。\n二、在規定電壓下，離開火警警鈴一百公分處，所測得之音壓，在九十分貝以上。\n三、電鈴絕緣電阻以直流二百五十伏特額定之絕緣電阻計測定，在二十ＭΩ 以上。\n四、警鈴音響應有別於建築物其他音響，並除報警外不得兼作他用。\n\n依本章第三節設有緊急廣播設備時，得免設前項火警警鈴。"],[1,"132","火警發信機、標示燈及火警警鈴，依下列規定裝置：\n一、裝設於火警時人員避難通道內適當而明顯之位置。\n二、火警發信機離地板面之高度在一點二公尺以上一點五公尺以下。\n三、標示燈及火警警鈴距離地板面之高度，在二公尺以上二點五公尺以下。但與火警發信機合併\n裝設者，不在此限。\n四、建築物內裝有消防立管之消防栓箱時，火警發信機、標示燈及火警警鈴裝設在消防栓箱上方\n牆上。"],[0,"第 三 節 緊急廣播設備"],[1,"133","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n緊急廣播設備，依下列規定裝置：\n一、距揚聲器一公尺處所測得之音壓應符合下表規定：\n\n┌─────┬────────────┐\n│揚聲器種類│音\n\n壓│\n\n├─────┼────────────┤\n│Ｌ級\n\n│ 92 分貝以上\n\n│\n\n├─────┼────────────┤\n│Ｍ級\n\n│ 87 分貝以上 92 分貝未滿│\n\n├─────┼────────────┤\n│Ｓ級\n\n│ 84 分貝以上 87 分貝未滿│\n\n└─────┴────────────┘\n\n二、揚聲器，依下列規定裝設：\n（一）廣播區域超過一百平方公尺時，設Ｌ級揚聲器。\n（二）廣播區域超過五十平方公尺一百平方公尺以下時，設Ｌ級或Ｍ級揚聲器。\n（三）廣播區域在五十平方公尺以下時，設Ｌ級、Ｍ級或Ｓ級揚聲器。\n（四）從各廣播區域內任一點至揚聲器之水平距離在十公尺以下。但居室樓地板面積在六平方公\n尺或由居室通往地面之主要走廊及通道樓地板面積在六平方公尺以下，其他非居室部分樓\n地板面積在三十平方公尺以下，且該區域與相鄰接區域揚聲器之水平距離相距八公尺以下\n時，得免設。\n（五）設於樓梯或斜坡通道時，至少垂直距離每十五公尺設一個Ｌ級揚聲器。\n三、樓梯或斜坡通道以外之場所，揚聲器之音壓及裝設符合下列規定者，不受前款第四目之限制：\n（一）廣播區域內距樓地板面一公尺處，依下列公式求得之音壓在七十五分貝以上者。\nＰ＝ｐ＋１０ｌｏｇ10（Ｑ／4πr2 ＋ 4（1-a）／Ｓα）\n\nＰ值：音壓（單位：dB）\nｐ值：揚聲器音響功率（單位：dB）\nＱ值：揚聲器指向係數\nｒ值：受音點至揚聲器之距離（單位：公尺）\nα 值：廣播區域之平均吸音率\nＳ值：廣播區域內牆壁、樓地板及天花板面積之合計（單位：平方\n公尺）\n\n（二）廣播區域之殘響時間在三秒以上時，距樓地板面一公尺處至揚聲器之距離，在下列公式求\n得值以下者。\n┌──────────\nｒ＝３／４ │ＱＳα／π (１－α)\n\nˇ\nｒ值：受音點至揚聲器之距離（單位：公尺）\nＱ值：揚聲器指向係數\nＳ值：廣播區域內牆壁、樓地板及天花板面積之合計（單位：平方\n公尺）\nα 值：廣播區域之平均吸音率"],[1,"134","裝設緊急廣播設備之建築物，依下列規定劃定廣播分區：\n一、每一廣播分區不得超過一樓層。\n二、室內安全梯或特別安全梯應垂直距離每四十五公尺單獨設定一廣播分區。安全梯或特別安全\n梯之地下層部分，另設定一廣播分區。\n三、建築物挑空構造部分，所設揚聲器音壓符合規定時，該部分得為一廣播分區。"],[1,"135","緊急廣播設備與火警自動警報設備連動時，其火警音響之鳴動準用第一百十三條之規定。\n\n緊急廣播設備之音響警報應以語音方式播放。\n\n緊急廣播設備之緊急電源，準用第一百二十八條之規定。"],[1,"136","緊急廣播設備之啟動裝置應符合 CNS\n\n一○五二二之規定，並依下列規定設置：\n\n一、各樓層任一點至啟動裝置之步行距離在五十公尺以下。\n二、設在距樓地板高度零點八公尺以上一點五公尺以下範圍內。\n三、各類場所第十一層以上之各樓層、地下第三層以下之各樓層或地下建築物，應使用緊急電話\n方式啟動。"],[1,"137","緊急廣播設備與其他設備共用者，在火災時應能遮斷緊急廣播設備以外之廣播。"],[1,"138","擴音機及操作裝置，應符合 CNS\n\n一○五二二之規定，並依下列規定設置：\n\n一、操作裝置與啟動裝置或火警自動警報設備動作連動，並標示該啟動裝置或火警自動警報設備\n所動作之樓層或區域。\n二、具有選擇必要樓層或區域廣播之性能。\n三、各廣播分區配線有短路時，應有短路信號之標示。\n四、操作裝置之操作開關距樓地板面之高度，在零點八公尺以上（座式操作者，為零點六公尺）\n一點五公尺以下。\n\n五、操作裝置設於值日室等經常有人之處所。但設有防災中心時，設於該中心。"],[1,"139","緊急廣播設備之配線，除依用戶用電設備裝置規則外，依下列規定設置：\n一、導線間及導線對大地間之絕緣電阻值，以直流二百五十伏特額定之絕緣電阻計測定，對地電\n壓在一百五十伏特以下者，在零點一ＭΩ 以上，對地電壓超過一百五十伏特者，在零點二ＭΩ\n以上。\n二、不得與其他電線共用管槽。但電線管槽內之電線用於六十伏特以下之弱電回路者，不在此限。\n三、任一層之揚聲器或配線有短路或斷線時，不得影響其他樓層之廣播。\n四、設有音量調整器時，應為三線式配線。"],[0,"第 四 節 瓦斯漏氣火警自動警報設備"],[1,"140","瓦斯漏氣火警自動警報設備依第一百十二條之規定劃定警報分區。\n\n前項瓦斯，指下列氣體燃料：\n一、天然氣。\n二、液化石油氣。\n三、其他經中央主管機關指定者。"],[1,"141","瓦斯漏氣檢知器，依瓦斯特性裝設於天花板或牆面等便於檢修處，並符合下列規定：\n一、瓦斯對空氣之比重未滿一時，依下列規定：\n（一）設於距瓦斯燃燒器具或瓦斯導管貫穿牆壁處水平距離八公尺以內。但樓板有淨高六十公分\n以上之樑或類似構造體時，設於近瓦斯燃燒器具或瓦斯導管貫穿牆壁處。\n（二）瓦斯燃燒器具室內之天花板附近設有吸氣口時，設在距瓦斯燃燒器具或瓦斯導管貫穿牆壁\n處與天花板間，無淨高六十公分以上之樑或類似構造體區隔之吸氣口一點五公尺範圍內。\n（三）檢知器下端，裝設在天花板下方三十公分範圍內。\n二、瓦斯對空氣之比重大於一時，依下列規定：\n（一）設於距瓦斯燃燒器具或瓦斯導管貫穿牆壁處水平距離四公尺以內。\n（二）檢知器上端，裝設在距樓地板面三十公分範圍內。\n三、水平距離之起算，依下列規定：\n（一）瓦斯燃燒器具為燃燒器中心點。\n（二）瓦斯導管貫穿牆壁處為面向室內牆壁處之瓦斯配管中心處。"],[1,"142","瓦斯漏氣受信總機，依下列規定：\n一、裝置於值日室等平時有人之處所。但設有防災中心時，設於該中心。\n\n二、具有標示瓦斯漏氣發生之警報分區。\n三、設於瓦斯導管貫穿牆壁處之檢知器，其警報分區應個別標示。\n四、操作開關距樓地板面之高度，須在零點八公尺以上（座式操作者為零點六公尺）一點五公尺\n以下。\n五、主音響裝置之音色及音壓應有別於其他警報音響。\n六、一棟建築物內有二臺以上瓦斯漏氣受信總機時，該受信總機處，設有能相互同時通話連絡之\n設備。"],[1,"143","瓦斯漏氣之警報裝置，依下列規定：\n一、瓦斯漏氣表示燈，依下列規定。但在一警報分區僅一室時，得免設之。\n（一）設有檢知器之居室面向通路時，設於該面向通路部分之出入口附近。\n（二）距樓地板面之高度，在四點五公尺以下。\n（三）其亮度在表示燈前方三公尺處能明確識別，並於附近標明瓦斯漏氣表示燈字樣。\n二、檢知器所能檢知瓦斯漏氣之區域內，該檢知器動作時，該區域內之檢知區域警報裝置能發出\n警報音響，其音壓在距一公尺處應有七十分貝以上。但檢知器具有發出警報功能者，或設於\n機械室等常時無人場所及瓦斯導管貫穿牆壁處者，不在此限。"],[1,"144","瓦斯漏氣火警自動警報設備之配線，除依用戶用電設備裝置規則外，依下列規定：\n一、電源回路導線間及導線對大地間之絕緣電阻值，以直流五百伏特額定之絕緣電阻計測定，對\n地電壓在一百五十伏特以下者，應在零點一ＭΩ 以上，對地電壓超過一百五十伏特者，在零\n點二ＭΩ 以上。檢知器回路導線間及導線與大地間之絕緣電阻值，以直流五百伏特額定之絕\n緣電阻計測定，每一警報分區在零點一ＭΩ 以上。\n二、常開式檢知器信號回路之配線採用串接式，並加設終端電阻，以便藉由瓦斯漏氣受信總機作\n斷線自動檢出用。\n三、檢知器回路不得與瓦斯漏氣火警自動警報設備以外之設備回路共用。"],[1,"145","瓦斯漏氣火警自動警報設備之緊急電源應使用蓄電池設備，其容量應能使二回路有效動作十分鐘\n以上，其他回路能監視十分鐘以上。"],[1,"145-1","一一九火災通報裝置，依下列規定設置：\n一、應具手動及自動啟動功能。\n二、應設於值日室等經常有人之處所。但設有防災中心時，應設於該中心。\n三、設置遠端啟動裝置時，應設有可與設置一一九火災通報裝置場所通話之設備。\n\n四、手動啟動裝置之操作開關距離樓地板面之高度，在零點八公尺以上一點五公尺以下。\n五、裝置附近，應設置送、收話器，並與其他內線電話明確區分。\n六、應避免斜裝置，並採取有效防震措施。"],[0,"第 三 章 避難逃生設備"],[0,"第 一 節 標示設備"],[1,"146","下列處所得免設出口標示燈、避難方向指示燈或避難指標：\n一、自居室任一點易於觀察識別其主要出入口，且與主要出入口之步行距離符合下列規定者。但\n位於地下建築物、地下層或無開口樓層者不適用之：\n（一）該步行距離在避難層為二十公尺以下，在避難層以外之樓層為十公尺以下者，得免設出口\n標示燈。\n（二）該步行距離在避難層為四十公尺以下，在避難層以外之樓層為三十公尺以下者，得免設避\n難方向指示燈。\n（三）該步行距離在三十公尺以下者，得免設避難指標。\n二、居室符合下列規定者：\n（一）自居室任一點易於觀察識別該居室出入口，且依用途別，其樓地板面積符合下表規定。\n┌───┬──────┬───────┬────────┐\n│ 途別 │第十二條第一│第十二條第一款│第十二條第一款第│\n│\n\n│款第一目至第│第四目、第五目│六目、第二款第一│\n\n│\n\n│三目\n\n│、第七目、第二│目至第九目、第十│\n\n│\n\n│\n\n│款第十目\n\n│一目、第十二目、│\n\n│\n\n│\n\n│\n\n│第三款、第四款\n\n│\n\n├───┼──────┼───────┼────────┤\n│居室樓│一百平方公尺│二百平方公尺以│四百平方公尺以下│\n│地板面│以下\n\n│下\n\n│\n\n│\n\n│積\n\n│\n\n│\n\n│\n\n│\n\n└───┴──────┴───────┴────────┘\n\n（二）供集合住宅使用之居室。\n三、通往主要出入口之走廊或通道之出入口，設有探測器連動自動關閉裝置之防火門，並設有避\n難指標及緊急照明設備確保該指標明顯易見者，得免設出口標示燈。\n四、樓梯或坡道，設有緊急照明設備及供確認避難方向之樓層標示者，得免設避難方向指示燈。\n\n前項第一款及第三款所定主要出入口，在避難層，指通往戶外之出入口，設有排煙室者，為該室\n之出入口；在避難層以外之樓層，指通往直通樓梯之出入口，設有排煙室者，為該室之出入口。"],[1,"146-1","出口標示燈及非設於樓梯或坡道之避難方向指示燈，其標示面縱向尺度及光度依等級區分如下：\n┌─────────┬───────────┬────────┐\n│\n\n區分\n\n│標示面縱向尺度（m）\n\n│標示面光度（cd）│\n\n├──────┬──┼───────────┼────────┤\n│\n\n│A 級│零點四以上\n\n│五十以上\n\n│\n\n│\n\n├──┼───────────┼────────┤\n\n│出口標示燈\n\n│B 級│零點二以上，未滿零點四│十以上\n\n│\n\n├──┼───────────┼────────┤\n\n│\n\n│C 級│零點一以上，未滿零點二│一點五以上\n\n│\n\n│\n\n├──────┼──┼───────────┼────────┤\n│\n\n│A 級│零點四以上\n\n│六十以上\n\n│\n\n│避難方向指示├──┼───────────┼────────┤\n│燈\n\n│B 級│零點二以上，未滿零點四│十三以上\n\n│\n\n│\n\n├──┼───────────┼────────┤\n\n│\n\n│C 級│零點一以上，未滿零點二│五以上\n\n│\n\n└──────┴──┴───────────┴────────┘"],[1,"146-2","出口標示燈及避難方向指示燈之有效範圍，指至該燈之步行距離，在下列二款之一規定步行距離\n以下之範圍。但有不易看清或識別該燈情形者，該有效範圍為十公尺：\n一、依下表之規定：\n┌───────────────────┬────────┐\n│\n\n區分\n\n│步行距離（公尺）│\n\n├─────┬──┬──────────┼────────┤\n│\n\n│\n\n│未顯示避難方向符號者│六十\n\n│\n\n│A 級├──────────┼────────┤\n\n│\n\n│\n\n│\n\n├──┼──────────┼────────┤\n\n│出口標示燈│\n\n│顯示避難方向符號者\n\n│四十\n\n│未顯示避難方向符號者│三十\n\n│\n\n│\n\n│\n\n│\n\n│B 級├──────────┼────────┤\n\n│\n\n│\n\n│\n\n├──┴──────────┼────────┤\n\n│\n\n│C 級\n\n│顯示避難方向符號者\n\n│二十\n\n│十五\n\n│\n\n│\n\n├─────┼─────────────┼────────┤\n\n│\n\n│A 級\n\n│二十\n\n│\n\n├─────────────┼────────┤\n\n│避難方向指│B 級\n\n│十五\n\n│\n\n│\n\n│示燈\n\n├─────────────┼────────┤\n\n│\n\n│C 級\n\n│十\n\n│\n\n└─────┴─────────────┴────────┘\n\n二、依下列計算值：D＝kh 式中，D：步行距離（公尺）h：出口標示燈或避難方向指示燈標示面之\n縱向尺度（公尺）k：依下表左欄所列區分，採右欄對應之 k 值\n┌────────────────┬────┐\n│\n\n區分\n\n│\n\nk 值\n\n│\n\n├─────┬──────────┼────┤\n│出口標示燈│未顯示避難方向符號者│一百五十│\n│\n\n├──────────┼────┤\n\n│\n\n│顯示避難方向符號者\n\n│一百\n\n│\n\n├─────┴──────────┼────┤\n│避難方向指示燈\n\n│五十\n\n│\n\n└────────────────┴────┘"],[1,"146-3","出口標示燈應設於下列出入口上方或其緊鄰之有效引導避難處：\n一、通往戶外之出入口；設有排煙室者，為該室之出入口。\n二、通往直通樓梯之出入口；設有排煙室者，為該室之出入口。\n三、通往前二款出入口，由室內往走廊或通道之出入口。\n四、通往第一款及第二款出入口，走廊或通道上所設跨防火區劃之防火門。\n\n避難方向指示燈，應裝設於設置場所之走廊、樓梯及通道，並符合下列規定：\n一、優先設於轉彎處。\n二、設於依前項第一款及第二款所設出口標示燈之有效範圍內。\n三、設於前二款規定者外，把走廊或通道各部分包含在避難方向指示燈有效範圍內，必要之地點。"],[1,"146-4","出口標示燈及避難方向指示燈之裝設，應符合下列規定：\n一、設置位置應不妨礙通行。\n二、周圍不得設有影響視線之裝潢及廣告招牌。\n三、設於地板面之指示燈，應具不因荷重而破壞之強度。\n\n四、設於可能遭受雨淋或溼氣滯留之處所者，應具防水構造。"],[1,"146-5","出口標示燈及非設於樓梯或坡道之避難方向指示燈，設於下列場所時，應使用 A 級或 B 級；出口\n標示燈標示面光度應在二十燭光（cd）以上，或具閃滅功能；避難方向指示燈標示面光度應在二\n十五燭光（cd）以上。但設於走廊，其有效範圍內各部分容易識別該燈者，不在此限：\n一、供第十二條第二款第一目、第三款第三目或第五款第三目使用者。\n二、供第十二條第一款第一目至第五目、第七目或第五款第一目使用，該層樓地板面積在一千平\n方公尺以上者。\n三、供第十二條第一款第六目使用者。其出口標示燈並應採具閃滅功能，或兼具音聲引導功能者。\n\n前項出口標示燈具閃滅或音聲引導功能者，應符合下列規定：\n一、設於主要出入口。\n二、與火警自動警報設備連動。\n三、由主要出入口往避難方向所設探測器動作時，該出入口之出口標示燈應停止閃滅及音聲引導。\n\n避難方向指示燈設於樓梯或坡道者，在樓梯級面或坡道表面之照度，應在一勒克司（lx）以上。"],[1,"146-6","觀眾席引導燈之照度，在觀眾席通道地面之水平面上測得之值，在零點二勒克司（lx）以上。"],[1,"146-7","出口標示燈及避難方向指示燈，應保持不熄滅。\n\n出口標示燈及非設於樓梯或坡道之避難方向指示燈，與火警自動警報設備之探測器連動亮燈，且\n配合其設置場所使用型態採取適當亮燈方式，並符合下列規定之一者，得予減光或消燈。\n一、設置場所無人期間。\n二、設置位置可利用自然採光辨識出入口或避難方向期間。\n三、設置在因其使用型態而特別需要較暗處所，於使用上較暗期間。\n四、設置在主要供設置場所管理權人、其雇用之人或其他固定使用之人使用之處所。\n\n設於樓梯或坡道之避難方向指示燈，與火警自動警報設備之探測器連動亮燈，且配合其設置場所\n使用型態採取適當亮燈方式，並符合前項第一款或第二款規定者，得予減光或消燈。"],[1,"147","（刪除）"],[1,"148","（刪除）"],[1,"149","（刪除）"],[1,"150","（刪除）"],[1,"151","（刪除）"],[1,"152","（刪除）"],[1,"153","避難指標，依下列規定設置：\n一、設於出入口時，裝設高度距樓地板面一點五公尺以下。\n二、設於走廊或通道時，自走廊或通道任一點至指標之步行距離在七點五公尺以下。且優先設於\n走廊或通道之轉彎處。\n三、周圍不得設有影響視線之裝潢及廣告招牌。\n四、設於易見且採光良好處。"],[1,"154","出口標示燈及避難方向指示燈，應符合出口標示燈及避難方向指示燈認可基準規定。\n\n避難指標之構造，應符合 CNS\n\n一○二○八之規定。"],[1,"155","出口標示燈及避難方向指示燈之緊急電源應使用蓄電池設備，其容量應能使其有效動作二十分鐘\n以上。但設於下列場所之主要避難路徑者，該容量應在六十分鐘以上，並得採蓄電池設備及緊急\n發電機併設方式：\n一、總樓地板面積在五萬平方公尺以上。\n二、高層建築物，其總樓地板面積在三萬平方公尺以上。\n三、地下建築物，其總樓地板面積在一千平方公尺以上。\n\n前項之主要避難路徑，指符合下列規定者：\n一、通往戶外之出入口；設有排煙室者，為該室之出入口。\n二、通往直通樓梯之出入口；設有排煙室者，為該室之出入口。\n三、通往第一款出入口之走廊或通道。\n四、直通樓梯。"],[1,"156","出口標示燈及避難方向指示燈之配線，依用戶用電設備裝置規則外，並應符合下列規定：\n一、蓄電池設備集中設置時，直接連接於分路配線，不得裝置插座或開關等。\n二、電源回路不得設開關。但以三線式配線使經常充電或燈具內置蓄電池設備者，不在此限。"],[0,"第 二 節 避難器具"],[1,"157","避難器具，依下表選擇設置之：\n┌──────────────┬───┬───┬───┬───┐\n│\n\n設置場所應設數量\n\n│地下層│第二層│第三層│第六層│\n\n│\n\n│\n\n│\n\n│、第四│以上之│\n\n│\n\n│\n\n│\n\n│層或第│樓層\n\n│\n\n│\n\n│\n\n│\n\n│五層\n\n│\n\n│\n\n├─┬────────────┼───┼───┼───┼───┤\n│1 │第二層以上之樓層或地下層│避難梯│避難梯│避難橋│避難橋│\n│\n\n│供第十二條第一款第六目、│\n\n│、避難│、救助│、救助│\n\n│\n\n│第二款第十二目使用，其收│\n\n│橋、緩│袋、滑│袋、滑│\n\n│\n\n│容人員在二十人（其下面樓│\n\n│降機、│臺\n\n│臺\n\n│\n\n│\n\n│層供第十二條第一款第一目│\n\n│救助袋│\n\n│\n\n│\n\n│\n\n│至第五目、第七目、第二款│\n\n│、滑臺│\n\n│\n\n│\n\n│\n\n│第二目、第六目、第七目、│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│第三款第三目或第四款所列│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│場所使用時，應為十人）以│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│上一百人以下時，設一具；│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│超過一百人時，每增加（包│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│含未滿）一百人增設一具。│\n\n│\n\n│\n\n│\n\n│\n\n├─┼────────────┼───┼───┼───┼───┤\n│2 │第二層以上之樓層或地下層│避難梯│避難梯│避難梯│避難梯│\n│\n\n│供第十二條第一款第三目、│\n\n│、避難│、避難│、避難│\n\n│\n\n│第二款第七目使用，其收容│\n\n│橋、避│橋、緩│橋、緩│\n\n│\n\n│人員在三十人（其下面樓層│\n\n│難繩索│降機、│降機、│\n\n│\n\n│供第十二條第一款第一目、│\n\n│、緩降│救助袋│救助袋│\n\n│\n\n│第二目、第四目、第五目、│\n\n│機、救│、滑臺│、滑臺│\n\n│\n\n│第七目、第二款第二目、第│\n\n│助袋、│\n\n│\n\n│\n\n│\n\n│六目、第七目之住宿型精神│\n\n│滑臺、│\n\n│\n\n│\n\n│\n\n│復建機構或第四款所列場所│\n\n│滑杆\n\n│\n\n│\n\n│\n\n│\n\n│使用時，應為十人）以上一│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│百人以下時，設一具；超過│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│一百人時，每增加（包括未│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│滿）一百人增設一具。\n\n│\n\n│\n\n│\n\n│\n\n│\n\n├─┼────────────┼───┼───┼───┼───┤\n│3 │第二層以上之樓層或地下層│避難梯│同上\n\n│同上\n\n│同上\n\n│\n\n│\n\n│供第十二條第一款第一目、│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│第二目、第四目、第五目、│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│第七目或第二款第一目至第│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│五目、第八目、第九目所列│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│場所使用，其收容人員在五│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│十人以上二百人以下時，設│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│一具；超過二百人時，每增│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│加二百人（包括未滿）增設│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│一具。\n\n│\n\n│\n\n│\n\n│\n\n│\n\n├─┼────────────┼───┼───┼───┼───┤\n│4 │第三層以上之樓層或地下層│避難梯│\n\n│同上\n\n│同上\n\n│\n\n│\n\n│供第十二條第二款第六目、│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│第十目或第四款所列場所使│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│用，其收容人員在一百人以│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│上三百人以下時，設一具；│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│超過三百人，每增加三百人│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│（包括未滿）增設一具。\n\n│\n\n│\n\n│\n\n│\n\n│\n\n├─┼────────────┼───┼───┼───┼───┤\n│5 │第十二條所列各類場所第三│\n\n│同上\n\n│同上\n\n│同上\n\n│\n\n│\n\n│層（供第十二條第一款第一│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│目至第三目所列場所使用，│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│或供同條第五款第一目使用│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│之二樓有第一款第一目至第│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│三目所列場所使用時，應為│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│二樓）以上之樓層，其直通│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│避難層或地面之樓梯僅一座│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│，且收容人員在十人以上一│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│百人以下時，應設一具，超│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│過一百人時，每增加（包括│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│未滿）一百人增設一具。\n\n│\n\n│\n\n│\n\n│\n\n│\n\n├─┴────────────┴───┴───┴───┴───┤\n│註：設置場所各樓層得選設之器具，除依本表規定外，亦得選設經中│\n│\n\n央消防主管機關認可之避難器具。\n\n│\n\n└──────────────────────────────┘"],[1,"158","各類場所之各樓層，其應設避難器具得分別依下列規定減設之：\n一、前條附表 1、至 5\n\n所列場所，符合下列規定者，其設置場所應設數量欄所列收容人員一百\n\n人、二百人及三百人，得分別以其加倍數值，重新核算其應設避難器具數：\n（一）建築物主要構造為防火構造者。\n（二）設有二座以上不同避難方向之安全梯者。但剪刀式樓梯視為一座。\n二、設有避難橋之屋頂平臺，其直下層設有二座以上安全梯可通達，且屋頂平臺合於下列規定時，\n其直下層每一座避難橋可減設二具：\n（一）屋頂平臺淨空間面積在一百平方公尺以上。\n（二）臨屋頂平臺出入口設具半小時以上防火時效之防火門窗，且無避難逃生障礙。\n（三）通往避難橋必須經過之出入口，具容易開關之構造。\n三、設有架空走廊之樓層，其架空走廊合於下列規定者，該樓層每一座架空走廊可減設二具：\n（一）為防火構造。\n（二）架空走廊二側出入口設有能自動關閉之具一小時以上防火時效之防火門（不含防火鐵捲\n門）。\n（三）不得供避難、通行及搬運以外之用途使用。"],[1,"159","各類場所之各樓層符合下列規定之一者，其應設之避難器具得免設：\n一、主要構造為防火構造，居室面向戶外部分，設有陽臺等有效避難設施，且該陽臺等設施設有\n可通往地面之樓梯或通往他棟建築物之設施。\n二、主要構造為防火構造，由居室或住戶可直接通往直通樓梯，且該居室或住戶所面向之直通樓\n梯，設有隨時可自動關閉之具一小時以上防火時效之防火門（不含防火鐵捲門）\n，且收容人員\n未滿三十人。\n三、供第十二條第二款第六目、第十目或第四款所列場所使用之樓層，符合下列規定者：\n（一）主要構造為防火構造。\n（二）設有二座以上安全梯，且該樓層各部分均有二個以上不同避難逃生路徑能通達安全梯。\n四、供第十二條第二款第一目、第二目、第五目、第八目或第九目所列場所使用之樓層，除符合\n前款規定外，且設有自動撒水設備或內部裝修符合建築技術規則建築設計施工篇第八十八條\n規定者。\n五、供第十二條第一款第六目之榮譽國民之家、長期照顧服務機構（限機構住宿式、社區式之建\n築物使用類組非屬 H\n\n條之二之日間照顧、團體家屋及小規模多機能）\n、老人福利機構（限長\n\n期照護型、養護型、失智照顧型之長期照顧機構、安養機構）\n、兒童及少年福利機構（限托嬰\n\n中心、早期療育機構、有收容未滿二歲兒童之安置及教養機構）\n、護理機構（限一般護理之家、\n精神護理之家、產後護理機構）\n、身心障礙福利機構（限供住宿養護、日間服務、臨時及短期\n照顧者）場所使用之樓層，符合下列規定者：\n（一）各樓層以具一小時以上防火時效之牆壁及防火設備分隔為二個以上之區劃，各區劃均以走\n廊連接安全梯，或分別連接不同安全梯。\n（二）裝修材料以耐燃一級材料裝修。\n（三）設有火警自動警報設備及自動撒水設備（含同等以上效能之滅火設備）。"],[1,"160","第一百五十七條表列收容人員之計算，依下表規定：\n┌─┬────────────┬───────────────┐\n│\n\n│\n\n各類場所\n\n│\n\n收容人員計算方式\n\n│\n\n├─┼────────────┼───────────────┤\n│1 │電影片映演場所（戲院、電│其收容人員人數，為下列各款合計│\n│\n\n│影院）、歌廳、集會堂、體│之數額：\n\n│\n\n│\n\n│育館、活動中心\n\n│一、從業員工數。\n\n│\n\n│\n\n│\n\n│二、各觀眾席部分以下列數額合計│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│（一）設固定席位部分以該部分座│\n\n│\n\n│\n\n│\n\n椅數計之。如為連續式席位│\n\n│\n\n│\n\n│\n\n，為該座椅正面寬度除零點│\n\n│\n\n│\n\n│\n\n四公尺所得之數（未滿一之│\n\n│\n\n│\n\n│\n\n零數不計）。\n\n│\n\n│\n\n│（二）設立位部分以該部分樓地板│\n\n│\n\n│\n\n│\n\n面積除零點二平方公尺所得│\n\n│\n\n│\n\n│\n\n之數。\n\n│\n\n│\n\n│（三）其他部分以該部分樓地板面│\n\n│\n\n│\n\n│\n\n積除零點五平方公尺所得之│\n\n│\n\n│\n\n│\n\n數。\n\n之。\n\n│\n\n│\n\n│\n\n│\n\n├─┼────────────┼───────────────┤\n│2 │遊藝場所、電子遊戲場、資│其收容人員人數，為下列各款合計│\n│\n\n│訊休閒場所\n\n│之數額：\n\n│\n\n│\n\n│\n\n│一、從業員工數。\n\n│\n\n│\n\n│\n\n│二、遊樂用機械器具能供進行遊樂│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│三、供觀覽、飲食或休息使用設固│\n\n之人數。\n\n│\n\n│\n\n│\n\n│\n\n定席位者，以該座椅數計之。│\n\n│\n\n│\n\n│\n\n如為連續式席位，為該座椅正│\n\n│\n\n│\n\n│\n\n面寬度除零點五公尺所得之數│\n\n│\n\n│\n\n│\n\n（未滿一之零數不計）。\n\n│\n\n├─┼────────────┼───────────────┤\n│3 │舞廳、舞場、夜總會、俱樂│其收容人員人數，為下列各款合計│\n│\n\n│部、酒家、酒吧、酒店（廊│之數額：\n\n│\n\n│\n\n│）、理容院、指壓按摩場所│一、從業員工數。\n\n│\n\n│\n\n│、節目錄影帶播映場所、視│二、各客人座席部分以下列數額合│\n\n│\n\n│聽歌唱場所、保齡球館、室│\n\n│\n\n│內溜冰場、撞球場、健身休│（一）設固定席位部分，以該部分│\n\n│\n\n│閒中心（含提供指壓、三溫│\n\n座椅數計之。如為連續式席│\n\n│\n\n│暖等設施之美容瘦身場所）│\n\n位，為該座椅正面寬度除零│\n\n│\n\n│、室內螢幕式高爾夫練習場│\n\n點五公尺所得之數（未滿一│\n\n│\n\n│、餐廳、飲食店、咖啡廳、│\n\n之零數不計）。\n\n│\n\n│茶藝館及其他類似場所\n\n│（二）其他部分以該部分樓地板面│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│三、保齡球館之球場以附屬於球道│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│四、視聽歌唱場所之包廂，以其固│\n\n│\n\n│\n\n│\n\n定座椅數及麥克風數之合計為│\n\n│\n\n│\n\n│\n\n準。\n\n計之：\n\n│\n\n│\n\n積除三平方公尺所得之數。│\n\n之座椅數為準。\n\n│\n\n│\n\n├─┼────────────┼───────────────┤\n│4 │商場、市場、百貨商場、超│其收容人員人數，為下列各款合計│\n│\n\n│級市場、零售市場、展覽場│之數額：\n\n│\n\n│\n\n│\n\n│一、從業員工數。\n\n│\n\n│\n\n│\n\n│二、供從業人員以外者使用部分，│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│（一）供飲食或休息用部分，以該│\n\n│\n\n│\n\n│\n\n部分樓地板面積除三平方公│\n\n│\n\n│\n\n│\n\n尺所得之數。\n\n│\n\n│\n\n│（二）其他部分以該部分樓地板面│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│三、百貨商場之櫥窗部分，應列為│\n\n│\n\n│\n\n│\n\n以下列數額合計：\n\n│\n\n│\n\n積除四平方公尺所得之數。│\n\n其他部分核算。\n\n│\n\n├─┼────────────┼───────────────┤\n│5 │觀光飯店、飯店、旅館、招│其收容人員人數，為下列各款合計│\n│\n\n│待所（限有寢室客房者）\n\n│之數額：\n\n│\n\n│\n\n│\n\n│一、從業員工數。\n\n│\n\n│\n\n│\n\n│二、各客房部分，以下列數額合計│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│（一）西式客房之床位數。\n\n│\n\n│\n\n│（二）日式客房以該房間之樓地板│\n\n│\n\n│\n\n│\n\n面積除六平方公尺（以團體│\n\n│\n\n│\n\n│\n\n為主之宿所，應為三平方公│\n\n│\n\n│\n\n│\n\n尺）所得之數。\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n（一）設固定席位部分，以該座│\n\n│\n\n│\n\n│\n\n椅數計之。如為連續式席│\n\n│\n\n│\n\n│\n\n位，為該座椅正面寬度除│\n\n│\n\n│\n\n│\n\n零點五公尺所得之數（未│\n\n│\n\n│\n\n│\n\n滿一之零數不計）。\n\n│\n\n│\n\n│\n\n（二）其他部分以該部分樓地板│\n\n│\n\n│\n\n│\n\n面積除三平方公尺所得之│\n\n│\n\n│\n\n│\n\n數。\n\n：\n\n│\n│\n\n│\n\n三、供集會、飲食或休息用部分│\n，以下列數額合計：\n\n│\n\n│\n\n│\n\n├─┼────────────┼───────────────┤\n│6 │集合住宅、寄宿舍\n\n│合計其居住人數，每戶以三人計算│\n\n│\n\n│。\n\n│\n\n│\n\n├─┼────────────┼───────────────┤\n│7 │醫療機構（醫院、診所）、│其收容人員人數，為下列各款合計│\n│\n\n│療養院\n\n│之數額：\n\n│\n\n│\n\n│\n\n│一、從業員工數。\n\n│\n\n│\n\n│\n\n│二、病房內病床數。\n\n│\n\n│\n\n│\n\n│三、各候診室之樓地板面積和除三│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│四、醫院等場所育嬰室之嬰兒，應│\n\n│\n\n│\n\n│\n\n平方公尺所得之數。\n\n列為收容人員計算。\n\n│\n\n│\n\n├─┼────────────┼───────────────┤\n│8 │長期照護機構（長期照護型│從業員工數與老人、幼兒、身體障│\n\n│\n\n│、養護型、失智照顧型）、│礙者、精神耗弱者及其他需保護者│\n\n│\n\n│安養機構、老人服務機構（│之人數合計之。\n\n│\n\n│\n\n│限供日間照顧、臨時照顧、│\n\n│\n\n│\n\n│短期保護及安置使用者）、│\n\n│\n\n│\n\n│兒童福利設施、幼兒園、托│\n\n│\n\n│\n\n│嬰中心、護理之家機構、產│\n\n│\n\n│\n\n│後護理機構\n\n│\n\n│\n\n├─┼────────────┼───────────────┤\n│9 │學校、啟明、啟聰、啟智等│教職員工數與學生數合計之。\n\n│\n\n│\n\n│特殊學校、補習班、訓練班│\n\n│\n\n│\n\n│、兒童與少年福利機構、Ｋ│\n\n│\n\n│\n\n│書中心、安親（才藝）班\n\n│\n\n│\n\n├─┼────────────┼───────────────┤\n│10│圖書館、博物館、美術館、│從業員工數與閱覽室、展示室、展│\n│\n\n│紀念館、史蹟資料館及其他│覽室、會議室及休息室之樓地板面│\n\n│\n\n│類似場所\n\n│積和除三平方公尺所得之數，合計│\n\n│\n\n│\n\n│之。\n\n│\n\n├─┼────────────┼───────────────┤\n│11│三溫暖、公共浴室\n\n│從業員工數與供浴室、更衣室、按│\n\n│\n\n│\n\n│摩室及休息室之樓地板面積和除三│\n\n│\n\n│\n\n│平方公尺所得之數，合計之。\n\n│\n\n├─┼────────────┼───────────────┤\n│12│寺廟、宗祠、教堂、供存放│神職人員及其他從業員工數與供禮│\n│\n\n│骨灰（骸）之納骨堂（塔）│拜、集會或休息用部分之樓地板面│\n\n│\n\n│及其他類似場所\n\n│積和除三平方公尺所得之數，合計│\n\n│\n\n│\n\n│之。\n\n│\n\n├─┼────────────┼───────────────┤\n│13│車站、候機室、室內停車場│從業員工數之合計。\n\n│\n\n│\n\n│、室內停車空間、電影攝影│\n\n│\n\n│\n\n│場、電視播送場、倉庫、傢│\n\n│\n\n│\n\n│俱展示販售場等工作場所\n\n│\n\n│\n\n├─┼────────────┼───────────────┤\n│14│其他場所\n\n│從業員工數與供從業員以外者所使│\n\n│\n\n│\n\n│用部分之樓地板面積和除三平方公│\n\n│\n\n│\n\n│尺所得之數，合計之。\n\n│\n\n├─┴────────────┴───────────────┤\n│註：一、收容人數之計算應以樓層為單位。\n\n│\n\n│\n\n二、依「複合用途建築物判斷基準」判定該場所不同用途，在管│\n\n│\n\n理及使用型態上，構成從屬於主用途時，以主用途來核算其│\n\n│\n\n收容人數。\n\n│\n\n│\n\n三、從業員工數之計算，依下列規定：\n\n│\n\n（一）從業員工，不分正式或臨時，以平時最多服勤人數計算。│\n\n│\n\n但雇用人員屬短期、臨時性質者，得免計入。\n\n│\n\n│\n\n│\n\n（二）勤務制度採輪班制時，以服勤人員最多時段之從業員工數│\n\n│\n\n計算。但交班時，不同時段從業員工重複在勤時，該重複│\n\n│\n\n時段之從業員工數不列入計算。\n\n│\n\n│\n\n（三）外勤員工有固定桌椅者，應計入從業員工數。\n\n│\n\n│\n\n四、計算收容人員之樓地板面積，依下列規定：\n\n│\n\n│\n\n（一）樓地板面積除單位面積所得之數，未滿一之零數不計。\n\n│\n\n│\n\n（二）走廊、樓梯及廁所，原則上不列入計算收容人員之樓地板│\n\n│\n│\n\n面積。\n\n│\n\n五、固定席位，指構造上固定，或設在一定場所固定使用且不易│\n\n│\n\n移動者。下列情形均應視為固定席位：\n\n│\n\n│\n\n（一）沙發等座椅。\n\n│\n\n│\n\n（二）座椅相互連接者。\n\n│\n\n│\n\n（三）平時在同一場所，固定使用，且不易移動之座椅。\n\n│\n\n└──────────────────────────────┘"],[1,"161","避難器具，依下列規定裝設：\n一、設在避難時易於接近處。\n二、與安全梯等避難逃生設施保持適當距離。\n三、供避難器具使用之開口部，具有安全之構造。\n四、避難器具平時裝設於開口部或必要時能迅即裝設於該開口部。\n五、設置避難器具（滑杆、避難繩索及避難橋除外）之開口部，上下層應交錯配置，不得在同一\n垂直線上。但在避難上無障礙者不在此限。"],[1,"162","避難器具，依下表規定，於開口部保有必要開口面積：\n┌───────────┬──────────────────┐\n\n│種\n\n類│\n\n開\n\n口\n\n面\n\n積\n\n│\n\n├───────────┼──────────────────┤\n│緩降機、避難梯、避難繩│高八十公分以上，寬五十公分以上或高一│\n│索及滑杆\n\n│百公分以上，寬四十五公分以上。\n\n│\n\n├───────────┼──────────────────┤\n│救助袋\n\n│高六十公分以上，寬六十公分以上。\n\n│\n\n├───────────┼──────────────────┤\n│滑臺\n\n│高八十公分以上，寬為滑臺最大寬度以上│\n\n│\n\n│。\n\n│\n\n├───────────┼──────────────────┤\n│避難橋\n\n│高一百八十公分以上，寬為避難橋最大寬│\n\n│\n\n│度以上。\n\n│\n\n└───────────┴──────────────────┘"],[1,"163","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n避難器具，依下表規定，於設置周圍無操作障礙，並保有必要操作面積：\n┌───────────┬──────────────────┐\n│種\n\n類│\n\n操\n\n作\n\n面\n\n積\n\n│\n\n├───────────┼──────────────────┤\n│緩降機、避難梯、避難繩│零點五平方公尺以上（不含避難器具所佔│\n│索及滑杆\n\n│面積），但邊長應為六十公分以上。\n\n│\n\n├───────────┼──────────────────┤\n│救助袋\n\n│寬一百五十公分以上，長一百五十公分以│\n\n│\n\n│上（含器具所佔面積）。但無操作障礙，│\n\n│\n\n│且操作面積在二點二五平方公尺以上時，│\n\n│\n\n│不在此限。\n\n│\n\n├───────────┼──────────────────┤\n│滑臺、避難橋\n\n│依避難器具大小及形狀留置之。\n\n│\n\n└───────────┴──────────────────┘"],[1,"164","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n避難器具，依下表規定，於開口部與地面之間保有必要下降空間：\n\n┌──────┬───────────────────────┐\n│種\n\n類│下\n\n降\n\n空\n\n間\n\n│\n\n├──────┼───────────────────────┤\n│緩降機\n\n│以器具中心半徑零點五公尺圓柱形範圍內。但突出物│\n\n│\n\n│在十公分以內，且無避難障礙者，或超過十公分時，│\n\n│\n\n│能採取不損繩索措施者，該突出物得在下降空間範圍│\n\n│\n\n│內。\n\n│\n\n├──────┼───────────────────────┤\n│避難梯\n\n│自避難梯二側豎桿中心線向外二十公分以上及其前方│\n\n│\n\n│六十五公分以上之範圍內。\n\n│\n\n├──────┼───────────────────────┤\n│避難繩索及滑│無避難障礙之空間。\n\n│\n\n│杆\n\n│\n\n│\n\n├──────┼───────────────────────┤\n│救助袋（斜降│救助袋下方及側面，在上端二十五度，下端三十五度│\n│式）\n\n│方向依下圖所圍範圍內。但沿牆面使用時，牆面側不│\n\n│\n\n│在此限。\n\n│\n\n├──────┼───────────────────────┤\n│救助袋（直降│一、救助袋與牆壁之間隔為三十公分以上。但外牆有│\n│式）\n\n│\n\n突出物，且突出物距救助袋支固器具裝設處在三│\n\n│\n\n│\n\n公尺以上時，應距突出物前端五十公分以上。\n\n│\n\n│二、以救助袋中心，半徑一公尺圓柱形範圍內。\n\n│\n│\n\n├──────┼───────────────────────┤\n│滑臺\n\n│滑面上方一公尺以上及滑臺兩端向外二十公分以上所│\n\n│\n\n│圍範圍內。\n\n│\n\n├──────┼───────────────────────┤\n│避難橋\n\n│避難橋之寬度以上及橋面上方二公尺以上所圍範圍內│\n\n│\n\n│。\n\n│\n\n└──────┴───────────────────────┘"],[1,"165","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n避難器具依下表規定，於下降空間下方保有必要下降空地：\n┌──────┬───────────────────────┐\n│種\n\n類│下\n\n降\n\n空\n\n間\n\n│\n\n├──────┼───────────────────────┤\n│緩降機\n\n│下降空間之投影面積。\n\n│\n\n├──────┼───────────────────────┤\n│避難梯\n\n│下降空間之投影面積。\n\n│\n\n├──────┼───────────────────────┤\n│避難繩索及滑│無避難障礙之空地。\n\n│\n\n│杆\n\n│\n\n│\n\n├──────┼───────────────────────┤\n│救助袋（斜降│救助袋最下端起二點五公尺及其中心線左右一公尺以│\n│式）\n\n│上所圍範圍。\n\n│\n\n├──────┼───────────────────────┤\n│救助袋（直降│下降空間之投影面積。\n\n│\n\n│式）\n\n│\n\n│\n\n├──────┼───────────────────────┤\n│滑臺\n\n│滑臺前端起一點五公尺及其中心線左右零點五公尺所│\n\n│\n\n│圍範圍。\n\n│\n\n├──────┼───────────────────────┤\n│避難橋\n\n│無避難障礙之空地。\n\n│\n\n└──────┴───────────────────────┘"],[1,"166","設置避難器具時，依下表標示其設置位置、使用方法並設置指標：\n┌───┬────┬────────┬──┬─────────┐\n│避難器│\n\n│\n\n│具標示│設置處所│尺\n│種類\n\n│\n\n│\n\n│\n\n│\n\n寸│顏色│\n│\n\n│\n標\n\n示\n\n方\n\n法\n\n│\n\n│\n│\n\n├───┼────┼────────┼──┼─────────┤\n│設置位│避難器具│長三十六公分以上│白底│字樣為「避難器具」│\n│置\n\n│或其附近│、寬十二公分以上│黑字│，每字五平方公分以│\n\n│\n\n│明顯易見│。\n\n│\n\n│上。但避難梯等較普│\n\n│\n\n│處。\n\n│\n\n│\n\n│及之用語，得直接使│\n\n│\n\n│\n\n│\n\n│\n\n│用其名稱為字樣。\n\n│\n\n├───┤\n\n├────────┤\n\n├─────────┤\n\n│使用方│\n\n│長六十公分以上、│\n\n│標示易懂之使用方法│\n\n│法\n\n│寬三十公分以上。│\n\n│，每字一平方公分以│\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│上。\n\n│\n\n├───┼────┼────────┼──┼─────────┤\n│避難器│通往設置│長三十六公分以上│\n\n│字樣為「避難器具」│\n\n│具指標│位置之走│、寬十二公分以上│\n\n│，每字五平方公分以│\n\n│\n\n│廊、通道│。\n\n│\n\n│上。\n\n│\n\n│\n\n│及居室之│\n\n│\n\n│\n\n│\n\n│\n\n│入口。\n\n│\n\n│\n\n│\n\n│\n\n└───┴────┴────────┴──┴─────────┘"],[1,"167","緩降機應依下列規定設置：\n一、緩降機之設置，在下降時，所使用繩子應避免與使用場所牆面或突出物接觸。\n二、緩降機所使用繩子之長度，以其裝置位置至地面或其他下降地點之等距離長度為準。\n三、緩降機支固器具之裝置，依下列規定：\n（一）設在使用場所之柱、地板、樑或其他構造上較堅固及容易裝設場所。\n（二）以螺栓、熔接或其他堅固方法裝置。"],[1,"168","滑臺，依下列規定設置：\n一、安裝在使用場所之柱、地板、樑或其他構造上較堅固或加強部分。\n二、以螺栓、埋入、熔接或其他堅固方法裝置。\n三、設計上無使用障礙，且下降時保持一定之安全速度。\n四、有防止掉落之適當措施。\n五、滑台之構造、材質、強度及標示符合 CNS、一三二三一之規定。"],[1,"169","避難橋，依下列規定設置：\n一、裝置在使用場所之柱、地板或其他構造上較堅固或加強部分。\n二、一邊以螺栓、熔接或其他堅固方法裝置。\n三、避難橋之構造、材質、強度及標示符合 CNS、一三二三一之規定。"],[1,"170","救助袋依下列規定設置：\n一、救助袋之長度應無避難上之障礙，且保持一定之安全下滑速度。\n二、裝置在使用場所之柱、地板、樑或其他構造上堅固或加強部分。\n三、救助袋支固器具以螺栓、熔接或其他堅固方法裝置。"],[1,"171","避難梯依下列規定設置：\n一、固定梯及固定式不銹鋼爬梯（直接嵌於建築物牆、柱等構造，不可移動或收納者）應符合下\n列規定：\n（一）裝置在使用場所之柱、地板、樑或其他構造上較堅固或加強部分。\n（二）以螺栓、埋入、熔接或其他堅固方法裝置。\n（三）橫桿與使用場所牆面保持十公分以上之距離。\n二、第四層以上之樓層設避難梯時，應設固定梯，並合於下列規定：\n（一）設於陽臺等具安全且容易避難逃生構造處，其樓地板面積至少二平方公尺，並附設能內接\n直徑六十公分以上之逃生孔。\n（二）固定梯之逃生孔應上下層交錯配置，不得在同一直線上。\n三、懸吊型梯應符合下列規定：\n（一）懸吊型梯固定架設在使用場所之柱、地板、樑或其他構造上較堅固及容易裝設處所。但懸\n吊型固定梯能直接懸掛於堅固之窗臺等處所時，得免設固定架。\n（二）懸吊型梯橫桿在使用時，與使用場所牆面保持十公分以上之距離。"],[1,"172","滑杆及避難繩索，依下列規定設置：\n一、長度以其裝置位置至地面或其他下降地點之等距離長度為準。\n二、滑杆上端與下端應能固定。\n三、固定架，依前條第三款第一目之規定設置。"],[1,"173","供緩降機或救助袋使用之支固器具及供懸吊型梯、滑杆或避難繩索使用之固定架，應使用符合 CNS\n二四七三、四四三五規定或具有同等以上強度及耐久性之材料，並應施予耐腐蝕加工處理。"],[1,"174","固定架或支固器具使用螺栓固定時，依下列規定：\n一、使用錨定螺栓。\n二、螺栓埋入混凝土內不含灰漿部分之深度及轉矩值，依下表規定。\n┌───────┬───────┬─────────┐\n│螺紋標稱\n\n│埋入深度（mm）│轉矩值（kgf-cm）\n\n│\n\n├───────┼───────┼─────────┤\n│M10×1.5\n\n│四十五以上\n\n│一百五十至二百五十│\n\n├───────┼───────┼─────────┤\n│M12×1.75\n\n│六十以上\n\n│三百至四百五十\n\n│\n\n├───────┼───────┼─────────┤\n\n│M16×2\n\n│七十以上\n\n│六百至八百五十\n\n│\n\n└───────┴───────┴─────────┘"],[0,"第 三 節 緊急照明設備"],[1,"175","緊急照明燈之構造，依下列規定設置：\n一、白熾燈為雙重繞燈絲燈泡，其燈座為瓷製或與瓷質同等以上之耐熱絕緣材料製成者。\n二、日光燈為瞬時起動型，其燈座為耐熱絕緣樹脂製成者。\n三、水銀燈為高壓瞬時點燈型，其燈座為瓷製或與瓷質同等以上之耐熱絕緣材料製成者。\n四、其他光源具有與前三款同等耐熱絕緣性及瞬時點燈之特性，經中央主管機關核准者。\n五、放電燈之安定器，裝設於耐熱性外箱。"],[1,"176","緊急照明設備除內置蓄電池式外，其配線依下列規定：\n一、照明器具直接連接於分路配線，不得裝置插座或開關等。\n二、緊急照明燈之電源回路，其配線依第二百三十五條規定施予耐燃保護。但天花板及其底材使\n用不燃材料時，得施予耐熱保護。"],[1,"177","緊急照明設備應連接緊急電源。\n\n前項緊急電源應使用蓄電池設備，其容量應能使其持續動作三十分鐘以上。但採蓄電池設備與緊\n急發電機併設方式時，其容量應能使其持續動作分別為十分鐘及三十分鐘以上。"],[1,"178","緊急照明燈在地面之水平面照度，使用低照度測定用光電管照度計測得之值，在地下建築物之地\n下通道，其地板面應在十勒克司（Lux）以上，其他場所應在二勒克司（Lux）以上。但在走廊曲\n折點處，應增設緊急照明燈。"],[1,"179","下列處所得免設緊急照明設備：\n一、在避難層，由居室任一點至通往屋外出口之步行距離在三十公尺以下之居室。\n二、具有效採光，且直接面向室外之通道或走廊。\n三、集合住宅之居室。\n四、保齡球館球道以防煙區劃之部分。\n五、工作場所中，設有固定機械或裝置之部分。\n六、洗手間、浴室、盥洗室、儲藏室或機械室。"],[0,"第 四 章 消防搶救上之必要設備"],[0,"第 一 節 連結送水管"],[1,"180","出水口及送水口，依下列規定設置：\n一、出水口設於地下建築物各層或建築物第三層以上各層樓梯間或緊急升降機間等（含該處五公\n尺以內之處所）消防人員易於施行救火之位置，且各層任一點至出水口之水平距離在五十公\n尺以下。\n二、出水口為雙口形，接裝口徑六十三毫米快速接頭，距樓地板面之高度在零點五公尺以上一點\n五公尺以下，並設於厚度在一點六毫米以上之鋼板或同等性能以上之不燃材料製箱內，其箱\n面短邊在四十公分以上，長邊在五十公分以上，並標明出水口字樣，每字在二十平方公分以\n上。但設於第十層以下之樓層，得用單口形。\n三、在屋頂上適當位置至少設置一個測試用出水口。\n四、送水口設於消防車易於接近，且無送水障礙處，其數量在立管數以上。\n五、送水口為雙口形，接裝口徑六十三毫米陰式快速接頭，距基地地面之高度在一公尺以下零點\n五公尺以上，且標明連結送水管送水口字樣。\n六、送水口在其附近便於檢查確認處，裝設逆止閥及止水閥。"],[1,"181","配管，依下列規定設置：\n一、應為專用，其立管管徑在一百毫米以上。但建築物高度在五十公尺以下時，得與室內消防栓\n共用立管，其管徑在一百毫米以上，支管管徑在六十五毫米以上。\n二、符合 CNS\n\n六四四五、四六二六規定或具有同等以上強度、耐腐蝕性及耐熱性者。但其送水\n\n設計壓力逾每平方公分十公斤時，應使用符合 CNS 四六二六管號 Sch40 以上或具有同等以上\n強度、耐腐蝕性及耐熱性之配管。\n三、同一建築物內裝置二支以上立管時，立管間以橫管連通。\n四、管徑依水力計算配置之。\n五、能承受送水設計壓力一點五倍以上之水壓，且持續三十分鐘。但設有中繼幫浦時，幫浦二次\n側配管，應能承受幫浦全閉揚程一點五倍以上之水壓。"],[1,"182","十一層以上之樓層，各層應於距出水口五公尺範圍內設置水帶箱，箱內備有直線水霧兩用瞄子一\n具，長二十公尺水帶二條以上，且具有足夠裝置水帶及瞄子之深度，其箱面表面積應在零點八平\n方公尺以上，並標明水帶箱字樣，每字應在二十平方公分以上。\n\n前項水帶箱之材質應為厚度在一點六毫米以上之鋼板或同等性能以上之不燃材料。"],[1,"183","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n建築物高度超過六十公尺者，連結送水管應採用濕式，其中繼幫浦，依下列規定設置：\n一、中繼幫浦全揚程在下列計算值以上：\n全揚程＝消防水帶摩擦損失水頭＋配管摩擦損失水頭＋落差＋放水壓力\nH=h1+h2+h3+60m\n二、中繼幫浦出水量在每分鐘二千四百公升以上。\n三、於送水口附近設手動啟動裝置及紅色啟動表示燈。但設有能由防災中心遙控啟動，且送水口\n與防災中心間設有通話裝置者，得免設。\n四、中繼幫浦一次側設出水口、止水閥及壓力調整閥，並附設旁通管，二次側設逆止閥、止水閥\n及送水口。\n五、屋頂水箱有零點五立方公尺以上容量，中繼水箱有二點五立方公尺以上。\n六、進水側配管及出水側配管間設旁通管，並於旁通管設逆止閥。\n七、全閉揚程與押入揚程合計在一百七十公尺以上時，增設幫浦使串聯運轉。\n八、設置中繼幫浦之機械室及連結送水管送水口處，設有能與防災中心通話之裝置。\n九、中繼幫浦放水測試時，應從送水口以送水設計壓力送水，並以口徑二十一毫米瞄子在最頂層\n測試，其放水壓力在每平方公分六公斤以上或 0.6MPa\n\n以上，且放水量在每分鐘六百公升以\n\n上，送水設計壓力，依下圖標明於送水口附近明顯易見處。"],[1,"184","送水設計壓力，依下列規定計算：\n一、送水設計壓力在下列計算值以上：送水設計壓力＝配管摩擦損失水頭＋消防水帶摩擦損失水\n頭＋落差＋放水壓力 H=h1+h2+h3+60m\n二、消防水帶摩擦損失水頭為四公尺。\n三、立管水量，最上層與其直下層間為每分鐘一千二百公升，其他樓層為每分鐘二千四百公升。\n四、每一線瞄子支管之水量為每分鐘六百公升。"],[0,"第 二 節 消防專用蓄水池"],[1,"185","消防專用蓄水池，依下列規定設置：\n一、蓄水池有效水量應符合下列規定設置：\n（一）依第二十七條第一款及第三款設置者，其第一層及第二層樓地板面積合計後，每七千五百\n平方公尺（包括未滿）設置二十立方公尺以上。\n（二）依第二十七條第二款設置者，其總樓地板面積每一萬二千五百平方公尺（包括未滿）設置\n二十立方公尺以上。\n二、任一消防專用蓄水池至建築物各部分之水平距離在一百公尺以下，且其有效水量在二十立方\n公尺以上。\n\n三、設於消防車能接近至其二公尺範圍內，易於抽取處。\n四、有進水管投入後，能有效抽取所需水量之構造。\n五、依下列規定設置投入孔或採水口。\n（一）投入孔為邊長六十公分以上之正方形或直徑六十公分以上之圓孔，並設鐵蓋保護之。水量\n未滿八十立方公尺者，設一個以上；八十立方公尺以上者，設二個以上。\n（二）採水口為口徑一百毫米，並接裝陽式螺牙。水量二十立方公尺以上，設一個以上；四十立\n方公尺以上至一百二十立方公尺未滿，設二個以上；一百二十立方公尺以上，設三個以上。\n採水口配管口徑至少一百毫米以上，距離基地地面之高度在一公尺以下零點五公尺以上。\n\n前項有效水量，指蓄水池深度在基地地面下四點五公尺範圍內之水量。但採機械方式引水時，不\n在此限。"],[1,"186","消防專用蓄水池採機械方式引水時，除依前條第一項第一款及第二款後段規定外，任一採水口至\n建築物各部分之水平距離在一百公尺以下，並依下列規定設置加壓送水裝置及採水口：\n一、加壓送水裝置出水量及採水口數，符合下表之規定。\n┌─────────┬─────┬───────┐\n│\n\n水量（m³）\n\n│\n\n│\n\n出水量\n\n│採水口數（個）│\n\n│（1／min）│\n\n│\n\n├─────────┼─────┼───────┤\n│四十未滿\n\n│一千一百\n\n│\n\n一\n\n│\n\n├─────────┼─────┼───────┤\n│四十以上一百二十未│二千二百\n\n│\n\n│滿\n\n│\n\n│\n\n二\n\n│\n│\n\n├─────────┼─────┼───────┤\n│一百二十以上\n\n│三千三百\n\n│\n\n三\n\n│\n\n└─────────┴─────┴───────┘\n\n二、加壓送水裝置幫浦全揚程在下列計算方式之計算值以上：全揚程＝落差＋配管摩擦損失水頭\n＋15mH=h1+h2+15m\n三、加壓送水裝置應於採水口附近設啟動裝置及紅色啟動表示燈。但設有能由防災中心遙控啟動，\n且採水口與防災中心間設有通話連絡裝置者，不在此限。\n四、採水口接裝六十三毫米陽式快接頭，距離基地地面之高度在一公尺以下零點五公尺以上。"],[1,"187","消防專用蓄水池之標示，依下列規定設置：\n一、進水管投入孔標明消防專用蓄水池字樣。\n\n二、採水口標明採水口或消防專用蓄水池採水口字樣。"],[0,"第 三 節 排煙設備"],[1,"188","第二十八條第一項第一款至第四款排煙設備，依下列規定設置：\n一、每層樓地板面積每五百平方公尺內，以防煙壁區劃。但戲院、電影院、歌廳、集會堂等場所\n觀眾席，及工廠等類似建築物，其天花板高度在五公尺以上，且天花板及室內牆面以耐燃一\n級材料裝修者，不在此限。\n二、地下建築物之地下通道每三百平方公尺應以防煙壁區劃。\n三、依第一款、第二款區劃（以下稱為防煙區劃）之範圍內，任一位置至排煙口之水平距離在三\n十公尺以下，排煙口設於天花板或其下方八十公分範圍內，除直接面向戶外，應與排煙風管\n連接。但排煙口設在天花板下方，防煙壁下垂高度未達八十公分時，排煙口應設在該防煙壁\n之下垂高度內。\n四、排煙設備之排煙口、風管及其他與煙接觸部分應使用不燃材料。\n五、排煙風管貫穿防火區劃時，應在貫穿處設防火閘門；該風管與貫穿部位合成之構造應具所貫\n穿構造之防火時效；其跨樓層設置時，立管應置於防火區劃之管道間。但設置之風管具防火\n性能並經中央主管機關審核認可，該風管與貫穿部位合成之構造具所貫穿構造之防火時效者，\n不在此限。\n六、排煙口設手動開關裝置及探測器連動自動開關裝置；以該等裝置或遠隔操作開關裝置開啟，\n平時保持關閉狀態，開口葉片之構造應不受開啟時所生氣流之影響而關閉。手動開關裝置用\n手操作部分應設於距離樓地板面八十公分以上一百五十公分以下之牆面，裝置於天花板時，\n應設操作垂鍊或垂桿在距離樓地板一百八十公分之位置，並標示簡易之操作方式。\n七、排煙口之開口面積在防煙區劃面積之百分之二以上，且以自然方式直接排至戶外。排煙口無\n法以自然方式直接排至戶外時，應設排煙機。\n八、排煙機應隨任一排煙口之開啟而動作。排煙機之排煙量在每分鐘一百二十立方公尺以上；且\n在一防煙區劃時，在該防煙區劃面積每平方公尺每分鐘一立方公尺以上；在二區以上之防煙\n區劃時，在最大防煙區劃面積每平方公尺每分鐘二立方公尺以上。但地下建築物之地下通道，\n其總排煙量應在每分鐘六百立方公尺以上。\n九、連接緊急電源，其供電容量應供其有效動作三十分鐘以上。\n十、排煙口直接面向戶外且常時開啟者，得不受第六款及前款之限制。\n十一、排煙口開啟時應連動停止空氣調節及通風設備運轉。\n\n前項之防煙壁，指以不燃材料建造，自天花板下垂五十公分以上之垂壁或具有同等以上阻止煙流\n動構造者。但地下建築物之地下通道，防煙壁應自天花板下垂八十公分以上。"],[1,"189","特別安全梯或緊急昇降機間排煙室之排煙設備，依下列規定選擇設置：\n\n一、設置直接面向戶外之窗戶時，應符合下列規定：\n（一）在排煙時窗戶與煙接觸部分使用不燃材料。\n（二）窗戶有效開口面積位於天花板高度二分之一以上之範圍內。\n（三）窗戶之有效開口面積在二平方公尺以上。但特別安全梯排煙室與緊急昇降機間兼用時（以\n下簡稱兼用），應在三平方公尺以上。\n（四）前目平時關閉之窗戶設手動開關裝置，其操作部分設於距離樓地板面八十公分以上一百五\n十公分以下之牆面，並標示簡易之操作方式。\n二、設置排煙、進風風管時，應符合下列規定：\n（一）排煙設備之排煙口、排煙風管、進風口、進風風管及其他與煙接觸部分應使用不燃材料。\n（二）排煙、進風風管貫穿防火區劃時，應在貫穿處設防火閘門；該風管與貫穿部位合成之構造\n應具所貫穿構造之防火時效；其跨樓層設置時，立管應置於防火區劃之管道間。但設置之\n風管具防火性能並經中央主管機關認可，該風管與貫穿部位合成之構造具所貫穿構造之防\n火時效者，不在此限。\n（三）排煙口位於天花板高度二分之一以上之範圍內，與直接連通戶外之排煙風管連接，該風管\n並連接排煙機。進風口位於天花板高度二分之一以下之範圍內；其直接面向戶外，開口面\n積在一平方公尺（兼用時，為一點五平方公尺）以上；或與直接連通戶外之進風風管連接，\n該風管並連接進風機。\n（四）排煙機、進風機之排煙量、進風量在每秒四立方公尺（兼用時，每秒六立方公尺）以上，\n且可隨排煙口、進風口開啟而自動啟動。\n（五）進風口、排煙口依前款第四目設手動開關裝置及探測器連動自動開關裝置；除以該等裝置\n或遠隔操作開關裝置開啟外，平時保持關閉狀態，開口葉片之構造應不受開啟時所生氣流\n之影響而關閉。\n（六）排煙口、進風口、排煙機及進風機連接緊急電源，其供電容量應供其有效動作三十分鐘以\n上。"],[1,"190","下列處所得免設排煙設備：\n一、建築物在第十層以下之各樓層（地下層除外），其非居室部分，符合下列規定之一者：\n（一）天花板及室內牆面，以耐燃一級材料裝修，且除面向室外之開口外，以半小時以上防火時\n效之防火門窗等防火設備區劃。\n（二）樓地板面積每一百平方公尺以下，以防煙壁區劃。\n二、建築物在第十層以下之各樓層（地下層除外），其居室部分，符合下列規定之一者：\n（一）樓地板面積每一百平方公尺以下，以具一小時以上防火時效之牆壁、防火門窗等防火設備\n及各該樓層防火構造之樓地板形成區劃，且天花板及室內牆面，以耐燃一級材料裝修。\n（二）樓地板面積在一百平方公尺以下，天花板及室內牆面，且包括其底材，均以耐燃一級材料\n裝修。\n\n三、建築物在第十一層以上之各樓層、地下層或地下建築物（地下層或地下建築物之甲類場所除\n外），樓地板面積每一百平方公尺以下，以具一小時以上防火時效之牆壁、防火門窗等防火設\n備及各該樓層防火構造之樓地板形成區劃間隔，且天花板及室內牆面，以耐燃一級材料裝修\n者。\n四、樓梯間、昇降機昇降路、管道間、儲藏室、洗手間、廁所及其他類似部分。\n五、設有二氧化碳、惰性氣體、鹵化烴或乾粉等滅火設備之場所。\n六、機器製造工廠、儲放不燃性物品倉庫及其他類似用途建築物，且主要構造為不燃材料建造者。\n七、集合住宅、學校教室、學校活動中心、體育館、室內溜冰場、室內游泳池。\n八、其他經中央主管機關核定之場所。\n\n前項第一款第一目之防火門窗等防火設備應具半小時以上之阻熱性，第二款第一目及第三款之防\n火門窗等防火設備應具一小時以上之阻熱性。"],[0,"第 四 節 緊急電源插座"],[1,"191","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n緊急電源插座，依下列規定設置：\n一、緊急電源插座裝設於樓梯間或緊急昇降機間等（含各該處五公尺以內之場所）消防人員易於\n施行救火處，且每一層任何一處至插座之水平距離在五十公尺以下。\n二、緊急電源插座之電流供應容量為交流單相一百一十伏特（或一百二十伏特）十五安培，其容\n量約為一點五瓩以上。\n三、緊急電源插座之規範，依下圖規定。\n四、緊急電源插座為接地型，裝設高度距離樓地板一公尺以上一點五公尺以下，且裝設二個於符\n合下列規定之崁裝式保護箱：\n（一）保護箱長邊及短邊分別為二十五公分及二十公分以上。\n（二）保護箱為厚度在一點六毫米以上之鋼板或具同等性能以上之不燃材料製。\n（三）保護箱內有防止插頭脫落之適當裝置（Ｌ型或Ｃ型護鉤）。\n（四）保護箱蓋為易於開閉之構造。\n（五）保護箱須接地。\n（六）保護箱蓋標示緊急電源插座字樣，每字在二平方公分以上。\n（七）保護箱與室內消防栓箱等併設時，須設於上方且保護箱蓋須能另外開啟。\n五、緊急電源插座在保護箱上方設紅色表示燈。\n六、應從主配電盤設專用回路，各層至少設二回路以上之供電線路，且每一回路之連接插座數在\n十個以下。（每回路電線容量在二個插座同時使用之容量以上）。\n七、前款之專用回路不得設漏電斷路器。\n八、各插座設容量一百一十伏特、十五安培以上之無熔絲斷路器。\n\n九、緊急用電源插座連接至緊急供電系統。"],[0,"第 五 節 無線電通信輔助設備及防災監控系統綜合操作裝置"],[1,"192","無線電通信輔助設備，依下列規定設置：\n一、無線電通信輔助設備使用洩波同軸電纜，該電纜適合傳送或輻射一百五十百萬赫（MHz） 或\n中央主管機關指定之周波數。\n二、洩波同軸電纜之標稱阻抗為五十歐姆。\n三、洩波同軸電纜經耐燃處理。\n四、分配器、混合器、分波器及其他類似器具，應使用介入衰耗少，且接頭部分有適當防水措施\n者。\n五、設增輻器時，該增輻器之緊急電源，應使用蓄電池設備，其能量能使其有效動作三十分鐘以\n上。\n六、無線電之接頭應符合下列規定：\n（一）設於地面消防人員便於取用處及值日室等平時有人之處所。\n（二）前目設於地面之接頭數量，在任一出入口與其他出入口之步行距離大於三百公尺時，設置\n二個以上。\n（三）設於距樓地板面或基地地面高度零點八公尺至一點五公尺間。\n（四）裝設於保護箱內，箱內設長度二公尺以上之射頻電纜，保護箱應構造堅固，有防水及防塵\n措施，其箱面應漆紅色，並標明消防隊專用無線電接頭字樣。\n\n共構之建築物內有二處以上場所設置無線電通信輔助設備時，應有能使該設備訊號連通之措施。"],[1,"192-1","防災監控系統綜合操作裝置應設置於防災中心、中央管理室或值日室等經常有人之處所，並監控\n或操作下列消防安全設備：\n一、火警自動警報設備之受信總機。\n二、瓦斯漏氣火警自動警報設備之受信總機。\n三、緊急廣播設備之擴大機及操作裝置。\n四、連結送水管之加壓送水裝置及與其送水口處之通話連絡。\n五、緊急發電機。\n六、常開式防火門之偵煙型探測器。\n七、室內消防栓、自動撒水、泡沫及水霧等滅火設備加壓送水裝置。\n八、乾粉、惰性氣體及鹵化烴等滅火設備。\n九、排煙設備。\n\n防災監控系統綜合操作裝置之緊急電源準用第三十八條規定，且其供電容量應供其有效動作二小\n時以上。"],[0,"第 四 編 公共危險物品等場所消防設計及消防安全設備"],[0,"第 一 章 消防設計"],[1,"193","適用本編規定之場所（以下簡稱公共危險物品等場所）如下：\n一、公共危險物品及可燃性高壓氣體製造儲存處理場所設置標準暨安全管理辦法規定之場所。\n二、加油站。\n三、加氣站。\n四、天然氣儲槽及可燃性高壓氣體儲槽。\n五、爆竹煙火製造、儲存及販賣場所。"],[1,"194","顯著滅火困難場所，指公共危險物品等場所符合下列規定之一者：\n一、公共危險物品製造場所或一般處理場所符合下列規定之一：\n（一）總樓地板面積在一千平方公尺以上。\n（二）公共危險物品數量達管制量一百倍以上。但第一類公共危險物品之氯酸鹽類、過氯酸鹽類、\n硝酸鹽類、第二類公共危險物品之硫磺、鐵粉、金屬粉、鎂、第五類公共危險物品之硝酸\n酯類、硝基化合物、金屬疊氮化合物，或含有以上任一種成分之物品且供作爆炸物原料使\n用，或高閃火點物品其操作溫度未滿攝氏一百度者，不列入管制量計算。\n（三）製造或處理設備高於地面六公尺以上。但高閃火點物品其操作溫度未滿攝氏一百度者，不\n在此限。\n（四）建築物除供一般處理場所使用以外，尚有其他用途。但以無開口且具一小時以上防火時效\n之牆壁、樓地板區劃分隔者，或處理高閃火點物品其操作溫度未滿攝氏一百度者，不在此\n限。\n二、室內儲存場所符合下列規定之一：\n（一）儲存公共危險物品達管制量一百五十倍以上。但第一類公共危險物品之氯酸鹽類、過氯酸\n鹽類、硝酸鹽類、第二類公共危險物品之硫磺、鐵粉、金屬粉、鎂、第五類公共危險物品\n之硝酸酯類、硝基化合物、金屬疊氮化合物，或含有以上任一種成分之物品且供作爆炸物\n原料使用，或高閃火點物品者，不列入管制量計算。\n（二）儲存第一類、第三類、第五類或第六類公共危險物品，其總樓地板面積在一百五十平方公\n尺以上。但每一百五十平方公尺內，以無開口且具半小時以上防火時效之牆壁、樓地板區\n劃分隔者，不在此限。\n（三）儲存第二類公共危險物品之易燃性固體或第四類公共危險物品閃火點未滿攝氏七十度，其\n總樓地板面積在一百五十平方公尺以上。但每一百五十平方公尺內，以無開口且具一小時\n以上防火時效之牆壁、樓地板區劃分隔者，不在此限。\n（四）儲存第一類、第三類、第五類或第六類公共危險物品，其建築物除供室內儲存場所使用以\n\n外，尚有其他用途。但以無開口且具一小時以上防火時效之牆壁、樓地板區劃分隔者，不\n在此限。\n（五）儲存第二類公共危險物品之易燃性固體或第四類公共危險物品閃火點未滿攝氏七十度，其\n建築物除供室內儲存場所使用以外，尚有其他用途。但以無開口且具一小時以上防火時效\n之牆壁、樓地板區劃分隔者，不在此限。\n（六）高度在六公尺以上之一層建築物。\n三、室外儲存場所儲存塊狀硫磺，其面積在一百平方公尺以上。\n四、室內儲槽場所符合下列規定之一。但儲存高閃火點物品或第六類公共危險物品，其操作溫度\n未滿攝氏一百度者，不在此限：\n（一）儲槽儲存液體表面積在四十平方公尺以上。\n（二）儲槽高度在六公尺以上。\n（三）儲存閃火點在攝氏四十度以上未滿攝氏七十度之公共危險物品，其儲槽專用室設於一層以\n外之建築物。但以無開口且具一小時以上防火時效之牆壁、樓地板區劃分隔者，不在此限。\n五、室外儲槽場所符合下列規定之一。但儲存高閃火點物品或第六類公共危險物品，其操作溫度\n未滿攝氏一百度者，不在此限：\n（一）儲槽儲存液體表面積在四十平方公尺以上。\n（二）儲槽高度在六公尺以上。\n（三）儲存固體公共危險物品，其儲存數量達管制量一百倍以上。\n六、室內加油站一面開放且其上方樓層供其他用途使用。"],[1,"195","一般滅火困難場所，指公共危險物品等場所符合下列規定之一者：\n一、公共危險物品製造場所或一般處理場所符合下列規定之一：\n（一）總樓地板面積在六百平方公尺以上未滿一千平方公尺。\n（二）公共危險物品數量達管制量十倍以上未滿一百倍。但處理第一類公共危險物品之氯酸鹽類、\n過氯酸鹽類、硝酸鹽類、第二類公共危險物品之硫磺、鐵粉、金屬粉、鎂、第五類公共危\n險物品之硝酸酯類、硝基化合物、金屬疊氮化合物，或含有以上任一種成分之物品且供作\n爆炸物原料使用，或高閃火點物品其操作溫度未滿攝氏一百度者，不列入管制量計算。\n（三）未達前條第一款規定，而供作噴漆、塗裝、印刷、清洗、淬火、鍋爐、油壓、切削、研磨\n或熱媒油循環設備作業場所。但處理高閃火點物品或第六類公共危險物品，其操作溫度未\n滿攝氏一百度者，不在此限。\n二、室內儲存場所符合下列規定之一：\n（一）一層建築物以外。\n（二）儲存公共危險物品數量達管制量十倍以上未滿一百五十倍。但儲存第一類公共危險物品之\n氯酸鹽類、過氯酸鹽類、硝酸鹽類、第二類公共危險物品之硫磺、鐵粉、金屬粉、鎂、第\n五類公共危險物品之硝酸酯類、硝基化合物、金屬疊氮化合物，或含有以上任一種成分之\n\n物品且供作爆炸物原料使用，或高閃火點物品者，不列入管制量計算。\n（三）總樓地板面積在一百五十平方公尺以上。\n三、室外儲存場所符合下列規定之一：\n（一）儲存塊狀硫磺，其面積在五平方公尺以上，未滿一百平方公尺。\n（二）儲存公共危險物品管制量在一百倍以上。但其為塊狀硫磺或高閃火點物品者，不在此限。\n四、室內儲槽場所或室外儲槽場所未達顯著滅火困難場所規定。但儲存第六類公共危險物品或高\n閃火點物品者，不在此限。\n五、第二種販賣場所。\n六、室內加油站未達顯著滅火困難場所。"],[1,"196","其他滅火困難場所，指室外加油站、未達顯著滅火困難場所或一般滅火困難場所者。"],[1,"197","公共危險物品等場所之滅火設備分類如下：\n一、第一種滅火設備：指室內或室外消防栓設備。\n二、第二種滅火設備：指自動撒水設備。\n三、第三種滅火設備：指水霧、泡沫、二氧化碳、惰性氣體、鹵化烴或乾粉滅火設備。\n四、第四種滅火設備：指大型滅火器。\n五、第五種滅火設備：指滅火器、水桶、水槽、乾燥砂、膨脹蛭石或膨脹珍珠岩。\n\n可燃性高壓氣體製造場所、加氣站、天然氣儲槽及可燃性高壓氣體儲槽之防護設備分類如下：\n一、冷卻撒水設備。\n二、射水設備：指固定式射水槍、移動式射水槍或室外消防栓。"],[1,"198","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n公共危險物品製造、儲存或處理場所及爆竹煙火場所，應依下表選擇適當之滅火設備。"],[1,"199","設置第五種滅火設備者，應依下列規定核算其最低滅火效能值：\n一、公共危險物品製造或處理場所之建築物，外牆為防火構造者，總樓地板面積每一百平方公尺\n（含未滿）有一滅火效能值；外牆為非防火構造者，總樓地板面積每五十平方公尺（含未滿）\n有一滅火效能值。\n二、公共危險物品儲存場所之建築物，外牆為防火構造者，總樓地板面積每一百五十平方公尺（含\n未滿）有一滅火效能值；外牆為非防火構造者，總樓地板面積每七十五平方公尺（含未滿）\n有一滅火效能值。\n三、位於公共危險物品製造、儲存或處理場所之室外具有連帶使用關係之附屬設施，以該設施水\n\n平最大面積為其樓地板面積，準用前二款外牆為防火構造者，核算其滅火效能值。\n四、公共危險物品每達管制量之十倍（含未滿）應有一滅火效能值。"],[1,"200","第五種滅火設備除滅火器外之其他設備，依下列規定核算滅火效能值：\n一、八公升之消防專用水桶，每三個為一滅火效能值。\n二、水槽每八十公升為一點五滅火效能值。\n三、乾燥砂每五十公升為零點五滅火效能值。\n四、膨脹蛭石或膨脹珍珠岩每一百六十公升為一滅火效能值。"],[1,"201","（因條文排版無法完整呈現內容，請詳閱完整條文檔案）\n\n顯著滅火困難場所應依下表設置第一種、第二種或第三種滅火設備：\n\n前項場所除下列情形外，並應設置第四種及第五種滅火設備：\n一、製造及一般處理場所儲存或處理高閃火點物品之操作溫度未滿攝氏一百度者，其設置之第一\n種、第二種或第三種滅火設備之有效範圍內，得免設第四種滅火設備。\n二、儲存第四類公共危險物品之室外儲槽場所或室內儲槽場所，設置第五種滅火設備二具以上。\n三、室內加油站應設置第五種滅火設備。"],[1,"202","一般滅火困難場所，依下列設置滅火設備：\n一、公共危險物品製造場所及一般處理場所、室內儲存場所、室外儲存場所、第二種販賣場所及\n室內加油站設置第四種及第五種滅火設備，其第五種滅火設備之滅火效能值，在該場所儲存\n或處理公共危險物品數量所核算之最低滅火效能值五分之一以上。\n二、室內及室外儲槽場所，設置第四種及第五種滅火設備各一具以上。\n\n前項設第四種滅火設備之場所，設有第一種、第二種或第三種滅火設備時，在該設備有效防護範\n圍內，得免設。"],[1,"203","其他滅火困難場所，應設置第五種滅火設備，其滅火效能值應在該場所建築物與其附屬設施及其\n所儲存或處理公共危險物品數量所核算之最低滅火效能值以上。但該場所已設置第一種至第四種\n滅火設備之一時，在該設備有效防護範圍內，其滅火效能值得減至五分之一以上。\n\n地下儲槽場所，應設置第五種滅火設備二具以上。"],[1,"204","電氣設備使用之處所，每一百平方公尺（含未滿）應設置第五種滅火設備一具以上。"],[1,"205","下列場所應設置火警自動警報設備：\n一、公共危險物品製造場所及一般處理場所符合下列規定之一者：\n（一）總樓地板面積在五百平方公尺以上者。\n（二）室內儲存或處理公共危險物品數量達管制量一百倍以上者。但處理操作溫度未滿攝氏一百\n度之高閃火點物品者，不在此限。\n（三）建築物除供一般處理場所使用外，尚供其他用途者。但以無開口且具一小時以上防火時效\n之牆壁、樓地板區劃分隔者，不在此限。\n二、室內儲存場所符合下列規定之一者：\n（一）儲存或處理公共危險物品數量達管制量一百倍以上者。但儲存或處理高閃火點物品，不在\n此限。\n（二）總樓地板面積在一百五十平方公尺以上者。但每一百五十平方公尺內以無開口且具一小時\n以上防火時效之牆壁、樓地板區劃分隔，或儲存、處理易燃性固體以外之第二類公共危險\n物品或閃火點在攝氏七十度以上之第四類公共危險物品之場所，其總樓地板面積在五百平\n方公尺以下者，不在此限。\n（三）建築物之一部分供作室內儲存場所使用者。但以無開口且具一小時以上防火時效之牆壁、\n樓地板區劃分隔者，或儲存、處理易燃性固體以外之第二類公共危險物品或閃火點在攝氏\n七十度以上之第四類公共危險物品，不在此限。\n（四）高度在六公尺以上之一層建築物。\n三、室內儲槽場所達顯著滅火困難者。\n四、一面開放或上方有其他用途樓層之室內加油站。\n\n前項以外之公共危險物品製造、儲存或處理場所儲存、處理公共危險物品數量達管制量十倍以上\n者，應設置手動報警設備或具同等功能之緊急通報裝置。但平日無作業人員者，不在此限。"],[1,"206","加油站所在建築物，其二樓以上供其他用途使用者，應設置標示設備。"],[1,"206-1","下列爆竹煙火場所應設置第五種滅火設備：\n一、爆竹煙火製造場所有火藥區之作業區或庫儲區。\n二、達中央主管機關所定管制量以上之爆竹煙火儲存、販賣場所。\n\n建築物供前項場所使用之樓地板面積合計在一百五十平方公尺以上者，應設置第一種滅火設備之\n室外消防栓。但前項第二款規定之販賣場所，不在此限。"],[1,"207","可燃性高壓氣體製造、儲存或處理場所及加氣站、天然氣儲槽、可燃性高壓氣體儲槽，應設置滅\n火器。"],[1,"208","下列場所應設置防護設備。但已設置水噴霧裝置者，得免設：\n一、可燃性高壓氣體製造場所。\n二、儲存可燃性高壓氣體或天然氣儲槽在三千公斤以上者。\n三、氣槽車之卸收區。\n四、加氣站之加氣車位、儲氣槽人孔、壓縮機、幫浦。"],[0,"第 二 章 消防安全設備"],[1,"209","室內消防栓設備，應符合下列規定：\n一、設置第一種消防栓。\n二、配管、試壓、室內消防栓箱、有效水量及加壓送水裝置之設置，準用第三十二條、第三十三\n條、第三十四條第一項第一款第三目、第二項、第三十五條、第三十六條第二項、第三項及\n第三十七條之規定。\n三、所在建築物其各層任一點至消防栓接頭之水平距離在二十五公尺以下，且各層之出入口附近\n設置一支以上之室內消防栓。\n四、任一樓層內，全部室內消防栓同時使用時，各消防栓瞄子放水壓力在每平方公分三點五公斤\n以上或 0.35MPa 以上；放水量在每分鐘二百六十公升以上。但全部消防栓數量超過五支時，\n以同時使用五支計算之。\n五、水源容量在裝置室內消防栓最多樓層之全部消防栓繼續放水三十分鐘之水量以上。但該樓層\n內，全部消防栓數量超過五支時，以五支計算之。\n\n室內消防栓設備之緊急電源除準用第三十八條規定外，其供電容量應供其有效動作四十五分鐘以\n上。"],[1,"210","室外消防栓設備應符合下列規定：\n一、配管、試壓、室外消防栓箱及有效水量之設置，準用第三十九條、第四十條第三款至第五款、\n第四十一條第二項、第三項之規定。\n二、加壓送水裝置，除室外消防栓瞄子放水壓力超過每平方公分七公斤或 0.7MPa 時，應採取有效\n之減壓措施外，其設置準用第四十二條之規定。\n三、口徑在六十三毫米以上，與防護對象外圍或外牆各部分之水平距離在四十公尺以下，且設置\n二支以上。\n四、採用鑄鐵管配管時，使用符合 CNS\n\n八三二規定之壓力管路鑄鐵管或具同等以上強度者，其\n\n標稱壓力在每平方公分十六公斤以上或 1.6MPa 以上。\n五、配管埋設於地下時，應採取有效防腐蝕措施。但使用鑄鐵管，不在此限。\n六、全部室外消防栓同時使用時，各瞄子出水壓力在每平方公分三點五公斤以上或 0.35MPa 以上；\n\n放水量在每分鐘四百五十公升以上。但全部室外消防栓數量超過四支時，以四支計算之。\n七、水源容量在全部室外消防栓繼續放水三十分鐘之水量以上。但設置個數超過四支時，以四支\n計算之。\n\n室外消防栓設備之緊急電源除準用第三十八條規定外，其供電容量應供其有效動作四十五分鐘以\n上。"],[1,"211","自動撒水設備，應符合下列規定：\n一、配管、配件、屋頂水箱、試壓、撒水頭、放水量、流水檢知裝置、啟動裝置、一齊開放閥、\n末端查驗閥、加壓送水裝置及送水口之設置，準用第四十三條至第四十五條、第四十八條至\n第五十三條、第五十五條、第五十六條、第五十八條及第五十九條規定。\n二、防護對象任一點至撒水頭之水平距離在一點七公尺以下。\n三、開放式撒水設備，每一放水區域樓地板面積在一百五十平方公尺以上。但防護對象樓地板面\n積未滿一百五十平方公尺時，以實際樓地板面積計算。\n四、水源容量，依下列規定設置：\n（一）使用密閉式撒水頭時，應在設置三十個撒水頭繼續放水三十分鐘之水量以上。但設置撒水\n頭數在三十個以下者，以實際撒水頭數計算。\n（二）使用開放式撒水頭時，應在最大放水區域全部撒水頭，繼續放水三十分鐘之水量以上。\n（三）前二目撒水頭數量，在使用密閉乾式或預動式流水檢知裝置時，應追加十個。\n五、撒水頭位置之裝置，準用第四十七條規定。但存放易燃性物質處所，撒水頭迴水板下方九十\n公分及水平方向三十公分以內，應保持淨空間，不得有障礙物。\n\n自動撒水設備之緊急電源除準用第三十八條規定外，其供電容量應供其有效動作四十五分鐘以上。"],[1,"212","水霧滅火設備，應符合下列規定：\n一、水霧噴頭、配管、試壓、流水檢知裝置、啟動裝置、一齊開放閥及送水口設置規定，準用第\n六十一條、第六十二條、第六十六條及第六十七條規定。\n二、放射區域，每一區域在一百五十平方公尺以上，其防護對象之面積未滿一百五十平方公尺者，\n以其實際面積計算之。\n三、水源容量在最大放射區域，全部水霧噴頭繼續放水三十分鐘之水量以上。其放射區域每平方\n公尺每分鐘放水量在二十公升以上。\n四、最大放射區域水霧噴頭同時放水時，各水霧噴頭之放射壓力在每平方公分三點五公斤以上或\n0.35MPa\n\n以上。\n\n水霧滅火設備之緊急電源除準用第三十八條規定外，其供電容量應供其有效動作四十五分鐘以上。"],[1,"213","設於儲槽之固定式泡沫滅火設備，依下列規定設置：\n\n一、泡沫放出口，依下表之規定設置，且以等間隔裝設在不因火災或地震可能造成損害之儲槽側\n板外圍上。\n┌──────────────┬─────────────┐\n│\n\n建築構造及泡沫放出口│泡沫放出口應設數量\n\n│\n\n種類\n\n│\n\n├─────┬───┬───┤\n\n│\n\n│固定頂儲槽│內浮頂│外浮頂│\n\n│\n\n│\n\n│\n\n├──┬──┼───┼───┤\n\n│儲槽直徑\n\n│Ⅰ或│Ⅲ或│Ⅱ型\n\n│特殊型│\n\n│\n\n│Ⅱ型│Ⅳ型│\n\n│\n\n│儲槽\n\n│儲槽\n\n│\n\n│\n\n├──────────────┼──┼──┼───┼───┤\n│未達十三公尺\n\n│\n\n│\n\n│二\n\n├──────────────┤\n\n│\n\n├───┼───┤\n\n│十三公尺以上未達十九公尺\n\n│一\n\n│三\n\n├──────────────┤\n\n│\n\n├───┼───┤\n\n│十九公尺以上未達二十四公尺\n\n│\n\n│四\n\n│一\n\n│\n\n│二\n\n│三\n\n│四\n\n│\n\n│\n\n│\n\n├──────────────┼──┼──┼───┼───┤\n│二十四公尺以上未達三十五公尺│二\n\n│二\n\n│五\n\n│五\n\n│\n\n├──────────────┼──┼──┼───┼───┤\n│三十五公尺以上未達四十二公尺│三\n\n│三\n\n│六\n\n│六\n\n│\n\n├──────────────┼──┼──┼───┼───┤\n│四十二公尺以上未達四十六公尺│四\n\n│四\n\n│七\n\n│七\n\n│\n\n├──────────────┼──┼──┼───┼───┤\n│四十六公尺以上未達五十三公尺│五\n\n│六\n\n│七\n\n│七\n\n│\n\n├──────────────┼──┼──┼───┼───┤\n│五十三公尺以上未達六十公尺\n\n│六\n\n│八\n\n│八\n\n│八\n\n│\n\n├──────────────┼──┼──┼───┼───┤\n│六十公尺以上未達六十七公尺\n\n│八\n\n│十\n\n│\n\n│九\n\n│\n\n├──────────────┼──┼──┤\n\n├───┤\n\n│六十七公尺以上未達七十三公尺│九\n\n│十\n\n│十二│\n\n│\n\n├──────────────┼──┼──┤\n\n├───┤\n\n│七十三公尺以上未達七十九公尺│十一│十四│\n\n│十一\n\n├──────────────┼──┼──┤\n\n├───┤\n\n│七十九公尺以上未達八十五公尺│十三│十六│\n\n│十二\n\n├──────────────┼──┼──┤\n\n├───┤\n\n│\n\n│\n\n│八十五公尺以上未達九十公尺\n\n│十四│十八│\n\n│十二\n\n│\n\n├──────────────┼──┼──┤\n\n├───┤\n\n│九十公尺以上未達九十五公尺\n\n│十三\n\n│十六│二十│\n\n│\n\n├──────────────┼──┼──┤\n\n├───┤\n\n│九十五公尺以上未達九十九公尺│十七│二十│\n\n│十三\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│二\n\n│\n\n├──────────────┼──┼──┤\n\n├───┤\n\n│九十九公尺以上\n\n│十九│二十│\n\n│十四\n\n│\n\n│\n\n│\n\n│\n\n│\n\n│四\n\n│\n\n├──────────────┴──┴──┴───┴───┤\n│註：\n\n│\n\n│一、各型泡沫放出口定義如左：\n\n│\n\n│（一）Ⅰ型泡沬放出口：指由固定頂儲槽上部注入泡沫之放出口│\n│\n\n。該泡沫放出口設於儲槽側板上方，具有泡沫導管或滑道│\n\n│\n\n等附屬裝置，不使泡沫沉入液面下或攪動液面，而使泡沫│\n\n│\n\n在液面展開有效滅火，並且具有可以阻止儲槽內公共危險│\n\n│\n\n物品逆流之構造。\n\n│\n\n│（二）Ⅱ型泡沫放出口：指由固定頂或儲槽之上部注入泡沫之放│\n│\n\n出口。在泡沫放出口上附設泡沫反射板可以使放出之泡沫│\n\n│\n\n能沿著儲槽之側板內面流下，又不使泡沫沉入液面下或攪│\n\n│\n\n動液面，可在液面展開有效滅火，並且具有可以阻止槽內│\n\n│\n\n公共危險物品逆流之構造。\n\n│\n\n│（三）特殊型泡沫放出口：指供外浮頂儲槽上部注入泡沫之放出│\n│\n\n口，於該泡沫放出口附設有泡沫反射板，可以將泡沫注入│\n\n│\n\n於儲槽側板與泡沫隔板所形成之環狀部分。該泡沫隔板係│\n\n│\n\n指在浮頂之上方設有高度在零點三公尺以上，且距離儲槽│\n\n│\n\n內側在零點三公尺以上鋼製隔板，具可以阻止放出之泡沫│\n\n│\n\n外流，且視該儲槽設置地區預期之最大降雨量，設有可充│\n\n│\n\n分排水之排水口之構造者為限。\n\n│\n\n│（四）Ⅲ型泡沫放出口：指供固定頂儲槽槽底注入泡沫法之放出│\n│\n\n口，該泡沫放出口由泡沫輸送管（具有可以阻止儲槽內之│\n\n│\n\n公共危險物品由該配管逆流之構造或機械），將發泡器或│\n\n│\n\n泡沫發生機所發生之泡沫予以輸送注入儲槽內，並由泡沫│\n\n│\n\n放出口放出泡沫。\n\n│\n\n│（五）Ⅳ型泡沫放出口：指供固定頂儲槽槽底注入泡沫法之放出│\n\n│\n\n口，將泡沫輸送管末端與平時設在儲槽液面下底部之存放│\n\n│\n\n筒（包括具有在送入泡沫時可以很容易脫開之蓋者。）所│\n\n│\n\n存放之特殊軟管等相連接，於送入泡沫時可使特殊軟管等│\n\n│\n\n伸直，使特殊軟管等之前端到達液面而放出泡沫。\n\n│\n\n│二、特殊型泡沫放出口使用安裝在浮頂上方者，得免附設泡沫反│\n│\n\n射板。\n\n│\n\n│三、本表之Ⅲ型泡沫放出口，限於處理或儲存在攝氏二十度時一│\n│\n\n百公克中水中溶解量未達一公克之公共危險物品，（以下稱│\n\n│\n\n「不溶性物質」）及儲存溫度在攝氏五十度以下或動粘度在│\n\n│\n\n100cst\n\n以下之公共危險物品儲槽使用。\n\n│\n\n│四、內浮頂儲槽浮頂採用鋼製雙層甲板（Double deck） 或鋼製│\n│\n\n浮筒式（Pantoon） 甲板，其泡沫系統之泡沫放出口種類及│\n\n│\n\n數量，得比照外浮頂儲槽設置。\n\n│\n\n└────────────────────────────┘\n\n二、儲槽儲存不溶性之第四類公共危險物品時，依前款所設之泡沫放出口，並就下表所列公共危\n險物品及泡沫放出口種類，以泡沫水溶液量乘以該儲槽液面積所得之量，能有效放射，且在\n同表所規定之放出率以上。\n┌───┬────┬────┬────┬────┬────┐\n│泡沫放│Ⅰ型\n\n│
